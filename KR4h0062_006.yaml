body:
  text: 蘇門六君子文粹卷六宛丘文粹一宋張耒撰論子産論天下之大患莫大於不量力而不量力之患起於好髙今夫使人皆量力而無慕於賢巳者疑若怠惰而無志而不知夫力之所受於天者莫不有極強任而過使之則將有禍嗚呼怠惰而無志不猶愈於禍歟吾知量力之不可廢也今夫天下之才自匹夫以至聖人其别無窮然大要有三而巳上智中人下愚是也昔者聖人之治天下使民畏也有不待刑使人愛也有不待賞夫無刑賞而畏愛行焉此天下之絶德也夫惟聖人而後能之使中人之才其為治也去賞與刑以求天下之畏愛曰吾將學聖人也則亦敗而巳矣使量力而行之治刑以明威信賞以施愛其誰曰不可以謂德不及於聖人耶不猶愈於敗乎夫烏獲之力至於舉千鈞而弱者至不勝一石以一石之力而負千鈞則膂絶而死此又天下之所知也昔者鄭國有災有勸子産使遷國者子産曰吾不足以定遷矣夫遷國以免災與夫安坐以待不測之禍二者孰利也然子産知其力之不能及則寧為安坐之計姑求其力之所及者而行之豈其心以謂不能定遷則其禍將甚於安坐而待患歟蓋子産嘗鑄刑書而叔向非之子産卒行之也彼以謂議事以制不為刑辟者非我之所能故也豫讀書至此未嘗不竊嘆古之君子其智慮深逺而較利害也詳量分審力而不誘於天下之浮説而深悲後世之惑者矣夫宋襄公之求諸侯徐偃王之行仁義卒無所就而敗隨之而世之人遂悲仁義之不效而不知二人者果能為文王之事歟非仁義之負二人二人之負於仁義也或曰天下之人不可以好卑而務近而量力之論殆不可以訓嗚呼使無妄學聖人者是豈使無學其德耶吾惡夫無其德而僭其事者也彼聖人之為聖豈好髙而為之哉其中之所有舉而措之而己使誠有其德吾何愛聖人之事而不使為之哉魯仲連論昔者君子之於仁義其行之非不勤而好之非不篤也然動而不得其中則君子不為是故罪至於可殺君子不生之以為恩而鄉閭之鬬勢有不可救則捨而不顧凡天下之事有可以不為而非不義者君子不強以為義也嗚呼君子之道豈固若是恝然而己哉彼誠以為事至於可以不為而無我責而我鰓鰓然求為之以為功則夫世之求為君子者蓋亦甚勞而我之心無乃非出於樂而後為之歟蓋昔者夫子之道未嘗不出於忠恕而其所以待物者亦甚厚矣然陳恆弒其君則孔子沐浴而言之朝告其君而請討之至其不能討而孔子不強也門人有以謂報怨以德者而夫子以謂何以報德出而告之朝者吾之所職者止矣鄰國之不討賊非我之責也受人之德而樂之加我以惡而怨之者是天下之常情也以德復德以怨復怨則理亦足矣彼天下之人必將以所樂施所惡則夫為善者不亦枉其情歟彼魯仲連者里閭之自好者耳安知夫所謂真仁義者也以布衣遊諸侯而不食其祿不當天下之責而出身以救天下之患功成事立而不享其報此仲連之所以為賢歟嗟夫仲連之所以為賢乃其所以為戻也夫當其位而後憂食其祿而後勞施其功而享其利解其憂而享其樂者孔子孟子之所不能過也而仲連者獨能不然吾見其越常棄禮亂世敗俗而己矣夫無責而憂人之憂致力而不享其報則使世之中人不勉於義必自仲連始使天下之賢者必如仲連而後可則亦率天下為偽而己矣蓋施義而不當其處者義之賊也嘗聞之昔者夫子之道所以行乎天下後世而不能廢者惟其不強仁義以為賢而不捨仁義以求自便也不強以為賢故為賢者不難不捨以為便故不為者有所畏夫人不可不為而為之不難此天下之所以同守而不廢也而後之惑者嘗欲摩頂放踵以利天下而其自便者不以仁義易身之一毛而天下卒去之然則夫子之道為不可易也商君論昔者商君之治秦貴利尚功明賞罰信號令使其日夜趨於功利之域而無間暇樂生之心勇於公戰怯於私鬬蓋凡所以養生者非從事於公不可得也不過十年而秦遂以強後世因之以有天下蓋始皇之亡自商君啓之而世之議者以謂秦以商君而興而不知商君之術是秦之所繇亡也今夫世之善養生者和其血氣平其心志安養而徐用之導引屈伸以宣其滯而導其和故藥石食飲平易而舒緩惟其然故其效也得其所欲而無後害有賤丈夫焉不知其為如此不能忍歲月之勤而急其效於耳目之前於是服毒石餌惡草以激之方其效也剛壯勇力倍於平時然不過數年之後草石之力巳盡而遺毒餘孽潰裂四出故癰疽壞決之變一曰皆作而不可制至於是而不死者未之有也嗚呼用民之道亦何以異於此昔者三代之聖人也其得天下也不為旦夕之謀揉伏其民而和輯其國一出於愷悌忠厚之政使其民無勉強不得己之心故其功成事立而民莫有厭之之意是以享國長久而無後憂彼商君以謂仁人之術非所以速功朝有所為而夕望其利日夜峻治其刑罰以驅迫其民斬艾懲創以齊肅其怠惰之氣汲汲然常若不可以終日故方其效也所求者得所敵者破徭役使令莫不如意然至於後世天下己定而吾之所欲巳得而後前日憤毒之志乃始大發而不可制故更二世而秦亡原其所以取怨於下者豈一日之積歟嗚呼商君實首之也夫民之力人之血氣一也可以徐治而不可以求近功夫欲求近功則必出於深刑痛罰毒石惡草夫四者用而危亡之禍可立而待故曰商君之術是亡國之術也應侯論豫觀應侯之入秦其心未嘗不在穰侯也彼范睢困苦展轉既瀕於死其求報於魏也切骨腐心不可終日故其將奪穰侯之位而代之也慎重周審不敢輒發非如朝遊夕説之士徼幸一言而勝之何者其怨魏之心重故傾穰侯之心必傾人之心必則其計必出於萬全故其上秦昭王書曰其深者不敢載之於書及見秦王乃先言越韓魏以伐齊之非計也陽陳外事以嘗秦王之心而自固其權事成勢固乃一言穰侯太后之専恣不終朝而逐之則睢之憚穰侯而不敢輕發豈不甚哉太史公不序睢事如此乃言睢之始見秦王誤入永巷聞有穰侯太后而不聞有王也何言之誤耶且睢與秦王相得數年而後敢言穰侯太后之事者知己之與王交密勢定而計穰侯之不能奪之也其始不敢載之於書一見秦王而不敢及之者知徒攖其鋒不足以成吾事而吾將受其禍故也且一見秦王而語穰侯太后之惡如此彼獨不畏穰侯之聞之歟以匹夫無援之分而斥骨肉子母之親非獨取患於穰侯秦王亦且逐之矣彼雎之入關料穰侯之惡諸侯之客下車而逃之其為計如此萬有一幸而得見王徐徐而圖之何所不可而遽為是鹵莽之計哉且秦自孝公以來操法繩下最嚴於宫闥之禁所以自衛者皆以峻法防其下故荆軻刺始皇而殿下之兵不敢輒動安有誤入永巷事耶揚子曰子長多愛愛竒也此亦好竒之過歟吳起論吾讀吳起傳觀與田文論功發三問文不得一然則起之才豈淺淺者耶及田文為之言主少國疑大臣未附百姓不信當是時屬之子乎屬之我乎起曰屬之子矣吾嘗疑起才何獨短於此而不敢與文較及觀起之相楚方悼王之死未幾而楚之宗室大臣起而殺吳起方是時悼王死起相新君可謂主少國疑矣起也於是乎不免然則起之才是誠短乎此則其始無以抗田文之言蓋無足怪而田文之於知人也亦明矣然則田文之知起之不足以處此者何説也蓋起之為人也明厲而不達於變從事於法而不知權是二者蓋相疑國輔少主親未附而安不信者之所深忌也昔者鄭國有難而子孔當國乃為載書以序位聽政辟而子産請焚之夫子孔之為載書敘羣臣而使之聽政豈有所不可哉而子産請焚而鄭國果定何也蓋誠未加於物則吾之所為衆之所疑故急之則亂繩之則怨方是時法有所不行是非有所不較徒知吾法之不欺而不顧物之情此取禍之道也故曰衆怒難犯専欲難成蓋當新造之國與夫衆情反側之際者不可以求定乎法而取必於理之是非而其權乃在夫人情可否之際此子産所以焚之而國定也史稱吳起治楚明法審令捐不急之官廢公族疏逺者夫起當新難之國輔未壯之主而馭不附之大臣與不信之百姓而其所行苟若是而不知變是其死也不亦宜乎嗚呼智士因變聖人乘時一龍一蛇與化推移庸得而制之哉吾悲吳起之志故論其説云陳軫論陳軫之辨不及蘇秦張儀然軫常從容於戰國之際而儀秦汲汲不能輔其所不及秦以客死儀逃於魏其周流諸國不得少休用智巧而為力勞何也蓋遊説不可取必於一端而儀秦之術一定故也何者蘇秦必於從張儀必於橫夫一室之人不同心一日之心不同事以叛散相傾之六國而使之一心以為從雖孺子知其不可以久此蘇秦之所窮且天下常見為從之利矣一日而散為橫雖足以解約然合散未可必此張儀之蔽也從者不敢橫雖見橫之利而不敢陳也而遊説以非之是強其所不親橫者不敢從雖見從之利亦不敢陳而強詞以亂之是讒其所不怨強其所不親是交胡越之道也讒其所不怨是間兄弟之道也天下固有胡越之可親而兄弟為可間者矣然其親與間之際勞矣且夫交胡越者是必親之而後可間兄弟者是必間之而後可中道不幸而謀失者必敗故儀秦之身顛沛而瀕於禍者數矣秦以此死而儀僅以免故從橫者危道也橫常負天下之責從則任天下之咎故從而散者蘇秦負其責橫而合者張儀任其咎然天下之勢故不一要之合散必不可以一定夫操不可以一定之勢而身當其任故曰從橫者危道也陳軫之智不逮二子而不主從橫之任乘勢伺變而行其説故其為説不勞而其身處於安逸然則軫者説士之巨擘也蘇門六君子文粹卷六
