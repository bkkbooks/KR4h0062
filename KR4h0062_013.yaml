body:
  text: 蘇門六君子文粹卷十三宛丘文粹一宋張耒撰議用民篇國能用其民者强不能用其民者弱今夫供天子之役者天下之民供一國之役者一國之民也不於民而役之則將孰取以為役臣未聞將辦天下之事不責於天下之民而判然又有供役者也先王知其然故常以教勤天下之民使各效其力而給吾之用大之為戰鬬次之為力役至於㑹聚召集飲饗田獵大呼則大至小召則小應進退往反惟所欲為而無有違拂沮閼於前者是以國强而天下莫能窺先王之道既微諸侯爭强征伐四出莫能有以相勝而管仲獨明其故於是相桓公而行其術三分其國以為三軍二十一鄉五人而為軌則五人之長也十軌而為里則五十人之帥也四里為連則二百人之帥也十連為鄉則二十人之將也公帥十有一鄉而髙子國子各帥其五於是有中軍之鼓有髙子國子之鼓授之以政令閲之以搜狩屬之以賞罰舉齊國之民無不為齊之用者提兵而鼓之三方之衆如一人三軍之情如一家此桓公所以橫行天下徜徉四方而霸諸侯諸侯之國既亡裂為戰國而未知所定商鞅獨明其故而相秦孝公於是什五秦國之民而使之相教告姦者賞之如斬敵匿姦與不告者誅民有二男以上不分異者倍其賦爵軍功止私鬬致粟多者復其身事末利者收為孥鋤去怠惰驕慢之心而振作功名勇敢之意於是全秦之民踴躍奮迅人自為戰以攻則取以守則固開關東向而天下無敵夫齊秦之君所以得志於天下兵强地大而莫敢抗者無他說也彼惟能用其民故也方是時南有楚北有晉西有秦兵民土壤未必不如桓公也三晉之戎馬荆郢之精兵負海之魚鹽未必不如秦也而諸侯東面而朝齊命出而不敢抗亦非有他說也彼惟不能用其民故也故曰能用其民者强不能用其民者弱夫君者乘車者也民者為車與馬而載君以行者也使之馳則馳使之止則止步驟進退惟乘者之為聽夫如是則車馬之利可愛也乘者欲止而轍不順奔蹄傾側與人異向則曽不如徒行大獲車馬之利而後為齊秦惟其有車馬而曾不如徒行此諸侯之所以折而入於齊秦也伏惟陛下獨立千載積弊之後而奮張三代知逺圖深見先王之用心而善操强國之大柄故立保甲之法以什伍其民自五家之小保而為二十五家之大保自二十五家之大保而為二百五十家之都保此誠先王所以親比其民而使歡欣相保憂患相恤無事使相師有事使相用之道而管仲衛鞅祖述之所自出者也如前所謂用民者陛下既行之矣臣猶敢為是說者以謂今保甲之政尚有詳略之殊臣欲繕其或闕而責其未周提天下之全威以制四夷而後為足也臣竊見今天下保甲行伍之法惟王畿與五路備邉之地而已練習教戒可用以操兵自是而往亦少略矣今若使天下保甲盡如五路備邉之地畨休教習則用或未息而臣獨以謂便今所謂都保大保小保之正長則其制當以加詳也夫軍五人而為之長必其所長過夫五人自是而上至於二百五十人之長則必智足帥是二百五十人者而後責以帥屬也立法而設正長非不使選擇而後補也然郡邑或未能悉如國家之意夫一無所長而强加之名則受侮遭謔之不暇而况能帥糾其屬歟故臣欲令自小保大保之長與都副保正有闕有司召其屬之人而躬擇之或其智可以辦事其武足以止盜而後授之臣又欲令提㸃刑獄之官每嵗一按所部期諸保之長使各集所近之地而閲之其尤不如法者大率十人己上則令佐為有罪如是則擇之當加審夫擇之得宜則正長之名不濫而率屬糾衆之責有司有以責之矣今日畿內五路之外保甲之非近邉者雖不使之悉操兵所謂正長者既擇則授之授之之際必使之具弓矢且曰將使爾防所部之盜也夫徒有弓矢而不知所用猶無之也故臣以謂既使具弓矢而後告之曰嵗終吾將閲之臣欲以每嵗之仲冬農事既閒而令尉合本部之正長而大閲之略為賞具以旌其技之能者而鞭其尤無良者每嵗一試著為定令夫野人之情易以勸沮動而難以言語喻其視上之所抑揚而尤以為榮辱夫使之榮辱於吾之勸沮雖不力教之有司而私家之習亦宜勉勵而嵗一閲之又獨在其正長則民固不勞而於事未有費也大抵正長二嵗而一更如是而行之則嵗久民皆足以執弓矢深山江湖之盜操刀於村落而不忌者何也知民之不習武故也一鄉之聚有善射者十夫則盜且不敢發况皆可用之民乎而議者以擾為說則先王之時一年而從事於畋者四其聞金鼓以振作從車馬以馳逐者皆平日塗手沾足於田野之民也後世兵農分而後有専於農有専於戰者然則謂後世為便民而先王為擾民可乎四方萬里之外無一夫不為吾用而提天下之全威以臨四隅而後先王用民之效見矣廣才篇臣聞天下之事無窮先王應之以無窮之才故事起而不患無人雖然先王能使其人才不窮者豈徒恃吾養之使成求之使至哉所恃者能養能求而又能察使賢者畢用而無遺也三代之時養才備矣求之之道亦至矣然天子朝夕既與其公卿大夫相與議論於朝廷之上以深知其才之所長公朝之事既退而燕私之所親左右之臣僕階陛之􅉏御下至宰夫圉人莫非用天下之士而不聞有冗賤愚下不在此數之人其故何也先王將以廣察其人之賢否與其才之所長短故公卿大夫有闕焉則或於此取之其磊落竒偉之士往往因此而得自達於上有事而用則非特取於薦者一時之言而求辦於保任之責此先王所以使人才供吾用而不窮者也臣嘗見西漢之時外則有州郡之常選內則有天子非常之舉其求才之道備矣然獨武帝號為知人其將帥如衛青霍去病委任大事如霍光金日磾是數人者或起於近習或拔於階闥當是時天子之左右賤役下至於戲玩厮養之臣莫不有可用之才雖獸圈嗇夫養馬牧羊皆能立功名於時者何也武帝引天下之士與之同居於禁闥之中故凡起居動靜之所役使悉用天下之士朝夕之所熟耳目之所審故其器能才技悉簡於上心是以事至變起則卒然拔取於微賤無聞之中駭笑者未定而武帝之心固己了然知其必濟吾事矣此英主之要道也嗚呼武帝之初宿將大臣既盡而一時新進皆足以辦事而武帝之所選蓋終武帝之世猶用之而未盡也故人君之用才猶獵夫之用矢獵夫操弓而遊於山前虎兕而後豺狼獵夫安然而不憂者何也箙中之矢未有盡也一矢之力盡則一矢繼之矣以不可窮之矢當不遽斃之獸而後能有獲而免於害如獸未盡而矢遽窮取辦於一發而後莫知所繼如是而能獵者未之有也故人君急于察才而獵夫急于聚矢伏惟陛下奮張中興之逺圖而上察衰季之弊陋文武並用賢能兩進外有學校三舍武學以養天下之英豪而三年一進多士坌進授命於庭而入官者宜數百人而公卿大夫子孫世祿者亦不可勝數養之使有成來之能無壅者雖三代亦蔑有加之矣然自陛下造起太平趨事赴功能悉如陛下之意委曲周旋不使陛下勞心於中者幾人乎甚者邉境師旅之際攻城能克得地能守遇敵能摧乘間能搗以奉揚陛下之威神於萬里絶漠之外者又幾人也臣誠不佞不敢妄論其餘臣以謂今之所尤少者將帥之臣也夫三代兩漢之盛時天下之人亦今之人也其養之取之之術雖少有異同然大抵亦今之道也何獨今之士大夫而有乏人之嘆哉臣知其不然矣而臣之私意竊以謂養之厚矣求之廣矣而所以觀察之路尤當廣之耳臣不敢臆料朝廷之事然竊以謂陛下之所深知者莫如輔弼侍從之臣其次莫如邉鄙之將帥又其次莫如諸路之監司臺寺學校之長要州劇郡之守過是三者則朝廷未有察之之端而小臣末官無路自達於上夫向之所謂三者其人之數能幾何也而小臣末官常僚冗列乃不可勝數於不可勝數之中其所遺者臣疑其亦不可勝數也夫監司之保任三年而為縣令七考而為京官者未足以察小臣也或出於請託或出於私恩况於所謂監司者或未足以知人庸人淺夫各挾所好投類而進何者不有此其不足恃也審矣故臣願朝廷略取漢家之制直廬殿中執㦸階陛與門扃階闥之役左右僕從之細頗選天下之士或以德行或以吏事或以文學或以辨說外使薦之監司內使舉之公卿考察精審而後授之使得從逰幸備顧問分所掌而多為之員庶乎天下之賤士得進於天子之前而陛下察才觀能之路亦巳漸及於下一人之仕限三年設授仕者五十人三年而一易則且計十年之中大率小臣之才能厯於視聽者己百餘人自是而積之將不可勝數使雖未得過人之能然才足以補朝廷智足以乘保塞亦宜稍稍而出矣非獨如是也不繇左右之薦論而出於陛下之考察則請託消而私恩不歸於下而公選出於天子則朋比蔽欺之患絶此亦天下之善計也或者不過以謂省閣之禁密左右之親近不當使外人處之臣則以謂當分直列職嚴為法禁一切禁其公謁慶弔之路而使內臣武官錯居以相察則亦無不可者苟以謂不信而疑之歟則君子小人隨類而有內外一也擇將篇上將主於智而勇為下智之必有勇勇之不必智智能使勇勇者不能使智立軍於此則智者上而勇者下蓋將軍拱手而不能射未害也戰士之箭不穿札則斥之矣用衆於此則智者謀而勇者行譬之人身手足之為力者搏擊於前耳目為之觀聽者夫何事於動作也故曰將主於智而勇為下今夫天下之將其智足以觀成敗審彼我術足以役百萬人之衆而無疑於胸中則其遇敵之隙有不能襲而見我之利有不能動者耶夫疑畏不勇見害而不能避見利而不敢赴者必於利害不眀故也使其視利害如平日之白黑則變至於前有不能為之應者乎天下固有氣陵三軍而才不足以治一邑勇陷萬夫而術不足以守一壘故曰智者必有勇勇者不必有智童子出令而不失則豪奴悍僕趨於堂下鵰鶚之力未必不能制人也然人實用之未聞鵰鶚之能制人也故曰智者能使勇勇者不能使智所謂擇將者非擇勇也將以擇智也一鄉之人銖銖而程其力則必得一人焉力足以雄一鄉夫力足以雄一鄉則一鄉之勇人也是故天下不患乎無勇夫至於一鄉之中求一人焉智足師一鄉使之順令從教畏而不敢議則百鄉之中未有一人蓋千室之邑必有令萬室之郡必有守天下固有郡邑十數而無一賢守令者矣而况乎付以百萬之衆而臨仇怨之敵決成敗可否於俄頃之勝否者何啻求之百鄉之中而未有一人雖半天下未必有也故智者常難得如是則勇者有所不必擇而智者不可一日而不求雖然天下之智將非徒如是也蓋知之至難用之為尤難何者萬人之衆至多也欲程其勇乎合圍而畋虎豹興乎前㷱羆勃乎左袒裼徒搏大呼直前而不畏者必勇於黨者也畏縮而不敢先與夫隨衆而進退者其常材也夫終日而畋則萬夫勇怯吾能數之矣故勇者易知夫般倕之巧于創室也非巧於斧斤也百匠斫木而成屋般倕傍睨而杜口則誰知般倕之智過於百匠哉使般倕雖為之言然授之斧斤而不能運遣之斫削而不能工則信般倕之為巧者蓋百人未有一人也故智者常難知昔辛武賢為漢宣帝畫伐先零之䇿宣帝不終朝而從之趙充國智將也為之陳屯田之計謀已審矣宣帝反覆詰難督使進取非充國之堅守不顧則其說幾不行其後充國之計已效而武賢之計與充國之䇿終兩用之夫何其勤勤不忍棄於進取之武賢而黽勉不獲已於持重之充國也蓋人君樂用勇將而不快於用智將非獨人君於將為然也凡人之情皆然一家而有二子焉一力農一為商為商者冒山險涉江湖征利而不顧其身不終年而獲千金力農者終嵗勤力安居不出非大豐多收則終嵗之入不足以為喜故人之父母未有不快為商之千金而以終嵗常安之入為庸庸也冒險而商者勇將也勤力務農者智將也故勇將常以樂用而不遺智將常以不快而遭廢雖然一日覆舟敗車而不能反使家失壯子而忽喪其千金之積者必行商者也力耕而不廢竭力而不失厯年而積之持久而得富焉者十常八九故不計其後日之患則不能勝其初用之喜故用智將之為尤難夫知人之眀各得諸心而不能以自言則夫將求知智者之心是宜不可以言語達而明者或逆得之於心然大率臨事不亂慮事不遺治繁多而力有餘更變故而術不窮者必智也夫無遺事固與鹵莽者異形而無亂志固與狼狽者殊觀力不足者自不能為有餘而術易竭者豈可使不窮則其迹又有較然必見于外而易别者此亦覩智者之一道也夫決萬全之生死事之至危者也謀人之國都技之至難者也事至危者非先有至安之地則不可動技至難者非先得至易之術者不可行二者非要以持久則至安至易之道不可以遽得故人君於此必有堅忍不拔之心小挫不足以敗成計而小勝不足以易至謀以吾從容勿迫之心要於必成之地者用智者之道也擇將篇下前之所論者智將勇將之輕重矣試更言智與勇之效古之伐胸奴而能力戰深入致死不顧者莫如衛青霍去病青凡七出而去病凡六出其為攻戰不為不多當其出也必有所俘斬計兩人之出殺掠不知其幾何則其為捕虜不為不至如史之所載元狩四年兩軍之討胸奴者出塞之馬十有四萬比其返也存者三萬而已自是推之則士卒之耗鎧甲之亡而貨財經費所以振贍三軍者自始至終幾不可計矣則其為用財不為不厚夫攻戰如此之多捕虜如此其衆而用財如此之廣則雖盡得胸奴之國繫單于而獻之闕下不足多怪而二將之功止于俘斬獲掠而不能大有所經制僅能築區區之朔方降懼誅之渾邪而已愚嘗論漢胸奴之盛與唐之突厥其初未甚相逺也然冒頓之盛嘗一至晉陽自是而後侵盜邉境殺掠吏民則有之矣不聞遂能涉中原近都邑而驚近甸之民而突厥之盛自隋以來侵邉境殺吏民者乃其所常患太宗之威强與李靖李績之智勇而頡利長驅中原至犯天下都邑蓋嘗一至渭橋與太宗隔水而陳則太宗突厥之初以事考之比之武帝之胸奴則又甚矣而李靖三千騎出惡陽嶺搗其不意而破壞其腹心一戰而復定襄即披其巢穴卒以竒䇿而擒頡利當是時俘獲之衆尚千萬計則頡利之勢亦未至於甚弱然遂復定襄常安之地踰隂山絶大漠唐遂以無突厥之患夫胸奴於漢未大甚也何衛霍廢心竭力之多而武帝竭財厯時之久而所得之效至於斥地數郡得一降將而李靖用力如此其少費財如此之簡而厯時如此之速又能大破積强之突厥至覆其國而虜其君嗚呼何其所遇之敵則同而用力之勞佚與成功之巨細異耶蓋衛霍勇將也知戰而已不足於謀李靖智將也謀與戰二者無所不可知戰而已則其用力固多而不足于謀也所以數出而少功謀與戰二者無所不可則當其戰也非苟勝而已謀定計成斬一夫如得萬夫破一陳如陷十陳搗其要害中其危病則用力少而為功多者固無足怪夫戰有時動有機因其時敵不能支乘其機敵不暇思夫衛霍豈足與言時與機之動哉直戰而已矣彼其失時與機而猶能勝者特出於其勇使無勇則敗之矣靖之御突厥大率再戰而已提兵再戰而收衛霍百戰之效者乘時趨機而不獨取辦於戰故也而或者以謂衛霍當胸奴之盛而靖當突厥之饑饉如武帝之深入窮追厯嵗之久其蹂踐焚蕩之所殘夷傷糜爛之所失叛降離二之所分雨雪饑饉之所困不可勝計單于乃更思和親之利則其國亦嘗衰矣以謂所遇盛衰之不同者非也夫青之度漠蓋嘗一對單于而不能得蘇建失軍而不敢戮而去病之降渾邪至戮八千人而嘗棄大軍天幸不至亡失夫伐不測之胸奴而不遇其軍者皆李靖之所深惜而去病之服渾邪獨倚斬艾之威蓋已危矣至于不戮蘇建而棄大軍此宜靖之所深笑故愚以是知衛霍勇將而已夫用勇將者足以快意目前然多費厯時而少大功用智將者雖滯於伺待然費輕省戰而收竒效則智勇之效可見矣蓋宣帝之時先零擾亂而趙充國嘆曰往者舉可先行羌者吾舉辛武賢而丞相御史乃用義渠安國竟沮敗羌吾嘗謂耿中丞積粟二百萬斛羌不敢動矣今所積才四十萬石而已失此二策故羌人敢為不順所謂失之毫釐差以千里而辛武賢乃始區區於力征深入以謂足以制敵嗚呼智將之收功者常在於未兆之前而勇將之成敗乃在於勝負之後則夫勇將之功是智將之所遺而智將之設施勇將終身繇之而不悟也彼衛霍者勇將之尤者而猶如此况其下者乎審戰篇臣嘗輕項梁教項籍以兵法籍略通其意不肯卒學而漢武欲教霍去病必以孫吳去病曰顧方略如何耳不至學古兵法其後籍與髙祖角馳於中原將諸侯之兵入關定秦遂霸天下而去病之方略雖不足稱然將輕鋭之卒入不測之地轉鬬千里踰險阻陟荒絶而未嘗失此亦必有以過人者而又常怪近世之士大夫其雄俊辨博好立武事而以將帥自許者則嘗竊疑之以謂用兵者果無事於古人之緒餘而一切務自己出也雖然天下之事豈有不學而自得者哉况夫兵者其術亦多矣是豈可以私意妄作而徼勝也蓋思之至而後知其故古之善戰者不必學非不學也不學其言而已若夫昔人之意則既得之矣故史稱項籍曰略知其意又不肯學啖炙者豈有知其美而不盡臠哉故不肯學者非不學也一得其意通之足矣後之言兵者傳昔人之言者也昔人之言有窮而用兵之變無極不能泮然盡悟昔人之心而徒欲以有窮之言而待無極之變嗚呼不終日而言已窮矣奕人之教奕也操圖置勢以教不能非使學者之不少變也要以寓其巧於是使學者因是得吾巧耳故善學者充其巧而遺其迹乃欲操一定不移之勢而無顧於敵者之情則亦敗而已矣故以謂用兵而不學者不可與言兵而必膠於古人之迹者亦不足用兵居學與不學之間而通古人之意而悟其致巧之妙者天下之善戰者也嘗試論之戰之術多矣有事不可而時可者昔者髙祖與項籍分天下而半居之陳平張良為之一言卷甲逐楚不顧敗亡而滅籍於垓下夫千里而逐利又犯强敵兵之所甚忌也而髙祖不顧者何也項籍有可亡之時而所犯之忌不足以害之故也是之謂事不可而時可者也有事不可而人可者韓信提兵於井陘客戰逺鬬不虞趙之絶其㗋驅兵而納其閾中夫逺鬬而士無宿糧敵險而輕犯者敗之道也而信不顧者何也知趙之愚將不足以知此雖示之以吾所忌而不能察故也此之謂事不可而人可者唐太宗以氣勝頡利於國都之中而李靖勒兵於北邉腹背而束之則頡利之衆可以徒手而就縛然太宗有必勝之勢不肯少動與之盟而安歸之者何也夫頡利之困未能一敗而覆之不能無慮於後則不若徐養而伺其變此之謂事可而時不可者以苻堅之强而東晉之陵遲江左之卑陋而關中之富强而王猛不肯南下而窺晉者何也晉之人弱矣而我之勢非有深根不拔之固悉衆逺鬬而國無至安之勢則外勝不足以紓內禍故苻堅不聽而秦亡此之謂人可而時不可者故當其可也微害小禍不顧而必為當其不可也敵有大利而不敢動凡此四者蓋略矣昔之為書教後世以兵者於此四者豈可以言盡哉設將言之是猶談西子之美者也言西子者能言其美而已所以為美者豈能發之以言而使後世因吾言而遂見西子也哉言之不足恃也如此而後世不務求昔人之意或則廢而不學或則學而不捨夫廢而不學是未嘗知有西子之美者也學而不捨是欲因昔人之言而見西子者也何怪乎不足以言兵乎蓋魏武號為深明孫子而為之解說最為簡略彼以謂孫子之意言雖多可以盡之耶姑開其端可也力政篇臣嘗患今之士大夫好言三代治安之世而不究其所以治安之端退而視其所為則亦汗漫而不可以有成夫亦思之不熟矣世之營居者莫不欲善居完室順寒燠燥濕之宜而可樂也將為是乎則一家之居集衆室而成者也一室之中集衆物而成者也一物之用集衆用而成者也試舉其一焉將為善室乎則必得善木將治木乎則必有善之器惡則不足以成牖將求善牖乎則自衆用而積之無一不善而後牖可善也將求善室乎亦猶治牖也自衆物而積之亦無一物不善而後為善室將求善居乎亦猶治室也無一室不善而後為善居天下之勢何以異此一民之家譬之則一牖也一國之地譬之則一室也萬國而為天下譬之則一居也故將求一居之無不善則必始於一牖之得人將求天下之無不治則必始於一家之得所一家無不得其所家家而召之而後一國皆得所一國無不得其所國國而積之而後天下莫不得其所此三代之所平治而仁人君子之所以盡心竭力而不辭安得漫然徒知其安平之可樂而不究其所以哉蓋召公聽男女之隂訟而舍於棠下而孟子以仁義教時君而其本乃在雞豚狗彘山林魚鱉耕桑里閭之各足五畝之宅所用耳夫召公為天子之大臣中分天下而治之而治事臨務至出於草野田畝草木之間而王者之政至于雞豚狗彘莫不謹書宜若不知體而可一概用矣然古人惟不敢遺一人故能康一家不敢遺一家故能王一國嘗讀西漢書見循吏傳如黃霸召信臣之徒其治郡邑事無大小一一立法曲有制度莫不便利而至於躬行田野不少休息决水疏田立為表制錙銖尺寸咸有次第未嘗不愛其知為政之理而竭力勤事而至誠愛其民也故生有顯名沒有祠祀使天下之守皆如此乎安有不治之憂而臣見今守令之不肯力政而勤求也今之為令者比之守差勤矣然天下訟獄無受賕之姦催科無後期之責偃然髙枕曰吾至辦矣田不闢桑不植溝洫不開林木不充疾病不養鰥寡無告問之且不知何暇責其治之乎為守則又失矣言公平付之有司吾待其成言出納付之有司吾責其慢舍是則晏安佚樂要賓客之歡而求聲名結利勢之援而舉世家一鄉有不治一邑有不安問之且不能言而又何暇責其治之乎其原在乎輕小事逐微利怠慢安佚而不肯力政故也向者臣見朝廷頒種植之法以下郡邑誠有其意矣然臣以謂政事之在民其委曲者非特桑而已今將事事立法則恐文書可行而病於報覆不若特命監司之按郡國者若今監司布治方里之外又當察見其田野溝瀆之植畜收穫凡民之細務以其治否為守令之賞罰則不獨入其國而又當行其野不獨觀其政又當令其俗舉其善之有成者而賞一人痛責其尤無良者一人以懲勸之則田畝里閭之間事宜不待令而上已為之使守令不一一為法而法固已立矣此非臣之私言也先王之巡狩而考諸侯之治否入其方土也問曰豫治者有慶而土地荒蕪遺老失賢者則先王以不治罰之彼治者蓋亦知此而已故將推力政之公必始於守令而後有成焉蘇門六君子文粹卷十三
