body:
  text: 蘇門六君子文粹卷六十九濟北文粹六宋朝補之撰序何龍圖奏議序代李侍郎作某嘗論天欲平治天下其勢有不期而自合者三始興之主不以兵革本於得人心以得天下故天為之開其統使宏且逺而其後世子孫出而承之者必恭儉愛人其德之流行亦洽故為之培其基使逺且固此二者皆天也又世常忽於無難無與佐之孰戒而康故詩曰思皇多士生此王國夫王者將有為而士之生於其國者多此亦非人之所能為也有以開之有以培之與夫卒相之以士然皆非人之所能為故曰天欲平治天下其勢有不期而自合者三何以言之堯授舜舜授禹禹用力而湯用兵堯舜不可及也而湯有慙德禹不以兵革猶八年於外用其力者勤矣而太祖皇帝不馳一馬不遺一矢雍容達節而有天下天下奔走而稱臣五國稽顙而下吏其受命配禹而用力寡繇湯以來未有太祖之武也天固開之矣漢髙祖以馬上取之至老於馬上而不得休且繼有諸吕喋血之禍而後文景起而施其澤兩世遵業僅得休息於無為而仁宗皇帝席祖宗優遊之盛傳之百年無大變故乃身服恭儉以振德之又四十餘年其守成比文景而施澤久繇漢以來未有仁宗之仁也天固培之矣方是時人君虛已於上而羣臣並進各自明於下君臣有慶譽而下並受其福風俗醇厚君子多而小人少蓋若董仲舒所言詩人美之為作上天祐之為生賢佐者嗚呼豈人力也哉其一時將相文武光明碩大之材左右論思直諒多聞之士不可勝數而何公名其間公為御史諌官至列侍從終始一節知無不言近古之遺直者其所為奏議二百餘篇為二十卷其言安危治亂之至數弛張取捨之要務與其尤深切世病者當時略已施行其誠心出於憂國愛君簡易而通非若世之無得於其中而以為文者榮華易瘁而難久也然則仁宗所以為治有德跨文景而追成康有自致矣某是以竊嘆於何公知天之生斯人有時而公之遭斯時有命二者適相值實難蓋必有能聽言之主導其臣使言而後能言之士至則夫生之者天也使之至者君也故君之權勝天然至有得士而不能用士以是隱則夫使其君能用而成功是乃所以為天相之之道故天亦終勝人昔吳季札觀上國論其興衰如指諸掌而獨見蘧伯玉數人者以謂衛多君子其國無故此不探其天命之所在而祗以人事知之然至於今論知天者唯吳季札則天人之際固可見矣某昔為和川令會天子詔求直言士而公以天章閣待制使河東遽取其文上之幸以是知名今位政府於公為門下士故其子某以公遺藁求序而不得辭公名郯字聖從仕至某官云治通小序毁譽不敢浮事實因以加賞罰謂之襲情賴之以生不可一日無也謂之飲食天日之清明奴𨽻識之謂之共知權言聖人之所獨見也謂之夜行所挈者要而順者衆謂之裘領如撓止水惡其波起不如遄已謂之本寧本強則精神折衝謂之折衝譬如播種終必粒譬如鑿井終必汲謂之可為鉤金輿羽不可為重輕之實謂之揣本誠者政事之本也謂之致誠常德不忒世自低昂而吾之為常者一謂之常一事有根本不可須臾離也謂之輜重先河而後海小式為本而大為末謂之務本非其道雖微不可假人也謂之名器五味異和謂之相濟始施之逆利在後日謂之要終天欲風草木未動而鳥已翔謂之前應小人以為翦翦耳君子畏焉謂之微大象見其牙而小大可論也謂之迎知推其𣲖而知其所從來深謂之逆流黃金珠玉飢不可食寒不可衣謂之貴疏中流失船一壺千金謂之賤適事或不相謀而相病謂之魯酒一人曰玉十人曰珉舉世皆曰珉謂之衆意事致其極則其後無以加謂之窮反狂者東走逐者亦東走寒者戰懼者亦戰謂之似是以攣拘之語疑域外之事謂之常談一言而得人之心謂之察鳴謂狐為狸則不知狐又不知狸謂之胥失蚌鷸相持田父捃之謂之兩得繫舟水中魚沉而鳥揚謂之同離月不知晝日不知夜謂之物曲且冬且夏謂之迭勝攘公議之近似者以蓋衆口而濟其私謂之借公志大心勞所以求者非其道謂之非分益而不已必損謂之勝懼知所弱則強矣謂之削喜事蠱物極而後可以轉從新謂之轉敗名實不虧而能使其喜怒移謂之朝三欲近四旁莫如中央謂之近四水避礙則通於海謂之曲成寡能似德拙言似默欲上者識謂之破庸捷趨而速至中道而敗憩不如椎之久謂之椎久始駕馬者反之車在馬前謂之始駕人取我豫人豫我取謂之獨獲佃魚網罟利隨世與謂之知化敗不在大一毫蒙之謂之見微無謂不效始終其告謂之養敢胡越可使無異心謂之同舟徒曰古人不我欺而不知時事已異謂之信書旦用旦效暮用暮效而不以經久謂之欲速挾事懷欺明能知之謂之詰詐惟有德能寬服其民其次莫如猛謂之量力夕而烹牛牛乃饗客會其已食謂之失時文是實非謂之名好人而不仁疾之已甚亂也謂之已甚法析毫釐小遍大遺謂之蜜紕以勢使之鈍者厲怯者奮謂之矢激利不百不變法謂之重改謨定於先羣言不能易謂之不搖毒蛇螫手勇士斷其臂謂之存大示之好惡而民知禁謂之止欲有德者進則朝廷尊謂之德成輿馬致千里舟楫涉江河謂之假物入有拂士出有敵國謂之常存尾大不掉謂之本弱藩籬不飭謂之外輕曲士不可以語道而聖人惟時變是守謂之達節立不易方非招不往謂之守官作法於涼其弊猶貪謂之謀始千里之行始於足下謂之積微川澤納汙瑾瑜匿瑕謂之忠厚苦節不可貞故教務因俗謂之人情論卑古人而才不足逮當世謂之髙論將以重之適所以賤之謂之過愛見幾而作不俟終日謂之轉圜以天下為心好惡不在其身謂之大度若緩若紆為國之本不可以無謂之濶要十羊九牧不若童子之獨謂之専任言異言逆視道以為則謂之不惑不患衆之不知患蔽謀者非謂之寶斷臣民異志則朋黨進在明公議謂之一下賞一切之功亂百世之法謂之賊下舉綱而略細謂之大體數米而炊不足濟天下謂之小節始勿輕舉人莫測然否謂之靜勝臣無求於其君故進退不纍其身謂之取重髙為量而罪不及逺為途而誅不至謂之大望躬自厚而薄責於人謂之逺怨殺身以為國然不足以拯世之溺謂之無益理無常是事無常非謂之通變今日用之明日不可復也謂之日改捨法任人廢法法存謂之小縱虛名無益事實而藉以鎮人心謂之名髙海陵集序文學古人之餘事不足以發身春秋時齊魯秦晉宋鄭吳楚列國之大夫顯名諸侯相與聘問交接陳詩揚禮見於言辭人稱之至今想見其為人若不可及者皆有他事業尊君庇民舉大而任重排難而解紛用之如榖米藥石一日不可無而言辭者特以緣飾而行之耳戰國異甚士一切趨利邀合朝秦而暮楚不耻無春秋時諸大夫事業矣而言辭始専為賢雄夸虛張聽者為奪雖義理皆亡而文章可喜以其去三代春秋時猶近也其用以發身亦不足言至於詩又文學之餘事始漢蘇李流離異域困窮仳别之辭魏晉益競至唐家好而人能之然為之而工不足以取世資而經生法吏咸以章句刀筆致公相兵家鬬士亦以方略膂力専斧鉞詩如李白杜甫於唐用人安危成敗之際存可也亡可也故世稱詩人少達而多窮繇漢而下枚數之皆孫樵所論相望於窮者也以其不足以發身而又多窮如此然士有無意於取世資或其間千一好焉惟恐其學之而力不逮營度雕琢至忘食寢會其得意翛然自喜不啻鍾鼎錦繡之獲顧他嗜好皆無足以易此者雖數用以取詬而得禍猶不悔曰吾固有得於此也以其無益而趨為之又有患難而好之滋不悔不反賢乎海陵集蓋許君大方作亦窮而不悔者之一也君於詩好之篤蓋辛苦刻篆呻吟裘氏者有年不幸其犁然之音與吾窮類然君少年自己得聲譽至他事業行已蒞官皆方進未可量何苦而為是閉關弦歌霖雨飢餓之聲樂之而不厭如此哉且以為後世名乎則孰與當身捷得權位之利抑謂利者君不近乎則後世之名於君亦復安有哉是未有以此語君者也是惑也補之既序此意以賢君能獨為人之所不為者而非有希於世視趨利邀合猶勝然亦因以為戒君字體之與補之故人張藝叟張文潛陳伯修皆厚云離騷新序上先王之盛時四詩各得其所王道衰而變風變雅作猶曰達於事變而懷其舊俗舊俗之亡惟其事變也故詩人傷今而思古情見乎辭猶謂之風雅而既變矣孟子曰王者之迹熄而詩亡然則變風變雅之時王迹未熄詩雖變而未亡詩亡而後離騷之辭作非徒區區之楚事不足道而去王迹愈逺矣一人之作奚取於此也蓋詩之所嗟嘆極傷於人倫之廢哀刑政之苛而人倫之廢刑政之苛孰甚於屈原時邪國無人原以忠放不忍去欲返幸君之一悟俗之一改也一篇之中三致意焉與夫三宿而後出晝於心猶以為速者何異哉世衰天下皆不知止乎禮義故君視臣如犬馬則臣視君如國人而原一人焉被讒且死而不忍去其辭止乎禮義可知則是詩雖亡至原而不亡矣使後之為人臣不得於君而熱中者猶不懈乎愛君如此是原有力於詩亡之後也此離騷所以取於君子也離騷遭憂也終窶且貧莫知我艱北門之志也何辜於天我罪伊何小辨之情也以附益六經之教於詩最近故太史公曰國風好色而不淫小雅怨誹而不亂若離騷者可謂兼之矣其義然也又班固敘遷之言曰大雅言王公大人德逮黎庶小雅譏小已之得失其流及上所言雖殊其合德一也司馬相如雖多虛辭濫説然要其歸引之於節儉此亦詩之風諫何異揚雄以謂猶騁鄭衛之音曲終而奏雅不已戲乎固嘗推本知之賦與詩同出與遷意類也然則相如始為漢賦與雄皆祖原之步驟而獨雄以其靡麗悔之至其不失雅亦不能廢也自風雅變而為離騷至離騷變而為賦譬江有沱乾肉為脯謂義不出於此時異然也傳曰賦者古詩之流也故懷沙言賦橘頌言頌九歌言歌天問言問皆詩也離騷備之矣蓋詩之流至楚而為離騷至漢而為賦其後賦復變而為詩又變而為雜言長謡問對銘贊操引苟類出於楚人之辭而小變者雖百世可知故參取之曰楚辭十六卷舊録也曰續楚辭二十卷曰變離騷二十卷新録也使夫緣其辭者存其義乘其流者反其源有力於詩亡之後豈虛也哉若漢唐以來所作非憂悲楚人之緒則不録離騷新序中劉向離騷楚辭十六卷王逸傳之按八卷皆屈原遭憂所作故首篇曰離騷經後篇皆曰離騷餘皆曰楚辭天聖中有陳説之者第其篇然或不次序今遷逺遊九章次離騷經在九歌上以原自敘其意近離騷經也而九歌天問乃原既放攬楚祠廟鬼神之事以攄憤者故遷於下卜居漁父其自敘之餘意也故又次之大招古奧疑原作非景差辭沉淵不返不可如何也故以終焉為楚辭上八卷九辨招魂皆宋玉作或曰九辨原作其聲浮矣惜誓𢎞深亦類原辭或以為賈誼作蓋近之東方朔嚴忌皆漢武帝廷臣淮南小山之辭不當先朔忌王褒漢宣帝時人皆後淮南小山至劉向最後作故其次序如此此皆西漢以前文也以為楚辭下八卷凡十六卷因向之舊録云然漢書至屈原賦二十五篇今起離騷經逺遊天問卜居漁父大招而六九章九歌又十八則原賦存者二十四篇耳並國殤禮魂在九歌之外為十一則溢而為二十六篇不知國殤禮魂何以系九歌之後又不可合十一以為九若溢而為二十六則又不知其一篇當損益者何等也惜誓盡敘原意末云鸞鳯之髙翔兮見盛德而後下與賈誼弔屈原文云鳯凰翔於千仞兮覽德輝焉下之斷章趣同將誼倣之也抑固二十五篇之一未可知也然則司馬遷以誼傳附原亦由其文義相近後世必能辨之王逸東漢人最愛楚辭然九思視向以前所作相闊矣又十七卷非舊録特相傳久不敢廢故遷以附續楚辭上十卷之終而其下十卷自唐韓愈始焉離騷人不讀久文舛闕難知王逸云武帝使淮南王安作章句至章帝時班固賈逵復以所見改易前疑亦作章句其十五卷闕而不説今臣作十六卷章句然則安與固逵訓釋獨離騷經一篇不知固逵所改易者何事今觀離騷經訓釋大較與十五卷義同或淺陋非原本意故頗刪而存之而録司馬遷史記屈原傳冠篇首以當離騷序云離騷新序下司馬遷作史記堯舜三代本紀孔子世家所引尚書論語事頗變其文字訓詁至左氏國語則遷所筆削惟意遷欲自成一家言故加櫽括而不嫌也雖然遷追琢傳記之辭可也而變尚書論語文字不可也補之事先朝為著作郎上即位備太史氏古文圖書得損益之况傳記乎離騷經始漢淮南王安為傳按隋志傳亡舊有班固敘贊二篇王逸序一篇梁劉協序一篇而王逸云班固賈逵改易前疑則固此序或當時作者也然頗詆原狂狷摘其不合者逸髙原義每難固説協附逸論然亦復失之固序曰君子之道窮達有命故潛龍不見是而無悶關睢哀周道而不傷又曰如大雅既明且哲以保其身斯為貴矣固説誠是也雖然潛龍勿用聖人之事也非所以期於原也又自淮南太史皆以謂兼風雅之義而固獨疑焉夫國風不能無好色然不至於淫小雅不能無怨誹然不至於亂太史公謂原之辭兼此二者而已乃周道大雅豈原所得庶幾哉雖遷亦不以是與原也世衰君臣道喪去為冦敵而原且死憂君斯已忠矣唐柳宗元曰春秋枉許止以懲不子之禍進荀息以甚苟免之禍夫荀息阿獻公之邪心以死其為忠也汙矣惟其死不緣利故君子猶進之而原乃以正諫不獲而捐軀方息之汙則原與日月爭光可也非過言也固又以謂原露才揚已競於危國羣小之中是乃上官大夫靳尚之徒所以誣原伐其功謂非我莫能為者也固奈何亦信之原惟不競故及此司馬遷悲之曰忠而被謗能無怨乎屈平之作離騷蓋自怨生也而固方且非其怨刺懷襄椒蘭原誠不忘以義劘上而固儒者奈何亦如髙叟之為詩哉又王逸稱詩曰匪面命之言提其耳謂原風諫者不如此之斥逸論近之劉協亦援逸此論稱固抑揚過實君子之與人為善義當如此也至言澆羿姚娀與經傳錯繆則原之辭甚者稱開天門駕飛龍驅雲役神周流乎天而來下其誕如此正爾託譎詭以諭志使世俗不得以其淺議也如莊周寓言者可以經責之哉且固知相如虛辭濫説如詩風諫而於原誇大獨可疑乎固大較喜訾前人如薄相如子雲為賦而固亦以為賦也劉協文字卑陋不足言而亦以原迂怪為病彼原嫉世既欲蟬蛻塵埃之外惟恐不異乃固與協所論必詩之正如無離騷可也嗚呼不幾於同浴而譏裸裎哉又協云士女雜坐娛酒不廢荒淫之意也是協以招魂為原作誤矣然大招亦説粉白黛黑清馨凍飲窮年永樂協以此為荒淫則失原之意愈逺原固曰世皆濁我獨清豈誠樂此濁哉哀已之魂魄離散而不可復也故稱楚國之美矯以其沉酣汙泥之樂若可樂者而招之然卒不可復也於是焉不失正以死而已矣嗚呼協安知離騷哉抑固漢書稱大儒孫卿亦離讒作賦與原皆有古詩惻隱之意而此序乃専攻原不類疑此或賈逵語故王逸言班賈以為露才揚已不専指班然亦不可辨也續楚辭序詩亡而春秋作其事則齊桓晉文其書王也以其無王也存王制以懼夫亂臣賊子之無誅者也以迄周亡至戰國時無詩無春秋矣而孟子之教又未興足迹接乎諸侯之境者諫不行言不聽則怒悻悻然去君又極之於其所往君臣之道微冦敵方興而原一人焉以不獲乎上而不怨猶眷顧楚國繫心懷王不忘而望其改也夫豈曰是何足與言仁義也云爾則原之敬王何異孟子其終不我還也於是乎自沉與夫去君事君朝楚而暮秦行若犬彘者比謂原雖與日月爭光可也豈過乎哉然則不獨詩至原而未亡於春秋之微亂臣賊子之無誅者原力猶能愧之而揚雄以謂何必沉江原惟可以無死行過乎恭使原不得死龍蛇雖歸潔其身而離騷亦不大耀於世是所以賢原者亦繇其忠死故其言至於今不廢也而後世奈何獨竊取其辭以自名不自知其志不類而無愧而續楚辭變離騷亦奈何徒以其辭之似而取之曰詩非皆聖賢作也捨周公尹吉甫仲山甫諸大夫君子則羈臣寡婦寺人賤者桑濮淫奔之辭顧亦與猗那清廟金石之奏俱采而并傳何足疑哉且世所以疑於此者不以夫後之愧原者衆哉而荀卿賈誼劉向揚雄韓愈又非愧原者也以迄於本朝名世君子尚多有之姑以其辭類出於此故參取焉然則亦有其行不足於原而取之者猶三百篇之雜而不可廢漢息夫躬為姦利以憂死著絶命辭辭甚髙使躬之不肖不傳而獨其絶命辭傳則譬猶從母言之為賢母言固無罪也柳宗元劉禹錫皆善屬文而朋邪得廢韓愈薄之王文公曰吾觀八司馬皆天下之竒才也一為叔文所誘遂陷於不義至今欲為君子者羞道而喜攻之然八人者既困矣往往能自強名卒不廢而所謂欲為君子者其終能毋與世俯仰以自别於小人者少復何議於彼哉王公世大儒其學自韓愈以下不論雖要不成人之惡至竒宗元輩而恕知其愛人憂國志念深矣而士之一切干祿陽自好而隂從利徼一時之願無禍而老者皆是也於王之言可遂不戒而視八司馬不反怍乎禹錫不暇議宗元之才蓋韓愈比愈薄而惜之稱其論議出入經史百家踔厲風發而謂其少年勇於為人不自貴重使在臺省時已能持身如其斥時亦自不斥愈於宗元懇懇如此豈亦知夫才難與王之意無異也抑息夫躬類江充禍國宗元禹錫誠邪不至於為躬躬之辭録則凡不至於為躬而辭録者皆録躬之意也漢蕩秦唐掃隋然頗因其法制文物為國猶爾以治易亂不可以皆廢也况言語趣操異世之習哉以狐父之人為盜因以食為盜而嘔之昔人以謂此失名實者也是乃續楚辭變離騷所以無疑於取此雜者也變離騷序上補之既集續楚辭二十卷又集變離騷二十卷或曰果異乎抑屈原之作曰離騷餘皆曰楚辭矣今楚辭又變而乃始曰變離騷何哉又揚雄為反離騷反與變果異乎曰反離騷非反也合也蓋原死知原惟雄雄怪原文過相如至不容而死悲其文未嘗不流涕也以謂君子得時則大行不得則龍蛇遇不遇命也何必湛身哉乃作書往往托其文而反之雖然非反其純潔不改此度也反其不足以死而死也則是離騷之義待反離騷而益明何者原惟不為箕子而從比干故君子悼諸不然與日月爭光矣雄又旁離騷作廣騷旁惜誦而下作畔牢愁雄誠與原異既反之何為復旁之又變離騷以其類而異故不可以言反而謂之變若荀卿非蹈原者以其後原皆楚臣遭讒為賦以風故取其七篇列之卷首類離騷而少變也又嘗試自原而上捨三百篇求諸書禮春秋他經如五子之歌貍首之斑然蠶則績而蟹有筐佩玉蘂兮吾無所系之祈招之愔愔鳳兮鳳兮他如此者甚多咸古詩風刺所從起戰國時皆散矣至原而復興則列國之風雅始盡合而為離騷是以繇漢而下賦皆祖屈原然宋玉親原弟子髙唐既靡不足於風大言小言義無所宿至登徒子靡甚矣特以其楚人作故繫荀卿七篇之後瓠子之歌有憂民意故在相如揚雄上而子虛上林甘泉羽獵之作賦之閎衍於是乎極然皆不若其大人反離騷之髙妙猶終歸之於正義過髙唐但論其世故繫髙唐後至於京都山海宫殿鳥獸笙簫衆器指事名物之作不専於古詩惻隱規誨故不録李夫人賦長門賦皆非義理之正然辭渾麗不可棄曹植賦最多要無一篇逮漢者賦卑弱自植始録其洛神賦九愁九詠等并録王粲登樓賦以見魏之文如此陸機陸雲有盛名顧不足於植粲摘其義差近者存之思遊有意乎幽通而下恨其流益逺矣然晉人喜清談而摯虞此作庶幾有為而言致足嘉者也鮑昭長於雜興故其蕪城作獨出宋世又以劉濞事諷劉瑱有心哉於此者江淹用寡而文麗又梁文益卑弱然猶蒙虎之皮尚區區楚人步趨也唐李白詩文最號不襲前人而鳴臯一篇首尾楚辭也末云雞聚羣而爭食鳳孤飛而無鄰嫫母衣錦西施負薪辭不雕而指類唐人知楚辭者少誤以為詩云王維生韓柳前才數十言雖淺鮮未足與言義然低昂宛轉頗有楚人之態矣元結振竒自成一家要曰羣言之異味亦可貴也顧况文不多約而可觀問大鈞理勝招北客詞勝阿房宫云亦使後人而復哀後人皆唐賦之不可廢者也皮日休九諷専效離騷其反招魂靳靳如影守形然非也竟離去畫者謹毛而失貌嗚呼離騷自此散矣故不録以迄本朝名世之作多已載續楚辭中今所録賦及文操或宏傑自出新意乍合乍離亦足以知古文之屢變至宋而復起云或大意述此或一言似之要不必同同出於變故皆以附變離騷若謂之變楚辭乎則楚辭已非離騷楚辭又變則無離騷矣後無以復知此始於屈平矣惡夫逾逺而迷其源若服盡然為之系其姓於祖故正名以存之變離騷序下詩亡春秋又微而百家􅑣起七國時楊墨申韓淳于髠鄒衍鄒奭之徒各以其説亂天下於時大儒孟荀實羽翼六經於其將殘而二儒相去百有餘年中間獨屈原履正著書不流邪説蓋嘗謂原有力於詩亡春秋之微故因集續楚辭變離騷而獨推原與孟子先後以貴重原於禮義欲絶之時又變離騷起荀子佹詩成相篇故并以其時考之知原雖不純乎孟荀於其中間非異端也孟子與梁惠王齊宣王魯平公同時而司馬遷史記表問何以利吾國蓋梁惠王之三十五年也是嵗齊宣王之七年楚威王之四年後七年而楚懷王始立立三十年而原諫王無入秦卒入秦死襄王初年而遷原原遷九年無幾何死矣推而上之去梁惠王問利國與齊宣王七年時蓋四十七年矣而魯平公元年則楚懷王之十五年也若孟子見平公在其初年則至原遷之九年蓋二十四年矣其平公末年乎則與原諫懷王之時蓋並矣雖史記不言孟子見宣王之年以其時考之逺者蓋四十七年近者二十四年又其近者同時也孟子見梁惠王乃在楚威王時惠王曰叟不逺千里而來於時稱叟孟子已老矣而原不及事威王故孟子與原接而原後於孟子又史記荀卿年五十始來遊學於齊齊襄王時荀卿最為老師而劉向敘荀子云齊宣王時聚學士於稷下荀卿十五始來遊學至襄王時最為老師按宣王立十九年卒至襄王元年四十一年矣而稷下之學乃在孟子淳于髠時使荀卿遊學時已年五十顧與孟子並安得至襄王而尚存哉故劉向云十五始來遊學而老為襄王師是也楚頃襄王遷屈原原遷九年無幾何亦死矣又五年齊襄王始立計原之死卿尚幼也至楚考烈王立二十五年而李園殺春申君荀卿始廢自此推而上之至原之死蓋五十餘年矣故原與荀卿接而荀卿後於原又孟子載孺子歌曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足孔子曰清斯濯纓濁斯濯足自取之也而原辭曰漁父莞爾而笑鼓枻而去乃歌曰滄浪之水清兮可以濯吾纓滄浪之水濁兮可以濯吾足遂去不復與言則原此歌蓋沿孟子事也漁父篇曰新沐者必彈冠新浴者必振衣安能以身之察察受物之汶汶者乎而荀子不苟篇曰故新浴者振其衣新沐者彈其冠其誰能以已之僬僬受人之棫棫者哉則卿此書蓋因原辭也凡言語文章之相祖述多其當時口所傳誦從古而然此皆古詩楚辭之流也其習而傳者雖至今可知也蘇門六君子文粹卷六十九
