body:
  text: 蘇門六君子文粹卷三十四淮海文粹二宋秦觀撰論擬郡學試近世社稷之臣論古之所謂社稷之臣者至矣忠足以竭才性之分敏足以應亊物之變苟利社稷則遂事矯制雖君有所不從苟害社稷則仗節死誼雖身有所不顧夫人莫不尊於君莫不親於身君與身也猶有時而㤀之知有社稷之事而己况其他乎此古之所謂社稷之臣者也揚子曰近世社稷之臣終之以禮樂可謂社稷之臣矣夫揚子之所以有取於四子者豈以運籌帷幄之中制勝於無形歟料敵制變筭無遺策攻城野戰前無堅敵歟出入禁闥二十餘年小心謹戒未嘗有過歟果在乎是則戰國之末士一介之庸人皆可以為社稷之臣矣豈揚子之意哉方高帝之時天下初定諸將論功日夜不决子房辭齊三萬户願封於留又勸先封雍齒諸將乃服及欲廢太子子房乃行少傅事晏然處於叔孫通之下招致四老人者以羽翼之太子以安此其所以有取於子房者也髙后時諸吕擅權欲危劉氏平勃用陸賈之謀深自相結卒能誅諸吕迎文帝於代而立之此其所以有取於陳平絳侯勃者也後元元平之際漢室多故子孟擁昭立宣政繇己出前後二十年海内厭服此其有取於霍將軍者也然光不學無術暗於大體死纔三年宗族誅夷勃免相就國不逺嫌疑䧟於吏議幾致顛覆平多隂禍至孫而廢掌雖親貴終以不侯子房雖無三子之過然不能為漢制禮作樂追迹三代之隆以聖人之道㮣之皆未得為全人也故曰終之以禮樂雖然四人者或氏而字之或氏而名之或爵而名之或氏而官之何也此葢楊子之深意春秋之大法也春秋之法雖貴賤不嫌同號美惡不嫌同辭然而州不若國國不若氏氏不若人人不若名名不若字字不若爵爵不若子因此等以寄褒貶焉氏者别其所自出也字以言其德名以言其體爵以言其功官以言其業張子房以智葢言其德也故氏而字之陳平以無悞葢言其體也故氏而名之絳侯勃以果葢言其功故爵而名之霍將軍以勇葢言其業故氏而官之四人者子房最優故獨字之絳侯勃為下故獨不氏焉嗚呼不如是何足以為法言聖人繼天測靈論古之語道德者未始不以聖人而論聖人者亦未始不以道德葢捨道德則無以見聖人而微聖人則道德或幾乎息矣何者其體相俱而其用無以異也夫物生謂之化物極謂之變變化而不可知謂之神神也者其合則藏於無為其散則寓於有得昔之命道者因其無為也故強名之以天所謂莫之為而常自然者是已自其有得也故強名之以靈所謂地得一以靈是己天者道也而於神為無體之體靈者德也而於神為無用之用體則可以繼用則可以測繇此兩者而不能知百姓是也知此兩者而不能行智者是也行此兩者而不能盡仁者是也繇而能知知而能行行而能盡静可以繼動可以測此聖人所以至也葢聖人者其聰無所不知其明無所不察積聰明而為淵則極天下之深盡聰明而為懿則窮天下之美夫人之所以䘮已於物失性於俗而一切事變之來不能以眀辨而應對之者以其質有不足而修有未至爾聖人既已具聰明之質而又加之以淵懿之修則尚惡徃而不至耶是以合而為體則可上與造物者游而無以為散而為用則足以遂知來物之不窮而各有得夫合於無為則固以天也散於有得則固以靈也以吾之天而繼天之天以吾之靈而測物之靈是猶操五寸之矩求天下之方其不合亦以鮮矣易曰無思也無為也寂然不動感而遂通天下之故夫無思無為寂然不動者所謂繼天也感而遂通天下之故所謂測靈也葢靈與天其始也出於神其終也入於神而聖人與之俱焉故楊子曰聖人聰明淵懿繼天測靈夫聰明淵懿者乃所以繼天測靈也及乎天已至於可繼靈已至於可測雖聰明淵懿亦莫得而言矣何則極道德之精則粗不足以盡之也彼百姓與仁智則不然其質與聖人未嘗不同而其修與聖人未嘗不異是以雖有存乎人之天而不能開之以物於有累雖有貴於物之靈而不能盡之以器於有窮夫以有累有窮之具而欲繼無為之天測無不得之靈其難也可眀矣嗚呼於是知聖人之所以聖人也變化論萬物不能常有有極則入於無亦不能常無無極則出於有變者自有入無者也化者自無入有者也方其入也則質散而返形形散而返氣氣散而返於芒忽之間闢隂以為陽者有矣闔陽以為隂者有矣其巧妙其功深故難窮難終此物之極者所以繇之也方其入也則芒忽之間合而成氣氣合而成形形合而成質移剛以為柔者有矣易柔以成剛者有矣其巧顯其功淺故隨起隨滅此物之生者所以繇之也是故物生謂之化物極謂之變變者天道也君道也聖人之事而化之所以始也化者地道也臣道也賢人之事而變之所以終也是二者猶生之有死晝之有夜動之有静往之有來常相待為用而未有能獨成者也二者雖不能獨成而亦不能兩立何則一氣不頓進變進則化退矣一形不頓虧化進則變退矣一進一退迭相出入而神用無窮焉故曰變化者進退之象也又曰知變化之道者其知神之所為乎昔之論變化者有先變而言者有先化而言者有兼變化而言者易曰形而上者謂之道形而下者謂之器化而裁之謂之變夫道者變之統也器者化之宇也有形者不能相有是以雖器也而制之者亦存乎道雖化也而裁之者亦存乎變故曰化而裁之謂之變此所謂先化而言者也中庸曰其次致曲曲能有誠誠則形形則著著則明明則動動則變變則化葢自致曲而至於變化者繇人以盡天道自變而至化者繇天以盡人道盡天道所以率性盡人道所以立教故曰變則化此所謂先變而言者也荀卿曰誠心守仁則形形則神神則能化矣誠心行義則理理則明眀則能變矣變化代興謂之天德夫變者所以原始化者所以要終獨化則不能以生獨變則不能以形生生形形而道之用盡矣故曰變化謂之天德此所謂兼變化而言者也葢先變者以言乎自無而出有先化者以言乎自有而入無而兼變化者以言乎出有入無相待為用而已矣然則主變者天也司化者地也而荀氏皆以為天德何也曰天道成終而成始凡言變者亦可以兼化地道無成而代有終凡言化者則不可以兼變易於乾曰乾道變化而於坤則曰萬物化生葢乾者用陽氣以統天地天既可以兼化則乾固不獨變矣地不可以兼變則坤固止於化矣故曰闢户謂之乾闔户謂之坤一闔一闢謂之變又曰在天成象在地成形變化見矣繇是觀之變化者神之用也神無方無方則無乎不在故在天則乾道是已在地則坤道是已在人則聖人是已故曰天地變化聖人効之此之謂矣君子終日乾乾論天任命人任力君子之道原於天而相之以人安於命而輔之以力故凡乘勢以應變因時以立功雖一聽於自然而進德修業未始不以自強不息為主何則力有所不盡則未可以言命而人有所不至則未可以言天故也乾九三所謂君子終日乾乾夕惕若厲无咎者葢亦以此矣夫九三以不中之位據重剛之險前有五之可至後有二之可終非所至而至則失義非所終而終則失幾失義則驕失幾則憂於時也可謂危矣可謂難其處矣此其所以終日乾乾而夕猶惕若也日者有為之時夕者無為之時也於有為之時乾乹以致其力於無為之時則惕若以致其心夫亂生於所忽治生於所憂安安者危亾亡者存固天之理也外既有以致其力而内有以盡其心然則德其有所不進業其有所不修而過其有所不補者乎故曰君子終日乾乹夕惕若厲无咎而孔子亦曰乾乾因其時而惕雖危無咎也易曰无咎者善補過也葢當勇於進而安於苟簡而不能果於自強能以无咎者寡矣嗚呼非深知天人力命之說者何足以與於此以德分人謂之聖論古之聖人其道本於成已而終於成物得其始不知其終則蔽於為我見其末而遺其本則蔽於為人為我之蔽溺於楊而為人之蔽流於墨二者所事不同要皆不該不徧一曲之所為而非道德之正也聖人則不然其入不藏其出不陽入而不藏故德先乎身而有以公於物出而不陽故道濟天下而有以私於己夫公於物仁也私於己智也公公私私仁智兩得聖人之道盡矣傳曰以德分人謂之聖其此之謂乎夫天下之人因其性而觀之則未嘗不同因其習而觀之則未嘗不異使天下皆知性之無不同也則其俯仰之際語黙嚬笑之間固足以官隂陽而府萬物矣又奚聖人之俟哉夫惟不知故尊其習者有至於上智而卑其習者或至於下愚夫以本同之性而異於上下相逺之習此天下所以有俟於聖人而聖人者所以不可一日無於天下也故古之人當其德未成則修之於已既成則分之於人其大也以其所知覺所未知以其所覺覺所未覺其小也以其所中養所不中以其所才養所不才既以與人已愈有既以為人已愈多仁者得仁智者得智得其精者足以治身得其緒餘足以治天下國家豈固有求於外以為人之所以望吾而吾之所以與人者適當然而已矣且上覆下大容小髙者抑之下者舉之有餘損之不足與之理之當然也彼聖人以德分人者也豈固有意於是哉葢以為人之所望吾吾之所以與人者亦理之適當然而已矣蘇門六君子文粹卷三十四
