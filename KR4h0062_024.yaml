body:
  text: 蘇門六君子文粹卷二十四淮海文粹二宋秦觀撰進䇿安都臣聞世之議者皆以謂天下之形勢莫如雍其次莫如周至如梁則天下之衝而已非形勢之地也故漢唐定都皆在周雍至五季已來實始都梁本朝縱未能逺規長安盍亦近卜於洛陽乎而安土重遷眷眷於開封之境非所以為萬世計也臣竊以為不然何則漢唐之都必於周雍本朝之都必於梁而後可也夫長安之地左殽函右隴蜀襟屛終南泰華之山縈帶涇渭黃河之水地方數千里皆膏腴沃野卒有急百萬之衆可具形勢便利下兵於諸侯如建瓴水四塞之國也故其地利守自古號為天府開封地平四出諸道輻輳南與楚境西與韓境北與趙境東與齊境無名山大川之限而汴蔡諸水參貫巾車錯轂蹄踵交道軸艫銜尾千里不絶四通五達之郊也故其地利戰自古號為戰場洛陽左瀍右澗表裏山河扼殽黽之隘阻成臯之險直伊闕之固廣袤六百里四靣受敵以守則不如雍以戰則不如梁然雍得之可以為重故自古號為天下之咽喉凡天下之形勢無過此三者也故彼蜀之成都吳之建業皆霸據一方之具而楚之彭城特盜賊之窟耳易曰天險不可升也地險山川丘陵也王公設險以守其國所謂險者豈必山川丘陵之謂哉在天而不可升在人而不可奪則皆為險矣夫雍為天府梁為戰場周為天下之咽喉而臣以謂漢唐之都必於周雍本朝之都必於梁而後可者漢唐以地為險本朝以兵為險故也漢高祖曰吾以羽檄召天下兵莫有至者武帝曰吾初即位不欲出虎符發兵郡國蓋漢踵秦事郡國皆有材官有變則以符檄發之京師惟有南北兩軍有期門羽林孤兒以備扈從唐分天下為十道置兵六百三十四府其在關中者惟二百六十有一府府兵廢始置神策為禁軍亦不過數萬人以此見漢唐之兵皆在外也故非都四塞之國則不足以制海內之命此所謂以地為險者也本朝懲五季之弊舉天下之兵宿於京師名挂於籍者號百餘萬而衣食之給一毫已上皆仰縣官又非若府兵之制一寓之於農也非都四通五達之郊則不足養天下之兵此所謂以兵為險者也夫以兵為險者不可以都周雍猶以地為險者不可以都梁也而昧者乃以梁不不如周周不如雍嗚呼亦不達於時變矣夫大農之家連田阡陌積粟萬斛兼陂池之利并林麓之饒則其居必卜於郊野大賈之室斂散金錢以逐什一之利出納百貨以收倍稱之息則其居必卜於市區何則所操之術殊則所託之地異也今梁據天下之衝歲漕東南六百萬斛以給軍食猶恐不贍矧欲襲漢唐之迹而都周雍之墟何異操大賈之術而欲托大農之地也繇是言之彼周雍之地者漢唐之險耳本朝何賴焉任臣上臣聞明君之御臣也不致疑忠臣之事君也不避嫌嫌疑之事皆出於姦臣庸君度量狹隘心意頗僻不能以至誠相期而已古之人有自舉其身者有舉其子者有舉其弟者有舉其姪者有舉其內外之親舊者而其君不以為疑其臣不以為嫌者何哉以其所舉者當而已漢宣帝欲擊先零問誰可將者趙充國曰無如老臣者矣宣帝用之遂破先零此所謂自舉其身者也晉君問孰可為國尉祁奚曰午也可君曰非子之子耶對曰君問可否不問子也君子謂祁奚能舉善矣此所謂有舉其子者也李石當國薦弟福可任治人繇監察御史為户部侍郎此所謂有舉其弟者也晉求文武良將謝安以其姪幼度應舉郗超聞而嘆曰安違衆舉親明也幼度不負舉才也果破苻堅於淝水之上此所謂有舉其姪者也崔貽孫為相未踰年除吏八百莫不諧允德宗曰人言卿擬官多親舊何耶對曰陛下令臣進擬庶官夫進擬者必悉其材行如不與聞何繇得其實此所謂有舉其內外之親舊者也此數子者皆內有以自信外有以信於人仰無所愧俯無所怍其視身也與人等其視子弟親舊也與不相誰何者等故能立功於當年垂名於後世千載之下想見其風向使念瓜李之小嫌忘事君之大節匿名迹逺權勢心知其然而不敢發則與糞壤同朽耳尚何功名之立哉陛下即位以來委政於六七大臣其人自以曠世遭遇莫不悉心竭力知無不為言無不盡可謂千載一時之嘉會也而臣竊有所不然者未能去用親之嫌而已奇材異行實為時輩所見推者一涉大臣之親則相顧謬悠莫敢援之以進幸而不顧進之則諫官御史之章相隨而至矣臣以謂此風一成非聖朝之事也何則大臣之親嫌而不用則侍臣之親亦當嫌而不用引而下之至於臺省寺監之官推而廣之至於漕刑郡縣之吏其親者皆嫌而不用矣夫奇材異行不常有於天下幸而有焉又以親與嫌而棄之則是非得草萊巖穴之士終不用也昔西漢之韋氏平氏東漢之袁氏楊氏唐之韋杜蘇李陸蕭諸氏皆兄弟為三公父子為宰相盛者至與國相終始其間建功立業號為名臣者蓋不可勝數奈何專用草萊巖穴之士哉願詔中外之臣惟賢是進惟不肖是退而勿以用親為嫌諫官御史惟進退之當否是察而勿以親嫌為劾則天下之奇材異行庶乎皆得而用也任臣下臣聞人主之於諫諍之臣非獨聽其言之難也取其大節而略其小過是為難矣夫骨鯁自信以身許國不為利害之所撓屈者謂大節也材智之不周思慮之不密學術之不至聽聞之不審所謂小過也必有大節而無小過者然後得為諫諍之臣則窮年沒世不可得其人矣如或不然則與其無一時之小過孰若有終身之大節哉昔汲黯通經術則不如平津侯恢武功則不如大將軍明習法令則不如張湯文章儒雅則不如司馬相如謹厚自全則不如石慶術略橫出則不如主父偃然淮南王謀反惟憚汲黯好直諫守節死義説平津侯等如發蒙耳繇是言之諫諍之臣其功在於正綱紀立風憲通上下之情使亂臣賊子顧憚而不敢發如此而已一舉之不當理一發之不中節曽何足以深咎耶陛下即位以來首下明詔使中外大臣保任諫官御史蓋充職者百有餘人其見用者十數人耳選擇既精人頗自重皆毅然有仗節死誼之心興利除害甚於嗜欲攘擊姦惡如報私讐首尾數年之間遂成冠古之治雖神功聖化敏妙自然亦此曹獻替可否之力也然比者嘗以所言不效諫官御史接迹引去或遷他官或補外郡臺省為之一空臣愚疏逺不知朝廷之事竊惟陛下何取之之難而去之之易也且人非蓍龜不無過誤顧其設心措意何如耳昔漢酈食其有撓楚之非唐魏鄭公有縱薛延陀之過本朝趙中令有遣趙保忠之失此三人者皆天下之豪傑一時之名臣也猶有非謬過失如此又况不及於三人者乎臣願陛下鑒師古始追御來今重諫官之進退謹御史之升黜取其大節而略其小過使天下之士得以盡忠畢力於前則神功聖化又將有新於此矣或謂臣曰古者諫諍之臣職於廣聰明除壅蔽成德業而已後世狂夫小子狡猾不道之人或假其名以資盜竊其器以售姦如谷永者王鳯之客也而譏斥帷幄劉栖楚者李逄吉之黨也而額叩龍墀陽為剴拂之迹隂成附麗之謀以此言之小過其可略乎略其小過則成其大惡矣臣應之曰不然夫藥石所以愈病因而致病者有矣然自古及今未有廢藥石者何哉以其所愈者衆所害者寡也諫諍之臣惟器有逺邇才有修短大抵縉紳之選也安可盡誣以谷永劉栖楚之徒歟就使有一二人焉則去其一二人者可也何至空臺省而逐之耶陸贄曰天不以地有惡木而廢發生天子不以時有小人而廢聽納又曰諫者多表我之能好諫者直示我之能賢諫者之狂誣明我之能恕諫者之漏泄彰我之能從有一於斯皆為盛德嗚呼人主用諫諍之臣贄之論盡矣朋黨上臣聞朋黨者君子小人所不免也人主御羣臣之術不務嫉朋黨務辨邪正而已邪正不辨而朋黨是嫉則君子小人必至於兩廢或至於兩存君子小人兩廢兩存則小人卒得志而君子終受禍矣何則君子信道篤自知明不肯偷為一切之計小人投隙抵巇無所不至也臣請以易道與夫堯舜漢唐之事明之易以陽為君子隂為小人一陽之生則為復復者反本也三陽用事則為泰泰者亨通之時也而五陽之極則為夬夬者剛決柔也以此見君子之道必得其類然後能勝小人也一隂之生則為垢垢者柔遇剛也三隂用事則為否否者閉塞之時也而五隂之極則為剝剝者窮上反下也以此見小人之道亦必得其類然後能勝君子也隂陽相與消長而為慘舒為生殺君子小人相與勝負而為盛衰為治亂然皆以其類也臣故曰朋黨者君子小人所不免也堯之時有八元八愷十六族者君子之黨也又有渾沌窮奇檮杌叨餮四凶族者小人之黨也舜之佐堯有大功二十者舉十六相去四凶也不聞以其朋黨而兩廢之亦不聞以其朋黨而兩存之也臣故曰人主御羣臣之術不務嫉朋黨務辨邪正而已東漢鉤黨之獄海內塗炭二十餘年蓋始於周福房植謂之甘陵南北部至於李膺陳蕃王暢張儉之徒遂有三君八顧八俊八及八厨之號人主不復察其邪正惟知震怒而已故曹節侯覽牢修朱並得以始終表裏成其姦謀至於刑章討捕錮及五族死徙廢禁者六七百人卒不知修並者乃節覽之黨也唐室之季朋黨相軋四十餘年縉紳之禍不解蓋始於李宗閔李德裕二人而已嫌怨既結各有植立根本牢甚互相傾擠牛僧孺李逄吉之屬則宗閔之黨也李紳韋處厚之屬則德裕之黨也而逄吉之黨又有八關十六子之名人主不復察其邪正惟曰去河北賊易去此朋黨難而其徒亦曰左右佩劍彼此相笑蓋言未知孰是也其後李訓鄭注用事欲以權市天下凡不附已者皆指以為二人之黨而逐去之至於人人駭栗連月霧晦卒不知訓注者實逢吉之黨也臣故曰邪正不辨而朋黨是嫉則君子小人必至於兩廢或至於兩存君子與小人兩廢兩存則小人卒得志君子終受禍矣朋黨下臣聞陛下即位以來虗懷側席博採公論悉引天下名士與之經綸至有去散地而藝鈞衡起謫籍而參侍從者雖古版築飯牛之遇不過如此而已君子得時則其類自至數年之間衆賢彈冠相繼而起聚於本朝夫衆賢聚於本朝小人之所深不利也是以日夜恟恟作為無當不根眩惑誣罔之計而朋黨之議起焉臣聞比日以來此風尤甚漸不可長自藝政從官臺閣省寺之臣凡被進用者輒為小人一切指為朋黨又至於三君八顧八俊八及八厨之名八關十六子之號巧為標榜公肆詆欺一人名之於前萬人實之於後傳曰下輕其上爵賤人圖柄臣則國家搖動萬人不靜也然則其可以不察歟臣聞慶厯中仁祖鋭於求治始用韓琦富弼范仲淹以為執政從官又擢尹洙歐陽修余靖蔡襄之徒列於臺閣小人不勝其憤遂以朋黨之議陷之琦弼仲淹等果皆罷去是時天下義士扼腕切齒髮上衝冠而小人至於舉酒相屬以為一網盡矣賴天子明聖察見其事琦弼仲淹等旋被召擢復蒙器使遂得成其功名今所謂元老大儒社稷之臣想望風采而不可見者皆當時所謂黨人者也向使仁祖惡朋黨之名不求邪正之實赫然震怒斥而不反則彼數人者皆為黨人而死耳尚使後世想望風采而不可見耶今日之勢蓋亦無異於此臣願陛下觀易道消長之理稽帝舜廢舉之事鑒漢唐審聽之失法仁祖察見之明杜媒孽之端窒中傷之隙求賢益急用賢益堅而信賢益篤使姦邪情得而無所售其謀讒佞氣索而無所啓其口則今之所謂黨人者後世必為元老大儒社稷之臣者矣蘇門六君子文粹卷二十四
