body:
  text: 蘇門六君子文粹卷五十濟北文粹六宋朝補之撰雜著齊物論此篇論齊物然物之理齊而情故自彼是莫得其偶而要之以天地之一指萬物一馬而後物無彼是道泯乎無成虧矣莛楹厲施極異而皆同故言惟達者知通為一通為一則不齊之論近不用也然而衆理相承彼是未始不用聖人欲泯用之迹故為是不用而寓諸庸寓諸庸則我雖不用而物量無窮默然而自用殊施而各得若此通矣故曰用也者通也通也者得也適得而幾矣不用則理阻而不通故用為通通則物各得其理故通為得得則各適其所而盡矣故適為幾而聖人非有心為之也特因物之自庸也故曰因是已有成與虧故昭氏之鼓琴也無成與虧昭氏之不鼓琴也猶之七竅未鑿而渾沌不死也過此以往則反乎無物其為無成虧也至矣故師曠之枝策也惠子之據梧也皆為者敗之也皆非所明而明之也故雖竭其智而理終不可窮謂之堅白同異名實之辨若此其察矣然要於不察而以昧終其為滑疑也不甚矣乎若夫天地雖大要之一指萬物雖多要之一馬一指一馬為論省矣則雖衆理相承默用而常通尚安有滑疑之耀者哉然其始也恢詭譎怪未通乎一故有滑者焉有疑者焉無滑無疑則其際冥冥昧而不耀有滑有疑則長短之相形前後之相隨不昧而耀矣耀也者明也而此非明也以夫衆理之相乘也滑亂而疑似反以炫聖人聖人欲為人解紛而辨惑則嘗圖之矣故曰滑疑之耀聖人之所圖也物之情不齊而其理齊聖人窮理衆人役情聖人欲反情之異合理之同所以圖滑疑之耀使無疑無滑而泯乎冥冥者莫要於此矣故重言為是不用而寓諸庸此之謂以明然則聖人泯用之迹而物未始不用無意於明物而物常自此明故曰此之謂以明也若昭氏師曠惠子者知盡于此以非所明而明之祗以為昧非此之謂以明也故曰三子之知幾乎猶曰知盡于此而終不足以明也幾盡也猶幾希也然非夫以道泛觀而備萬物之應則以不齊齊其齊也不齊乃若莊周則以齊不齊其不齊也齊矣而猶以為未也故又曰今有言于此不知其與是類乎其與是不類乎類與不類相與為類則與彼無異矣夫類則齊不類則不齊類與不類相與為類則齊與不齊相與為齊夫有所謂齊有所謂不齊則與彼誠何以異哉故推而上之極于物之無曰有未始有夫未始有無者此要言無物無物則無齊矣推而下之窮于物之有曰自無適有以至于三而况自有適有乎此要言有物有物則有不齊矣故於是重言無適也因是已因是已者蓋齊物之要論盡此矣何以知其盡此也曰以因因則無適也故入之為無非或使之無也因是以出之為有非或使之有也因是已夫號物之數自一至萬逺矣夫無未始適有何以自一而語萬有未始適無何以自萬而語一之二者泯而無物無物而無齊矣雖然非刳心喪我不能觀萬物而知無故此篇始之以南郭子綦之喪我而齊物之論開非觀物同我不能知化而窮有故終之以不知周之為蝴蝶蝴蝶之為周而齊物之論閉學説學不可以不知惟知之然後能好之記曰雖有嘉肴弗食不知其旨也雖有至道弗學不知其善也而孟子亦曰理義之悅我心猶芻豢之悅我口蓋飲食旦旦之所須故譬學於飲食為最易知然猶曰人莫不飲食鮮能知味也天下豈有不習而能察者哉昔野人有甘葈莖芹萍子者對鄉豪稱之取而嘗焉蜇口而慘腹夫口腹人所同也而野人至甘人之所不甘此非未嘗知甘所謂甘者而以夫已甘謂人甘者止此哉至於百工衆技皆學也下至跳劍弄丸緣竿踏索既為之終身不得已非特利所在也習而知其味故樂也若乃對君子稱之則如野人之甘葈莖芹萍子其於不足味也不特慘蜇而後方知之也故嘉肴世皆知其旨必食者而後益知其為旨至道世皆知其為善必學者而後益知其為善曰聞而知其旨且善者意之也或曰道之出口淡乎其無味而飲食人所甘似不類夫以人所甘者弗食猶不知其旨而道又淡而難好則不知者不其愈多乎然終猶是也病弗學耳學而入之安知其淡乎大觀四年四月旦日書付姪公秉俾以語諸小道云勤説送甥李師藺遊學道無勤物無不勤夫既謂之物矣物必有所事有所事必勤故物莫大于天地其次曰人而三者同以才稱才之為言物量之所能也能必有所事故天有四時地載神氣皆謂之無非教無非教者有所事也日月如爭其所乎雲者為雨乎雨者為雲乎意者其有機緘而不能已耶其有所運轉而不能自止耶則天地之事亦勤矣人見其四時行百物生也以謂天地未嘗勤焉不知夫有道焉範圍乎其外莫或使之日夜以造偲偲然若有與之計其期而不得暇者是能成千歲之積而開萬化之原人以其才參諸天地有誠焉冥極於道不息而善成古之聖賢唯孔子顔淵能知此故孔子之語子貢而曰生無所息顔淵之贊孔子而曰欲罷不能夫以有涯逐無涯必墮故欲罷而願息皆人之情也然回非不欲罷而曰不能罷賜非不願息而曰息無所夫求斯須之晝至於念兹之隙其暫無幾也猶曰不能而無所此非有所畏慕勉強而驅之也性不能已也是天地人之所以均不能無事而皆勤也雖然天地以無心莫之為而為故久人以有心知而為之故怠嘗試語怠之所從起譬道為萬里塗而以勤為馬繕性之始如適舉趾其弛于負擔未知其以曷月止斯殆已故欲從事於此必自夫誠其意者始焉夫人何可以確然隤然如天地之無心而常運能誠其意則幾矣誠者非義襲而取之也間其邪則存嘗又請實之以誠為我我欲至於萬里孰禦之哉以其孰禦之者為策以臨馬不至於萬里馬終日躞蹀而不得止由不怠故能久久則凝於神矣聖人之事業所以蔽天地而凝於神則自其孰禦之者積之耳雖然此亦非聖人獨能之也百工之賤預能焉承蜩者猶掇之也夫豈惟其精之至自五六月纍垸二而不墜至於纍三而不墜至於纍五而不墜則其勤之積可知已而世不知者方且曰勤者事也道無所用勤其知者則將曰事者勤也天地不能無事而况於學者乎余甥師藺年少而強文采曄然其所學又中庸也故告以其無息者自誠其意始而余老矣不復能自強猶樂以靜觀動日出而開吾牗以臨交衢之內四民亹亹各各以其業趨利鳥嚶翔而獸嘷鶩意各有所𨽻蜂蟻之至細忤行旁逝營宅室而競食事亦維以卒歲至于物之無情者山日夜出雲流水之不停甲拆而勾申木不崇朝而其華敷榮並行若爭小積而大盈而天地乃司其成功及其至也皆日損於是以觀復而見天地之心則萬物何莫猶斯道謂道無勤道亦未嘗息也而其勤見於天地天地亦未嘗勤也而其勤見於萬物萬物各以其勤自成而天地終其功故成能者為聖人學之積由是師藺勉之警陋説子欲居九夷或曰陋如之何子曰君子居之何陋之有吾非君子安能不顧蠻貊之陋而欲居居之不惟不能革彼陋吾未免于陋也里仁為美擇不處仁焉得智吾非智者安能知里之不仁而擇處處之不惟不能遷彼之不仁吾未免于不仁也與君子遊苾乎如入芝蘭之室久而不聞則與之化矣與小人遊膩乎如入鮑魚之肆久而不聞則與之化矣吾不幸逺君子而近小人近之不惟不能洗彼膩吾未免于膩也一薰一蕕十年猶有其臭吾薰也蕕尚能臭之吾惡夫久而不聞也不惟不能薰彼蕕吾未免于蕕也四纍者吾憂之見賢思齊焉見不賢而內自省也壤陋里不仁鮑漬蕕與藂也引領而望夫安得賢者而齊之而不賢者乃日夜相與輩而詠且遊乎吾之邦囂塵雜起千變萬化在人目前苟見此而恥者炟然肺熱濈然顙泚而內自省曰吾不幸無乃類之其庶乎居與之同里出與之同閭吾不能捨以逃也使迹近而心逺焉雖不得賢者而齊之日警此亦賢矣尹鐸為趙鞅戒晉陽之辱而不墮其壘培又增之鞅怒郵無正曰委土可以為師保何為不增夫里無仁賢則思吾一日之嘗辱焉如晉陽之委土非耳目能言之類也修而存之如見參於前倚於衡也亦可以為吾師何必師人蘇門六君子文粹卷五十
