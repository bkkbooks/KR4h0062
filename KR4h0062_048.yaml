body:
  text: 蘇門六君子文粹卷四十八濟南文粹五宋李豸撰記太宗皇帝御批記元祐天子錫晏東宫以御書古詩遍賜執政暨講筵諸臣明日諸臣各進表獻詩以謝著作郎兼侍講范祖禹曰臣願陛下篤志學問亦如好書益進道德皆若遊藝於是有以見人君大略字書未足多尚臣聞太宗皇帝方側微已有書名擅於世及即位益專益工勒之金石藏之延閣布在天下不可勝數在前世中君已足稱述而帝以神武聖文左右太祖自布衣取天下以湯武拯濟之功全堯舜揖禪之美及紹大統遂集大勳巍巍成憲為宋太宗則其德業睿智煌煌然與唐文皇爭雄矣故文皇與帝雖以字學名於當代而為餘事云因觀帝批天下兵馬元帥吳越國王錢俶表故作是記元祐三年八月十一日臣李豸記安老堂記甚哉老之難安也方少之時隂陽役之血氣使之心志誘其欲而迷其真勢利幻其前而誤其後未易能安之老且衰矣卻視向日之為宜其悔而求安然貪夫鄙人嗟老景之已至念短日之足惜悼前志之未充痛昔謀之匪良方且苟求無厭務得患失皇皇偷朝暮之生汲汲為子孫之計節義日衰亷恥盡喪貪於富者則曰吾老矣講貨財較虧羡之術始詳矣未忍舍也擅兼并而亘阡陌巧梯航以絶山海籠物貨而無餘藏運籌算而無遺䇿甘心於錐刀之間盡瘁於錙銖之末負戴於道路轉徙於溝壑貪夫徇富死而後止貪於貴者則曰吾老矣結知遇賈名譽之術始明矣未忍止也履公門而矍鑠遊闕庭而徘徊衒筋力强飲啖染鬚鬢逞聰明職愈隆而意愈切祿愈豐而戀愈深故位愈重而望愈輕年愈髙而德愈薄貪夫徇貴死而後止然則日暮途逺而倒行漏盡鍾鳴而未止類皆貪夫而富貴有以纍之也故曰甚哉老之難安也居士新作西堂以安老為名然居士之安非惟老而後安安之也久矣郭外之田足以給饔餼郭內之圃足以給葅茹而未嘗求羡裘葛足以具伏臘祿食足以備婚嫁而未嘗求豐居士曰富不可妄致也吾老矣求安而已居士以文學知名於時聲聞藹揚薦為禮部一選遂擢上第名公巨卿爭欲出已門下一唯諾足以得薦擢而恥於附炎平生故人多在相輔一舉手可以登臺省而恥於自售居士曰貴不可妄致也吾安矣求老而已故雖起家郎署於朝有曼容之高風端居十年不調有淵明之徑節或曰嵩少箕隗山水佳秀近列左右築室巖下足以專天下之雄觀奈何局蹐於里閭之間哉居士曰吾求安者也舍易就難舍近就逺則內勞吾心外勞吾力但見夫勞而未知其樂不獲其安而先撓吾天和矣此先人之故廬也即而新大之吾心猶欿然吾行年六十有二人間富貴不可妄求從吾所好行將掛冠懸車奉身以退歸老此堂志已決矣人生七十雖居是堂以安吾老知復幾何時哉則居士之所養可知故曰居士之安非惟老而後安安之也久矣夫安之為樂世之人未嘗知之及於病然後悔而求安及於勞然後慮而求安及於危然後懼而求安則向日求安之心皆妄未有能安其安者故老而能安已可尚矣非惟老而後安乃每以安老為心非達觀勇退無妄君子不能也故曰居士之所養可知矣元祐三年八月初三日太華李豸記登封縣令㕔盡心堂記一人之心與夫千萬人之心先民之心與夫後世之心聖人之心與夫愚夫愚婦之心其所以然不然可不可者無有或異有社稷人民之寄欲設教布政而願治者能盡其心使人人之心皆以為然皆以為可則天下之理無往而不當天下之情無往而不通誠能奉之以悃愊之誠持之以黽勉之力思其理之所在必使之無遺藴慮其事之所安必使之無遺䇿吾之心盡於是矣以之律身以之臨民以之事君以之事天地無愧無怍矣夫然後推之以及人其以為不然以為不可者乎陽翟管景文為登封大夫為政期月境內畢治吏畏威明民安教令迹其治效當在善最景文新作聽訟之堂取傳所謂刑者侀也侀者成也一成而不可變故君子盡心之說名之曰盡心可謂明慎欽恤而願治者歟民罹罪罟既陷刑辟桁楊狴犴之間徽纆箠楚之下彼不能盡心者或作聰明以自私於已或不事事而仰成於吏自私於已者徇其意之愛憎顧其身之利害所欲脫之則鑽毛出羽粉飾其辭所欲收之則洗垢求瘢傅致其議仰成於吏者不能審克而信其舞文雖髙下其手而有所不察不能平反而縱其鬻獄惟貨惟來而有所不問以是而施刑於民俾罰之者自以為不寃奪之者沒齒而無怨何可得乎然則知一成不可變而盡其心非忠厚不苟有古昔長民之風者疇肯如是然君子之盡心何獨刑罰而已哉盡心以奉上守靖恭正直之操盡心以馭下成豈弟和平之俗盡心以治賦府廩充牣無追胥之擾盡心以務農田野墾闢無愁歎之聲由是推而廣之至纎至悉心之所知皆為之盡然而不治者未之有也景文之意以謂不惟其身當然後之為令者亦當然不惟為令者當然凡邑之有職事者亦當然不惟此邦當然凡有位於朝有職於官雖百職事小有司者亦當然於是屬贊皇李豸為之記濟美堂記天下治安世臣之裔能踐修前烈以世其家太平之盛節也蓋曰吾之先正嘗有嘉績顯於先王陪食太廟預享大蒸載之旗常銘之鼎彛是將昭示後昆無忘其功且夫封圻采邑俾有爵於國冕辨裳衣俾有列於朝賞之所延其澤甚逺盍思之今吾所事之君乃吾先正所事之君其子孫也今吾所使之民亦吾先正所使之民亦其子孫也或忝其先為愧滋甚盡夙夜之志殫股肱之勤必也復有勳勞在乎王室聲名風節奕顯於世然後無愧於心有宋名臣諫大夫贈司徒田公以忠諫立德事太宗真宗讜言徑節凜凜岌岌如秋霜夏日為朝廷獻替可否進退賢不肖剴切上章敷奏治道天下穆然底乎隆平士大夫曰唐文皇以正觀之盛為魏鄭公勸行仁義之功淳化咸平之治亦由公忠諫之力雖不登庸丞弼而嘉謀嘉猷惠於生民固足以為一代賢臣矣豸聞諸縉紳先生論國朝人物以謂有古遺直之風必以公為稱首竊嘗欣慕焉嵗丁丑自箕隗將適吳粵稅駕荆州獲從公之曾孫世德新作南堂謂豸曰臧孫達所以有後於魯者以其君違不忘諫之以德也衍生世晚不逮事王大父而餘慶所被幸有位於朝惟是臣子之職不敢不勉蚤夜汲汲冀弗為門户羞又期我後之人必紹前躅故名是堂曰濟美誠欲如十六族之才能世濟其美不隕其名也豸曰元凱之賢非唐虞之世亦未必能成其功何哉異時功臣之世豈皆泯滅無聞苟非逢年遇合則欲自振起厥路無由深可太息況夫自求禍自速辜除其國圮其族轘其軀醢其肉鬼無血食家無炊火者乎今聖神在御孝治之化形於四海其於名卿之裔方且求是似之實而左右之以舉象賢之典世德乃能飭戒砥礪欲世世承承濟司徒公之美於無窮則君臣之義篤於朝子孫之孝成於家顧不偉哉愚載曰天下治安世臣之裔能踐修先烈以世其家太平之盛節也唐州比陽縣新學記待民以厚可以化薄待民以薄無復歸厚古之君子將臨其民也必敬之愛之以謂皆賢人君子安吾之教令而同期於治其心既平其教既廣其民心親而化其道借有不若者惟其哀矜而不憎怨不忍陷之於辟聽其自遷於善於是雖有偷薄可變於厚蓋所以待之者主於厚之也若乃將臨其民先儲威怒之意欲嚴刑峻法以刈制之故其忮惡忍恚之心無所往而不逢民固不勝愈趨於薄然其政亦勞蹙而無成欲以求治不以悖乎蓋所以待之者主於薄之也襄州光化縣里修縣學記飲則祭先酒食則祭先飯一飲一食而不忘報其先矧修身治民可忘先聖人乎孔子載道欲濟天下而時君不能用故祖述堯舜憲章文武之實不試於當年然金聲玉振之德發乎一身刑於萬世萬世之下六合之間如天地之覆載如日月之照臨尊為王公卑為庶士皆仰之以為師大而治天下小而治一已凡進德修業者皆資之以為法蓋人無貴賤莫不為其徒事無巨細莫不用其道烏有為其徒而寢廟之奉不䖍用其道而教化之宫不飭者哉浮圖老子之道敢與吾聖人抗衡則以習其說者皆能嚴其居尊其師故塔廟參差錙黃雜遝彌滿天下孔子弟子乃顧學校廢興恝然無心可無愧乎寶籍堂記元龜象齒大貝南金世以為寶是惟難得之貨天球河圖和弓垂矢世以為寶是為希代之珍然連城之璧開秦趙之隙照乘之珠召齊魏之難文仲以居蔡獲譏虞叔以懷玉賈害故君子之寶寶乎可貴之道夫傳道以文六藝之書百氏之學歷世之史諸儒之作輯以簡編著之載籍天文之奧此其藴也其藴可索也理義之妙此其㫖也其㫖可求也治亂之端此其迹也其迹可視也言行之實此其效也觀其文以味其言得其原以言其道精微要妙藏於一身而無餘周於萬物而不足充之可參於天地勉之可至於聖人糠粃緒餘者其實足以齊事業其華足以成藝文大焉以之潤色鴻烈小焉以之緣飾吏事奚在藏之韞櫝玩之掌握然後謂之寶哉蘇門六君子文粹卷四十八
