body:
  text: 蘇門六君子文粹卷六十四濟北文粹六宋朝補之撰䇿問舒民力厚風俗等事始終本末問物有本末事有終始知所先後則近道矣上以仁心仁聞遵先王之道苟日新日日新又日新其於治天下蓋無所不用其極也已為矣已行矣則所以待安榮積美者固宜有嘉㑹之期今田疇則闢也而民力未舒貨財則通也而國用未給學校則設也而人倫未明教化則修也而風俗未厚官府則具也而人材未選賞罰則信也而功罪未彰兵武則訓也而蠻夷未柔大之制禮作樂改正朔易服色為法於天下可傳於後世者皆上之所垂心積精虛已仄席夜旦以求也敢問是六七者孰本孰末孰終孰始孰先孰後苟得其序而訓諸天下則所以致朞月之可三年之成者惡乎而宜夫學之為王者事則固欲其有用或誦詩三百而不足乎一獻則緑衣紵絮雖多亦奚以為將必有疏通知治體之士遺淺陋而論著明者也用威愛之道問德惟善政政在養民王者務養民以德而已德不足有威愛然而威克厥愛允濟愛克厥威允罔功後世不原於德而務威愛或失則猛或失則寬蓋愛克而罔功者有矣未有威克而濟者也始皇方斧將相方刀沛公入關民之望之猶鮒逢西江也文景恭儉繼以休息天下滋殖刑用不試而循吏出焉吳公文翁皆謹身率先居以亷平王黃朱龔鄭邵之徒所居民富所去見思嗚呼盛矣而治優柔網漏吞舟民衣食有餘豪傑少年或相與椎埋飲酒亂齊民自瞷氏兩高定襄寺門誅死者跆藉國中股辨而吏治亦從而酷矣夫數十年間上所以為治下所以為俗未大異也而吏緣之政寬猛殊勢若戰氷炭其故何也豈其上賞罰好惡之偏亦有以致此耶將吏以一切相帥成風遂往不反耶抑所謂循吏如龔黃者使之在三代時其治安所比也而伉直若郅都守正若趙禹又安得名酷吏而已哉或曰奉法循理亦可以為治則髖髀之所固已莫勝不然鷹擊毛摰又不可以為治將求先王所以用威愛之道宜必有說也蠟問天之所生地之所養物有材人有力使之必報之勞之必息之百日之蠟一日之澤賜所以為狂而子所以為樂也記曰伊耆氏始為蠟蠟者索也其名安取或曰夏商之祭有嘉平清祀至周而後曰蠟則蠟者將其事則伊耆氏其民則周者非耶不然則夏商之祭與周之蠟抑其事自異也八蠟所記故主先嗇伊耆為神農之氏則先乎神農豈復有為嗇者歟而說者之於八蠟取昆蟲而遺草木又信乎否也臘先祖五祀以疈辜祭四方百物見於經或曰是蠟也或曰非蠟也二者繇禮文考之安所從正先嗇古天子則宜若諸侯所不得祭而仲尼嘗與於蠟賔此魯也而得祭何哉以謂使之必報之勞之必息之曰仁可也何以為仁之至曰義可也何以為義之盡凡此於五經為莫重而繇漢以降滅裂而未白者也願詳質之數問道無非物物無非數自宓羲氏畫八卦黃帝獲寶鼎迎日推䇿堯以閏月定四時成嵗是三聖人所以神而明之為後世法者繇數起竊深推之數始形變數實無形與天地存往來昧昧間不可分若有終始無所得循自一適萬變化無垠復於其一兀然獨在自一而上一莫能載則聖人所以先得諸心幽贊而生以之開物成務而卒於和順道德者其微若此豈直世俗術技乘除子母之差盈縮之間而已哉上以神心執道之樞觀其㑹通有舉無廢此建五學以養羣士庶幾成材而猶患數之不明操觚持籌凌雜胥史故復詔立博士與弟子員所以待之蓋視四學意甚美矣雖然均數也仲尼用以述易同民吉凶謂之神物而考諸周官司徒所職僅名六藝保氏所教才止九數在漢義和亦為小學至於魏晉苐列史官唐雖置學而要之所習類非易數豈星厯氣朔土田粟米朝夕所用於是為急耶將四營二篇其法雖在不有聖人莫之能究耶抑學者必先粗者後其精者耶不然則𨽻首所作蓋不本於易與易固異也上方教士以此且舉諸其廢而不講之餘固不得不先於其近今其書咸在若九章周髀海島之類設或非古而所以知數將必自此始顧可忽哉荀子曰學數有終夫學而至於有終遺數可也蓋有不知而作則君子所病諸君盍試精思且副上所以廣學之意歟文問文猶質也質猶文也虎豹之鞟猶犬羊之鞟所貴乎文者以其有别也大人則炳君子則蔚辨人則萃見乎外不掩乎內者如此故古之觀人者謹焉蓋莫謹於漢漢之文同風三代其一時行事類是而陵夷晉宋羣醜亂夏士大夫相與為言語於鞍馬流離之間因以靡靡不能復振譬之草木百鳥灼然其華嚶然其鳴奄忽物化聲采偕盡而好事者猶往往而傳溺其淫辭以誳法度獨一王通起而論之知其亦有君子之心而知其亦有小人或傲或冶或怨或怒或纎或夸鄙而貪詭而捷以謂皆古之不利人夫玩其文不索其實遂往不反則風俗斯殆而通於此能辭而精之則通也亦可謂知言者非耶本朝以言取人蓋文盛矣士平居入孝出弟行有餘力然後學文而有司一日之進退則卒不在行今庶幾乎亦欲因其言而觀焉非好學深思心知其意者孰能近之必曰以言取人失之宰豫孔子猶病則通於此其能知者復何以也願并聞之祭祀問昔者明王事父孝故事天明事母孝故事地察德莫大乎天地而王者成位乎其間所以報之其義一也六經不完三王之禮其詳不可得聞已而周官具在學者講之猶或不明蓋有禮天於地上之圓丘而有所謂燔柴於泰壇有禮地於澤中之方丘而有所謂瘞埋於泰折謂一祭耶而或曰丘為自然壇折封土其義何以不同天子祠天地則天者天神地者地示耳而五帝與昊天上帝同曰帝山林川澤丘陵墳衍之示與土示同曰示至其言祀大神示則凡所謂帝所謂示者亦皆及乎否耶日用辛也而有曰用日至犢用騂也而有曰用騂黝服用衮也而有曰用大裘凡此或於地不及焉亦何義也素車陶匏煎鹽鸞刀是於三王孰考或者其同乎而其有蒼璧又有四圭有黃琮又有兩圭至於樂之變或六或八其數復安取也用辛用日至則嵗一報焉而已而或曰祭天嵗九祭地嵗二多學如鄭氏宜不苟者也此其為說於經又何所質哉上方舉先王之廢典而大緝之雖制度考文天子之獨而討論闕遺則學校之所得共願詳著焉以待旁求幸學問王者化民成俗未有不繇於學者古之天子視學興秩節祭先聖先師養老習舞以升俊造而簡不帥意誠美也後世治雖不若先王而至於教學亦所先務漢唐之盛二三王者猶親行焉國家得天下以仁百有餘嵗庠序大興主上天縱神智加以緝熙光明所為垂心憤精惓惓惻怛蓋未嘗一日不在諸生也而幾年於兹既卜禘矣諸生相與延頸企踵而望屬車之清塵亦未嘗不在於此也意者肅恭宗廟焦勞萬幾或未遑暇耶無乃崇術立教大法信備而成材尚寡未足以迂臨幸耶不然則莫行久之顧且復舉禮儀必肄而後可耶夫禮儀嘉事博士弟子之所宜朝夕講也嘗試考之先王六經所載草具其事將以獻諸朝廷或者清閒之燕命有司警大昕扆在堂蹕在庭章甫峩峩摳衣執經各誦所聞諸生亦樂乎否也山澤之禁問平土宜五穀而山澤資貨殖夫古之為國所重民食蓋五穀為先貨殖為後也雖然平土以封而不以封者名山大澤而已非曰其可食日用人之賴之與穀同化者於此為饒耶周官井田一夫百畝各有分地而虞衡之職厲禁所施有曰使其地之人然則設不以封而欲作其材焉固授之民也抑所謂厲禁者亦以家受地無得越此而多取耶將萬民共之特以時入不時則不可耶或者邦工王府之入國用足矣而後其餘民乃得有耶不然九賦之所賦以政取之使與夫入者同輸於公其職宜有常也國家比修六官之屬而曰虞與水者實掌山澤惟曰寶藏所興不以奪民芻蕘雉兔與之皆往若此可也抑法無限則工商庶民不有常職而盜林麓陂池之饒或乘馬食肉而不佐公家之急甚亡謂也弛之如漢不加均節諸侯煮匹夫冶則已寬斂之如晉論以重法至或棄市則已虐盍亦本之三王稽之後世宜必有為法適中可行乎今者幸條數之刑書問易曰聖人以順動則刑罰清而民服刑罰雖聖人弗能去也亦曰勿撓勿攖期於清而已疏或漏吞舟之魚而密則無所措手足惟夫咸中時乃有慶主上仁心所以閔焉博稽舊章大布新典厲禁兹省鞭朴用希天下皆曰天子惻怛其於百姓有罪且固去之非固取之嗚呼美矣而議者以謂法欲其久久則吏習而民安輯之十年成而後頒此不刋之典也然而治無常事法固軫轉事之出無窮則法之應之亦無窮抑無復損益耶則琴瑟不解工不能御亦變而趨時務出其便則朝夕以改前此者是已惡在其為成書也吏或未之講民或未之觀藏諸有司付在胥吏人有從違莫之避就豈主上猷告示有位與民宜之之意哉且欲如同官嵗時讀法使人耳目熟於見聞有善得以遷而有罪得以逺亦奚不可願商略之字書問古者觀飛蓬窽木而知為車為舟觀鳥獸蹄迒之跡而知為字夫蓬木蹄迒天也而為車為舟為字者人則原書之起豈人力也哉河洛有書鳯鳥有文孰規模是孰制作是譬之一身手足有位耳目有職五藏百骸各有本末能觀吾一身則推而觀夫天地鬼神山川草木鳥獸蛇蟲雜物竒怪其情其狀無不可知而字之說庶幾窮矣百工之事皆聖人作而倉頡能知之敢問倉頡孰與聖人而智若此科斗之變有大小篆與科斗同聲異形敢問因耶革耶因則科斗與篆不殊革則篆不出乎科斗抑壁間竹書文或非篆必以篆求之其義豈能皆與科斗合哉字之為言孳乳而無窮網罟耒耜迄於宫室皆變而通之以趨後世之利然則即科斗而為篆即篆而為𨽻儻便一時亦奚不可而𨽻學者莫道何哉將後之作者其知淺陋不足以知聖人惟意損益無所法象則廢焉可也而自朝廷學校至於家人里巷䇿牘檄劵咸以𨽻寫之是又何哉且破桔橰以復抱瓮與民同於初則苟且紕繆而害於義者無若書為甚凡此奈何衣服之制問道化無形蓋有不言而喻人心者至於為之綱紀文章以藩飾天下使民有常德而無覬覦則衣服之制雖其於化民也外抑古人所先而不敢忽者歟冕而垂旒衮十二章王以象道而公侯伯子男其制以是為差燕衣縞衣元衣以養老者不可以加幼緇布皮辨爵辨以加幼者不可以養老都人之緇撮無用於野野人之黃冠不施於都其義豈無所當哉自天子出以禮義授則人於是焉榮之否則終朝三褫以訟而受者為不足欽豈曰無衣以己所製者非安且吉嗚呼何修而得此於人耶禮義既亡法度不審門關無苛而竒袤之民用以亂古廣袖之謡流於四方均中國也而齊魯異制况斷髮文身者乎且欲反古以救其弊凡此奈何民無常心惟其耳目習熟聞見者為是今一旦革焉不非且笑者幾希亦其所作有損益所施有先後將俾不悖於古可宜於今則非疏通知治體者安可以議此願極言之屯田問管子曰粟行五百里則衆有饑色古者患此故當其戍守閒暇擇寬大地而教之耕平居有蓄積之備而倉猝無飛挽之困以之多戰人農則朴朴則易用且力有餘可與持久此屯田之法至於今猶利也漢事胸奴使發射士詣朔方屯田張掖而先零之討趙充國上十二事其說最詳然或者以謂充國之論施於當時為便耳智者因世而度宜則論無常是敢問十二事者舉而用於今孰得孰失魏以任峻之闢而破蜀晉以羊祐之墾而平吳兩人者之於佐軍功不減蕭何此其為法之利豈無可言者哉國家修六官以正百度而尚書之屬有以屯田名者將㳂歷代之法而推行之且自朔方始必得充國峻祐知務之才俾之典領勸課而後可敢問擇人立法何以賞罰問或曰治天下欲無事治天下果無事乎唐虞三考黜陟幽明周官以八柄詔王馭羣臣帝獨盛於唐虞王莫若周其於黜陟廢置彰善而疸惡不能一朝去也而言治天下欲無事何耶上執道之統出應帝王譬諸四時變化其成在久是非已明而賞天下之功罰天下之罪在此時也今考功刑部論為成格非大賞罰功當賜帛罪止輸金猶告四方以為勸沮意誠美矣然天下之人其君子固已宿道向方而小人之革面懷其肺肝或誣功罪以近賞而逺罰孰從正之齊威王烹一人封一人而齊國人人無敢飾非務盡其情上方示人以好惡動為道言為法則齊人之事猶爝火不足道也凡此奈何將必有博習明於三事之體者知所以救也開言路問古者敷奏以言庶言同則繹上有大事與天下共之所以防壅蔽而近公正也漢有諌大夫有議郎有博士凡朝廷法出令下事之張弛皆得以所見預討論故漢之文章炳然可觀後世因之有百官轉對或五日起居言事或閣門拜章至於建隆淳化之盛亦時舉焉蓋其餘也今官制自通直郎而上皆升朝官夫仕而位王朝朝之事何不可言大昕警蹕簮組在庭贊謁而出無所預朝事豈天子所以求多助開敢言之意哉今欲如祖宗故事修百官轉對遵漢用諫大夫議郎博士集議得失以今揆昔勢有因革亦可乎不可願聞其說平糴問古者平糴齊物開市不乏所以使農夫俱利抑兼并不得滯穀而饑者食賤也夫平糴以待水旱邊陲屯輸貔貅所聚不耕而仰餔者衆故朔方有便糴有措置以時入穀而措置所藏以待倉卒之發領諸使者付之官屬期㑹勸課以王命行之無慮不集雖然通都大邑囷窖鱗比獨取諸此則患穀之至不廣亦入之旁近則穀不在倉逺者數百里近者數十里轉輸都邑不能無勞又便糴之積以廩吏以餉軍故量入為出僅以足用今措置之榖非倉卒不發且承平日久烽燧無警借使十年不出則紅腐之患若此奈何抑視年之豐凶以時斂散則備不常具又何以待倉卒之發是三四者有司之所宜聞也幸條疏之冠禮問六經惟禮若强人而人之情不可以無禮袒而起趄箕坐大呶則市人亦且睥睨去之常試爼豆於士君子之間端冕而坐則雖有小人猶將斂顔色愧其不似而欲其似况天下之人其始不皆小人哉此古者重冠禮所以謹其始也嗚呼禮之本意非亡而禮之文滅栁宗元記孫氏冠其子曰某子冠畢則有曵笏却立而外庭大笑者天下不以非外庭而以固孫氏甚矣士君子之好禮者微也上比臨軒悼禮俗之未形以下詢諸生學士諸生學士蓋講議洽聞然或不免於溺辭章而晦法度禮用不舉今欲舉三代之遺而求所以施諸今其義何以三加稱尊而辨服之制不同可得聞乎冠於阼醮於客位爰字孔嘉使之棄幼志而順成德若是可也以見於母而母拜之以見於兄而兄拜之不已太重乎曰成人而與為禮歟則大夫之冠也父命之母也兄也則禮答父也則不與為禮何哉無大夫冠禮古也而公侯有冠禮為夏之末造則古者冠禮蓋獨施於士抑童子未成人而顧得與士齒其說又安取厯問天地始於無始日月五星寒暑昏明之運始於天地而厯之原與有物者同始漢以來傳所載有黃帝調厯而其文不見於經所見獨堯以閠月定四時成嵗與中星賓日餞日而其法不詳於傳故學者忽焉夫先王所以正時作事厚生者於是乎在且其事則堯之所謹也顧不務哉抑經所見因推以為厯使後世宗之亦可乎否也自漢至唐語厯者凡幾家而術凡幾變其名察發斂大較安所出其損益盈縮以求合孰者為疏孰者為密其施於人事抑逺耶近耶或曰厯本於易而律治之易之數與律之數皆不改而厯必改易與律不改以之求陰陽每合厯必改以之求陰陽又每合若此何也以謂天動物動久必差差則必變以求合其說最近然知其久將差則逆為法焉進退後先以齊之世豈無智者哉日官不能底日而日御不能不失日今欲復修其職而總其事其擇人奈何揚子曰通天地人曰儒通天地而不通人曰伎故凡語厯必求諸儒者為能盡願討論之貨利問為國之所患法亡限而輕重斂散之權不幹於公庶民農工商賈乘時取豫富至侔封君或不佐縣官之急而貧與拙者益困故為之法曰更繇租賦鹽酒茶礬其物有禁絲麻竹木鳥獸魚鱉果蓏有算上取焉輕十一重十二下賴焉多十九寡十八繇漢以來未之改也雖然法日設貨日出民用不加少而縣官之力滋屈猶曰法未善從而改之所以勸課推行第其增耗而為之賞罰甚明且具矣而吏日趨事比不增民疾作赴上而病於莫贍凡此何也夫人才無常是可則用之要騏驥以千里責狸狌而捕鼠用所在也賣醬隃侈灑削鼎食胃脯連騎馬醫擊鍾彼其以匹夫操是權而私之則與千乘同利乃至官師有司之貴禁凡自我莫之或奪而堇堇乎維日不足顧匪拙歟朱公在越而越彊適陶則三致千金卜式牧羊而肥以致卿士以謂治國猶治家則將欲興利盍試求之朱卜之間抑可哉儒問荀子曰如用真儒無敵於天下又曰仲尼之門人五尺之童子言羞稱乎五霸所貴乎儒者道術無所不包非呻吟詩書俯焉白首之為賢其舉先王之事而力無不可為之為貴然而管仲霸者佐也九合諸侯不以兵車仲尼稱焉曰如其仁其功之在天下豈少耶世之言儒者曰孔氏之儒受業身通如由與求仲尼論其能乃不過於為宰而治賦尚且以自許使民有勇而見嗤為人聚斂附益而得咎至或見比於具臣何耶以謂真儒必周孔而後可則後世之賴於儒者何其寡曰不然歟則以由與求而尚不足蓋才之難若是烏在其為童子羞稱五霸也漢之名臣如賈誼董仲舒推明六經尊師而重道則仲舒為純博達古今計利害於始萌探安危於未形則誼為當然而劉向謂仲舒伊呂無以加而管晏殆不及也至論誼則曰伊管未能逺過其才之長短等級固若是乎將向自離而言之未始為輕重也抑誼之好學俊傑特出董生何以先之江都之治乃牽於春秋災異而五餌三表亦不免見笑於術疏豈二子者終未可與大有為耶將漢未嘗舉國而聽之也蘇門六君子文粹卷六十四
