body:
  text: 蘇門六君子文粹卷二十五淮海文粹二宋秦觀撰進策人材臣聞天下之材有成材者有奇材者有散材者有不材者氣識閎而風節勵問學博而行治純通當世之務明道德之歸此成材者也經術藝文吏方將略有一卓然過人數等而不能飾小行矜小亷以自託於閭里此奇材者也隨羣而入逐隊而趨既無善最之可紀又無顯過之可繩攝空承乏取位而已此散材者也寡聞見暗機㑹乖物理昧人情執百有司之事無一施而可此不材者也古之人主於成材則付以大任而備責之於奇材則隨所長而器使之於散材則明賞罰而磨勵之於不材則棄之而已四者各有所處然而奇材者尤人主所宜深惜者也蓋天下之成材不世出而散材者又不足以任事不材者適足以敗事而已是則任天下之能事者常在乎奇材有奇材而不深惜焉則將與不材同棄而曾散材之不如矣夫匠氏之於木也楩楠豫章易直而十圍者必以為明堂之棟路寢之楹七圍八圍者雖多節必以為高明之麗拱把而上者雖小撓必以為狙猿之杙稍修則以為榱桷甚短則以為侏儒至於棭樠軸解亟沉而易蠧者然後以之㸑也今有楩楠豫章於此七圍八圍拱把而上特以多節小撓之故遂并棄之豈不惜哉人主用天下之材亦何以異於此今國家之人材可謂富矣養之以學校而取之以貢舉名在仕版者無慮數萬然一旦有事則常若乏人何哉以臣觀之未能深惜天下之奇材故也蓋不深惜天下之竒材則用之或違其長取之將責其備雖有嶔崎歷落頴脫絶倫之士執事者始以名聞未及試之而媒孽其短者固已圜視而起矣夫奇材多自重又不材者之所甚嫉也以自重之勢而被甚嫉之毁其求免也豈不難哉一旦有事而常若乏人其勢之使然無足怪也昔孟公綽為趙魏老則優不可以為滕薛大夫禆諶能謀於野則獲於邑則否黃霸為丞相功名損於治郡時人固有所長亦有所短也臯陶喑而為大理天下無虗刑師曠瞽而為太宰晉國無亂政賢如蕭何而有市田請地之汙直如汲黯而有褊心忿罵之鄙文如長卿而有臨卭滌器之陋將如韓信而有胯下蒲伏之辱吏如張敞而有便面拊馬之事此數子者責其備則彼將老於耒耜之㫄死於大山龕巖之下耳人主豈得而用之陛下即位以來屢下明詔舉諫臣御史臺閣學校之臣刺史牧民之吏與夫可備十科之選者所得人材蓋不可勝數臣願陛下取其名實尤異者用之而勿疑人情不能無小過非有顯惡犯大義所當免者宜一切置而不問以責異時之功則彼將輸寫肝膽捐委軀命求報朝廷而不可得一旦天下有四夷之事何足患哉法律上臣竊觀唐虞以後有天下者安危榮辱之所從長久亟絶之所自無不出於其所任之術而所任之術大抵不過詩書法律二端而已蓋純用詩書者三代也純用法律者秦也詩書法律雜舉而並用迭相本末遞為名實者漢唐也何以知其然耶夏商周之興也治教政令既本於道德之意而舟車器械亦出於義理之文其迹載於典謨訓誥誓命之篇而其㫖寓於國風雅頌之什當是時也聖賢之學著而百家之說熄帝王之制舉而霸者之事廢議事以制不為刑辟故曰純用詩書者三代也魏文侯之師李悝論次諸國之法著為法經其徒商鞅用以相秦始作牧司連坐告匿之法而輔以詆欺文致細微之事晚節末路至於焚書坑儒偶語者棄市以是古非今者族吏見知不舉與同罪故曰純用法律者秦也漢自高祖納陸賈之言命為新語用叔孫通之說而使定禮儀可謂知所取矣而以三章之約不足禦姦於是蕭何攟托秦法作律九章而張湯趙禹之徒又為見知故縱監臨部主之法唐自太宗詘封倫秦漢之論用魏公帝王之謀可謂知取舍矣而朝廷郡縣百官有司所以朝夕從事者一出於律令格式之文故曰詩書法律雜舉而並用迭相本末遞為名實者漢唐也惟其純用詩書故三代享國安榮而歷年長久惟其純用法律故秦危辱而亟絶惟其詩書法律雜舉而並用迭相本末遞為名實故漢唐之有天下雖號長久而安榮之日少危辱之日多僅免亟絶而已蓋詩書者所以崇德其事皆孝弟忠信人之所欲者也而安榮長久人之所欲者也而法律所以制姦其事皆鞭笞斬刈人之所惡欲以報所惡之讐者也以所惡之術報所惡之讐亦其理之然哉賈生曰今或言禮義之不如法令教化之不如刑罰人主胡不引商周秦事以觀之也嗚呼若賈生者可謂知治體矣法律下臣聞古今異勢不可同日而語以今天下而欲純用詩書盡去法律則是腐儒不通之論也要使詩書不為法律所勝而已祖宗之時二端雖號並行而士大夫頻自愛重以經術為職文藝相推間有喜刑名精案牘者則衆指以為俗吏而恥與之言近世則不然士大夫急於功利不師古始相與習者莫非柱後惠文之事父教其子兄語其弟以為速化之術無以過此間有引古義决嫌疑則掩口而笑曰此老生之常談耳何所用於今哉嗚呼此風一成非天下之福也蓋昔者以詩書為本法律為末而近世以法律為實詩書為名臣以天下之大弊君子所宜奮不顧身而救之者無甚於此何則廢詩書而從法律則是舉天下而入於申韓之術也揚子曰申韓之術不仁之至矣夫不仁者三代之所以失天下也君子教之其可以緩耶臣嘗思之其所以然者無他始於試法而已朝廷試士以法者欲其習為吏也而假之太優擢之太峻至有黃綬中選數歲之間持斧仗節領一道之權任二千石之重而制策進士留滯於州縣之官有十年而不得調者嗚呼欲士大夫不廢詩書而從法律也豈可得乎且法吏之與儒臣所聞異趨所見異塗猶方圓曲直之不相入也昔胸奴渾邪王降漢長安賈人與市者當坐死五百餘人而汲黯固爭以為不可若使法吏言之則必以為䦨出財物矣密人有告部亭長受其米肉遺者而卓茂折之以禮以為汝能高飛逺走不在人間乎若使法吏言之則以為受所監臨矣朱博曰如太守漢吏奉三尺律令以從事耳無奈生所言聖人道何也且持此道歸堯舜君出為陳說之今天下所以未受其禍者以異時制策進士所得之臣有如汲黯卓茂者在也十數年之後耆老大臣相繼待謝而試法所得之吏有如朱博者當軸而中處焉則君子雖欲奮不顧身以救之亦無及已臣以為縱未能盡罷其士宜稍變革以抑其風使吏非有出身母得試法其餘出仕換官之類可一切試以經術藝文要令天下皆知法律之不如詩書也則申韓之禍熄矣論議上臣竊聞役法之議不决久矣有司閲四方之牘眩蜂起之說牽制優游相視而不斷者二年於兹雖稍復筆削著為一切之令取濟朞月卒未有確然定論可以厭服人情傳萬世不弊者也其所以然者無他焉士大夫據偏守獨各有系吝不能以至公為心故耳何則夫所謂役法者其科條品目雖曲折不同大抵不過差免二法而已差役之法雖曰迭任府史胥徒之士率數年而一更然而捕盜者奔命不遑主藏者備償無算囷倉竭於飛挽資産破於厨傳藝事者患其弊也於是變而為免役之法雖曰歲使中外之民悉輸僦直以免其身然而平估至於室廬撿括及於車馬裒多以為寬剩厚積以為封摏則其弊又有甚於差役者矣蓋差役之法不弊則免役之法不作免役之法不弊則今日之議不興然而士大夫進用於嘉祐之前者則以差為是而免為非進用於熙寧之後者則以免為得而差為失私意既搖於中公議遂移於外嗚呼豈特二年而無定論哉雖十年而無定論不足怪也昔唐室賦役之法有租庸調者最為近古自開元之後版圖既隳丁口田畝皆失其實法以大弊故楊炎變之以為兩稅之法已而盜起兵興征求無節法又大弊故陸贄以七事者力詆其非然而終唐之世不復改也夫唐之諸臣豈不知兩稅為非古租庸調為近古哉蓋以晚節末路俱為弊法以此易彼實無益也今差役免役之法蓋類於此然則何為而可耶臣聞楚人有第二區者其甲則長子之所創也其乙則少子之所創也規摹不同而歲久皆弊其父謀所止二子各請止其所創之廬至數日不决有鄰人告之曰昔少君以甲第壞甚於是營乙以舍族人今乙第又壞而長君復欲徙之於甲是以壞易壞非計之得也何不合二第可用之材别營一區而棄其腐撓者乎父以為然其論遂定陛下以役法之議付於嘉祐熙寧之臣何異楚人之謀於二子也盍亦質諸鄰人之論哉陛下若以臣言為然願詔有司無牽於故新之論母必於差免之名悉取二法之可用於今者别為一書謂之元祐役法則嘉祐熙寧之臣皆默然而心服矣若夫酌民情之利病因五方之所宜條去取之科别輕重之目此則有司之事臣所不能知之亦猶楚人之第某材可棄某材可留皆當付之匠氏不可問諸鄰人也傳曰雖有絲麻無棄菅蒯雖有姜姬無棄憔悴唯陛下擇焉論議下臣聞世之議貢舉者大率有二焉務華藻者以窮經為迂闊尚義理者以綴文為輕浮好為高世之論者則又以經術文辭皆言而已矣未嘗以為德行德行者道也是三者各有所見而不能相通臣請陳其本末而備論之則貢舉之議决矣古者諸侯卿大夫交接鄰國以微言相感動當周旋進退之時必稱詩以喻其志蓋以别賢不肖而觀盛衰焉其後聘問不行於列國學詩之士逸於布衣於是賢人失志之賦興屈原離騷之詞作矣此文詞之習所繇起也及其衰也雕篆相夸組繪相侈苟以華世取寵而不適於用故孝武好神仙相如作大人賦以風其上乃飄飄然有凌雲之志此文詞之弊也昔孔子患易道之不明乃作彖象繫辭文言說序雜卦十篇以發天人之奧而左氏亦以春秋之法弟子傳失其真於是論本事作傳以記善惡之實此經術之學所繇起也及其衰也幼童而守一藝白首而後能言故漢儒之陋有曰秦延君能記說堯典二字至十餘萬言但說若稽古猶三萬言也此經術之弊也古者民有恭敏任恤者則閭胥書之孝悌睦姻有學者則族師書之有德行道藝者則黨正書之而考之於州長興之於鄉老大夫而論之於司徒樂正司馬所謂秀選進造之士者是也然後官而爵祿之此德行之選所繇起也及其衰也鄉舉里選之法亡郡國孝亷之科設而山林遺逸之聘興於是矯言僞行之人弊車羸馬竄伏巖穴以幸上之爵祿故東漢之士有廬墓而生子唐室之季或號嵩少為仕途捷徑此德行之弊也是三者莫不有弊而晚節末路文辭特甚焉蓋學屈宋而不至者為賈馬班揚學賈馬班揚而不至者為鄴中七子學鄴中七子而不至者為謝靈運沈休文休文之撰四聲譜也自謂靈均以來此祕未覩武帝雅不好焉而隋唐因之遂以設科取士謂之聲律於是敦朴根柢之學或以不合而罷去靡曼剽奪之技或以中程而見收自非豪傑不待文王而興者往往溺於其間此楊綰李德裕之徒所為切齒者也熙寧中朝廷深鍳其失始詔有司削去詩賦而易以經義使學者得以盡心於六藝之文其意信美矣然士或苟於所習不能博物洽聞以稱朝廷之意至於歷世治亂興衰之迹例以為祭終之芻狗雨後之土龍而莫之省焉此何異斥桑間濮上之曲而奏以舉舂勸力之歌雖華質不同其非正音一也傳曰梁麗可以衝城而不可以窒穴言殊器也驊騮騏驥一日而馳千里捕鼠則不如狸狌言殊技也鴟梟夜撮蚤察毫末晝出暝目而不見丘山言殊性也今欲去經術而復詩賦則近乎棄本而趨末并為一科則幾於取人而求備為今計者莫若以文辭經術德行各自為科以籠天下之士則性各盡其方技各盡其能器各致其用而英俊豪傑庶乎其無遺矣蘇門六君子文粹卷二十五
