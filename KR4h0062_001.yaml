body:
  text: 蘇門六君子文粹巻一宛丘文粹一宋張耒撰論論法上古之善為天下者不患法不立而患不能為法不患法不足而患法宻而不勝舉然則天下之治亂不繫法之存亡歟夫亦有推本而後知其至也夫法之所生不生於無事事起而不可理則法從而經之事日益多法日益周事日益新政日益工並起而相制則不勝者受其患故法不勝事則天下之亂紛然而起故治天下者非無法之尚也為其無事之可貴也非法備之可削也為其事變之可慮也昔者三代之治不若堯舜商周之治不如夏后孔子曰後世有作者虞帝不可及也又曰虞夏之道寡怨於民商周之道不勝其弊夫舜之禮比於夏后之時則略矣商周之禮比於夏后之時則備矣夫四代之治否豈禮不具之罪哉制度日多淳粹日衰矣天下之勢譬如人之一身夫世之人有不畏寒暑不治藥石恣口之所食肆體之所安夫如是者問其年必壯者也深居奥處愛養備至藥石百物毒烈備進而灸艾鍼砭徧嘗而無遺問其年則必老者也夫虞夏之道壯者也其不治可為也其不足可補也壯者之疾易治也商周之道老者也其不治難為也以其嘗治之而不信故也其不足難補也以其嘗補之而不滿故也以彼之疾方來而吾之術已窮彼之變未休而待之道已盡如是則死繼之矣嗟夫天下之不願取辦於法也如此而世之君子因事制變而尤法之不足豈不悲哉夫法度之弊起於徳不足而求勝其民而敗於啟民之邪心而多怨夏之繼舜也豈不知舜之為不可及也商周之繼夏也豈不知其弊之將不勝也然而明見其弊而不為已何也豈其世變日繁而徳有所不足故耶徳不足以還民之初熟視其亂而莫之禁則將以智加之故曰法起於徳不足而求勝其民夫上以智勝其下則下亦以智勝其上不絡馬首則毁䘖竊轡之馬終身而不知不立門牆則穿窬竊發之盜終身而不為法之於民常制其一而開其一制之者易見而開之者難防上下以智相勝而姦邪詭偽不可勝究故天下之人始忘其歡欣戴君之心而有怨怒忌上之讎故曰敗於啓民之邪心而多怨嗚呼夏之後為商商之後為周三代之治未甚相變也其治亂之迹未甚相逺也周亡而為秦天下大亂先王之治掃滅而無餘治世之迹卒不能復先王之絲毫而三代之俗遂以不見於後世何也夫法未極則俗之變未足夏商之法嘗若極矣然民未大厭也民有未厭之心則其淳氣美質猶有存者周之法詳矣極矣不可以復加其俗之變已窮而民之姦心邪態靡不畢出其智備其質盡其惡甚其美殫故周之亡而不可復為矣此聖人所以深悲之而曰周人之末凟神而貴爵刑罰窮矣此後所以必為秦也歟論法下古之有天下者必得於紛爭敗亂之後夫人之情出於亂亡之後則其情苦而思安夫惟其情苦而思安故其事簡而易教天下有易教之俗則上無難立之法故有國家者其初下常綏靜而易治安平之日乆而民之侈心生嗜慾之動無窮而罪愈繁故居其上者乃始日夜補完其缺敗而調伏其崛强曲為之防多為之制法度繁興刑政畢舉文勝而質不足名美而實不稱大抵有國者中世以後天下之事常多而國家之觀益美生民之過日滋而有司之文加備而世之惑者以謂能完上世之不足而備前人之所未成以為成功而不知其不若使上世之質未散而前人之樸常在也天下之物其勢相激而後變生焉名美者實之所由亡文備者偽之所自起葢嘗以漢之事考之髙祖取天下於秦民出於百戰夷傷之餘父子兄弟僅相保聚以安其生故其氣帖然靜愿而少事而高祖文景得以畫一之法羇縻而安輯之歴數世而天下安妥海内有大亂而豪傑不作此民淳而法簡之效也至於武宣天下之勢久習於無事民意日縱豪俠盜賊稍起於里閭二帝乃修明制度收納天下之才講政備物以與天下戰於才智之中才者奮而姦者隨之强者勝而亂者因之紛紛藉藉以傳於不肖之子孫而漢以大壊此則事衆而法備之弊也故天下之難治不在於創始鹵莽之初而常在於積安大備之後是故君子必觀其兆而審其宜解其甚而不激其變使其勢不為周人之已甚而務使後世可以有加嗚呼其本果安在哉葢天下之弊好强治者必召天下之大亂務窮利者必貽天下之大害夫汚尊而抔飲蕢桴而土鼓天下之人苟未厭其為禮樂也則吾之禮樂雖足以備天下之聲容藏而勿陳可也橧巢營窟之居衣薪不封之葬天下之人苟不失為生死之所安則吾之制度雖足以建九筵之堂五稱之衣棄而勿用可也不亂則已不必邀其敬不欺則已不必盡其忠是謂不求備於民矣可久之道起於不求備而效於人不厭譬之萬金之家責之千金其力亦足以供我之求然吾日取一金焉於是有不得已而取之百金彼猶樂輸而不怨何則彼惟所有者未竭而不厭故也故禮樂刑政之設於下使民有未厭之意則後世有作者得以復加焉故其弊也可以自救而不至於術窮智竭而無繼嗚呼惑者徒見法度宻而民不化文理具而功不立日夜從而加之嗚呼亦失其本矣天下之勢不可以激而民之智不可窮激之以所欲者必得其所不欲窮之以所能者必報之以其所不能徐導其欲激之勢而扶其未用之智則天下久安而無虞然則周人其未足以知此歟彼或者遭其㑹而有不得已焉故也治術嗚呼治天下之難也其為物也大而難舉其為情也雜而不類為之不得其要用之不中其節用力勞而功不成是故聖人本諸道而明於術凡吾所以為術者制物以使入於吾之道也然則何其不直致吾之所欲而為是委曲迂緩而使之從也夫人之情使之從我而刼之以刑則成功難隂有以役其心使之不得不從我則成功易今夫欲天下之畏也而陳之以刀鋸欲天下之愛也而陳之以金帛此直致其畏愛者也夫刑戮賞賜非不足以立畏愛也使必陳其物設其具則刀鋸金帛亦不給矣且天下故有不愛金帛之賞者則賞之所不能恱也天下有不畏刀鋸之刑者則刑之所不能懼也故欲求吾欲而直遂焉者其事繁其教粗吾與物以力相勝而物之從之也内有不伏之心而吾力之所不周者亂之所從起今夫四馬之於車也奔驟舒遲至難齊也夫人之於馬必待夫躬臨之而後如意耶則一車而四御未能足也今以一御而四馬之遲速惟十指之聴者以吾取執者轡也以一轡之約制四馬之節者執馬之要雖欲不吾聴而不可得也是先王之所以役天下者執天下之轡也今夫權衡之舉物也右仰則左俯左抑則右揚夫苟欲俯則卑之而仰者何與焉欲揚則舉之而抑者何與焉夫惟卑者有不能使之卑而後仰者用也舉者有不能使之舉而後抑者用也先王知天下之卑高有不可以刑為也故為其所以卑髙者而不為其刑古之知是道者執天下之所必從者如轡而制物理之必應者如衡四凶天下之巨蠧也商容比干箕子商之望也舜能使天下不犯於有司而度罪之不可以盡刑也取天下之巨蠧者而繫之天下雖有悍强不化者知所畏矣舜非徒能使刀鋸也能沮其不畏之情也武王得商而善者未可盡賞也取世之望者三人而尊禮之而商之為善者悦矣夫武王非徒知尊賢能也能動其恱我之心也故舜武王執天下之轡者也昔梁恵王以利問孟子而孟子非之然其終曰未有仁而遺其親者也未有義而後其君者也何必曰利夫使不遺其親不後其君利之大者也梁恵王以為利而孟子非之何也孟子者以謂不求不遺於民而後民守之不求不後於民而後民先之彼以利而責望於民則民散而惟利之從而卒不獲吾之所求梁恵王之術疎而孟子之術精梁恵王之事私而孟子之事微老子之道絀術者也其言曰將欲翕之必固張之將欲取之必固與之又曰非以其無私耶故能成其私夫將翕而合之將取而奪之行其私以成其私是以暑致暑以寒致寒隂陽之不能為也天之將寒也不以霜雪為之也金石烈土山焦者所以為今日之霜雪也天之將暑也不以蒸鬱為之也震風積雪者所以為今日之炎烈也故邀其反物之功不能逺守其復物之情不能伏故孟子之術低昻天下之衡者也夫術有小大者邪正耳天下之士徒見夫世之淺人執小術踽邪逕而流入於譎詐之域而曰聖人無術直道而已矣嗚呼亦惑矣聖人之所謂直道非無術之言也過乎術者之言也故其道平易而有成惑者之所謂直道不及術者之言也故其道疎魯而多敗文王以仁義而王宋襄公以仁義而亡均為仁義而存亡異何也烏獲之力弛而不用遇盜而三揖之則盜知服矣無烏獲之力遇盜而揖焉則死矣文王過乎術者也宋襄公不及術者也而況乎聖人之未必不出乎術也本治論上治天下之道有歴萬世而可知者有朝不可以知夕者自三代以來至於今蓋已數千百年事勢之變雜出而不可期然而如是而為仁如是而為義得之則安失之則危者未始有改也此雖歴萬世而吾能知之仁與義者吾能知之其所以為仁義者吾不能必也今天下之所謂仁義者有生之而為仁亦有殺之而為仁刑之而為義亦有宥之而為義彼聖人之治天下其可必者吾之所謂未有出於不仁不義者而已矣彼將求其所以致仁義之迹則雖聖智吾知其不能前知夫天下之事未始一也循之則弊激之則變反覆相代而不可知今夫質之於文是無以異於氷炭之不可同也然質之弊則文必至是何也勢之所激故也夫隂極不生隂而生陽寒極不生寒而生暑故物有以同相戾有以異相使此之謂激之而變者也彼先王之法其初固未嘗不善也而至於後世而不能行何也循之故也譬之水也決之而注於海則有所避有所就縱横委曲而不可一而後海可至也有賤丈夫焉不知其為如此以謂水出於西則決而西水出於東則導而東當避而不知避當就而不知就則力可竭而海不可至也夫聖人之法何為而立也無乃因於時乎時去矣而法不改則雖聖人之法有所不能為區區而循之堅守而不變時日益異而吾方倀倀然抱已陳無用之物而求施之則亦何施而可哉此所謂循之而弊者也惟其循之而弊是故隨其所激而變從之天下之事如此而不可一也而世之惑者猶將舉腐餘已棄之空文而求為之無乃已疎乎凡此者朝不可以知夕者也治天下者必求至於仁義而無禍猶治身者求必至於安樂而無疾也夫求安樂而無疾則必察夫寒暑之動而為之應故狐貉以御寒而絺綌以去暑凡晦明燥濕之變吾皆有以制之而吾初不能自必夫如是而後安樂可為也寒而為裘暑而不易暑而御葛寒而不變如是則疾而死耳尚何安佚之有哉嗚呼知此而後可以語天下也本治論下或曰三代已來天下之未大治豈非天下之勢有不便歟嗚呼是未逹夫變者之論也且天下之勢果何為而起也方三代之時列而為諸侯自王畿之外皆侯國也當其盛也藩翰屏蔽而王室以之彊及其衰也分裂四出更為雄强而不可制而後天下之勢合於一而秦始為郡縣以收天下之權而其弊也天子孤立於上匹夫橫行而莫之禁至於漢而天下之勢遂雜而不一列為三國而合於晉分為南北而一於隋天下之勢雖或不同然當其改也必有所懲當其立也必有所利葢自唐之末始有藩鎮之强而唐以之亡歴五代而不能改至於今而藩鎮之禍遂大去而不復今天下之勢委於守令而分於監司總於朝廷自三代以來至於今何其屢改而不一耶其無乃出於有所激歟故堯舜之不得不為諸侯猶今之不得不為郡縣也故兩出於不得不為則勢固有所定而不可變故天下之政有是非而天下之勢無可否譬如人之自少而之壯至壯而之老也夫三者未始同而各有所養亦各有所樂苟不知其所以待老之具而必曰壯而後可則惑矣按今之勢而善為之其誰曰不可而必曰唐虞三代而後可則天下卒不可得而治也然則三代以來其難於治者其病果安在哉蓋有二説一曰尚虚名而忘實利二曰謹小過而失大患何謂虚名好堯舜三代之名是也世之學者圜坐而議政未有不曰唐虞三代者也其言當時之病未有不曰不如唐虞三代者也夫唐虞三代之法豈誠有所不足哉時易而事遷世變而勢異譬之鑄金琢玉以為飲食雖美而無用之矣有一人焉强立而不顧則必羣笑而競排之以為臆説而不學而不知吾之於堯舜三代固相期於仁義之地而吾何求其名哉蓋昔者夏為貢法以取其民至商而為助孟子曰莫善於助莫不善於貢嗚呼使世之惑者必曰禹之法豈有不善哉而不知夫末世之利聖人不能預為而已去之時聖人不能强至也嗚呼使堯舜三代之聖人復出於今而反顧當時之所為予知其必不復為之矣夫天下之禍未始不自好名始也昔者王莽之井田後周之周官房琯之車戰嘗試之矣譬如病狂喪心之人越行妄作而不顧是果何益哉是之謂好虚名而忘實利者也何謂小過夫世之人有好種植者一日種之一日溉之一日培之朝伺其長夕伺其蕃一日至百而不倦是其愛之亦至矣然木不加盛而日槁又有人焉既植而去之行三年而返而木之大可拱矣是何也凡物之性不擾則樂而滋數治則殘而稿且秦之吏比漢之初則勤矣逺邦小都之民其知秦之政令亦熟矣秦之命令布於田野閭里之間者亦至矣而民亦怨苦而漢初之吏雖不如秦之勤而民樂之何則秦之所急者不過簿書文法之間謹嚴其細而勞擾之困固已不勝其弊矣此無以異於愛木而日擾也彼漢之初雖號為文濶而網疎然不過少弛於簿書期㑹纎悉委曲之間而民乃不至於勞擾則何怪乎天下之治哉彼一溉一培之失時於木之性未害也彼不求政之所病而乃尤天下之勢嗚呼其亦不知治本哉治原論昔者堯舜三代之時天子拱已優㳺於上至於無為不言而天下嚮風百官有司夙夜以治職赴功而天下之務無有不成及其至也至廣之於人至幽之於神山川草木之無情天地隂陽之不測皆能制其靜動而導其和時其消息而治其變不至者能格之不順者能柔之葢非特辨目前正人事苟為治安而已天地之功而與有力焉鬼神之造而與有制焉故堯舜三代之治至於匹夫匹婦皆有仁人君子之風者非過論也所至者然也九官之治莫不為萬世法葢嘗更數聖人而莫之或加矣何則彼之所建立者極天下之理者也嗚呼自堯舜三代以來更秦漢數千載世之君子有意於治者仰望先王之時而俯視後世之莫及也咨嗟嘆息以謂卒不可至者衆矣葢亦不原其本甚矣天下之理在我者有所不修而物無不可治立誠者有所不至而俗無不可善先王之時公卿大夫修身以格物而至精神以治職不過是二道而已嘗試言之君子之道至於言出而物應事舉而人諭者君子之末節而非其至也必也不言而物從泯事而人勸心正於内身修於外天下化之而不知所以化者君子之盛也故曰所過者化所存者神夫人情之不可誣也言之有不應者矣諭之有不動者矣去言屏事而天下治者何也吾身之修故也吾身之所以能修者何也吾誠之立故也吾誠之所以能立者何也吾性之盡故也能盡性則能立誠能立誠則能修身能修身而後能正物葢正物以迹者功淺而有窮故聲不能使聾者聴色不能使瞽者視彼其所及者盡其迹之所至者耳迹之所不至雖近而不感何則力治其外而無以鼓舞其内故也夫惟至誠積於心發於身其聲不待言其象不待視故其及物也得吾之所不期者焉譬之日月也日月之為光非期於辨是物也然日月無勞於上而天下之物苟有形者皆効其景於前枉直大小纎細必察而日月豈固與是物辨哉譬之江海也注渟潤澤者吾之事固若是而已其於生物未數數然凡在吾澤之所及者槁者滋瘠者充而江海豈固澤是物哉故日月不期於明而明之所及者不能逃江海不期於潤而澤之所被者不能外君子修身立誠於上則其道大而化之矣凡物之在吾化者亦莫能逃養者自遂枉者自正未嘗怒也而惡者悛未嘗喜也而善者勸悠然使萬物莫不得其職而我初未嘗與物期也堯舜三代之治其能格物若此者何也修身之功也古之君子其治職也不恥有所不能而所能恥其不盡不恥有所不學而所學恥其不成王良之不能射不恥也車不正馬不順則恥之矣羿之不能馭羿不恥也射而不能中則恥之矣故先王之因任也因能以授之而人之受之也無喜心則我之所當處也無侈慮何則終身由之猶懼其不能何暇外慕哉且物之在天下者人無不可為也有形之於無形有情之於無情至大而至毫釐至顯而至鬼神其初皆物色其動一致其事一理然判而别之使不相為異而絶之使不相通者非其理然也世之淺術末智者不能盡其理之所通則其物色有所窒矣智之所窒者術之窮術窮於其智而天下無能事矣龍之為物世之所神而不可見者也然其初豢而御之也何以異於馬牛使人神之而不可見也非龍為之也人之智不足以致之而自絶之也故曰人實不智非龍實智天下之事舉何以異是哉先王之官其能致物者皆如龍也後世仰望而不可得者皆如以龍為神而不可見者也故先王之臣不求多能而能極其能修其官治其事有毫釐之不知則且以為辱矣夜以思之朝以行之父以是傳之子子以是傳之孫索之而極其微鈎之而窮其深是以百官皆修其方而能致其物凡在天地之間吾之力無有不能為之者焉故善治者役物而不善治者役於物役物者物制於我葢可慘可舒可翕可闢吾所欲致者物聴命焉役於物者聴命於物而我不能制故其緩也或急之其行也或止之惟物之所為而已故堯舜三代之官所以能治職而後世莫及者致精之功也嗚呼三代之政既亡刑名刻薄而為秦王霸雜揉而為漢天下之士知學者鮮矣雖或學焉得其正者亦鮮矣汚其身而望人以潔枉其身而望人以直何怪乎應者之不如其欲也官設於上而人覬於下不能其事而貪其名職廢於朝而咎不及其身敗其官而公冒其禄何怪乎物之不順命而至也故身不修誠不充則雖有善教而民不從聾者之言宫商瞽者之言白黒聴者笑之矣何望其信之也何則彼言之者非其任矣人有樂進之心而殆其事與殆其事而不任其恥則是牛羊瘠而牧者無罪也幾何其牛羊之不盡斃矣身不修則妻妾違之一國一邑之衆而望其不我違也難矣學奕而志鴻鵠舉不足以勝其偶欲以滅裂之誠而成天下之務也亦難矣故秦漢不如三代也失其本矣故正學以修身明恥以致精而庶乎先王之治也天下之道有小大有本末隆其大建其本而使小者末者從之而後學之道正矣顔子之好學學其本也子㳺子夏之文學學其末也後世儒者非不務修身也惟其學者不知其本而趨其末先其文而後其實是以儒者接踵於上而無補於天下之治亂楊綰唐之君子也其望聖人也亦逺矣然綰至誠能儉而已一致其誠於儉而為相之日天下化之宿將大臣為之悛革而不終日綰之學未必皆知本也獨於儉則有本矣有本之効至於如是之速則天下之不吾聴豈非士之修身者本未立歟故格物在立本立本在修身修身在致誠致誠在盡性盡性在正學正學在乎隆本以抑末然後教化以明之勸沮以勵之官師以蒞之而後所隆者人勸所沮者人畏此先王隆本抑末之政也將明恥者有道無隆人之所重無卑人之所輕均天下之事於一誠而榮其能辱其不能則士有恥矣人之所輕而卑之則人恥習之矣人恥習之望其不能而知恥不可得也人之所重而隆之則事有輕且賤者矣使人恥賤而羞卑者未有不自此始也禹為相而䕫為樂工伯夷典禮而皋陶治囚論其所處則有貴賤精粗矣而舜之於數人者未嘗有輕重之别也均為朝廷之事耳是數人者知恥其職之不修而已不聞其有粗精貴賤之間其心也天下未嘗無竒才異能之士也惟其心侈大而不肯自守於一隅治職者不恥職之不修執技者不羞技之不工是天下之事卒以汗漫而無成蓋鯀不能抑洪水而罪至於殛死羲和廢時亂日而刑至於征故罰不至則罪不彰罪不彰則恥不明故嚴不職之刑者先王明恥之道也故正學明恥而先王之治其庶乎可為矣亂原論國家之亂嘗在於違理害事最深最要而世主甘心不悟不懼之處若有物焉而左右之此天之所以倍壅將使為亂原者也西漢之亡也以外戚東漢之亡也以宦者方其未亡也皆嘗有釁关然人主安之而不忌信之而不疑卒至於大亂而後已豈非天相之哉唐之髙中制命婦人一奪其國一殺其身明皇玩異類而安史猖狂身播國屯徳宗輕於用兵黷武不戒而叛臣内侮禍連不解文宗知人不明信用狂妄欲求大功卒成甘露之禍凡百君子見本可以知末觀微可以知著陳靈之滛亂子産曰僑聞之如是者常有子禍子産豈求之他哉蘇門六君子文粹巻一
