body:
  text: 蘇門六君子文粹卷十二宛丘文粹一宋張耒撰議逺慮篇上臣聞將享天下之大利者其初必涉天下之危害將受天下之至安者其初必受天下之至勞夫大利至安豈可以苟且安坐無事而得之哉是以聖人雖履危害而不畏當至勞而不厭堅忍強力痛自策勵必為而不輟夫然後天下之大功立矣昔者漢武帝承文景積安之餘天下富實倉廪有餘人力盛強於是大舉以伐胸奴蓋深討窮追者二十餘年通西域闢朔方驅良馬徑卒精兵堅甲北向而爭窮荒之地費財傷民甘心而不悔大勝不滿其意而小挫未嘗不復犬武帝之心豈其止於好大樂夸而力犯天下之憂勞樂驅其士民而殺傷之哉蓋其心以謂胸奴之強非四夷之敵異日之患或在於此而吾之所遭偶中國富強盛衍可以有為之時夫將摧萬里之強國以遺後世安樂無事之福豈可以安坐拱手不傷一民不費一矢而得之也夫使異日之所積僅足以償今日之費異日之安全僅足以補今日之損失猶將為之而况費寸而得尺損尺而得尋哉蓋自武帝北征以來至宣帝之際胸奴之勢浸以消弱單于相率稽首來朝以平日抗禮之強敵而北面跪拜樂為臣僕而不敢動蓋嘗讀西漢見呼韓邪單于始朝宣帝於渭上未嘗不臨卷竊嘆武帝之英才逺略過絶天下而使其國家享安榮之福而漢之強敵獨在胸奴單于入朝而稱臣則漢之威德旁暢逺達於是盡天下而無不為之臣矣嗚呼亦可謂盛也觀今之所獲而追計前時之事費損失者才幾何歟故無勞於心不動乎身則百姓無富家無勤于民無事於敵則天下無強國嗚呼淺夫末議猶以武帝為好大樂夸之主傷財害民而不遵文景之恭儉其亦不思甚矣臣雖州縣之小臣不當妄議朝廷之大事而於意凛凛不能自休者竊以謂今日之強敵與漢之胸奴其何以異耶非獨其強盛之勢僅同而己臣則以謂過之矣何者漢之胸奴其盛未久方秦之亡楚漢角馳於中原內患起而外禦廢貪救目前而無暇於逺略是以胸奴休養生息得成其強至武帝之時其盛近矣且方是時胸奴之所安胸奴之俗也而無慕於中國今日之朔方豈特積嵗之盛哉而胸奴之衰蓋嘗陵鑠上國而澶淵之役長驅中原至勞萬乘之重與之親為之結好通使然而今北朝之所以衣冠居處官名郡邑大抵皆有愛樂中原之心其為治盛極矣而其患又豈特如武帝時也夫端然安居熟視不動而邉鄙之上不肯輕犯者非不欲也提兵而戰勝敗未可知終年而戰所獲能幾何孰與安坐不失而終年之獲皆良金精幣何啻百戰之積以謂重賂而果得其歡心者臣不知其説也夫武帝之時胸奴之患止於侵邉境殺吏民而己今也空內府之藏損中國之力而不免於傷威重賂結歡而未能保其無患則其為患比之武帝之時加切矣夫胸奴之盛則加於武帝之時而武帝之患則未如今日之切武帝猶憂勞勤苦積纍嵗月費財力而為之則今日之計尚安得深畏目前之勤而欲以苟且無事處之而望至安大利之獲也夫先王於危害非樂履之也其於勞費非甘受之也其樂無事而願安佚豈與人異情哉特其審利計害深得事勢雖欲不為而不獲己故也臣聞之太祖皇帝常積縑于內庫曰俟所蓄足用即圖攻取而天錫陛下以勇智神武英特果斷神眀獨照于幾微之表則是天之所付祖宗之所畀實在陛下而臣觀北朝今日之勢故為逺慮之説伏惟陛下念之其詳者臣未敢言焉逺慮篇下臣竊以謂今將制胸奴未可以遽戰當如吳起之取闔閭晉之取孫皓擇將帥之可屬以范蠡羊祜之事者而専委之隂謀密計潛潰其心腹為一戰可滅之計而其深微有未可遽論者而臣竊謂潰其心腹矣而手足肘臂之助猶當為之經制也臣聞之胸奴之俗弱不恥受役於強小不恥見用於大而強大之國常資小族傍國之助而復相與犄角為手足之勢是以中國之力卒不可破冒頓之強也以其能服從北夷而控弦之士至三十萬而始畢之兵至百三萬者以其能臣屬室韋髙昌之屬非徒獲其兵民而為之用也其弱者臣之以為用而羈縻者悅之以為助故有嫁女輸貨而悅傍族鄰國而傍族鄰國幸其不至於侵伐也為之效力而不辭夫如是故中國之伐之也力常分而不得専自漢武帝伐胡數年而無成功然後因張騫之言始通西域踰蔥嶺開玉關以伐萬里之國西置酒泉以隔胡羌之往來通月支使大夏捐宗室之子以嫁烏孫於是胸奴始孑孑然西顧而惴栗蓋漢之兵威自龍堆之西旁暢逺達不啻萬里之地斷胸奴之右臂而壓其脅而後浸浸消縮逺遁大漠窮北之野胡馬北首垂涕而望隂山自昭至宣而甘泉之庭強胡君長北面俯拜而聽命於漢者矣故武帝之征胸奴不在於衛霍而在於得西域故臣以謂今不考武帝故事以破壞其屬國則其勢未能遽衰且今胸奴之國何異冒頓始畢之時其所以臣屬羈人而賴其用者亦宜不止一二而己西有西域東有東夷其姻婭之所親金帛之所悅如漢之胸奴所謂奴僕校尉者計亦有之矣故臣敢有四説一曰金幣以奪其所臣屬之族昔者烏孫之初未甚樂漢也其後貪得漢物而見漢之強大乃始自二於胸奴烏孫大國也而猶如是而况於小族弱姓哉臣以謂宜得如張騫之徒果敢強立奮命逺使者稍稍致命於西北之逺邦少貴而勿厭而啖之以厚利而邀至於漢宜有服從之心此離小國之術也二曰兵威侵討以壞其援助胸奴之傍國比之漢唐則其名號遷徙不一亦當有兵精地少為之聲援者臣以謂宜得如李廣利之徒勇敢不顧投身萬里之外不畏萬死一生之計者數出以困其國使其南向而備中國則兵力分而不専此破其援助之術也三曰審據要害而離其交蓋武帝既通西域初築酒泉以塞羌胡之道其後又建張掖武威燉煌以據要害堅城精甲壓其裘領而使之不得動今誠能按圖審實知其咽喉或以戰取或以謀致而使一將積精兵萬人強弩利戰以守之使之欲交而不能得此破其交之道也四曰遊説反間以弊其力夫胸奴之與國誠得而通之而後使談夫辨士隂誘以利而遊於其間或搆其隙而鬬其兵或疑其心而敗其約此四策者雖古人之所嘗試然後之人欲為之者未見其能出此也恭惟陛下聖神英武受天命以為四方萬里之主稱陛下之威神聖德則盡天地四方之所及堯舜三代之所不能服者悉得而臣之臣尚以為未足也然河隴之地玉關之東漢唐盛時畿西之民也今也中國視之如敵國矣况漢都護之所治哉幽燕之地先王諸侯之所封而唐節度之所治也今也胸奴視之如其民矣况能銘燕然臨瀚海哉夫以蓋天地四方之威而兩隅之地乃不能如其故是豈理之所當然哉此臣之所以深憤痛惜而又謂天將以資陛下立英偉不世之大功也惟留神熟計之慎微篇上先王之治天下雖小害微患不足以為中國大愛其發易消者先王不敢忽日夜補完其藩籬芟耨蕪穢務為牢固精密不使有纎芥之隙為姦人所窺者何也以謂天下之所謂大治者非苟無大患至變而己也必將使之確然無毫釐之憂卒然有驚而吾固己豫為經畫於衆慮之前矣先王之心豈有小害微隙之足以動吾之大計哉以謂要不能悉除之則未足以為大治而不能不纍於泰然無思之懷耳蓋世之善養生者比於常人則其所以纍喪其生天敗其身固己能去之矣然豈以特異於世之常人者而遂足也於是又日夜練治其氣調揉其身小至於飲食之忌詳至于衣服之節其説甚繁其防甚微一一蹈行不敢少忽于頃刻之欲者豈以夫飲食衣服之微害為足以傾其本哉蓋不若是要不為萬全必安之身斷然必趨於夀考安強之域而保其無所梗於前者耳而臣之所慮又非特如是而己也天下之患常養於安樂不慮之處馴致而積之而後日深月長極而後動而小患之不除者大患之所積微害之所在者深害之所養是又不可不察也今天下之勢四方之形可謂安且固矣甲兵之衆不可勝用矣財用之府不可勝發矣而臣竊有慎微之論於今日者天下之重兵精卒驍將健馬大抵皆在西北之陲訓戎練卒講武用衆之法大抵皆篤於兩邉之卒而臣之拳拳以謂東南兩隅亦當有以豫備而陛下威武鎮服之氣當使之周通四海而後為足也臣少居淮南州郡其當會要之控扼者舟車使客日夜往復牽挽駕御之卒皆一切責之於州有司斷長補短常不足於用此外則不過戍卒而屯戍之卒數既不多州府諸役往往而是則有司所謂教行伍訓擊刺者特名存耳此外則僻逺之邦本城與戍卒固己單弱而又本城之兵例不習武而戍卒所寄情如旅人夫無樂土自衛之心而望其出力捍衛輕生而不顧何可得哉夫江淮閩浙之郡江湖千里間以山藪魚鹽茶鐵之所出其間冒法桀黠之民往往竊發故江湖之間聚為冦賊殺掠商賈者雖豐年樂嵗未嘗絶也雖然何足道哉狙猿雖健不可以舍山林黿魚雖悍不可以失淵泉圍而守之則何能為一失其穴安行殺之矣臣特以為方其未殄也郡國不能不驚單弱之民不能不罹其毒於陛下仁民愛物之志不能不少纍耳是可惜也夫養生者既己能絶人之所大欲而人之大欲至難絶者雖絶其所至難而不為其所至易是果何哉朝廷之力固己殄強梁無紀之姦民服萬里樂戰之強敵則夫江湖盜賊之末患禁之易耳臣願陛下詔江淮閩浙之監司使察諸郡之士卒各逐其所宜頗增置之其間控帶要害有所防守當加於常郡無易其名無增其廪然其募之也有司程其才勇可為者而後補既補則使之習戰陳行伍之法募數既廣則士卒之充役者習戰可以畨休而迭用大約一軍之中充役習戰者各占其半更畨而教勞佚相補而卒伍之長有所遷進則有司取其挽強刺堅優於其黨者授之而監司嵗時巡按郡國皆臨蒞激賞動以勸沮使一州有可用之卒數百人與今兵官之所率可以不至於甚弱而不振也彼其所扞衛乃其父母妻子之邦宜各盡力而不憚而姦民亦有以弭其心故臣嘗以為今山林之盜特以勇力之民不能守農畝之勤安田里之養而顧其材力有足恃者故轉而為盜耳豈無刑誅之畏哉今設科以募之則夫材力可恃而無所歸者將欣然而集此亦消盜之一道也而有司不過為衣食之養仰給户部而經費不足臣以謂諸郡既增本土之兵則戍兵漸可減罷戍兵既不外戍則其逋逃死亡可以不補益於此而省於彼何遽患費哉又戍兵之廩多士卒之廩薄增其薄省其多非獨不費且將有得焉耳若夫綱目之詳悉精盡則願詔有司講明其大致則臣以謂不是過矣慎微篇下臣嘗怪昔者先王之時學校遍於天下里閭田畝之民皆不鄙而教之至於庠序之間有一不率教之小人亦國家之細事耳而先王至於元日習射習鄉自左而移之右自右而遷之左移之郊移之遂而天子之學有一人不率長者之教則以王命三公九卿大夫元士視學其又不遷善也天子親臨之教之備待之盡其不改猶是也則屏之逺方窮荒之野其罰之至於終身不復齒於鄉里臣讀書至此未嘗不竊怪以天下國家如此之廣學校庠序如此其衆受教之士如此其多有一人焉不率教於其間其勢至於勞天子動卿相則紛紛然日力且不給而教之不化不遽刑之反覆激發思必反之於善則近于柔懦而不決而不率教之罰又至于流徙逺荒棄絶之地惡之至于終身又何其近於虐也待之則似太重教之則似過仁而罰之又似甚忍也於是深思其故而得先王之用心嗚呼古之人豈費心於無益而為之乎特其寓意深慮患微後之人未之思耳夫天下小之為不治大之為放亂禮義不行上下相窺至於不可勝言者其初誰為之也使天下之民皆有君子之風敦厚和柔俯首聽令愛君而孝親謹身而懼禍則天下之分雖厯萬世無繇壞矣夫惟其間有所謂桀傲不遜教之而不從令之而不懼亂衆敗羣毁慢其上者出焉一人而敗百人於是天下為之不治而有司之法有所不禁矣小人之情不知所禁則禍患之起何事無之故天下小之為不治大之為放亂者凡以不率教者為之夫當其悖傲不遜也示之以禮義暴之以恥辱臨之以重勢庶幾改乎則是吾國中得一善人而除一賊夫為國而得千金不如益一善人之為利也威加鄰國不如去一賊之為安也則先王待之似未過重教之似未過仁者至其確乎趨於惡不改判然與善人異域不可復用矣則他日害我者也眀知其特為吾患而恕之何以異於明見陷穽而自赴也是故非投之屏之於視聽之外則其患不絶則先王罰之似未過忍也嗚呼先王之慮患憂禍至於此其深逺也故三代之衰者諸侯肆行則有之矣不聞匹夫肆行敢有所窺覬也其效可見矣伏惟陛下聰眀聖智深見先王之用心隆學校擇賢師以養天下之才肅政刑謹禁令以破天下之姦其術固密矣然臣之意獨以今天下郡縣里閭田畝小民之姦豪者尚當為之制也夫飲酒聚博而不已必為穿窬穿窬又不己則習而為劫掠一為劫掠則屠牛發冢盜販殺害何所不為矣故田閭之間遊手無賴酗酒毆鬬者異日之盜賊也將除盜賊抄掠之患則必先去田閭之惡民故臣欲使今天下郡縣凡以鬬酗放縱而入有司者既形則禁錮之表其門閭以恥辱之異其衣服以隂辨之鄰里保伍譏其出入容而不察者必為之罰不幸不入於有司而長民者訪知其素其待之也亦然嵗終舉籍於名上之於州州設籍以記之州之役卒有闕則擇其尤不善者而補為兵蒞之有司籍之軍伍則雖有不善亦且不縱又其所役不逺其鄉則無志於逋逃非惟禁之足以杜其姦而威之亦且勸於善數嵗之後田畝之間無賴惡猾者稍稍消去則盜賊孰從而起乎臣前任西京夀安尉時聞旁邑有盜發至一夕劫數家公入市井無敢誰何者問盜之數則才數人耳臣竊怪一市之人其問豈無能行拒驅逐之者何遽為是數盜之所困也訪其故則盜既入市乃甘言以誘市人取民家之財而散之縱其奪取於是市人無賴少年相與間而為之勢不須臾而紛紛滿前舉皆盜也則以數人之盜至於一市之人不敢與較者繇此之故夫與盜為聲勢而奪掠人財平日之心皆盜也是以旦夕之所願望者特在此耳其情不亦甚可惡哉大抵捕逐者以其素非盜賊而劫掠之迹不眀遇之不敢殺故臣欲乞盜發而市人為之助方劫掠時與吏相遇聽得格殺而嚴立市人助賊之禁乞比過致資給之律明詔有司痛治而深刑之庶幾以絶其後蓋先王非不愛人也至於罪惡小人未嘗輒恕故曰羣飲汝勿逸盡執拘以歸於周豫其殺而無恕大憝不孝不友皆刑法無赦夫豈特忍於此哉勢有不得己故也故臣敢以消凶民為慎微之説蘇門六君子文粹卷十二
