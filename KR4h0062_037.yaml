body:
  text: 蘇門六君子文粹卷三十七豫章文粹三宋黃庭堅撰論論語斷篇論語一書孔子之門人親受聖言雖經秦火編簡斷缺然而文章條理可疑者少繇漢以來師承不絶比諸傳記最有依據可以考六經之同異證諸子之是非學者所當盡心夫趨名者於朝趨利者於市觀義理者於其會論語者義理之會也凡學者之於孔氏有如問仁有如問孝問政問君子者衆矣所問非有更端而所對每不一蓋聖人之於教人善盡其材視其學術之弊性習之偏息黥補劓之功深矣古之言者天下殊塗而同歸百慮而一致學者儻不於此領會恐於義理終不近也近世學士大夫知好此書者已衆然宿學者盡心故多自得晚學者因人故多不盡心不盡其心故使章分句解曉析詁訓不能心通性逹故終無所得荀卿曰善學者通倫類蓋聞一而知一此晚學者之病也聞一以知二固可以謂之善學繇此以進智可至於聞一知十繇此以進智可至於一以貫之一以貫之聖人之事也繇學者之門地至聖人之奧室其塗雖甚長然亦不過事事反求諸已忠信篤實不敢自欺所行不敢後其所聞所言不敢過其所行每鞭其後積自得之功也夫不仕無義也子使漆雕開仕對吾斯之未能信而孔子説蓋漆雕開在聖人之門聞義雖甚髙至於反身以自誠則未能篤信其心未能篤信則事至而不能無惑以不能無惑之心適事而欲應變曲當不可得也此漆雕開所以不願仕也先王制禮行道之人皆有三年之愛於其父母而宰豫欲於期祥之中食稻衣錦引天下至薄之行自以為安漸漬孝弟之説不為不久豈其無所忌憚吐不仁之言至於如此蓋若宰豫者其先受之質薄自其至誠內觀實見三年為哀已忘而強勉為之者將欲加厚其質而不可得故不敢少自隱匿方求孔子之至言以洗雪其邪心以窮受薄之地不暇恤人之議已也豈其不仁者欲見於一時之言而近仁者將載於終身之行古之學者所自得於內而不恤其外凡如此也此所以有講有學有朋友切磨以相發明非為文章可傳後世辨論可屈衆人而發也其所聞於師與自得於心者如此方其學於師也不敢聽以耳而聽之以心於其反諸身也不敢求諸外而求之內故樂與諸君講學以求養心寡過之術士勇之不作久矣同與諸君勉之孟子斷篇繇孔子以來求其是非趨舍與孔子合者惟孟子一人孟子聖人也荀卿著書號為祖述孔氏而詆訾孟子以為略法三王而不知其統蓋荀卿見孟子道性善言必稱堯舜義不見諸侯其迹與孔子不合故云爾曾不知前聖後聖所謂合若符契者要於歸潔其身者觀之孟子論孔子去魯其不知皆以為為肉其知以為為無禮乃若孔子則欲以微罪行此聖人之忠厚非孟子不足以知之學者欲知孟子率以是觀之其智不足以知孟子安能知孔子然則荀卿所謂知孔子者特未可信聖人無名而淳于髠以名實求孟子固不足以知之荀卿曾未能逺過淳于髠也揚子雲曰孟子勇於義而果於德知言之要知德之奧非苟知之亦允蹈之言雖不多以聖人之言行反覆考之足以發子雲之知言司馬遷號稱博極羣書至如論伊尹百里奚皆不信孟子此所以得罪於子雲也繇孔子以來力學者多矣而才有孟子繇孟子以來力學者多矣而才有楊雄來者豈可不勉方將講明養心治性之理與諸君共學之惟勉思古人所以任已者莊子內篇論莊周內書七篇法度甚嚴彼鵾鵬之大鳩鷃之細均為有纍於物而不能逍遙惟體道者乃能逍遙耳故作逍遙遊物之不齊物之情也大塊噫氣萬竅殊聲吾是以見萬物之情狀俗學者心窺劵外之有企尚而思齊道之不著論不明也故作齊物論生生之厚動而之死地立於羿之彀中其中也因論以為命其不中也因論以為智養生者謝養生而養其生之主幾乎無死地矣故作養生主上下四方古者謂之宇往來不窮古者謂之宙以宇觀人間以宙觀世而我無所依彼推也故去挽也故來以德業與彼有者而我常以不材故作人間世有德者之驗如印印泥射至百步力也射中百步巧也箭鋒相直豈巧力之謂哉子得其母不取於人而自信故作德充符族則有宗物則有師可以為衆父者不可以為衆父父故作大宗師堯舜出而應帝湯武出而應王彼求我以是與我此名彼俗學者因以塵埃粃粳據見四子故作應帝王二十六篇者解剝斯文爾繇莊周以來未見賞音者晚得向秀郭象陷莊周為齊物之書湣湣以至今悲夫胡宗元詩集序士有抱青雲之器而陸沉林臯之下與麋鹿同羣與草木共盡獨託於無用之空言以為千歲不朽之計謂其怨耶則其言仁義之澤也謂其不怨耶則又傷已不見其人然則其言不怨之怨也夫寒暑相推草木與榮衰焉慶榮而弔衰其鳴皆若有謂候蟲是也不得其平則聲若雷霆澗水是也寂寞無聲以宫商考之則動而中律金石絲竹是也維金石絲竹之聲國風雅頌之言似之澗水之聲楚人之言似之至於候蟲之聲則末世詩人之言似之今夫詩人之玩於詞以文物為工終日不休若怨世之不知者以待世之知者然而其喜也無所於逢其怨也無所於伐能春能秋能雨能暘發於心之工伎而好其音造物者不能加焉故余無以命之而寄於候蟲焉清江胡宗元自結髮迄於白首未嘗廢書其胸次所藏未肯下一世之士也前莫挽後莫推是以窮於邱壑然以其耆老於翰墨故後生晚出無不讀書而好文其卒也子弟門人次其詩為若干卷宗元之子遵道嘗與豫為僚故持其詩來求序於篇首觀宗元之詩好賢而樂善安土而俟時寡怨之言也可以追次其平生見其少長不倦忠信之士也至於遇變而出竒因難而見巧則又似豫所論詩人之態也其興託髙逺則附於國風其忿世疾邪則附於楚辭後之觀宗元詩者亦以是求之故書而歸之胡氏頥軒詩序髙君素作頥軒請豫賦詩子為説其義曰在易之頥觀頥自求口實其傳曰觀頥觀其所養也自求口實觀其自養也單豹巖棲谷飲有孺子之色而虎攻其外張毅擎跽曲養養人間之譽而疾攻其內養虎者不以全物與之牧羊者去其敗羣視其後者而鞭之養鷹者飢之是謂觀其所養庖丁不以肯綮攖其解牛之刀痀僂丈人不以萬物易蜩之翼匹夫之志不可奪於三軍之帥是謂觀其自養觀其所養盡物之性也觀其自養盡已之性也詩云如切如磋如琢如磨求盡性而已君素樂善好賢將求學問日新之功故作頥軒以養其正吉乃以觀頥自求口實六字作詩以勸戒之蘇門六君子文粹卷三十七
