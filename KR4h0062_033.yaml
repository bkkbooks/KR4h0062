body:
  text: 蘇門六君子文粹卷三十三淮海文粹二宋秦觀撰進論王儉論臣聞君子之論人觀其終身之大節大節喪矣雖有一時之美一日之長足以夸汚世而矯流俗君子無取焉史稱王儉嘗謂江左風流宰相惟有謝安蓋自况也以臣觀之儉實安之罪人也豈可同日而語哉何則自晉以閥閲用人王謝二氏最為望族江左以來公卿將相出其間者十七八子為主壻女為王妃布臺省而列州郡者不可勝數亦猶齊之諸田楚之昭屈景氏皆與國同其休戚者也安之仕晉始於桓溫司馬孝武之世政繇溫出縉紳顧望不知所為而安與王坦之盡忠王室蔑有二心至於屢改袁宏之文以寢九錫之命可謂以身許國社稷之臣者矣儉之仕宋襲封選尚其為親貴固非安之比也蕭公雖有異志而謝朏禇彥回之屬初無從意齊室之建儉實發之至引梁王魯國之事使臣珥貂所居稱殿何異取大勢以文姦言者安之於晉其大節如彼儉之於宋其大節如此臣故曰儉實安之罪人也至於該洽經史明習故事工詞令妙威儀動為名流之所稱所謂一時之美一日之長夸汚世而矯流俗者也君子何取焉安少有重名纍年辟召不至其後雖受朝寄而東山之志始末不渝形於言色則安之功名出於無意者也儉少時志在執政見於所賦之詩及生子字曰元成取仍世作相之義則儉之富貴取於有心者也夫無意之與有心相去逺矣豈可同日而語哉宋初受命陶潛自以祖侃晉世宰輔恥復屈身投劾而歸躬耕於潯陽之野其所著書自義熙以前題晉年號永初以後但稱甲子而已以此論之則儉之為人蓋可見矣韓愈論臣聞先王之時一道德同風俗士大夫無意於為文故六藝之文事辭相稱始終本末如出一人之手後世道術為天下裂士大夫始有意於為文故自周衰以來作者班班相望而起奮其私智各自名家然總而論之未有如韓愈者也何則夫所謂文者有論理之文有論事之文有敘事之文有託詞之文有成體之文探道德之理述性命之情發天人之奧明死生之變此論理之文如列禦寇莊周之所作是也别黑白陰陽要其歸宿決其嫌疑此論事之文如蘇秦張儀之所作是也考同異次舊聞不虗美不隱惡人以為實録此敘事之文如司馬遷班固之作是也原本山川極命草木比物屬事駭耳目變心志此託詞之文如屈原宋玉之作是也鈎列莊之微挾蘇張之辨托班馬之實獵屈宋之英本之以詩書折之以孔氏此成體之文韓愈之所作是也蓋前之作者多矣而莫有備於愈後之作者亦多矣亦無以加於愈故曰總而論之未有如韓愈者也然則列莊蘇張班馬屈宋之流其學術才氣皆出於愈之文猶杜子美之於詩實積衆家之長適當其時而已昔蘇武李陵之詩長於髙妙曹植劉公幹之詩長於豪逸陶潛阮籍之詩長於沖淡謝靈運鮑照之詩長於峻潔徐陵庾信之詩長於藻麗於是杜子美者窮髙妙之格極豪逸之氣包沖淡之趣兼峻潔之姿備藻麗之態而諸家之作所不及焉然不集諸家之長杜氏亦不能獨至於斯也豈非適當其時故耶孟子曰伯夷聖之清者也伊尹聖之任者也柳下惠聖之和者也孔子聖之時者也孔子之謂集大成嗚呼杜氏韓氏亦集詩文之大成者歟李泌論臣聞有善聽無良謀有善謀無利勢天下之勢善謀之則無不利天下之謀善聽之則無不良臣嘗以為唐室方鎮之患至於百有餘年而不能解者其弊蓋始於天寶之際肅宗不用李泌之謀先取范陽而已何則夫范陽者祿山之巢穴也鳥焚其巢雖有徑翮無所歸獸失其穴雖有絶足無所恃其勢也祿山帥范陽專三道徑兵不徙者十有四年矣其人視之猶子之於父也一旦舉兵犯順天下之人以為反虜切齒攘袂惟恐其不滅而范陽之人獨以為主引領企踵惟恐其不興此所謂家臣不知有國自古小人之常情故郭子儀李光弼自朔方起兵皆欲先圗范陽而泌為肅宗言之最悉此蓋天下之利勢乘之不可失者也使肅宗能聽其謀先詔李郭諸將掎角而取范陽賊失巢穴則其衆自潰兩京可以傳檄而定兵亦遂息矣惟其不用泌謀是以慶緒思明相繼復起至凶徒逆黨久稽天誅則偷為一切之計瓜分河北地以付之此方鎮之患所從起也昔之取天下者皆以首事之地為根本故雖困敗而能復振高祖之保關中光武之據河內魏武之完兖州是也夫范陽者亦祿山之關中河內兖州也方其陷兩京所得禁府珍寶輒以槖駝載歸其俗至謂祿山思明為二聖後十七年張洪靖欲懲其事發墓毁棺而衆猶不悅以至於亂繇是言之天寶之際若非唐之威德在人忠臣義士乃心王室則天下之事可勝言哉柳玭稱兩京之復泌謀居多其功大於魯連范蠡若以范陽言之泌之謀不見聽者多矣其言王者之師當務萬全圗久安使無後害又得兩京則賊再亂已而果然嗚呼使泌之謀盡見聽也豈有方鎮之患哉白敏中論臣聞白敏中用李德裕薦入翰林為學士及德裕貶敏中為相詆之甚力或曰人臣事君公義而巳何以私恩為乎敏中之事未足深咎也臣竊以為不然人臣能盡私恩然後能盡公義敏中之罪不容誅矣孔子曰事親孝故忠可移於君事兄悌故順可移於長推此言之則背師賣友之人必不能以身許國何則於所厚者薄則所施無不薄也昔吕布為丁原主簿為董卓而殺原為卓之子又為王允而殺卓及兵敗被執魏祖欲生之劉先主曰明公不見布之事丁建陽董太師乎於是殺布漢封陳平辭曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知其後誅吕氏而安劉氏者平與周勃也夫以布之不忠於丁董也其肯忠於曹氏乎以陳平之不負魏無知也其肯負於劉氏乎此魏所以誅布漢所以屬平者也然則敏中之事蓋可見矣雖然敏中所以負德裕也亦有繇焉傳曰盜憎主人主人何負於盜而盜憎之乎蓋自度其事必為主人所惡故也白氏素與楊虞卿姻家居易又與李宗閔牛僧儒厚若敏中本無英氣雖緣德裕以進而不能無意於僧孺宗閔虞卿之徒自度其事必為德裕惡也故因其勢盡力以擠之耳夫德裕忠臣也以非罪被斥天下皆知其寃使敏中素與讐猶當為社稷而救之况因之以進也然則敏中豈惟不忠於德裕亦不忠於唐也臣故曰人臣能盡私恩然後能盡公義敏中之罪不容誅矣然則公義私恩適不兩全則如之何以道權之而巳義重而恩輕則不以私害公若河曲之役趙宣子使人以其乘車干行韓厥執而戮之是也恩重而義輕則不以公廢私若庾公之斯追子濯孺子抽矢叩輪去其鏃發乘矢而後反是也夫公義私恩適不兩全猶當以道權其輕重奈何無故而廢之哉雖然逄蒙殺羿孟子以為是亦羿有罪焉以此言之德裕之薦敏中亦不得為無罪也李訓論臣聞天下無易事非其人則難於登天天下無難事得其人則易於仄掌難無定勢易無常形惟其人也昔漢有諸侯強大之患連城數十地方千里擅爵人赦死罪戴黃屋刺客公行景帝用朝錯之謀始議削之法令未及行而七國合從而起矣何其難耶逮武帝用主父偃之謀令諸侯得推恩分其子弟詔下之日人人各得所願法令不更疆境不變而尾大之患亡矣又何其易耶以此言之則知天下之事惟其人也臣讀唐史至甘露之事未嘗不為文宗而歎息何則欲除纍世之姦而倚一區區之李訓豈不疏哉宦官之禍深矣自德宗懲北軍之變以左右神䇿天威等軍分委宦官主之由是太阿倒持不復可取憲宗之賊歷三世而不能討天下憤焉是時故老名臣如裴度李德裕之徒皆在也向使文宗有知人之明委任二臣俾之圖畫則刀鋸之殘豈難制哉何則以訓之輕躁寡謀尚能殺王守澄則知度與德裕可以制仇士良之屬無疑矣惟其不用二臣而委之訓與鄭注是以事敗謀泄害及忠良蹀血觀闕之前不勝飲恨而已非事之難不知人之禍也或曰注之帥鳯翔也欲因宦者送守澄之喪以鎮兵誅之訓忌其功乃先五日舉事使注不為訓所忌也庶其有濟乎臣曰不然惟其訓之事敗則唐之禍在士良使注之功成則唐之禍在注矣何則袁紹董卓崔休朱溫之事蓋嘗成矣其禍何如哉以此觀之事敗亦受禍成亦受禍禍在用小人而己矣德裕嘗曰舉大事非北軍無以成功此所謂天下之常勢也又曰焚林而畋明年無獸竭澤而漁明年無魚既經李訓之猖獗則天下常勢亦不用臣以為德裕能不為於會昌之時也則知其能為於太和之時必矣王朴論臣聞適用而不窮者天下之真材也材而不適用用而有所窮雖有高世之名難能之行實庸人耳何有補於世耶臣讀五代史見王朴為周世宗決平邉之策然後知朴者天下之真材也夫用兵之要在於識序之先後而識先後之要在於知敵之難易天下之敵非大而而堅則小而脆也其難易孰不知之所以不知者敵大而脆則疑於難敵小而堅則疑於易也昔漢兵圍宛丘光武以别將徇昆陽王邑欲攻之嚴尤以謂昆陽城小而堅宜進擊宛宛敗昆陽自服邑不聽盡鋭攻之兵所以大敗邑之所以不聽尤者疑於難而已朴嘗為世宗畫平邉之策其言曰攻取之道從易者始當今吳易圖得吳則桂廣皆為內臣閩蜀可飛書而召之如不至則四面並進席卷而平之必矣惟并必死之寇可為後圗蓋李氏雖據江南之地二十一州為桂廣閩蜀之脊然南帶江東距海可撓者二千餘里其人易動搖輕擾亂不能持久號為大國實脆敵也劉氏雖據河東十州之面與中國為境然左有常山之險右有大河之固北有契丹之援其人剽悍強忍精急高氣樂鬬而輕死號為小國實堅敵也是時中國欲取之也譬如壯士操利兵於深山之中左觸虎而右遇熊不可並刺則亦先虎而後熊矣何則虎躁悍易乘熊便捷難制舉虎困則熊必畏威而逃困於熊虎將乘弊而至形勢然也故朴以大而脆者為易小而堅者為難易者宜先難者宜後則所以先吳而後并也及皇朝受命四方僣偽次第削平皆如其策非所謂天下之真材其孰能與於此朴雖出於五代擾攘傾側之中然其器識學術雖治世士大夫與之比者寡方世宗之時外事征伐內修法度而朴至於陰陽律厯之學無所不通所定欽天厯當世莫能異而其所作樂至今用之而不可改其五策之意彼民與此民之心同是與天意同契天人意同則無不成之功以此推之朴之所知者蓋未可量也使遭休明之時遇不世出之主則其所就者將不止於此哉蘇門六君子文粹卷三十三
