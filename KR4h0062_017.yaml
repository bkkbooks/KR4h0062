body:
  text: 蘇門六君子文粹卷十七宛丘文粹一宋張耒撰詩傳嵩髙傳嵩髙之所序止於建國親諸侯褒賞申伯韓奕之所序止於能錫命諸侯夫武王之盛時大邦畏其力小邦懷德朝覲會同無敢失時征伐侵討莫不如志爵賞有度錫命有禮夫豈以為盛哉天子之事固若是也一不能是則亂而已矣而宣王之所能乃止於褒賞申伯錫命韓侯而詩人美之如是者蓋周宣至厲王而亂極矣王室衰微諸侯肆行王且不能有國矣而况能建國乎諸侯背叛搆怨連禍而况能親諸侯乎賞命不行於上則褒賞申伯為可美也錫命不行乎下則錫命韓侯為可善也天下出於大亂衰微之後而宣王能振之以行天下之事則雖未能甚盛極美足以比隆先王而苟無大亂衰微之辱則是亦可道也揚子曰習治則傷始亂也習亂則好始治也方宣王之初可謂習亂矣而宣王始能行天子之職詩人為樂其始治而好之此所以美之而不計其善之大小也飢者甘食渴者甘飲雖非飲食之正亦足以無飢渴之害也是詩曰惟嶽降神生甫及申而序之所稱止於申伯蓋褒賞之事止於申伯而已宣王在廷之臣若方叔召虎韓侯張仲皆賢者而所稱止於惟申及甫何也蓋申甫得所出此二人者皆主嵩嶽者之後故也四國于蕃則內足以蕃蔽王室四方于宣則外足以宣播王政四國有所界內也四方無所限外也民勞曰惠此中國以綏四方則中國者四國也四方外也故先中國而後四方則四國為內可知也又曰惠此京師以綏四國者蓋四國比四方為內而比京師為外蓋京師者王所都而已故其言如此又曰揉此萬邦聞於四國萬邦外而逺者柔之而已未必聞四國內而邇者親聞其政矣其能揉之可知也王錫申伯四牡蹻蹻鈎膺濯濯路車乘馬敘其物止於如此而韓奕所序自淑旗綏章簟笰錯衡玄衮赤舄鈎膺鏤鍚鞹鞃淺幭鞗革金厄其詳如此何也蓋韓奕所美止於錫命故詩稱其所以錫之之物詳嵩髙方言能建國親諸侯而因及其禮命之物故不嫌於略也柔者嫌於無立不能剛而有立則其為柔惠也撓而巳矣夫惟柔惠且直者外柔順而內不撓者也夫直者所以為無撓也蒸民稱仲山甫之德曰柔嘉維則嘉者有禮則者有制夫惟柔而無過乎禮而行之有制故不嫌於撓而其意亦與此同也江漢傳六月宣王北伐采芑宣王南征與夫江漢之平淮夷常武之伐徐土其事一也而六月采芑載之小雅江漢常武載之大雅何也蓋其所敘輕重之體異故也六月既成我服此則一人之辭而其及於宣王戎事之修與夫吉甫文武之得者興起一人之情而遂及天下之政也采芑之所稱美方叔而已美方叔之才能而及宣王之作新人才此亦興起一人之善而遂及征伐之事也江漢則言宣王之征亂討罪而因及召伯之賢而不専於召虎常武則有常德以立武事而及太師皇父之美而不専於皇父傳曰大雅言王公大人德逮黎庶小雅譏小已之得失而流及於上天六月采芑興起一人之情一人之善而遂及於朝廷征伐之事者所譏小已之得失而流及於上者也江漢常武言宣王之德而及召伯皇父之美此所謂王公大人德逮黎庶也蓋自大而下之至於小大雅之類也自小而上之至於大小雅之類也故其為事則同而作詩之體異故雅之大小别焉或曰采芑繇一人之善而及征伐之事然則嵩髙之美申伯蒸民之美仲山甫韓奕雖美韓侯而主於能錫命蒸民雖美仲山甫而主於任賢使能何以知其然哉蓋采芑無一詞及宣王而三篇之詞皆主於稱宣王此雅之大小所不同也淮夷來求討齊罪也又曰淮夷來鋪則討鋪刑也常武征徐方之詩也乃曰惠此南國省此徐土又曰濯征徐國蓋惠以仁之省以恤之濯以滌其汙征以正其邪而已二詩其為征伐則同而言不類何也蓋所謂來求來鋪者指所伐之人言之故以致討鋪刑為言蓋淮夷所伐之人也惠此南國省此徐土者指所伐之方言之故以惠省濯征為言而南土者所伐之方也所伐之人則討伐之者誅有罪也所伐之方則惠伯之豫其民也文武受命召公維翰無曰豫小子召公是似蓋召虎在宣之時平淮夷恢境土而疆理至於南海則蓋禦侮啓土之臣而曰召公是似者則昔之召公蓋亦能禦侮闢土之臣矣故召旻曰昔先王受命有如召公日闢國百里是也釐爾圭瓚文事之器也秬鬯一卥行禮之酒也召伯有武功而錫之以文事禮酒者蓋將與之修文德故也故曰告於文人而終曰矢其文德也常武傳先王之道文所以立常武所以禦變為天下國家不可一日而無文故文為常討亂禦侮而後武事舉故武為變宣王有常德以立武事則其武也未嘗去文故也何以言之蓋是詩言惠此南國又曰省此徐土不留不處三事就緒而終之以王猷允塞故也惠則非以為罪也不留不處則不傷財三事就緒則不害民而王猷允塞所謂修文德以來之也雖然因以為戒者武不可觀故也大明曰明明在下赫赫在上故此先曰赫赫而次以明明赫赫示之顯明明示之昭兵事尚神密而王之命將如此其明顯者蓋將討伐有罪民各欲正已而巳安用密乎既敬者不敢慢既戒者不敢忽也以宣王中興之君而皇父賢才之將而征蕞爾之徐土而其重慎如此者蓋兵凶器戰危事也容可忽乎王明顯以命之者道也臣重慎以臨之者法也上有道揆下有法守宣王中興如斯而正奮厥武如震如怒則未嘗震未嘗怒也如震如怒而巳何則兵不以怒戰以怒戰者所謂不勝其憤者也如雷如霆如震如怒而後進虎臣所謂先聲後實也吾陳至於淮濆則敵逼於水矣此所以能執醜虜也如飛如翰管子所謂有飛鳥之舉也如江如漢積水也如山之苞固也如川之流順也是詩之所陳蓋先王之時用兵之法以戰以守可以概見不留不處尚神速貴省費也王舒保作舒者所謂不竭士力以逐利也保者軍行必依水草邱陵所以為固也徐方繹騷而後進虎臣擊其亂也鋪敦淮濆則乘地利也王旅嘽嘽所謂以逸待勞也有飛鳥之舉者善超髙也有積水之洋善守下也固如山之苞止營壘也順如川之流行部伍也綿綿為弱外誘敵也翼翼為飭內謹法也先王之用兵雖動以仁義然行之有法馭之有術不為小仁末義以陷人於死蓋明恥教戰務以勝敵而宋襄公以君子不重傷不禽二毛為君子之所笑也文王傳文武之功起於后稷之播種而文武之興繇於太王之遷岐而周之先公未有不務農者故成王將立政而召康公戒之以公劉之事而周公陳王業則道后稷先公風化之本乃在衣食耕織之際然文王詩敘受命作周之事乃未嘗言先公之業以致文王之受命而一篇之本止於文王能承天意以陟降其臣之賢不肖而後能使周之士世有顯德思皇多士生此王國而文王以寧非獨能陟降招納周之士也而其風化之所及雖商之孫子亦皆相與助成禮樂之美而歸周矣內則有不顯亦世之周臣外則有其麗不億之商士文王作周乃本諸此而后稷先公稼穡養民之功乃不與焉何也竊嘗譬之為宫室也其始斂聚衆材惟恐不多積載土壤惟恐不厚材集矣土積矣於是命工以度宜革化土木以為用而宫室立矣方其集材積土則無所事工也故工為後工治土木以成室則非工者之巧土與木亦從而敗矣故工為重后稷先公之造始種德相承不替以成文武之業則譬之為室之積材聚土者也文王席后稷先公纍世之德完其純備矣於是招合天下之俊乂登用大小之才興事造業革天下而為周譬之為室則命工度宜以革化土木而成室者也方言周之所以興則本諸后稷先公之際而未及於士故衣食稼穡可道也是猶論未成宫室之前則稱其材未及工可也方言文王受命作周則夫后稷先公之功所以立而為周者皆士力也則士為重矣於文王之詩其言止乎陟降多士之際是猶論宫室於既成也則才之美未若工之能也且小雅敘文王之事首於晏羣臣嘉賔則言其於多士能禮之也而繼之以勞功遣使言其於羣臣能用之也而大雅美文王之政而首之以棫朴言其能因任之也而綿稱太王以及文王之烈則止於有疏附先後奔走禦侮言其臣之所以為用者真也然則言文王之造周本於多士之功者凡詩人之意莫不如此言文王之事於周之初基則不知所以本言先公之事於文王則不思所以成言之不同各有所輕重而不可亂故也故曰詩可以言蓋作詩者知言者也不顯亦世何也不顯言其顯也蓋顯德者世世有之故也思皇多士何也皇美且大者也美且大者非止一二而已故也夫父子兄弟之間賢不才不齊也而况於世世皆賢乎故顯德可有也至於世有顯德者所以為難也夫士之美者常難致也而得一二焉亦足以為善矣而况於多士皆美乎故士之美者可致也至於多士皆美所以為難也然則文王之能養才作人以招納天下之俊乂可知矣雖然文王豈有他術哉致禮以來其所以成勤教以養其所未就而已敦養老之禮則太公伯夷欣然而歸之天下之賢者蓋未有不能致者也故孟子以謂天下之父歸之其子焉往是也此之謂致禮以來其所以成示之以法象如雲漢之文章以道藝如金玉之文質非徒臨於不顯而不聞者亦用之非徒勿棄於無射而不諫者亦入終於成人有德小子有造也此之謂勤教以養其所未就也是詩之所稱曰凡周之士又曰思皇多士又曰濟濟多士又曰殷士膚敏其言止乎士何也蓋士以齒言之則少者也以位言之則卑者也言少之賢則老者可知也上天之載無聲無臭而不可聞欲得天者當儀刑文王而已則惟天為大惟文王則之而其義與堯同矣蘇門六君子文粹卷十七
