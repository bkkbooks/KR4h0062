body:
  text: 蘇門六君子文粹卷四十二後山文粹四宋陳師道撰策擬御試武舉策問湯武之兵無敵於天下然而或曰出其不意或曰天命未也晉文公霸者爾然欲用其民則曰教之義示之禮與信夫出其不意詭道也諸侯不期而會者八百矣而猶曰天命未也其故何哉能用其民以禮義信然而不曰王者之事何也昔之誓師者或曰孥戮汝或曰有常刑或曰有大刑或曰無有餘刑非殺其不同何也司馬遷讀司馬兵法曰雖三代未能究其義如其文也今其書尚在其義難盡其文難遵者何歟墨子之詘公輸九攻而九拒之諸葛之服孟獲七擒而七縱之其智安出哉諸羌犯漢辛武賢假紀明則謂當大擊之趙充國張奐則謂兵可罷以罷之為是而紀明之戰克以擊之為便而充國之算勝或謀同而功異或論殊而效同何以然也子大夫習於論兵造庭待問其以所學者具著於篇臣惟陛下學以明王度德以善方俗材以成世務不自賢聖詢於寡昧延見田里之士究觀文武之宜臣愚無以奉明問廣聖志顧常聞之藪宅善牧川居善漁偏昧者聽微右廢者便左臣誠不佞顧無遊居之習偏左之能以成陛下好問之志而幸萬一之得哉謹昧死以對臣聞孔子曰俎豆之事嘗聞之矣軍旅之事未之學也夫兵非聖人之學其所學者無事於兵雖然兵者政之出也能盡爼豆之事則軍旅得矣聖人雖不學蓋能之矣刑者政之餘兵者刑之末非聖人所優為也故武未盡善不若舜禹之修文也古之為國者兵設而不試戰習而不用應而不倡服而不侮臨敵而人不戰得國而市不亂此王政也若夫亷李之戰鬬事也孫吳之書盜術也不足陳於王者之前嘗以臣之所聞敬奉明詔其有不稱乃臣寡陋之罪非聖人之道有所不宜也臣聞古之言無敵者非謂戰勝守固天下不能敵也謂其願為之臣而莫與敵焉昔者商湯東征則西怨南征則北怨可謂不敵矣若夏桀則其衆曰時日曷喪子及汝皆亡非商亡夏夏自亡也夫以不敵攻自亡以天下當一夫安用詐三王之代行天討也是故謀於蓍龜詢於臣民以定其論法以正名刑以正罪以成其詞詔於鬼神諭於公侯誥之於國誓之於軍以致其衆教之以文懼之以武聲之以鐘鼓與天下共之惟公與義詐何施焉故以湯為出不意以伐桀者蓋不知義也臣聞命者天之道視人則知矣天從人者也周文之時三分天下而有其二天之去商舊矣不待盟津而知臣以為文武後之非命後也君子之道同而各有行也如權之稱物惟其所重文王屈義而伸仁以同於天武王屈仁而伸義以順其命孔子以為文王至德也夫優為之與不可已而為之者異矣此文王之為文武王之為武也盟津之會臣無傳焉其漢儒之説乎故以武王為還師以待時者蓋不知命也臣聞君子內德而外行有其德而無其行者有矣有其行而無其德者有矣故君子貴其全也易曰君子以成德為行君子之行出於德也德則有化禮義信者德之行也是故王以安行霸以利動利之者偽也君子恥之夫德形於身而加於民謂之化教其可禁其不可謂之政無化則不革無政則不行本末相用王者之事也晉文公則不然大搜以示禮伐原以示信勤王以示義夫上無化下無教造事舉善以聳觀聽此豈有意於成俗文之以為名爾然能用其民者蓋有政焉王者尚政行之以刑有行而無其德有政而無其化此晉之所以不王也臣讀征誓之書知後世之刑重也虞之誓曰其克有勳刑蓋未用也夏商之誓曰孥戮汝周之誓曰有顯戮尚刑也夏商之孥周之皂𨽻也魯之誓曰有常刑有大刑有無餘刑非殺越逐誘盜則服常刑常刑者劓刖也材不足用則服無餘刑或奴或戮猶未至於殺也無餘者盡之之詞也刑盡而非殺猶今之言辜止於流者也餉不足食則服大刑刑至於殺則極矣傳者以謂無餘之刑戮及妻子臣不知其説也夫罰弗及嗣臯陶之善問也罪人以族武王之伐紂也父子兄弟罪不相及周公之命康叔也而伯禽為之乎先王之刑有至於殺而無相及者以非其罪也故刑至於殺不以為暴而遷刑則暴也雖然誓師而至於殺不亦甚乎夫三代異尚惟其時也周有三典施於五刑惟其宜也軍事尚威其用重典乎天下有道征伐出於天子魯之軍刑蓋周制也臣則知其為仁焉先之以誓期於不悖示之以刑期於不犯未足為仁師克則鮮死為負則多矣伸之以威以逭死也其仁至矣仁以濟義義以行信此其所以賢也臣聞齊威王使其大夫追論古者司馬兵法附以先齊大司馬田穰苴之説號曰司馬穰苴兵法夫所謂古者司馬兵法周之政典也所謂司馬穰苴兵法太史遷之所論今博士弟子之所誦説者也昔周公作政典司馬守之以佐天子平邦國而正百官均萬民故征伐出於天子及上廢其典下失其職而周衰矣故征伐出於諸侯典之用捨興壞繫焉遷徒見七國楚漢之戰以詐勝而身固未嘗行道也遂以仁義為虛名而疑三代以文具可謂不學矣史稱遷博極羣書而其論如此所謂雖多奚為者也臣謹案傳記所載司馬法之文今書皆無之則亦非齊之全書也然其書曰禮與法表裏文與武左右又曰殺人以安人殺之可也攻其國愛其民攻之可也以戰去戰雖戰可也又曰冬夏不興師所以兼愛民也此先王之政也何所難乎至其説曰擊其疑加其卒致其屈襲其規此穰苴之所知秦漢之所行遷之所見而謂先王為之乎臣惟墨子之拒公輸匠之事也武侯之屈孟獲將之事也此百官羣吏之能非王法也昔墨子為守屈其一世而不以守名自惟其術有大者焉墨子之所不為臣愚敢一為陛下道哉崇墉浚川完廩衆民可以守矣然而不守者民散故也故曰地利不如人和也封溝委積所以保民也民固矣而後城郭可得而守也米粟可得而食也墨子之術可得而用也不然寇將侵之巧何施焉夫武侯之縱敵務勝其心以持久專意東方而無後憂可謂善畫矣雖然智以服人可以終侯之世不可繼也此霸者之術也君子制法中材守之所謂百世之道也書曰柔逺能邇惇德允元而難任人蠻夷率服又曰無怠無荒四夷來王夫行法於身而效於四海之外臣謂王者之功易也臣聞先漢西羌之叛辛武賢則欲攻趙充國則欲守臣愚以謂充國之議是也後漢東羌之叛張奐則欲廣恩假熲則欲極武臣愚以謂皆非也臣謂武賢之議非為國逺計冒危徼幸以自利耳此邊吏之常態國之大患也臣謂充國之議有大焉其説曰帝王之兵以全取勝是以貴謀而賤戰戰而百勝非善之善也故先為不可勝以待敵之可勝夫慮勝而戰度得而攻可謂善矣非全師坐勝之道也不戰而勝不攻而取此充國所謂善之善者屯田是也敵所保者衆所恃者地奪其田里則人畜失職而衆不保矣購之以利則有罪者可得無罪者可致此折衝樽俎之道也逸以待勞久以待變亡費而有備可謂善矣臣猶以謂未也兵久則頓役久則怠內有盜賊乘間之虞外有夷狄相因之變防患於未然收利於將來有先王之意焉夫治外與內異譬之於家盜在內攻之可也在外備之可也千金之子不開門穴垣與盜爭死况於國乎臣故曰充國之議是也漢居羌屬於三輔與民雜處而武備不修將吏不選擾以致怨利以啓貪以故數叛夫御失其宜殺之則怨寬之則侮張奐不推其本而襲儒者之弊以恩易武力窮則服利而後動一切苟安非至計也假熲窮兵以盡敵此蠻夷相攻非中國之政也王者之師務明善惡罪人得則畏威善人伸則懷德二者各得其一臣故以謂皆非也以臣之愚驅之度塞限以封略羈以恩信完聚繕守皆以待其來則漢長無事矣臣聞王者之治夷狄自治而己譬諸身焉氣血外強精神內守則厲邪不干本虛末弛則風濕寒暑乘間而作惟其所致疾何能焉其視夷狄若鳥獸然不足計曲直較得失備禦之道因其盛衰來則撫之去則巳之其來不怡其去不戚外之也昔文王事昆夷武王通道九夷八蠻太王去邠宣王薄伐至於太原因時之宜非異道也太王諸侯之事也上無王下無霸既不能拒又不能去是危道也宣王王者事也拯民以去亂武之經也逐之盡境以限內外天之制也如鳥之攫如獸之摶驅之則已暴者為之則覆巢薰穴戮及麛卵不可謂政強則事之文王是也弱則懷之武王是也兩強不相下則相傷故下之以保民也孟子曰仁者能以大事小樂天者也智者能以小事大畏天者也樂天者保天下畏天者保其國夫樂天者與天同者也畏天者同於天也髙而能降以無我也大而能覆以無物也物我兩忘君子之德也以身與人則身重以身與天下則身輕屈小以伸大君子之事也以大事小以賢事不肖先人後身所以為至德而賈誼以謂天子貢夷狄為倒置此少年之氣褊者之心也故其論內則欲削諸侯外則欲事胸奴以尊天子其申韓之餘意乎至於去國千里則憂壽不長一失其職則涕泣以卒無以自容其能容胸奴乎詩云惟是褊心是以為刺誼之謂也智有得失材有能否德則無不盡也充國可謂至矣而內徙降羌令居循致後患務便於近而忘其逺夫料敵決勝誠非儒者之能見危慮逺建萬世之安亦非武人文吏之所及也臣聞禹伐有苗三旬不克禹不以為恥舜不以為罪蓋德不懷則修刑刑不服則明德君子固自反也德刑更用舜之政也自反而不責人舜之所以賢也以舜之政以益佐禹不能得志於有苗而兵家之書有必勝之術非臣所知也夫以禹益之智諸侯之師豈不足以一戰君子勝人不以力有化存焉化者誠服之也故曰滿招損謙受益至諴感神矧兹有苗然則舞干羽於兩階又豈足以感人哉所以偃武而修文也夫惟有德可以服人臣又聞柳下惠曰伐國不問仁人問且不及而兵家之書奮然自任欲一試之幸而不得則又以遺人是樂禍也故術不可不謹臣願陛下循大禹之事服下惠之言而却兵家之圖書將不敵於天下而威行萬世區區一方何足留聖意哉陛下幸詔愚臣敢有隱情不敏之誅惟陛下赦之擬學士院試館職策問傳曰秦失之強周失之弱昔周公治魯親親而尊尊至其後世有寖微之憂太公治齊舉賢而上功而其末流亦有爭奪之禍夫親親而尊尊舉賢而上功三代之所共也而齊魯行之不免於衰亂其故何哉國家承平百年六聖相授為治不同同歸於仁今朝廷欲師仁祖之忠厚而患百官有司不舉其職或至於偷欲法神考之勵精而恐監司守令不識其意流入於刻夫使忠厚而不偷勵精而不刻亦必有道矣昔漢文寬大長者至於朝廷之間恥言人過而不聞其有怠廢不舉之病宣帝綜核名實至於文理之士咸精其能而不聞其有督察過甚之失何修何營可以及此願深明所以然之故而條其所當行之事悉著於篇善言古者不知變習於世故足以經物成務而不在於法義此士之所患也考古之道御今之宜故明者不兩失也夫明者自明也故明於物君子之事而學者懋焉願效其愚夫王者之政逺近異宜貴賤異制而其行之一也一者政也先王所以開天下也昔周公之作周也典以經邦國則以馭都鄙法以任官府內建六卿以導其治外建監牧以齊其政掌交諭其好惡布憲逮其刑禁匡人察其反側行人書其逆順協於朝覲而考於巡狩小則訝士治焉大則司馬討焉方是之時器不異量書不異文行習有常風俗大同故曰夏尚忠商尚質周尚文是之謂治至於上失其政而下擅命國殊治而家異俗故秦尚武晉尚儉而曹尚奢衛失之淫陳失之荒齊魯異變而魯衛同歸故曰天下無道禮樂征伐自諸侯出是之謂亂夫親親尊尊進賢保庸治典之八柄而太宰之職也廢一不可而齊魯各有行焉非所聞也學者以謂齊魯之於八柄各有隆焉非異道也是不然王者革命易姓變古振弊作為一代之法則隆殺有焉所以新天下也故虞氏貴德夏氏貴爵商人貴富周人貴親非諸侯之事也夫齊之強自桓公始舉賢上功管氏之政也逮晉之興而齊衰矣其事晉如小侯特屈強於魯衛之間爾而魯固暴於邾莒矣此無他地有小大人有衆寡非政得也隱桓之際兵行中國則常強矣國無其人能不衰乎春秋之際兩君不葬諸桓之盛其不奪者幸也繇是言之齊未嘗不衰而魯未嘗不亂也世徒見其田氏代齊三桓弱魯以為親尊之弊不亦陋乎蓋漢之諸儒明不證理見周之衰而未聞其盛也喜為異説而自智或者有所傳焉而不能明也遂以前知其然為二公之聖賢君子無取焉夫事有其官官有其人上下相維刑賞並用可謂備矣然而不舉者不考法於先王也是以其弊居之不知其任行之不知其分勇者自用懦者自棄久之則倦逺之則怨急之則詐緩之則偷賞而不勸刑而不變古今之公患也先王之治有政焉而非其本也其所本者化也政者治之具也為化以德為政以禮化以革之政以行之譬之田焉化由天道也政由人力也人力至矣而隂陽之和雷風之動雨露之潤不時則不生天道順矣而種植之宜耕鋤之功不勤則不豐天人相與而成歲矣有化有政而不舉者又有刑焉政以使君子而刑以御小人刑者先王有之而不敢先也非所以待士大夫也政化行而後刑可用也是故政以佐德刑以佐禮而本末具矣雖然治之始也道德既明民俗既成則刑設而不用矣治之終也夫不務德禮而用刑是以小人使之也而責其治可乎先王明足以官人而有禮以使之有度以則之隆之以恩諭之以義時考其績而誅賞焉可謂有其政矣而其所以治者蓋有以先之也正心以及身正身以及人先王之化也化以導其內政以齊其外導之以德則勇者安焉懦者興焉齊之以禮則智者不敢先愚者不敢後此其所以寬而不苟察而不苛之道古之人有之堯舜是也昔在唐虞明德以協百姓考績以行黜陟戒之以休董之以威勸之以九歌申之以四罪而庶績熙矣此無難惟君與相懋之而已故書曰元首明哉股肱良哉庶事康哉漢之宣文稱號仁明有紀於後世然未足以與此也夫有其志者有其事有其事者有其功是以君子務大其志重其事而不有其功文帝有可致之資而無欲治之意聞賈生之論則退避而未遑聞釋之之説則毋甚髙論其所志亦苟矣是以有仁心而非德也行其善而非法也好申韓而非學也方內治安而非政也而一時之士又無其人此漢之所以不振也賈生區區有慕古之心而大臣以謂紛亂諸事其大者既已曠廢矣盜吏出粟賦錢數以百萬姦人乘傳周行郡國其小者又不恪矣君子之學以成其志則志不可不先定也醉酒者亂操刀者殺則有以使之也其學又不可不謹也宣帝不好儒而喜申韓之書則其志可知矣故其治以察為明以刑為義以律為法以賞罰為政而文俗之吏都公卿之位言足飾人之詞文足成人之辜故楊惲蓋寬饒以語言成罪而趙廣漢韓延壽以怨禍致刑君臣如此可謂刻矣雖然方文帝之時胸奴之強魏尚戰勝有功矣以移書一言之誤文吏繩之以法則免官奪爵而罰作矣吏豈篤於厚乎地節之間王成以偽蒙褒賞而俗吏習為虛名欺漫以避課至以不禁姦邪為寬大縱釋有罪為不苛黃龍之詔張敞之議尚可考也吏豈稱其職乎故曰未足以與此也夫以文帝之仁宣帝之智而其治效如此蓋刑政之不足恃也世以文帝為寬宣帝為察而不知兩君未嘗定其所向也文帝有仁人之心而學申韓則其所學害其政也故其議刑未嘗不重聞釋之之論未嘗不輕者以其資之仁也宣帝好察而起於民間知民之苦漢吏也而行之以寬故其為治以安民為本棄嚴延年而用黃霸于定國然有時而刻深者以其資之察也是故德者治之本也可不務乎蘇門六君子文粹卷四十二
