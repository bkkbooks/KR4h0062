body:
  text: 蘇門六君子文粹卷三十八豫章文粹三宋黃庭堅撰序洪氏四甥字序洪氏四甥其治經皆承祖母文城君講授文城賢智能立洪氏門户如士大夫蓋嘗以義訓四甥之名曰朋芻炎羽其友為之易名往往不似經意舅黃庭堅為發其蘊而字之江發岷山其盈濫觴及其至於楚國萬物並流非夫有本而益之者衆耶夫士也不能自智其靈龜好賢樂善以深其內則十朋之龜何由至哉故朋之字曰龜父飛黃騄耳之駒一秣千里御良而志得食君場苗蹇􅐒同軒其在空谷生芻一束不知場穀之美也能仕能止惟其才可仕可止惟其時何常之有哉故芻之字曰駒父火炎髙邱珉石共盡和氏之璞王者之器溫潤而澤晏然於焚如之時蓋火不炎無以知玉事不難無以知君子故炎之字曰玉父鴻雲飛而野啄去來不繆其時非其意不自下故其羽可用為儀非夫好髙之士操行潔於秋天使貪夫清明懦夫激昻者何足以論鴻之志哉故羽之字曰鴻父既字之又告之曰曾子曰未得君而忠臣可知者孝子也未有治而能仕可知者修士也二三子捨幼志然後能近老成人力學然後切問問學之功有加然後樂聞過樂聞過然後執書册而見古人執柯以伐柯古人豈真逺哉朝氏四子字序物無不致養而後成器况心者不器之器乎其耳目與人同而至於窮神知化則所養可知矣觀頥自求口實內外盡矣合者行之不合者思之思者作聖人之具也舜何人哉故字端頥曰聖思察表者思影不知左者求諸右以其所願乎君以撫民知臨者也知臨者可以端委而聽民矣盛車服而載之士民之上徒貴之而已乎教不倦而思無疆也故字端臨曰教思波流衮衮萬物並馳其不隨者匪金石歟彼徒自重而猶若是况物不能遷者乎昔之知常者能人能天能明能昏更萬變而獨存故字端常曰永思有本之水其至於海也蚤夜以之是以聖學者貴夜行日之晉也亨乎大明萬物效之形名非以其健行故耶君子崇德以競時樂思無期忘其髮之化而維好德之思故字端晉曰敏思陳氏五子字序陳氏五男子制名以五行之物始於天一生水而止於金蓋因天道起於北方而成歲之序曰崇居中孚宜又以智仁禮信義嫓名而字之豫章黃庭堅曰君子之名子也以德命為義於此合矣故為具其說易大傳曰智崇禮卑崇效天卑法地蓋周萬物而不遺智之德也欲極髙明故智言崇孟子曰居惡在仁是也路惡在義是也居仁由義大人之事備矣仁固人之安宅也人有不願居安宅而中路以託宿者乎君子居天下之廣居體仁而已矣故仁言居周官曰以天産作隂德以中禮防之以地産作陽德以和樂防之蓋天産精神也隂德心術也精神運而心術形焉無過不及而一要於中者禮之節文也故禮言中易曰中孚信及豚魚孚者信之心化也信不素顯同室致疑及其孚也異物敦化故信言孚禮曰君子之所謂孝也者國人皆稱願焉曰有子如此可謂孝矣仁者仁此者也義者宜此者也蓋義者萬物之制也君子務本時措萬物之宜而已矣故義言宜雖然之五物者故參相得也播五行於四時其治不同同歸於成歲仁義禮智信雖所從言之異要以內視反聽克已以歸於君子而已矣今夫水上下與天地流通周乎萬物智也天下之至柔仁也馳騁天下之至剛義也無心於遲速盈科而後進信也善下百谷故能為百谷王禮也今夫仁微子去之箕子為之奴比干諫而死曲直皆遂焉木之理也無求生以害仁有殺身以成仁金之决也非禮勿視非禮勿聽非禮勿言非禮勿動火之政也無欲而好仁無畏而惡不仁水之事也造次必於是顛沛必於是土之守也明此二端三者得矣一則五五則一也然欲求深則去本逺用意過當則善失真吾生也有涯用以隨無涯之知智之蔽也君子質而巳矣何以文為仁之過也嫂溺不援禮之棄也父攘羊而子證之信之賊也避兄離母而居於陵義之罪人也故太髙則不情太下則易溺君子所以亹亹焉為夫節㑹肯綮又如此也天下之道術未有無當於五物五物待是而後立者其惟好學乎趙安時字序合肥趙安時學士大夫也其質甚美黃庭堅謂之少莊以尊其名且告之曰莊周昔之體醇白而家萬物者也時命繆逆故熙然與造物者遊此其於禮義君臣之際皂白甚明顧俗學世師窘束於名物以域進退故築其垣而封之於聖智之外彼曾何足與談大方之家嘗試相與言其土梗五石之瓠浮江湖以相適我植擁腫之樗謝斧斤之不若感栗林之戮而不庭者三月寧貸粟於縣令而不為楚國相可謂知巳矣知迹之不可以得履知斫輪之妙於手其學也觀古人之不可傳可謂知言矣觀本於濠上之魚絶意於郢人之斤知死生不入虞氏之心魯國之儒者一人可謂知人矣知新生之犢之無求凡亡之不喪其存禆干越之劍而不試洊發硎之刃而不見全牛棄智於垂涎之蟻得計於伏涔之魚可謂知天矣雖然吾又未嘗言其莊語也少莊自澡雪於塵澤之中蟬蛻於俗學之市而權輿於君子之方必不能規市人之履迹而責三倍之贏故吾直告以大道之一忽少莊四顧徘徊則萬繭吐緒矣逮其旁皇四逹必能因莊生之所言知其所未嘗言者國經字序余弟安世之子壻曰國經其友字之曰敦常經則常也於義無所發明為更其字曰端本而說之曰太𤣥曰南北為經東西為緯古者為屋無不面南冬夏無不得宜織者正機則經南北矣匠人營國國中九經九緯九涂九軌蓋取諸此經者所以立本緯者所以成文也忠信以為經義理以為緯則成文章矣易大傳曰正其本萬事理差以毫釐繆以千里故字經曰端本古之善學者取之左右逄其原立於本故也周渤字序輒奉字曰惟深頗與名相稱滄溟渤澥所以能無不容惟其深而己傳曰惟深也故能通天下之志此德人之事業也彼得一先生之言則暖暖姝姝惟其淺而已坳堂之上覆杯水焉置杯則膠矣未嘗鈎致己之深逺安能通天下之志哉古之人能知殊塗而同歸百慮而一致者無他焉盡巳之學而己楊概字序清江楊概問字於黃子黃子字之宰平而語之曰概無列於五量五量待是而後平聖人之作百工也生平於衡而五量受法焉五量官入不能自平則命概為之師概國器也是宰天下之平與物交而懷市道以相傾人情不能無然也由􅕛合而受之至於萬不能計取豫之家皆責贏焉彼安能以不欺維概也中立而無私天下歸心焉非以其無心故耶今夫學至於無心而近道矣得志乎光被四表不得志乎藏之六經皆無心以經世故耶曰然則願聞性命之說黃子曰今孺子總髮而服大人之冠執經談性命猶河漢而無極也吾不知其說焉君子之道焉可誣也吾子欲有學則自爼豆鍾鼓宫室而學之灑掃應對進退而行之曰是可以學經乎曰吾子强學力行而考合先王之言彼如符璽之文可印也韓非曰先王有郢書而後世多燕說夫家奮私智而講無詔之書幾何其不為燕說吾久不喜作書生語因楊君聊復談故并書之訓郭氏三子名字序郭英發見其三子而乞名余名之曰基垕􅟓而英發請其說告之曰老子曰九層之臺起於纍土纍土為基而功不已增臺崇成忠信者士之基也有忠信以為基而濟之以好問强學何所不至哉書曰厥父基厥子乃弗肯堂矧肯構故名曰基字以堂父梁有疑獄國中半以為當罪半以為不當罪雖王亦疑聘陶朱公而問焉朱公對曰臣有二璧其徑相若也其色澤相若也而一者千金一者五百金王曰徑與色澤相若而價倍何也朱公對曰其一側而視之厚兼寸是以其價千金王曰善哉賞疑則從豫罰疑則從去也夫物薄而可以曠日持久者未之有也孔子曰躬自厚而薄責於人孟子曰仁人之安宅也故名曰垕字以宅父日月之行微矣積而成萬年至於不可紀惟其不巳也昔北山愚公欲平太行王屋操蛇之神懼其不已也謁之於帝帝為遷之於朔東雍南夫不巳者神所畏也淮南子曰浮空一􅟓體具衆微衆微從之成一拳石積此以往巋然成山故名曰􅟓字以山父又祝之曰咨爾堂父忠信惟汝既基而堂奄觀百堵咨爾宅父薄不可狃仁以為宅安往不垕咨爾山父一塵為初學而不已泰華為徒惟爾英發務殖三德爾子似之不稼何穡暮夜生子求火燭之恐其似巳尚三復之錢培字序歷陽錢總過其家庭而受大夫公之命曰吾世不繁黍稷柔嘉是集於汝躬汝力學謹行日篤不迷以對我宗祊今命汝曰培其夙夜承之其義蓋取天之生物必因其材而篤焉栽者培之所以寵嘉而勸之云耳培稽首奉名而問字於豫章黃庭堅字之曰茂世而說之曰培者深根固蒂而枝葉遂焉故美實載於崇成之時忠信以為地孝友以立苗夙夜匪懈以致其人功求其友聲以深其雨露實方實皂實堅實好以見其有秋也螽斯詵詵兮宜爾子孫振振兮以見其後嗣之多賢而忠厚似汝也水盈科而進故朝宗於海日月之行微故踐四時而成歲書曰茂哉草木之茂也達其亹亹焉果能以道矣遂有世家其誰曰不然田益字序韓城田益字遷之黃庭堅以謂不足以配名更之曰友直田子曰益者三友何獨取諸此庭堅曰夫友直者三言之長也千夫之諾不如一士之諤誠得直士與居彼且不貸吾子之過切磋琢磨成子金石使子日知不足雖然取直友猶有四物有直而終於直者有直而似於曲者有曲而盜名直者有曲而遂其直者邦有道如矢邦無道如矢此直而終於直者也子為父隱父為子隱此直而似於曲者也其父攘羊而子證之此曲而盜名直者也或乞醯焉乞諸其鄰而與之此曲而遂其直者也其二端可願其二端不可為吾子擇之益友常以是觀之黃育字序㑹稽黃渥與庭堅皆出於婺州之黃由七世以上失其譜以年相望與渥相近也故復以昆弟合宗渥之言曰異時與我同昭穆者皆以今𨽻字形同類為名惟渥未之得今願改曰育敢以字請庭堅曰古者生以字尊名殁以誄易名易名之實有宗也有勸也其治在後人尊名之義有宗也有勸也其治當其身今曰懋達以配育名則宜夫草木之茂亹亹以勸四時及其日至而立於成功之㑹非深根固蒂得其養故耶彼達於道者不可以窮故獨立於萬物之表而無終始以今不出於閭巷之智望之相去逺矣然孟子以謂聖人與我同類者何耶今舉一粒之種則曰是與太倉同類人之聞之也見色而爭慮清氣平則聞命矣蓋長育以達其才故也穀之育苗也達於粢盛水之育源也達於海君子之聞道也達於天地之大蓋聞道者必明於權銖兩低昻與道翺翔稱天下以此不以萬物易巳由是觀之病於夏畦曽子難之未同而言仲由不知君子以直養氣而已氣者萬物受命而效形名者也懋達乎勉之在邦必達在家必達羅中彥字序延平羅中彥問字於豫豫字之曰茂衡茂衡曰願遂教之黃庭堅曰道之在天地之間無有方所萬物受命焉因謂之中衡稱物低昻一世波流洶洶憤憤我無事焉叩之即與為賔主恬淡平愈宴處而行四時死生之類皆得宜當是非中德也歟惟道之極小大不可名無中無徼以為萬物之宰强謂之中知無中之中斯近道矣精金躍於爐曰我且必為莫邪其成果莫邪矣人也破世俗之紏纒自躍於造化之爐曰我且必聞道化工於我何有焉爐錘之柄安能禦之哉茂衡曰今之言道者奚獨不然曰以聖學則莫學而非道以俗學則莫學而非物詩云人知其一不知其他侍其鑑字序侍其純夫之孫曰鑑涪翁字之曰彌明而說之曰物材美火齊得然後成鑑鑑明則塵垢不止明雖鑑之本性不以藥石磨礱則不能見其面目矣况於下照重淵之深上承日月之境者乎學者之心似鑑求師取友似藥石得師友則心鑑明矣求天下之師取天下之友則彌明矣元勛字序河南元氏世典名教仕不得軌其宗盟不著大儒之效生子嗜學㝅莬有彬鶴游於鶩昻昻不羣乃翁祝之曰其受命於先君子闢楊墨以倡斯文散齊七日致齊三日而號之曰勛則問字於太史氏太史氏曰懷道者不爭贏寶若龜玉進道者不觀歲行若日月有居成功之心則不達自智而敖不能則不達故三釁三沐之而字之曰不伐昔在伯禹荒度土功九河三江四海㑹同七年三過其門風雨櫛沐啓呱弗子民乃粒食而不伐不矜故天下莫能與之爭暖姝以一聞為足河伯以秋水自多是其弗忍弗容惟未嘗聞伯禹之風不伐曰若先生之言嚮也誠有之今則謝之矣請誦斯言殁而後已宋完字序僰道宋君完曰完也有志從學於先生之門而未能自克出從市井之囂葷然其有味而常見侮於人入聞先生之言淡然其無味而常見敬於人二者交戰敢問其故涪翁字之曰志父而命之曰志父來前士惟無志則不可學誠有志乎不難追配古人矣戰市井之囂又何難哉古之言不以物挫志之謂完季札子臧不以國挫志泰伯虞仲不以天下挫志是以縉紳先生於今尊之夫志者戰不義之良將也不怒而威不言而信總百行而出戰可謂堂堂之陳未有能當其鋒者也而况市井之囂曲巷之好頻頻之黨酒食嬉戲相追逐者乎詩云豈不爾思室是逺而子不邇求豈有執戈而禦之者乎李攄字安詩豫既字舅弟李攄曰安詩而安詩請其說嘗試妄言之吾讀詩至緑衣然後知先王之風澤深厚士之出於其時者為可願夫以婦人女子而其所知如此蓋其器閎深其聲舂容其藏充實其施漙博鳴和鑾委玉佩執綏正立辭色坦夷固與追奔車比服馬追前人惟恐不及氣息茀然者不可同年而語矣安詩乎子誠可與言緑衣之一章曰緑兮衣兮緑衣黃裏心之憂矣曷維其巳其義以為間色為表而正色為裏是嫡無分於妾也憂國者所宜動心孰能已之尚幾可救也二章曰緑兮衣兮緑衣黃裳心之憂矣曷維其亡名分治之統所以保宗廟者也緑顧居上黃顧居下名分悖矣亡之徴也誰當為宗廟社稷憂之三章曰緑兮絲兮女所治兮我思古人俾無訧兮均之絲也一以為緑則不可尚黃均之女也一以為妾則不得二嫡色比黃緑者女序比嫡妾者君古之人歟何獨善名分而無過也窮於外則反於家困於今則樂道古亦理之固然也四章曰絺兮綌兮凄其以風我思古人實獲我心先王正始以經夫婦謹名分序人倫厚民德今也殆所謹薄所厚非所以維持風俗養亷恥救衰世之道能明吾意者誰乎當求之古人中耳此其大略也此婦人傷己之詩也由後世言之必且仰天而號曰何為使我至於斯極也殆其甚者今其言若此亦可以觀矣蓋無意於攄其蘊不得已而後言仁厚積中而言者其行之指也詩三百率以是觀之荀卿言善學必曰通倫類誠用此說以學詩一以貫之可也古之學詩者始於詩而終於樂禮者學之中流也誠博學夫詩則富有萬物之府吾酌而取之行有暇則約之以禮求寡過而已至於樂也無務其速成而待其自然深於仁則安仁深於詩則安詩矣安之者是樂之也王蕃字觀復維亨嘉之㑹草木亦樂其生天地否塞君子有失其所故易曰天地變化草木蕃天地閉賢人隱君子所以處窮通如寒暑者何哉方萬物藝藝之時已觀其復矣蒲大防字元禮夫禮之使人左規右矩前瞻後顧見德思義見名思實大為之防如水之有所游泳而不决溢以為敗者也張慤字士節荀卿曰馬必服而後求良士必慤而後求智夫執德不𢎞信道不篤惟其不慤也夫慤者守之則虛一而靜接物則言忠信行篤敬矣如是故可以託六尺之孤可以寄百里之命矣無是節亦不足以為士矣靜而慤有餘動而節不立吾不信也全璧字天粹長林全君璧問字於涪翁翁字之曰天粹而告之曰璧者成器之玉也其溫潤縝密清明特達天之粹美也體圓而性剛又其天德之純也夫名者實之賔也有其實然後受其名而無愧昔者舜在父子兄弟之間遇人之不幸而舜盡其心於孝友使頑嚚誕傲蒸蒸而為善不至於姦曾參之事親盡力以養其志此孝之粹也傅說之事君也勸人君終始典於學魏鄭公之事君也造次顛沛責善責難終其身而不倦此忠之粹也柳下惠與鄉人處國人不稱天下樂之此和之粹也季子辭國而恤吳之社稷子臧辭國而與曹之存亡此清之粹也是皆清明在躬有玉德者也若夫有好學之意而不求明師不近畏友喜君子之名而不舍幼志不出下流則是珉而非玉也彼珉之為物似溫潤而不澤也似縝密而不栗也是以君子賤珉而貴玉惟天粹之質可以琢磨而成器故豫為之言也訓四從子字序札去千乘之國而仁滿天下仲尼嘉之書延陵季子文安國字序質之柔者能有所不為則剛氣之弱者不從於無益則强知柔之剛者觀水知弱之强者觀弓弛蘇門六君子文粹卷三十八
