body:
  text: 蘇門六君子文粹卷五十一濟北文粹六宋朝補之撰春秋左氏傳雜論宰咺歸賵秋七月天王使宰咺來歸惠公仲子之賵緩且子氏未薨故名云云贈死不及尸弔生不及哀豫凶事非禮也惠公葬在春秋前故曰緩也子氏仲子薨在二年右隱元年周政衰禮廢歸惠公之賵於葬後宜有之也而子氏未薨無故而并歸賵此為難知抑侮耶詛耶他國赴告之不一而誤耶求周之所以然者而莫得而人情無容如此也侮詛則周之不君甚矣言豫凶事非也誤則周之無政極矣言豫凶事亦非也不君無政又何暇論禮與非禮之間哉言非禮亦非也蓋此元年七月也而子氏以二年十二月薨相去不逺杜氏以長厯推經或言日誤或言日月必有誤者不一安知非策牘脫亂而傳忘夏五之疑杜又信傳而不核其然歟周鄭交質鄭武公莊公為平王卿士王二于虢鄭伯怨王王曰無之故周鄭交質君子曰信不由中質無益也又曰君子結二國之信行之以禮又焉用質右隱三年周衰徒以虛器位諸侯上而周又最弱質固宜也然王而與鄭質鄭也而質王則無王與不臣未有甚於此時者如先君子之論則宜曰王不當取諸侯質諸侯固不可以質王可矣而曰信不由中質無益也又曰君子結二國之信行之以禮又焉用質是周鄭敵也非先君子之言也鄭師入郜入防庚午鄭師入郜辛未歸于我庚辰鄭師入防辛已歸于我君子謂鄭莊公於是乎可謂正矣以王命討不庭不貪其土以勞王爵正之體也右隱十年經書夏翬帥師㑹齊人鄭人伐宋公敗宋師于菅辛未取郜辛巳取防杜預云齊鄭後期而傳言鄭入郜入防蓋鄭後至而得邑歸功于魯魯受而不辭故書取也按十一年公及齊侯鄭伯入許齊侯以許讓公公曰君謂許不共故從君討之許既伏其罪矣雖君有命寡人不敢與聞乃與鄭人鄭伯使許大夫奉許叔以居許東偏曰敢以許自為功乎是魯與齊鄭連伐宋伐許而同勝之齊皆不取魯取宋邑而讓許土鄭以宋邑歸魯而得許不有也鄭莊公為有禮且正宜矣隱公賢君也知讓許土而不嫌于取郜防豈其心哉蓋許國也郜防邑也人情于大者則不敢貪而辭小者則易而受故三國有功而魯獨失惜哉周公欲立王子克周公欲弒莊王而立王子克辛伯告王遂與王殺周公黑肩王子克奔燕初子儀有寵于桓王桓王屬諸周公辛伯諫曰並后匹嫡兩政耦國亂之本也右桓十八年周公黑肩欲弒莊王而立其弟克辛伯告王而殺之元惡得戮義無可悔而傳乃以謂辛伯嘗陳四者以諫周公弗從故及於難天使子儀作亂以纍周公周公無辜而及禍如是言之可也周公為惡而自禍豈但前弗從諫之咎傳意非也祭仲廢立十一年鄭昭公之敗北戎也太子忽齊人將妻之昭公辭祭仲曰必取之君多內寵子無大援將不立三公子皆君也子突子亹子儀母皆寵弗從昭公立宋莊公誘祭仲而執之曰不立突將死亦執厲公子突而求賂焉祭仲與宋人盟以厲公歸而立之昭公奔衛厲公立又十五年祭仲專鄭伯患之使其壻雍糾殺之祭仲殺雍糾厲公出奔蔡昭公入又十七年髙渠彌弒昭公而立公子亹又十八年齊人殺子亹而轘髙渠彌祭仲逆鄭子于陳而立之是行也祭仲知之故稱疾不往人曰祭仲以知免仲曰信也右桓十一年十五年十七年十八年傳趙穿弒君而春秋書趙盾弒其君為亡不出境返不討賊而仲尼稱盾以其為法受屈也祭仲立昭公又廢之立厲公又逐之至高渠彌弒昭公而立公子亹又假手于齊而殺之復立子儀人臣而改立君者四然而春秋不書其罪當時稱以知免何耶盾之力足以全靈公而靈公欲殺盾不獲而見弒弒非盾為而事由盾起故盾被惡名而不辭若祭仲自昭公之未立也固以諫其受齊婚知有後日之禍也昭公不從而及此其廢昭而立厲又非已志宋實劫之若曰喪君有君社稷無隕多矣是仲之心也至髙渠彌立子亹齊人將誘而殺之仲雖知之而不往同其難則仲與子亹無君臣之分然也不然則衛州吁既篡立為君矣石碏亦安得使陳人并石厚殺之哉石厚之黨于州吁猶髙渠彌之黨于子亹也石碏教陳殺二人尚無罪則齊人自誘二人殺之祭仲安得而預其難哉晏平仲亦曰君為社稷亡則亡之為社稷死則死之若為已死而為已亡非其親昵誰敢任之祭仲石碏晏平仲易地則皆然人謂其以知免而仲曰信也者知其不可辨而可受也公羊以祭仲廢君為行權而范寧非之曰是神器可得而窺也夫鄭之亂非一人之力可為也祭仲固前言之矣宋既劫之非其死所而三公子又自爭立以及于難祭仲何罪乎卒之逆子儀于陳而立之以存鄭者祭仲也則其本心可見矣馮道在五代時歷事異姓而不預其難惟其草昧力相篡奪道以為不足死而勢不得去故易世更主依違而獨全而世不加惡于道或恕而許之至稱其明哲保身其庶乎祭仲之以智免者耶然則要極而言之何如曰君子遭此為不幸士蒍謀去公族晉桓莊之族逼獻公患之士蒍曰去富子則羣公子可謀也已公曰爾試其事士蒍與羣公子謀譖富子而去之富强者又與羣公子謀使殺游氏之二子士蒍告晉公曰可矣不過二年君必無患晉侯圍聚盡殺羣公子右莊二十三年二十四年二十五年士蒍對伐虢事言禮樂慈愛戰所畜也夫民讓事樂和愛親哀喪而後可用也何其賢哉賢者而謀人之國則必以其道若患公族之逼則有道以裁之矣而無故教其君以滅宗黨戕支傷本如是以為强公室耶實弱之矣獻公知患其族而不知患其子身死而諸子爭立禍流晉邦申生縊夷吾重耳奔而奚齊卓子其愛子也皆為世大戮蓋其事好還也非天啓文公晉其可望血食哉來俊臣輩教武后誅唐宗室而后亦不自戕武氏黨故士蒍之罪深於後人􅉑公敗犬戎􅉑公敗犬戎于渭汭舟之僑曰無德而祿殃也殃將至矣遂奔晉右閔二年孟子論出則無敵國外患者國常亡而吳起亦言數勝以亡者衆善哉舟之僑之觀國於其得志焉而憂之可謂知矣築蒲與屈晉侯使士蒍為二公子築蒲與屈不慎置薪焉公使讓之對曰冦讐之保又何慎焉云云退而賦曰狐裘尨茸一國三公吾誰適從右僖五年士蒍始勸晉侯去桓莊之族羣公子皆無罪而以為戮晉公室已弱矣晉侯惑驪姬欲去申生夷吾重耳故為二公子築蒲與屈士蒍賢乎當諫其君無疏諸子自啓禍不然知三年必將尋師焉則無築可也築而不慎坐觀晉隙若非已任者而退有後言以謂一國三公夫晉之寵者不惟奚齊卓子乎而二公子何與為臣不忠慢君誤國其罪大矣惡後之人泥其浮詞而不要其衷故辨之葵丘之會夏會于葵丘尋盟且修好禮也王使宰孔賜齊侯胙云云下拜登受秋齊侯盟諸侯于葵丘曰凡我同盟之人既盟之後言歸于好宰孔先歸遇晉侯曰可無會也齊侯不務德而勤逺略云云右僖九年葵丘之會天子初使賜胙齊方霸諸侯未有大失而宰孔徒以其勤逺略知終在亂遽勸晉侯以無會其智逺矣荀息死難初獻公使荀息傅奚齊公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之云云及里克將殺奚齊先告荀息曰三怨將作秦晉輔之子將何如曰將死之里克曰無益也曰吾與先君言矣不可以二能欲復言而愛身乎右僖九年獻公嬖驪姬殺太子逐羣公子晉事可知卒欲立驪之子以屬荀息荀息賢乎公子有當立者矣盍姑勸之以與所當立不然辭勿傅以直匡君可矣傅非所立而許之死非也而又終欲以復言為忠孔子曰信近於義言可復也然則不義以為信雖孔子猶不復也陳平亦嘗許呂后以王諸呂無不可者王陵駭怒而詰之而平不盡語以其心也及産祿已王乃與周勃舉兵而誅之後世不曰陳平無信以謂信不近於義也夫必以安劉氏為忠則不以不忠於呂氏為不信也忠所在義也義所在信也雖然陳平何足言哉智足以及之而已嗚呼曾謂荀息不如陳平乎襄王適鄭初甘昭公有寵于惠后王子帶也惠后將立之未及而卒頽叔桃子奉太叔以狄師攻王王御士將禦之王曰先后其謂我何寧使諸侯圖之王遂出及坎欿國人納之狄師伐周大敗周師王出適鄭處于汜秦晉納王入于王城取太叔于溫殺之右僖二十四年襄王辟母弟之難棄王城而處于汜曰寧使諸侯圖之卒用秦晉得入而後殺帶襄王之於待其親者亦足矣昔惠公之立雖非國人意而惠公卒懷公立重耳未入也入而殺懷公則遽矣諸侯之欲納重耳皆是也盍亦使諸侯圖之不可哉文公於是有愧于襄王矣唐太宗亦與建成爭立太宗始造唐者也雖欲不有天下天下其舍諸難起而避其兄天下猶當求我而不置何至援弓矢戕骨肉乎然則周之所以益弱而愈存雖文武之澤未竭亦其子孫義有以持之也舍魏犫而殺顛頡晉侯入曹令無入僖負羈之宮而免其族報施也魏犫顛頡怒曰勞之不圖報于何有二子各有從亡之功爇僖負羈氏魏犫傷于胸公欲殺之而愛其材使問且視之病將殺之魏犫束胸見使者曰以君之靈不有寧也云云乃舍之殺顛頡以狥于師右僖二十八年犫頡犯君命驕已功爇無罪快心忿亂莫大焉刑皆無赦者也晉侯誠愛犫之材耶則不以不病故生病則重躋之死也曰病將殺之此何理哉頡之材則又未知其孰與犫也其不及犫乎則自其材之分於取死何增損哉罪鈞而材異舍一而戕一恩威胥失矣是役也祁瞞奸命舟之僑先歸皆殺之傳曰君子謂文公其能刑矣三罪而民服蓋言瞞僑與頡也夫殺瞞與僑自軍政之常而至殺頡則刑固已不平矣何所示民而民服哉傳之失誣非君子之意也晉侯復曹晉侯有疾曹伯之豎侯獳貨筮史使曰以曹為解齊桓公為會而封異姓邢衛今君為㑹而滅同姓非禮也與衛偕命而不與皆復非信也同罪異罰非刑也公說復曹右僖二十八年貨史而託神欺也利在復國忠也事順而辭恭禮也行一欺而二善得侯獳有焉淮南王書曰子貢詐而全魯詐不可以為恆弦髙誕而存鄭誕不可以為常夫道不可遵而功有難廢故二子所以全存二國之名至今語曰屈寸而伸尺君子為之小枉而大直聖人行之也陳教衛伐晉晉師圍戚六月戊戌取之獲孫昭子衛人使告于陳陳共公曰更伐之我辭之衛孔達帥師伐晉君子以為古者越國而謀右文元年是役也晉襄公伐衛先且居曰效尤禍也請君朝王臣從師晉侯朝王于溫此近於轉敗而為功其舉得矣衛求救于陳陳救之教衛伐晉以示有餘慮勝而會可也而傳言君子以為古者越國而謀夫越國而謀其舉固有可否不然凡鄰國以利交而權合者皆古也可乎哉杜預遵傳於傳之失不直攻之以為合古之道而失今事霸主之禮故國失其邑身見執辱衛之禍陳啓之也預之言乃庶乎古狼瞫君子戰于殽也晉襄公縳秦囚使萊駒以戈斬之囚呼萊駒失戈狼瞫取戈以斬囚禽之以從公乘遂以為右箕之役先軫黜之而立續簡伯狼瞫怒其友曰盍死之瞫曰吾未獲死所云云吾以勇求右無勇而黜亦其所也謂上不知我黜而宜乃知我矣子姑待之及彭衙既陳以其屬馳秦師死焉晉師從之大敗秦師君子謂狼瞫於是乎君子右文二年瞫之失右也苟自謂黜而宜則亦安之苟自謂黜而非宜則亦有君命矣先軫何所受怨哉自以未獲死所而往馳秦師豈死所也哉若恥無勇乎則挺然以身投兕虎亦勇也是匹夫之剛也狼瞫而君子孰非君子晉歸孔達于衛晉人歸孔達于衛以為衛之良也故免之右文四年此晉襄公事也春秋之時諸侯以强并弱得一士而可以弱一國人所貪而不捨者也何有於良蓋孔達嘗帥師伐晉不量力而干霸主故衛不得已而執達以說晉而襄公乃矜其國之良而捨之猶有文公之餘烈賢哉趙孟殺公子樂晉襄公卒靈公少晉人以難故欲立長君趙孟曰立公子雍云云賈季曰不如立公子樂云云趙孟使先蔑士會如秦逆公子雍賈季亦使召公子樂于陳趙孟使殺諸郫右文六年趙孟晉賢臣也立君國大事也已為政與大夫謀而賈季實干命不能討季而止樂樂至而又殺之樂何罪哉徒曰既不立則雖欲無殺不可得慮後患可也然晉於是乎始衰矣賈季害陽處父晉搜于夷舍二軍使狐射姑將中軍趙盾佐之陽處父至自溫改搜于董易中軍且謂趙盾能是以上之宣子於是乎始為國政云云賈季怨陽子之易其班也而知其無援於晉也使續鞫居殺陽處父云云晉殺續簡伯賈季奔狄宣子使臾駢送其帑右文六年盾為政晉始有政然而賈季專立公子樂既不討又擅殺陽父亦不討僅能歸罪續鞫居異哉夫陽處父以能上盾公也賈季怨易班而害處父私也盾自以不足當政耶則去之苟無愧於公而季再逞私盾力不足以禁又送其帑無政莫甚焉背先蔑而立靈公秦康公送公子雍于晉曰文公之入也無衛故有呂郤之難乃多與之徒衛云云趙宣子與諸大夫皆患穆嬴且畏逼乃背先蔑而立靈公以禦秦師右文七年宣子始謀之不臧既逆公子雍而殺公子樂矣患穆嬴又背先蔑拒公子雍而立靈公我則無信秦何所負哉不得已稱兵而禦秦愧矣而尚以先人謂有奪人之心無愧矣哉惠伯死君命仲殺惡及視而立宣公書曰子卒諱之也仲以君命召惠伯其宰公冉務人止之曰入必死仲叔惠伯也曰死君命可也公冉務人曰若君命可死非君命何聽弗聽乃入殺而埋之馬矢之中右文十八年襄仲以敬嬴故殺適立庶故仲初不可是也既立宣公而詐以子惡之命已可以逃矣知非君命而以君命往死之可以死可以無死死傷勇嗚呼惠伯文子賂齊請會季文子如齊納賂以請會注宣公篡立未列於會故以賂請之右宣元年文子不納莒紀僕之逆陳義甚髙賢大夫也而襄仲弒君立君惠伯不避難而往死行父不能死亦不能正也又以身往賂齊而請會嗟乎不幾所謂然則從之者歟孔達請死以利社稷晉原縠宋華椒衛孔達曹人同盟于清丘曰恤病討二宋為盟故伐陳衛人救之孔達曰先君有約言焉若大國討我則死之注衛成公與陳共公有舊好故孔達背盟救陳晉以衛之救陳也討焉孔達曰苟利社稷請以我說衛殺其大夫孔達右宣十二年十三年十四年背盟以干大國罪也然春秋時諸侯曰尋盟盟未必善善未必信也背盟以干大國其罪小遵先君之約不忘與國而救之知利社稷寧以死塞責其忠大孔達賢哉頃公不射君子為有禮齊師敗績逐之三周華不注韓厥夢子輿謂己曰且辟左右故中御而從齊侯邴夏曰射其御者君子也公曰謂之君子而射之非禮也注齊侯不知戎禮射其左越于車下射其右斃于車中將及華泉驂絓于木而止右成二年戰欲殺敵無問其人矣而頃公自以不射其君子為有禮用此敗執此與宋襄公不鼓不成列不禽二毛同意欒書讒郤至郤至三遇楚子之卒見楚子必下免胄而趨風楚子使工尹襄問之以弓曰方事之殷也有韎韋之跗注君子也識見不穀而趨無乃傷乎云云為事之故敢肅使者云云欒書怨郤至以其不從已而敗楚師也欲廢之使楚公子茷告公曰此戰也郤至實召寡君以東師之未至也與軍帥之不具也曰此必敗吾因奉孫周以事君公告欒書書曰其有焉不然豈其死之不恤而受敵使乎云云長魚矯以戈殺之尸諸朝右成十六年十七年人臣無外交郤至事君無二而在桴鼓之列受楚王之問苟以為禮而忘義忘義安取禮故其後欒書之讒得入夫為禮而不圖終尚以貽禍而不足成名况非禮也哉宣子來聘晉范宣子來聘告將用師于鄭公享之宣子賦摽有梅季武子曰誰敢哉賓將出武子賦彤弓宣子曰城濮之役我先君文公獻功于衡雍受彤弓于襄王以為子孫藏丐也先君守官之嗣也敢不承命君子以為知禮右襄八年晉霸業衰與楚爭鄭干戈日尋魯畏晉强徒欲成晉志而嫁禍于鄭鄭何罪哉武子賦彤弓以諛晉而宣子不度其君之德不量其國之力而受之自以為得可恥而不足榮傳猶曰君子以為知禮若魯無君子者以為知禮可也蘇門六君子文粹卷五十一
