body:
  text: 蘇門六君子文粹巻四十四後山文粹四宋陳師道撰書上林秀州書宗周之制士見於大夫卿公介以厚其别詞以正其名贄以效其情儀以致其敬四者備矣謂之禮成士之相見如女之從人有願見之心而無自行之義必有紹介為之前焉所以别嫌而謹微也故曰介以厚其别名以舉事詞以導名名者先王所以定名分也名正則詞不悖分定則名不犯故曰詞以正其名言不足以盡意名不可以過情又為之贄以成其終故授受焉介以通名儐以將命勤亦至矣然因人而後達也禮莫重於自盡故祭主於盥婚主於迎賔主於贄故曰贄以效其情誠發於心而喻於身達於容色故又有儀焉詞以三請贄以三獻三揖而升三拜而出禮煩則泰簡則野三者禮之中也故曰儀以致其敬是以貴不凌賤下不援上謹其分守順於時命志不屈而身不辱以成其善當是之世豈特士之自賢蓋亦有禮為之節也夫周之制禮其所為防至矣及其晚世禮存而俗變猶自市而失身况於禮之亡乎自周之禮亡士知免者寡矣世無君子明禮以正之既相循以為常而史官又載其事故其弊習而不自知也答江端禮書學始於身而成於性欲善其身而不明於善所謂徒善者也徒善者非善之正也是故學者所以明善也學外也思内也學以佐行思以佐學古之制也若其自得則在子矣士之所戒其惟名乎聲實相從如影之於形短長曲直惟形之使無實之名聞人敗焉善人畏焉得且畏之況求之乎言以述志文以成言約之以義行之以信近則致其用逺則致其傳文之質也大以為小小以為大簡而不約盈而不餘文之用也正心完氣廣之以學斯至矣辱問非所及敬誦所聞足下其擇焉僕之不敏勤無成能惟於修文略有師法愧無異聞虚辱盛意若曰量子以為教如醫之量藥以當病如工之量材以當用子曾子葢能之矣僕非其任也嗟乎子之不逢夫子也與僕㳺者衆矣莫有問焉子何問之下耶嗟乎夫子之失子也尚幸來臨願言其詳記思亭記甄故徐富家至甄君始以明經教授鄉稱善人而家益貧更數十嵗不克葬乞貸邑里葬其父母昆弟凡幾喪邑人憐之多助之者既葬益樹以木作室其旁而問名於余余以謂目之所視而思從之視干戈則思鬭視刀鋸則思懼視廟社則思敬視第家則思安夫人存好惡喜懼之心物至而思固其理也今夫升髙而望松梓下坵壠而行墟墓之間棘荆莽然狐兎之跡交道其有不思其親者乎請名之曰思亭親者人所不忘也而君子謹之故為墓於郊而封溝之為廟於家而嘗禘之為衰於忌而悲哀之所以存其思也其可忘乎雖然自親而下至於服盡服盡則情盡情盡則忘之矣夫自吾之親而至於忘之者逺故也此亭之所以作也凡君之子孫登斯亭者其有忘乎因其親以廣其思其有不興乎君曰博哉子之言也吾其庶乎曰未也賢不肖異思後豈不有望其木思以為材視其榛棘思以為薪登其坵墓思發其所藏者乎於是遽然流涕以泣曰未也吾為子記之使君之子孫誦斯文者視其美以為勸視其惡以為戒其可免乎君攬涕而謝曰勉矣遂為之記徐州學記夫祭之以報以反本也是故食則祭先飯飲則祭先酒耕則祭先穡桑則祭先蠶畜則祭先牧祭䕫於樂祭龍於社祭棄於稷祭皋陶於理祭周公孔子於學葢自三代以來共之然學祀周公非也治始於伏羲更虞夏商至周而大備行始於伊尹更夷齊栁下恵至孔子而大成葢治成於周公行成於孔子故學者主焉序仁宗皇帝御書後序人皆有所好其上勝之其次任之其下藴崇之也惟至人無好有所好者同於人也神文聖武皇帝其好之與人同其勝之與人異同以為徳異以為法邇聲色而欲不勝禮寶珠玉而利不勝義時㳺田而逸不勝度故其在位四十餘年而四方百物無所損益顧好飛白書明窓浄几時一為之以侈其好於是將相宗戚家有蔵焉臣不知書不能誦其美而竊有所歎也凡藝不滯古則徇今滯古則捨已而就規矩徇今則略法度而逐世好故其弊君臣爭名而禍亂從之臣竊窺觀皇帝㑹法而忘世㑹理而忘法故工拙偏正不足論也所謂有其道而進於技者王者之於藝葢如此彭城王氏世為貴將故其家有傳焉其從孫萬夀主簿臣有基以皇帝所書六大字以示臣臣蓋望而知之也臣不知書然望而知之者臣以理得之也臣惟皇帝却天下之好而留神翰墨乃帝者之懿徳來世之偉聞而臣實懼焉臣聞故老言當斯之時二府百吏内宗外姻下逮近習莫不好書夫士大夫阿主之好而為書未害於政而臣懼小人因書以進也故君子於其所好又有謹焉臣惟皇帝之知此故世無所傳而臣之愚不得不懼也顔師道詩序萬物者才之助有助而無才雖久且近不能得其情狀使才者遇之則幽竒偉麗無不為用者才而無助則不能盡其才然則待萬物而後才者猶常才也若其自得於心不借美於外無視聴之助而盡萬物之變者其天下之竒才乎比出東都門沙行數百里夾河而城者今澶州之治也平林曠野荒墳故壘甲士介馬無修阻麗華之觀頹垣弊廬棘荆沮洳無臺池苑囿鳥獸魚鼈之美吏不勝事一飰再起經年相逢交馬顧揖不通勞苦無飲食歌舞逰從之樂征商𣙜酤號稱才官身雜徒吏下等細微無閒燕之樂彭城顔夫子居既踰年矣元豐四年邑子陳師道西逰京師遂見夫子於北門請於左右得其應用之詩若干篇羅絡隠遁穿穴險怪遇事以發憤因難而見竒如在巖崖之下洲渚之上隂林叢竹空曠莽蒼之野月星風露烟雲杳靄之際漁釣弋獵樵蘇耕稼之間不知其居弊陋之内市井之中甕盎之側也昔聞其語今見其人可謂美矣而於夫子猶其粗也孔子曰莫我知也夫又曰詩可以怨君子亦有怨乎夫臣之事君猶子之事父弟之事兄婦之事夫也為人之子而父不愛焉為人之弟而兄不愛焉為人之婦而夫不愛焉則人之深情皆以為怨情發於天怨出於仁舜之號泣伯竒之履霜周公之鴟鴞孔子之猗蘭人皆知之而不怨有二焉東隣之子西隣之父不愛也人雖褊心莫以為意謂之路人夫婦之㤙窮君臣之義盡然後為路人路人則不怨責全於君子小人則不責也謂其不足責也致怨於明主昏主則不怨也謂其不足怨也則又不怨故人臣之罪莫大於不怨不怨則忘其君多怨則失其身又有義焉此其所以異於小人者也夫子之詩仁不至於不怨義不至於多怨豈惟才焉又天下之有德者也夫才者德之用也徳成於心而後才為用才足於身而後物為用吾於夫子見之矣又為之序以詔學者雜著孔北海贊世以曹操為英雄雖孫仲謀甘出其下而文舉以犬豕見之諗知不免而遂不屈蓋其髙明下視之耳方操微時幸許紹之目以為重匈奴使來自謂不稱而代捉刀其自處如此至其自比劉𤣥徳謂袁紹不足數特居勢使然耳𤣥徳之死謂孔明曰如嗣子不肖君自取之其勤勞一世蓋不為漢計豈為子孫計哉操非其比也操惡禰衡而畏殺士之名故以衡予劉表不以文舉予人卒自殺之其不畏之亦至矣劉毅家徒四壁一擲百萬世亦以為英雄小遇鵞炙丐乞如奴婢孰謂英雄而以一臠動其心哉此其操之類乎子曰棖也慾焉得剛剛者所以制慾非勝人也是故自用之為英自勝之為强蘇門六君子文粹巻四十四
