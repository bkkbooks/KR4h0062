body:
  text: 蘇門六君子文粹卷二十三淮海文粹二宋秦觀撰進策序篇臣聞春則倉庚鳴夏則螻蟈鳴秋則寒蟬鳴冬則雉鳴此數物者微眇矣然其候未至則寂寞而無聞既至則日夜鳴而不已何則隂陽之所鼓動四時之所感發氣變於外則情迫於中雖欲不鳴不可得也淮海小臣不聞廟堂之議帷幄之謀獨耳剽目采頗知當世利病之所以然者嘗欲輸肝膽效情素上書於北闕之下則又念身非諫官職非御史出位犯分重煩有司之誅隱忍逡巡而不敢發幸陛下發德音下明詔使大臣舉賢良方正能直言極諌之士將修祖宗故事而親䇿於庭嗚呼此亦愚臣效鳴之秋也輒忘疏賤條其意之所欲言者為三十篇以獻惟陛下財擇焉其目曰以意寓言以言寓文示變化之所終始使天下曉然知之作國論瑟不鳴二十五弦各以其聲應轂不運三十輻各以其力旋默則治語靜則制動作主術急不極則緩不生緩不極則急不成一僨一起如環無端作治勢二篇以地為險山川為資以兵為險不厭通達作安都自信者不避嫌自許者不求合倚而容之績乃可底作任臣二篇衆賢聚於本朝姦人之所不利巧為詆誣以幻羣聽作朋黨二篇鳥有鳯魚有鯤超絶之材宜見濶略作人材揚墨塞路孟子所攘申商崛興莫或汝遏作法律二篇得與失為鄰利與害同門非至精莫之能分作論議二篇爵祿者所以礪世磨鈍科條品目其可不悉作官制二篇善治水者以四海為壑善治財者以天地為資國之大計於是乎在作財用二篇料敵之虗實若别牛馬應變之倉卒如數一二非有道之士不能作將帥以寡覆泉來如風雨去如絶絃作奇兵美言可以市三寸之舌勝百萬之師作辨士機會之來間不容髮匪龜匪鏡其能勿失作謀主心不治則神擾氣不養則精喪治心養氣四術自得作兵法愚民弄兵依阻山谷銷亡不時或為大釁作盜賊三篇黨項微種盜我靈武逾八十年天誅不迄作邊防三篇東西為緯南北為經織者就綜而文成其詳在彼其略在此作序篇國論臣聞古之人君以其祖考之志而升黜人材弛張法度者多矣太上忘言其次有言其下不及言何則昔舜舉十六相去四凶肇十有二州皆堯志也而精誠所動神化所移不待告之以言而天下曉然固已心知其本末此所謂太上忘言者也盤庚之遷亳武王之伐商所以從先王之業承文武之志也而浮言橫議二三不一至以其遷伐之意託於詞令丁寧而告於廷委曲而誓諸野然後民始恱而服從此所謂其次有言者也秦孝公用商君之説變法律易風俗所以修繆公之業成獻公之志也然未嘗以其變法之意告民疑而不服則痛法以繩之此所謂其下不及言者也夫秦之不及言固無足道而舜之忘言亦未可以遽及然則後世人君有以祖考之命而升黜人材弛張法度者安得不法盤庚武王之有言哉陛下即位以來圖任元老眷禮名儒屏棄姦臣投竄刻吏所以照臨海內甚盛罷青苖之使廢市易之司削保甲之條刋免役之令至於摘山煮海冶鑄之事他日吏緣以為姦者臨遣信臣更定其法所以加惠元元甚厚臣竊聞之凡此大功數十淹速輕重雖出於聖母之裁成其大概則皆先帝之末命也然大道之行小人所不利或作為詆欺之言悖亂羣聽以為先帝之道陛下當終身奉以周旋而數年之間遽聽一二大臣更張幾盡異乎所謂父作之子述之者矣自非明智不惑之士往往聞其説而疑之嗚呼此殆陛下不法盤庚武王有言之過也夫子之事父其生也養志為大養口體次之其殁也繼志為大述事次之知述事而不知繼志猶養口體而不養志也非所以為達孝秦皇漢武皆以蓋世之氣闢闔宇宙之材并吞諸侯攘却胡粵若以功業言之則始皇之英偉傑特又非武帝之可比也然而萬世之下號始皇為暴主稱武帝為賢君秦祚遽傾漢基益大者何哉二世不變始皇之事孝昭能改武帝之法故也向使先帝晚年於人材法度初無升黜之心弛張之意陛下猶當繼其志不述其事又况親承於末命乎臣願陛下具以意作為明詔丁寧反覆如古訓誥誓命之文布告天下咸使聞知則小人雖有詆欺之言不能以疑衆矣然後被之於詩章傳示無窮以明德意使後世咸知成先帝之功者陛下也豈不休哉主術臣聞人主之術無他其要在乎能任政事之臣與議論之臣而已政事之臣者宰相執政和隂陽萬物宰制百辟鎮撫四夷與天子經綸於帷幄之中者也議論之臣者諫官御史學術知古始器識通世務奮不顧身與天子辨曲直爭是非者也今天下之事有執政之臣以行之有議論之臣以言之則人主可以辨冕端委而無所事不然雖弊精神竭筋力以夜繼日猶無益也臣請以用人一事明之士大夫以名列於仕版者蓋以萬計有智者有愚者有賢者有不肖者若智與賢則功利之所從興也愚與不肖則罪害之所從起也夫人主以一身之思慮一耳目之聰明而當天下功罪利害之機非有政事之臣則百官之進退奈何而不亂也然人之難知久矣實愚而似智實智而似愚者有之實賢而似不肖實不肖而似賢者有之申以親疏之異重以好惡之偏夫以天下之智愚賢不肖而付之於二三大臣之手非有議論之臣則進退當否奈何而知之也雖然政事之臣者人主之股肱議論之臣者人主之耳目任政事之臣而忽諫官略御史猶股肱便利而耳目盲瞶也任議論之臣而輕宰相薄執政猶耳目聰明而股肱折也要之二者不可偏勝使之適平而已漢成帝用王鳯為大將軍政事大小皆自鳯出天子曽不一舉手京兆尹王章言之為鳯所陷罪至大逆故陽朔之後天下以言為諱唐明皇用李林甫為相十有九年專政用事補闕杜暹上書斥為下邽令繇此諫諍路絶此則任政事之臣太勝也漢武帝擢嚴肋朱買臣吾丘壽王司馬相如東方朔之徒於左右朝廷有政事輒令助等與大臣辨論大臣數絀唐德宗晚年宰相惟奉行詔書所與圖事者李齊運裴延齡韋渠牟而已此則任議論之臣太勝也臣聞仁祖時天下之事一切委之執政羣臣無得預者除授或不當雖貴戚近屬旨從中出輒為固執不行一旦諫官列其罪御史數其失雖元老名儒上所眷禮者亦稱病而賜罷政事之臣得以舉其職議論之臣得以行其言兩者之勢適平是以治功之隆過越漢唐與成康相先後蓋繇此也陛下即位以來圖任老成屬以政事屢下明詔使中外大臣舉諫官薦御史保任骨鯁以備獻納之科可謂得人主之要術矣願鑒漢唐之弊專取法於仁祖常使兩者之勢適平足以相制而不足以相勝則陛下可以辨冕端委而無事矣治勢上臣聞御天下之術必審天下之勢不審其勢而已信臆決行其所謂道守其所謂法則雖有剛嚴果斷之才或失而為刻深慈惠惻隱之意或壞而為姑息何則設之不當也夫聖主之於天下豈嘗有意用術哉天下有強勢吾則有寬術天下有弱勢吾則有猛術非強非弱天下無勢非寬非猛吾亦無術蓋無勢者天下之常而無術者聖人之至術也雖然御強勢者必以寬而強之弊實生於寬御弱勢者必以猛而弱之弊實生於猛何則昔漢之文景承高祖開創之後接吕氏喋血之餘除誹謗去肉刑減笞法定箠令可謂寬矣而諸侯逆命夷狄侵邉孝武不勝其憤力攘胸奴誅兩粵大臣相繼而入獄二千石連頸而伏誅巫蠱之禍至於夫婦父子之間而不相保繇是言之豈非強者之弊實生於寬耶昔唐肅宗器本深刻以刑名自喜安史之亂來歸者戮於獨柳之下待罪者斃於縲紲之中可謂猛矣而慶緒荐興思明復起代宗深鑒其事舍脅從之罪緩汚染之誅至於封豕長蛇無所懲艾忠臣義士切齒不平王室凌夷之漸蓋基於此繇是言之豈非弱之弊實生於猛耶是故救強之弊必於崇寬之時救弱之弊必於尚猛之日夫強弱之相乘寬猛之相代猶東之有西晝之有夜理之所必至事之所固然也顧昧者不知耳昔陵陽嚴詡將去潁川謂掾吏曰我以柔弱召必選剛猛代到將有僵仆者矣及何並至郡首治鍾威趙季李欵之獄果如詡言以詡並觀之則天下之勢可以前百年而豫定古者刑罰世輕世重不為定論文王之時關市譏而不征周公成王之時則關市有征矣至凶年然後弛之推此類而言則先王之法度大抵皆審天下之勢而為之者也傳曰政寬則民慢慢則糾之以猛猛則民殘殘則弛之以寬寬以濟猛猛以濟寬政是以和夫傳所謂和者則臣之所謂聖人之至術者歟治勢下臣間祖宗之時天下新脫割據戰伐之禍天厭久亂俱欲無為而又掃除煩苛之患足以深結海宇之心削平僣偽之威足以逆折姦俠之氣當是時天下之勢如元氣在乎渾淪之中固莫得而名已逮嘉祐之後習安玩治為日既久大臣以厚重相高小臣以苟簡自便肉食者鄙未能逺謀誰能無偷朝不及夕故先皇即位之始大講法度作而新之核名實以興百辟攘夷狄以布威靈有司奉行於中使者刺舉於外此真得所謂以猛政救緩勢之術也元豐之後執事者矯枉過直矜鈎距以為法術任惠文以取婾快上下迫脅民不堪命故陛下即位之始黜煆鍊之吏逐聚斂之臣登老成於散地擢忠鯁於謫籍平寃獄振窮餒與天下休息此真得所謂以寬政解急勢之術也而比日以來執事者又將矯枉而過直矣何告訐詆欺之言率然敢陳而王體未嚴也嚮背異同之見各自為守而國論未決也此吞彼噬禍結兵連隱忍羈縻冀其自罷而天誅未迄也推此言之天下之緩急雖曰未見而固已胚腪於冥冥之中矣夫致先帝之用猛術者嘉祐之緩勢也致陛下之用寬術者元豐之急勢也今又矯枉過直則勢必復緩緩甚則術又將出於猛矣猛術一用天下固以震動若再用焉則安危之計未可知也何則天下之勢猶一人之身緩而救之以猛猶關鬲不通而涌泄之也其急而解之以寬猶虗中暴下而補養之也補養至平則可以已矣平而不已則又將至於關鬲不通再加涌泄正氣必傷重被猛術國本必伐故曰安危之計未可知也臣願陛下遏逋慢之原杜解弛之漸明詔內外一乎中和使天下之緩勢不得而成緩勢不成則後世雖有猛術不可得而用之蘇門六君子文粹卷二十三
