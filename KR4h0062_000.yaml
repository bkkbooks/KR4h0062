body:
  text: 蘇門六君子文粹總集類提要臣等謹案蘇門六君子文粹七十卷不著編輯者名氏卷首凡例稱或傳為陳亮所輯然亮輯歐陽文粹序載龍川集而此書之序無考則未必出于亮也宋史稱黃庭堅張耒朝補之秦觀為蘇門四學士而此益以陳師道李豸稱蘇門六君子者蓋陳李雖與蘇軾交甚晚而師道則以軾薦起官豸亦以文章見知於軾故以類附之也其文皆從諸家集中録出凡淮海集十四卷宛邱集二十二卷濟北集二十一卷濟南集五卷豫章集四卷后山集四卷頗有一篇之中刋去首尾繁文僅存其要語者觀其所取大抵議論之文居多蓋坊肆所刋以備程試之用者陸遊老學菴筆記曰建炎以來尚蘇氏文章學者翕然從之而蜀士尤盛有語曰蘇文熟喫羊肉蘇文生喫菜羮云云蓋風會所趨併其從遊之士亦為當代所摹擬矣然其去取謹嚴猶工文之士所輯且李豸集世無傳本今始從永樂大典裒輯成帙頗藉此書相補苴又張耒集寫本僅存字多舛誤陳師道集刋本校詩差詳校文則略亦頗藉此書以勘正云乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2992972e531402b9a745add146f6eaa509239f8352a4ca6e1b1e2d92b14258ba
