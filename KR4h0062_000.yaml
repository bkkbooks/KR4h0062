body:
  text: 蘇門六君子文粹總集類提要臣等謹案蘇門六君子文粹七十巻不著編輯者名氏巻首凡例稱或傳為陳亮所輯然亮輯歐陽文粹序載龍川集而此書之序無考則未必出于亮也宋史稱黄庭堅張耒晁補之秦觀為蘇門四學士而此益以陳師道李廌稱蘇門六君子者葢陳李雖與蘇軾交甚晚而師道則以軾薦起官廌亦以文章見知於軾故以類附之也其文皆従諸家集中録出凡淮海集十四巻宛邱集二十二巻濟北集二十一巻濟南集五巻豫章集四巻后山集四巻頗有一篇之中刋去首尾繁文僅存其要語者觀其所取大抵議論之文居多葢坊肆所刋以備程試之用者陸㳺老學菴筆記曰建炎以來尚蘇氏文章學者翕然從之而蜀士尤盛有語曰蘇文熟喫羊肉蘇文生喫菜羮云云葢風㑹所趨併其從遊之士亦為當代所摹擬矣然其去取謹嚴猶工文之士所輯且李廌集世無傳本今始從永樂大典裒輯成帙頗藉此書相補苴又張耒集寫本僅存字多舛誤陳師道集刋本校詩差詳校文則畧亦頗藉此書以勘正云乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b2bdc0c70027211c1bf2a287ccc72d25e4f2aa5e0a7e13eafc506728428711f2
