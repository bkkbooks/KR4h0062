body:
  text: 蘇門六君子文粹卷六十七濟北文粹六宋朝補之撰書上吕相公書竊嘗深推天下之故以謂王者之措國欲大而有容其所以期於天下者欲緩而不迫夫為天下宰不能大而有容天下之情雜然並至欲一一以核則堂上之言異於門外門外之言異於百里而况天下之至逺能鄙之相形利害之相傾日效于前將無時而安不能緩而不迫揭揭然欲表天下之善而置之以厭天下之爭髙為度而責不及逺為程而要不至天下之不及不至者衆而善人始危又嘗竊太息以謂蓋自成湯文武之季而聖人固已歎其流之不可復曰虞夏之道寡怨於民商周之道不勝其弊又曰後世有作者虞帝弗可及也已矣夫以商周之治詩書載之後世想望不可得而見者而聖人蔽之一言曰不勝其弊何哉以謂夏道未瀆辭而不求備不大望於民商人未瀆禮而求備於民周人強民未瀆神而爵賞刑罰窮矣夫瀆與未瀆誠何足以議虞帝之至髙而不求備不大望於民猶足以識夏政之未改至於商人則瀆辭矣周人則瀆禮矣求備於民猶可而強民則已甚故孔子喟然致志蓋傷之也夫惟其能大而有容緩而不迫故如天地之大寒暑自運而當生者生當殺者殺雖有不得其所誰能怨之若夫望於天下之治也重而蘄於民之應之也亟於是乎上之智始不同而下多遁民上察而下缺然且不返此民所以不堪而怠也恭惟仁祖臨御四十二年其間禮樂制度光明纎悉豈遽可以議三代之同風而壅培長養功成於久澤浸四海天意得而百樂生民被其施有三代致治之實者戰伐屢興於邊亡將覆軍而逺戍黷武之歎不起於民水旱間作於時公窘私罄而流離死亡之怨不聞於下士弊於末習學問浮剽豈能皆本經術尚道理而文采足以赴用議論足以忠國民狃於安樂風俗奢美豈能皆守禁令知廉耻而歡欣足以相慶患難足以相恤其根本結於人心其基甚大而固而末流隄防小疏類出於大而有容緩而不迫者聖人有作其法之所損益某不可得而知而至於挈國之大勢則雖有虞帝誠不能改已再惟聖君賢相相與勤勞天下九年于兹天下之大勢已定者誠知出此其始待以立者曰公公故明明故當當故欲搖之者難故變法易令出於期月而未嘗拂天下之心舉賢而民悅黜不肖而民懼而天下不得而異議下寬大之詔一切便民而民知上之愛已甚於父母可殺而不可離循此而守無改其道自可以長治而某愚不肖獨私憂過計以謂明天子在上尊德樂道從諌如不及而大臣又務以其至公同天下之心挾姦病國不容於公議者又皆已逺去而一時進於朝者又皆曰忠且良矣宜其小大協恭戮力馴致四門穆穆之美追還三代直道之盛而士大夫用意過當趣操介狹好惡矛楯毁譽陵雜同國而處者言人人殊夫所貴乎國多君子者豈欲其必同然古之君子蓋亦曰和而不同焉耳其和者志也其不同者事也夫不和而可以為國實難某豈敢以褊心小智輕量在事之羣才然借曰如前所陳者皆忠且良也耶則所謂忠者固無異忠而所謂良者固無異良矣比肩事主同意為善而勢駸駸焉若欲相為消長盛衰此何為者哉人何可以異忠則必有不忠者撓其間人何可以異良則必有不良者病其內強者以智倡而弱者以愚附從天下之公議遏而不得行方今之慮莫大於此詩曰其維哲人告之話言順德之行其維愚人覆謂我譖民各有心順德者君子之性而疑者事之暌也故詩人憂而戒之意者士大夫亦欲合而不可相疑而不親形格勢阻方且盡齟齬之情而貽朋黨之患因以害政而某所慮者猶不在是蓋以謂君子必自好務德競而不務力爭使夫小不同者時亦小訓焉以快其小不平而君子又務退避而不已則忠良之勢侵而后脫有大不同者俯焉抵其巇而入之則凡今之為同異者曽何足道盍亦譬國於同舟奚取於胡越哉雖然事何至於是亦可為智者道難為流俗言者也伏惟相公道德之學經緯之才光映於近古天子之所信倚以伏天下之心士大夫之所儀範而慕從其日夜思念欲為天下開坦塗而亡羣疑薰太和而導百順者亦必在此固將益振公議務白善人以拯救之耶然有一於此孟子曰以善服人者未有能服人者也以善養人然後能服天下夫服天下必以善而所以用善者不同以養人則聽以服人則違為天下安可以善服人哉尚敦重則剽疾者疑貴明達則深阻者忌與辨敏則淺謇者忿進辭技則椎拙者忮至其他用一事則不便者必從而非之然八者之情亦何足以相賢愚而敦重明達辨敏辭技又為國者所必須而不廢則亦安可與夫剽疾深阻淺謇椎拙者並皂而同驅彼其矯已以為人所為則不可而謂人之視已若見其肺肝然故常以不容而為姦非夫在上者有以養之是苟無罪又不可去也雖然有道孟子曰君子之所以教者五有如時雨之化者此以善養人者也為天下惟無私然後可天下固不可以皆賢且能而忠與良者又世之所望而難得也則如牧羊焉姑視其後者而鞭之可矣至其所必去則必其敗羣者也然而揚子曰有天下者審其御而已矣御得其道則天下狙詐咸作使御失其道則天下狙詐咸作敵何世而無狙詐先王豈惟不去尚有以使之故其敵者失也夫然故措國能大而有容緩而不迫是之謂以天下為天下天下知朝廷所以待之者公而責於人者不盡故人易以進而其志平若夫峻賞明罰豈不足以彰善而沮惡扶正而抑邪而古之語大道之序者常以謂九變而賞罰可言賞罰果難恃以獨治哉天下有大功罪與士與衆同焉而廢置之非難也而有所謂難者前却之志而疑似之行兩可之詞而常試之為此中人之所以不自立而陷於邪欲君子之類衆則若此者皆當教之不改而後誅又有嘗已自暴不可復還者設欲懷之其道無繇然且革面以蒙利而內有不服之心焉者雖小而必察故君子尤難之然至其所必去則必其敗羣者不害為大而有容緩而不迫也某不敢廣引以亂視聽書曰爾無忿疾於頑無求備於一夫必有忍其乃有濟先王之立政其寬如此至於進厥良以率其不良亦曰從厥攸好而已矣豈強之哉昔曹參為相用吏必擇謹厚長者而言文刻深欲務聲名者輒斥之人有細過専掩匿蓋覆而子窋之諫以無所請事者弗聽也參之意亦深矣方時出於百戰之後武夫悍士功名之氣囂然而未己參務揉訓其粗武崛強之心而輯安其休息無為之業不得不爾至於諸葛孔明患蜀土人士専權自恣君臣之道寖以陵替故先峻法以繩下乃稍收其民望而用之以謂寵之以位位極則賤順之以恩恩竭則慢所以致弊實此之由故繩且限之亮固知為治之體不苟出於此倘非乘蜀之弊不如是之亟使亮當文景時不知與曹參意能異否也伏惟相公敦大知微至於賞罰亦何足為執事者道而要曰主爾忘身國爾忘家先務有以大服天下之心益收賢俊之助而後均調其參差不齊之際以彌縫其侵蠧之隙而後天下之貴名盛業可得而長守國是一定施於無窮過此則百官有司之所當務其大者禦邊治河澄官冗而節財用消水旱而惠困窮雖相公勤勞不以一日置是而不念而某以謂凡此天下必有能為相公以身辦之者而相公之所宜慮獨天下之大勢哉今天下之大勢若巨川然隄防千里深厚而完固亦足恃矣盍嘗視其曲無蟻垤浸淫者焉而已某獲見相公門下將十年侍坐聽言相公固有采拾教戴之惠而又職事在文字辱通籍殿陛下五日一敘立以望天子之光明竊不度量不敢自比於在闕門之外而輕犯出位之誚不知其當言與否而進之猶以謂語之至者不敢載之於書而淺者又不足聽故粗道其意之所先者以代匱伏惟相公垂意裁擇幸甚上蘇公書古先哲王之世士無貴賤而道同國無逺近而俗均王公大人服冠劍而坐廟堂握圖印而臨海縣所以宰制萬物役使羣動者有道而窮巖深林長嘯逺引之人所以為藏迹而不耀閉口而不傳者亦是道也鄒魯之郊洙泗之間老幼敘於席男女别於塗鄉飲時祭執邊獻豆之容不闕於堂而家孰黨庠鳴琴擊磬之聲不乏於耳流風善政相漸成俗以波及夫宋衛燕晉秦楚者亦是俗也世衰道微諸侯錯立而國自為治家自為法矣德禮之所全刑政之所厚山川之所産風氣之所習故其民思慮不純而趣舍異向不幸而小道異術羣起而乘之駕徜徉之文張詭怪之事而使人動目駭耳而為列禦寇莊周詆前言往行而自大尊禮法刑名以為賢而為荀卿韓非峩冠博帶髙談乎九州之外閎大而不經文具而難施而為鄒衍鄒奭微辭隱語滑稽不窮其混迹若髙其蒙惡若卑而為淳于髠稷下學者伏車結駟東奔西馳而使楚兵不得合臨淄秦甲不得下函谷而為蘇秦張儀左手把人之袖右手揕人之胸義不返顧計不旋踵以快一時之忿而為荆軻聶政蓋先王之道披猖磔裂此其極矣而秦漢已降則又有山東出相山西出將之説魯多平原廣野土厚而水深故民朴而少文齊北有渤海南有琅邪魚鹽貨利之與俱故其民險而多詐晉介齊秦之面搏燕楚之脅其道四平舟車之所交會甲兵之所馳突故其民危而好亂燕土確北迫胸奴馬羊水草之所聚故其民健而少慮秦倚華山阻函谷膺擊韓魏垂頭中國一夫當關百夫莫前故其民勇而輕鬬楚接吳越之封雜荆舒之地故其民剽而難恃其餘窮邦小國不可殫數要之天下蕩然無復先王之民矣繇漢歷唐雖賢君相望異人間出慨然太息有憂天下之心而卒之道不同俗不均者其來有漸也某不佞嘗竊歎此夫有蓋天下之名而後可以服天下之心有服天下之實然後可以望天下之化閣下布衣單車﨑嶇出蜀一日而聲振四方四方之士拱手而來降向風而交馳可謂有蓋天下之名矣橫身當職不肯碌碌出辭吐氣無所阿避可謂有服天下之實矣然則天下之所為望而化者非閣下何以哉昔者文翁一入蜀而蜀之民雖縣邑小吏皆知文雅之可好常衮一治閩而閩之人感厲讀書頴脫而出者相望於途夫大江之南五湖之間其人便捷而多能輕清而好竒閣下亦既知之矣閣下之入吳也吳人固已有隨舳艫於末流望冠蓋於後塵者使閣下少借之以貌薄誘之以言彼孰不油然喜翕然變哉故某將首為吳人慶而次為天下有望於閣下而化者慶也某濟北之鄙人生二十年矣其才力學術不足以自致於閣下之前獨幸閣下官於吳而某亦侍親從宦於吳也故願隨吳人拜堂廡而望精光焉蓋聞君子尊賢而容衆嘉善而矜不能某非能賢且善也而方其盤辟俯僂從衆人之後以幸君子之知而不自慊某雖不能亦閣下所宜容而矜之傳曰苟以是心至斯受之而已輒敢進其説以纍執事者伏惟幸恕而少進之再上蘇公書昔者嘗有言於左右而未獲奉教不敢進亦不敢退輒復俯心下首因門下人以求畢其區區之説而少試其愚閣下容察之某少駑野不喜學及冠非有聞於道德也顧嘗自信以謂尊其所知則明而狃於所習則昏一逐纎縞而鬻狐裘入楚市而為秦語人皆笑之自以為得也雖然不佞生十五年知讀閣下書閣下蓋嘗自謂學出於孟子矣孟子之學以詳説者為説約而執中者為近之逺以知天下事大以觀海之瀾而近取於牛山之木小得於食稿之蚓兼陳雜舉而會歸於理則其所統者可知始某不能識閣下之心而竊觀其為文豪重敢決旁肆橫發呼吸隂陽出入鬼神􅌓然莫窮其指意之所施伏而悸仰而思恍乎若目前之所嘗聞而未悟每睹而不識者而皆會於吾前又如入深山行大澤以觀風雲之相遭奔騰交會窈冥晝晦搖川振谷蹶木發屋忘其岐道之所從城郭之所向而頃之雷止雨息光景復開則四海一色物象皆還矣以是察閣下胸中千變萬態不可殫極而要以縈紆曲折卒貫於理然後知閣下之所為自許者不誣也天下之士方且爭雄鬬妍自立門户則雖有服天下之名而信閣下之實者又烏能一一識夫閣下之心舒而博卷而約者哉夫爭名於朝爭利於市朝之所貴名之所歸也市之所趨利之所聚也某誠欲有求於名耶則方王公大人髙門垂箔躍馬疾驅言語咳唾足以榮辱後生者皆可以柔聲而乞親搖尾而乞憐也誠欲有求於利耶則非特陽翟之大賈滇蜀之野人其智皆可祖其術皆可傳也於此無所爭乃獨倀倀然欲抱其所知以求伸即其所慕而願師其言名數通於將吏而足兩及於君子之庭閣下察某之獨何為哉夫冠雞佩猳之由貨殖遊説之賜生異鄉識異趨而使不得夫子而為之託則才不才固未可議也是以司馬子長積怨發憤思附青雲之士者豈虛言也某不佞切眷眷於是矣夫九九之術非可以推天而測地而千金之骨非可以越澗馳坂也然齊侯納之燕昭市焉何則蓋將因小以來大借虛以招實耶有人焉其學既不為九九之賤而其質又不若朽骨之無用也而終已潔誠以求出於閣下之門不識閣下其庸何説以拒之耶必曰待其從容也而後盡其聲則某有將升堂攀木而一叩焉上杭州教官吕穆中書某聞三代之前天下無可治之事而賢者無急仕之意天子與其二三大臣終日接膝都俞唱和於其上而海內之民相與動心向風歡欣鼓舞於其下方是時也政教平而賦斂輕禮義行而刑罰止天下已治士雖有尊主庇民之業而無所用之則往往引手而去括囊晦迹以盡其生笑歌優遊以樂其時山巔水涯布衣韋帶樵漁衰老之人負擔行路之夫與之語有可驚之言而施於政有可見之效若此者不知其幾何人也三代已降世既多事賢者不忍拱手以視天下之紛紜而思有以治之則爭相奮厲發於畎畝之間挾竒策以干時君曳長裾而遊王門以身任職以職任事各務有立於世而士始有好功名之心其不獲知於斯時而退伏於山林者則皆當日之無能人也故人不知隱居之可尚而皆以有用為賢然而天下亦以治其後晉之士大夫不知為此者將以趨時弊而竊有慕乎隱者之名於是乎棄禮法遺冠冕以求為養髙之術而晉天下之事亦靡靡不振無與治者甚可歎也陵夷至於唐而終南嵩少至號為仕途捷徑則其失隱者之風為益逺矣夫君子非固為隱亦非固為不隱也三代之前無可治之事則隱而不失為髙三代而降世多事矣思有以治之則不隱不失為賢矣若夫居不可隱而固隱焉則又何矯情拂道之甚也晉唐之士其失以此國家承平百年政令日新主上慨然思有以追兩漢之餘而復三代之故焦心以問治降意以下賢而士之懷瑾握瑜者紛紛籍籍雲翔蜂起奔走自效不待招來蓋某嘗遊於齊楚之郊見夫帶經而耕者莫非求仕也而後知今日之無隱者設有之亦皆今日之無能人爾夫進不能少補於世退以受無能之名則與夫孟子之所謂自棄者何以異哉某濟北鄙人也生十年而學學九年矣嘗自謂幸出於有為之世而耻矯晉唐之風故嘗歷四方以觀郡邑之政治遊上庠以服天子之教化從士大夫論議以知當日之施為措置而稍稍自飾以求去鄙野之容竊聞執事以經術文章取上科以開敏明辨入幕府而有職乎庠序見師於學者故某願伏於門下而受教焉繼之以所為歌詩雜文一編投獻於左右凡此非求果有用於今也要以為不自棄而已不識閣下以為何如夫沒世而無聞者君子之所疾則夫士之區區以自言者其亦有罪焉可也蘇門六君子文粹卷六十七
