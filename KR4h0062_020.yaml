body:
  text: 蘇門六君子文粹卷二十宛丘文粹一宋張耒撰記漢世祖光武皇帝廟記漢自成哀不君權歸外家王莽卒盜而有之天下大亂民心思漢惟世祖以匹夫起田畝出入行陳躬夷大難勇無兼敵智無遺策故能祀漢配天光復舊物一時羣雄芟夷略盡撫有方夏覃及蠻貊聲教所暨比隆武宣是宜暴鷙强抗玩兵黷武視民如草芥而不講於治國之事也而武功既成海內既定則抑功臣進文吏投戈講藝息馬論道英偉之度屈於禮樂驍猛之氣束於儒學敦尚經術賓延儒雅開廣學校修明典禮煥然一變舊漢之俗蓋嘗以謂吾理天下欲以柔道行之至於明章繼志承統纂修洪業典章文物燦然大備故後世言禮樂稽古稱東漢焉孝和巳後漢德不競破壞板蕩可謂極矣而仗節死義之士如袁安楊震李固陳蕃之徒救於上符融郭泰范滂許邵之徒助於下矜尚名節以振激衰弊蹈死而不悔至於獻帝人主特號而巳而曹操終不敢身自取之彼其心誠有所畏故也蓋禮樂之功風化之美足以保國長世如此皆世祖之遺烈也嗚呼自三代以來一人而巳冀州州學記朝廷以學校道藝教天下之士亦巳久矣而其興衰亦繫其守長之能否慶厯中始詔郡縣立學而信都乃即孔子廟而為之僅以塞詔其後為守者欲興之數矣皆不果成元祐某年河中劉侯守冀始大作學舍師之授經有堂而諸生肄業有室凡學之百須皆具精壯完好可以傳久逺又為之買良田治市舍藉其所入以養士而士之來學者日有餼學之有司月有給其秀民良才從其先生長者皆往游焉四方之士聞而來者日至劉侯喜其有成而使其屬李公輔請文於譙郡張耒以記之為之言曰嗟乎政事之緩急如人之於飲食不可强也强使急者緩如止饑者之食强使緩者急如持食以進飽二者無怪其不可也余嘗怪今之士大夫皆能責守令不如古者興學校隆師儒讀書行禮其中而為守令者雖責之不受亦不害其為政論守令之能否與夫人民之利病亦絶不在此何也三代之時天子諸侯之有學其朝夕政事之所繫不啻如今省寺之要且急也自出師受成獻馘皆必繇之則一士之不率教至勤天子公卿而親臨焉蓋無足怪當此之時雖欲緩而不治亦不可得先王之俗既亡更數千嵗風俗禮樂既已大異矣而朝廷郡縣之政視學校無毫髮相及而乃日夜責之以不如古夫我則無用而强受之此何為者也且不怪夫冠者之不為章甫騎者之不為四馬而獨怪學校之不如三王不亦異哉夫求三王之治不立學是廢食於饑而必責學校於今日猶强食於飽必不行矣繇是言之學之興廢其本未逺矣吏未有責也夫未可以責吏則劉侯之為此殆苟然歟蓋昔者子貢欲去告朔之餼羊子曰爾愛其羊我愛其禮夫不告朔而去羊未害也然使後世不知有告朔者自去羊始以今之政為無事於學而為不可也因我之無用而毁古人之所急安知來者之不有作乎此劉侯之所不忍也侯之意深矣二宋二連君祠堂治國有善政不如在位有善人之化民速也在位有善人不如其鄉有善人之化民易也夫人之情所感動常在其所易接而親者若夫政事者固民之所畏則其從之蓋有不得已之心焉其及物淺矣司馬溫公祠堂記盛德之不作於世久矣古之所謂盛德者不施而民信未嘗動顔色見詞氣而天下從之若子弟之慕父兄故其為功也不勞而物莫之能禦三代之亡聖賢不作而士之能有所立于世者亦多矣然皆費心殫力招天下而從之以其智勝之後能有成是何也德不足而取辦於其才故也故其所建立勞苦而淺陋夫豈不欲為盛德之事哉蓋其所積者有不足故也子産君子也猶曰惟有德者能以寬服民其次莫如猛夫子産豈欲為猛哉以謂德之效實難懼夫好髙之難成也是以甘心於其次以求夫無失嗚呼德者子産之所難而况其下者乎故自秦漢而後更千有餘嵗而盛德之士不作蓋無足怪惟司馬公事君而君敬之未嘗求民而民與之非其類者有不合而無不信受其罰者有不悅而無敢謗其自洛入覲也郡邑田里至于京師觀者十萬環聚嗟歎至于泣下嗟乎此可以言語術智得之哉故其相天下也因物之所利而與之因人之所厭而更之從容指麾內外響應而天下無事矣蓋自漢秦以來至公而盛德之效始見於世可謂盛矣嗚呼當大事處大疑勇者招敵智者招謀惟有德而後萬物服則夫二聖之所以用公其可知也夫陵川縣山水記孔子曰仁者樂山智者樂水夫盡仁之成名必若堯舜而語智之正必若禹然世之好山水者豈皆具聖人之成德哉豫以謂凡安靜可久淳厚而不變者皆仁之類也臨事而不滯遇物而不惑者皆知之類也伐木記人與物各以其氣相勝而後能全夫氣也者假其所託而後有者也夫長江大河積水之淵俯視杳然莫知其深長波巨派出沒奔突近窺而神寒逺視而目竦此則蛟龍虬蜃魚鱉之所託以禦物之害己者而全其生者也髙山大麓綿亘盤屈翳以林薄捍以木石縈溪絡澗懸壁千仭使人望而不敢近近則畏而走此則虎豹熊羆之所託以禦物之害己者而自全其生者也使虎豹窺魚龍之淵蛟黿視熊羆之藪則惶怖疾走而求去之矣何則物各以其所託者見其氣氣勝則非其類者避之矣今夫叢祠墟墓之間入者慘然而心不寧目不敢肆游其皆肅肅如畏是何也叢祠墟墓鬼神之所託而人之氣不勝故也夫惟氣勝者全故氣不勝者受其病故虎兕蛟鼉易其所處則其心悲沮而無聊者病之所從入也雙槐堂記古之君子其將責人以有功也必使之樂其職安其居以其優游喜樂之心而就吾事夫豈徒苟悅之哉凡人之情其將有為也其心樂而為之則致精而不苟雖殫力費心而不自知故所為者有成而無難古之馭吏也為法不苛其勤惰疏密隨其人之所欲而吾獨安其成是以古之循吏皆能有所建立夫望人以功而使其情愁沮不樂求捨去之不暇誰肯以其怨沮不平之心而副我之所欲哉蘇門六君子文粹卷二十
