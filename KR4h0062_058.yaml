body:
  text: 蘇門六君子文粹卷五十八濟北文粹六宋晁補之撰舊唐書雜論褚遂良忌嫉崔仁師崔仁師甚承恩遇中書令褚遂良頗忌嫉之㑹有伏閣上奏者仁師不奏太宗以仁師㒺上遂配龔州右崔仁師傳第二十四太宗征遼時劉洎嘗輕出言太宗頗怪之及太宗疾又有憂懼語故遂良之誣易入因賜自盡蘇翰林疑無是事然觀仁師事史臣亦有忌嫉之語何耶語曰君子而不仁者有矣人情大不美雖聖人猶曰不保其往也况利害之間哉王荆公亦疑揚雄無投閣事兩公意皆忠厚然雄之學惟未至於孟軻或不幸至此以劇秦美新觀雄意憂懼深矣然世之君子必有能辨之者崔湜說武三思誅桓敬桓彦範敬暉等旣知國政懼武三思讒間引崔湜爲耳目湜反以桓敬等計議潜告三思及桓敬徙嶺外湜又說三思盡宜殺之三思問誰可使者乃舉周利貞桓敬等聞利貞至遂自殺右崔湜附傳第二十四桓敬等忠於唐志必興復繼以中宗之庸患未艾也故與武三思同列而不辭夫與惡人處欲不伺其動靜而務通行則身易危而功不成其不得巳而用耳目計之下也夫仁厚者固不肯爲人使而可使者必皆小人以敬桓二公之忠如日月而委情於小人之湜以胎禍後世不可以罪之者特其不爲身而爲國可以情恕耳雖然亦足以爲立功謀事者之深戒也蘇良嗣囚採竹宦者蘇良嗣爲荆州長史高宗使宦者緣江採異竹將於苑中植之宦者科舟載竹所在縱暴良嗣囚之因上疏切諌高宗下制慰勉遽令棄竹於江中右蘇良嗣傳第二十五高宗非納諌之主而良嗣之名亦未信於朝廷也至囚王人而罷奪其所求高宗慰勉之不暇此事君臣皆可賢近古所未有也馬周奏韋挺韋挺爲御史大夫馬周爲監察御史以周寒士殊不禮之至是周爲中書令太宗嘗復欲用挺在門下周密陳挺傲狠非宰相器遂寢將有事於遼東擇人運粮周又奏挺才堪麤使太宗從之至盧思臺不可更進太宗怒除名右韋挺傳第二十七人才豈有世族寒士之間耶挺不足以識周又輕之非也而周報挺亦甚矣謂非宰相器或者雖挾舊怨猶附公議至言才堪粗使加以萬里之行是擠之也周於此愧不忮矣姚崇薦張柬之姚崇爲靈武軍使將行則天令舉外司堪爲宰相者對曰張柬之沉厚有謀能斷大事且其人年老惟陛下急用之則天登時召見尋同鳳閣鸞臺平章事右張柬之傳第四十一時柬之已爲秋官侍郎矣按狄仁傑傳則天嘗問仁傑朕要一好漢任使仁傑曰豈非文士齷齪思得奇才用之以成天下之務乎則天曰此朕心也仁傑曰荆州長史張柬之其人雖老眞宰相才也乃召拜洛州司馬他日又求賢仁傑曰前言張柬之未用也則天曰巳遷之矣仁傑曰臣薦宰相今爲司馬非用之也又遷爲秋官侍郎竟召爲相果興復中宗呂溫賛仁傑云取日虞淵洗光咸池潜授五龍夾之以飛葢仁傑之勲如此而此傳乃專言崇薦之以其時考之仁傑之薦在荆州時後再薦乃爲秋官侍郎而崇之薦時巳在秋官矣或者則天用仁傑言巳深知柬之因崇繼薦竟大用非崇一言便爲相也又傳曰仁傑所㧞用至公卿者數十人崇自是仁傑薦用則天信重二人當有間也而舊史自相爲異其無法多此類魏元忠拒吐蕃突厥吐蕃數犯塞元忠皆爲大總管拒之元忠在軍惟持重自守竟無所克獲右魏元忠傳第四十二元忠初以太學生詣洛陽上封事言吐蕃形勢將帥得失成敗曉然眞經務才也至身自臨戎僅能保聚迄無成功然則人才豈一端而己必有能言之者亦必有能爲之者故王者之用人貴因其長計議折衝自兩事也若元忠當國守正嫉邪忠讜可與任大則不能少貶矣魏元忠親附權豪初元忠作相於則天朝議者以爲公清至是再居政事天下莫不延首傾屬冀有所𢎞益元忠乃親附權豪抑棄寒俊竟不能賞善罸惡右同上武韋之際執政者厥惟艱哉元忠直亮有勇當來周酷吏羅織方興尚不能自容而顚沛僅免者數矣至韋氏時何庸乃復親附權豪哉觀其懇諫太女之請全軀固位者所不能爲後竟遭三思之黨搆其與節愍同謀權豪之助果安在耶此近史臣私意也元忠安石軰不得其死史臣曰大帝孝和之朝政不由巳元忠安石巨源至忠彦昭等行非純一識昧存亾狥利貪榮有始無卒不得其死宜哉右傳第四十二此謂魏元忠韋安石韋巨源蕭至忠趙彦昭也元忠在武韋時皆有忠節非苟從之者借使其間不能盡舉綱紀以正朝廷或遜以免禍以其時考當爾也昭公不知禮孔子受以爲過陽貨謂孔子非賢智曰諾吾將仕矣道有時而屈也安石在則天朝於内殿面折張易之顧左右逐出宋覇子在睿宗朝顯拒太平公主力保太子有大功云上不可信讒言二事皆勇過孟賁矣卒不容於邪黨以至擯死此兩公何負而與巨源彦昭憸險附離軰並列而同書至謂行不純一狥利貪榮何其悖哉至忠雖柔佞猶時時小附公議爲一介之操不至於巨源軰可深賤第因依太平以蹈禍則無可言者休璟諳練邊事長安中西突厥焉質勒與諸蕃不和舉兵相攻安西道絶則天令休璟與宰相商度事勢俄頃間草奏便遣施行後數日安西諸州表諸路兵馬應接程期一如休璟所畫因遷夏官尚書同鳳閣鸞臺三品又謂魏元忠李嶠姚元崇李逈秀等曰休璟諳練邊事卿等十不當一也右唐休璟傳第四十三休璟知四鎭山川迂直又長於兵計故能喻度不差若當時欲擇帥則無以加顧責宰相不及邊臣諳事非也而休璟又竟用此得宰相自古任人多此類張仁愿請築城先是朔方軍北與突厥以河爲界張仁愿請奪取漠南之地於河北築三受降城唐休璟以爲兩漢以來皆北守黄河今於宼境築城勞人費功恐終爲賊虜所有竟從仁愿奏六旬而三城就不置甕門及曲敵戰格之具或問之仁愿曰兵貴在攻取不宜退守宼若至此卽當併力出戰廻顧望城猶須斬之其後常元楷爲總管始築甕門以備禦議者以此重仁愿而輕元楷右張仁愿傳第四十三仁愿始謀築城休璟持不可而當時卒從仁愿奏旣築城不爲守備元楷至乃修之而議者皆輕元楷此似仁愿智勇俱勝而休璟元楷暗怯也然因河爲津不免侵軼若入人之地恃孤壘以守則兵食非十倍不可使力能守之亦可暫而不可久也休璟之慮遠矣兵在攻取亦無常勝若前有堅敵勢必退守而無退守之城亦不可此似背水袛可一用而防戍難施也元楷之計得矣成器辭儲副以讓𤣥宗時將建儲貳以成器嫡長而𤣥宗有討平韋氏之功意久不定成器辭曰儲副者天下之公器時平則先嫡長國難則歸有功若失其宜海内失望非社稷之福臣敢以死請累日涕泣言甚切至旣薨推尊爲讓皇帝右讓皇帝成器傳第四十五後改名憲憲以嫡長見議猶建成之當立也秦王創國所謂天與之人與之也高祖不謀而立建成建成不辭而當大統禍幾覆邦承乾魏王㤗等事不戒前車之轍亦相傾危以至併棄夫禍福成敗之理本不難知而利害當前不啻丘山何暇自擇哉人情簞食豆羮見於色而能深知天命人事不以天下易其生非吳太伯其誰能任此耶葢𤣥宗以藩王討國后雖英謀獨斷而事成不成間不容髪於唐室再造之功無異秦王衆所屬也憲雖鑑往事而懼然明識先定不爲大利中搖葢高世難能之行不但明哲保身而巳𤣥宗旣内懷推已之德故一切褒崇終始恩厚亦前古所無夫讓非難讓而不處其嫌之爲難憲旣通達故克自抑畏不干時事使間言無從而入豈特𤣥宗天性篤於兄弟而然哉觀肅宗親𤣥宗子旣以功遜位而李輔國搆其間𤣥宗晚節猶自恨以謂吾兒不得終孝道夫親愛何足恃哉姚崇忌魏知古魏知古改紫微令姚崇深忌憚之陰加讒毀罷知政事三年卒宋璟聞而歎曰叔向古之遺直子産古之遺愛能兼之者其在魏公右魏知古傳第四十八知古强諫守職不愧廣平之稱崇方勁雖不及璟然當時同稱賢相言忌憚知古人情不相若或者有之至陰加讒毀則崇不應爾也讒毀必有言何得不載故凡史臣書事欲信於後世者必著其事之實不然誰不可以加諸耶姚崇遣使捕蝗韓思復開元初爲諫議大夫時山東蝗大起姚崇爲中書令奏遣使分往河南河北諸道殺蝗而埋之思復以爲蝗天災當修德以􅓙之恐非人力所能剪滅上疏云云崇乃請遣思復往山東撿蝗又請劉沼詳覆沼希崇㫖遂捶撻百姓囘改舊狀以奏之由是河南數州竟不得免思復遂爲崇所擠出爲德州刺史右韓思復傳第五十一修德􅓙災雖王者所務然蝗遍天下不加驅捕坐視飢荒父子相食而曰天災勿除但當修德夫德修一日何足以弭已然之變而政事暫弛則患不勝滋矣要患至先除而後退自儆勵其誰曰不可思復書生守文而崇慮變深以事不合㫖出爲刺史非擠也元行冲著論自釋魏光乘奏請行用魏徵所注類禮上令元行冲撰義疏將立學官張說駮奏孫炎始改舊本有同抄書上然其奏行冲恚諸儒排已著論自釋史臣曰此道非趨時之具其窮宜哉右元行冲傳第五十二戴禮己號殘缺補綴然聖言尚多有之及弟子門人所述不可廢也孫魏編類之書不能増益秦漢以前乃欲如遺經加義疏立學官何哉張說自非純儒不爲章句者聚徒修書日不暇給要皆破碎無補未免於此累也然至於行冲等欲經外别立學則說亦知其不可矣行冲務黨巳學猥爲同異而史臣又謂此道非趨時之具抑末也哉蘇門六君子文粹卷五十八
