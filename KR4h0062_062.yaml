body:
  text: 蘇門六君子文粹巻六十二濟北文粹六宋晁補之撰䇿問各言其志問聖人立經術以教天下使天下學者同出於一師意甚美也然聖人能以夫所同者養人心而不以夫所同者害其志則善觀士者亦必於其不同焉而得之道之所歸則並事之所措則並時之所遭則並而繇衆心度之則仁智之見父子殊向志豈可一哉自回也由也親與聖人語而要以所願非子之所願則士之遭時有用亦各言其志而已何必同乎士窮年抱經局促無所効平居相與語則曰不吾知也借使諸君得以其所學與民繇之其願憤悱自致者何以哉亦按圖以御馬邪則馬之情有所不能盡故觀諸君以是覬亦有異聞也形禮俗問上有所好下必有甚焉者皇帝勇智學古不厭菲飲食卑宮室欲以躬行表正萬邦此甚盛徳也而天下或莫知聖學之宗自冠婚喪祭人倫之所厚而縉紳學士家自為法不有等宜菲則禮廢美則禮没下逮庶人賤醜僣差不度要以刺繡文倚市門有財者得為之其弊至於今固在也豈聖人所以風化天下者聾瞶有不洽耶將人安於所習而溺於所聞不可以遂復也不然則庶民厥臣所以達大家者或未也諸君强學將以施於有政則輔上之澤而成其志形禮俗豈所宜後哉禦戎之䇿安在問自昔為國以謂禦戎無上䇿夫時異事異便則為制顧議者不察爾䇿豈有定不可乎昔匈奴席冒頓之始彊能以其力為中國患絶塞而北自以漢不能至而漢率二三嵗一出或二千里不見一人匈奴亦罷極苦之竊譬夫摶鼠當衢善遁易失灌垣燻穴則生無聊賴故欲戰在我則不欲戰在敵其理然也自漢羣臣多附韓安國議而後世亦或以王恢馬邑無功為解迄於今紛紛無適從然其大要所出則不過乎兩塗縉紳之儒則守和親介胄之士則言征伐是兩者繇先王之時考焉緩急先後孰可哉今天下雖已安而備患不忘諸君行見用矣則時異事異凡所以制今其䇿將安出也心性離合問學者欲以一身為天下之事則反一身而觀焉凡在我者宜知之既曰口之於味也目之於色也耳之於聲也鼻之於臭也性也又曰耳目之官不思而蔽於物心之官則思然則有性又有心一身之視聽納嘗所主者安在哉夫婦之所與知而其至則察乎天地若是者性能之乎心能之乎合處則一何得有兩名離居則兩不可為一致敢問二者果合也離也性之動有情而心之動有志有意有思有慮敢問情之所以異於志意思慮與夫志意思慮之自相為異者何如將情起而四者從之乎抑四者起而後情從之乎不然則情與志意思慮或未始相隨也君子小人之所同然者在性與心雖然有才焉有識焉或相什伯或相千萬二者豈與生俱生有生則固異乎或者生而後有特養不養充不充之異也諸君之學欲克已守約以一知萬則必講乎此然後應物成務無行而不可欲守令如漢故事問易曰地上有水比先王以建萬國親諸侯三王之治時用是維天下外薄四海咸析之土秉圭戴璧世世承式何其盛也秦滅六國罷封建置郡守縣令而有人民者任自此輕於是藩籬決弛民散不保漢起而牧之因秦所立損益濟治郡守縣令遂置不廢而天下亦賴以安寜蓋有刺史入為三公郎官出宰百里者此其為法之得惟其任守令猶諸侯不使僅僅按文書赴期㑹如此而已惠賜得專刑罰得省有利得行不便得改然後龔黄卓魯俊民出焉而後世進取多門士累於名髙而官郡縣者皆號俗吏至以齷齪自愛名稱職此何為者也國家稽古建官凡郡縣之任其選蓋已慎矣今欲如漢故事守令重禄出長入治且尊表之使人不得以嵗月之格取成有司羣假而軰授則凡前所是亦幾於可行而無害以謂如何孔孟荀言堯舜三代問孔子斷書自唐虞而堯舜謂之典言常道也荀子獨曰五帝之間無傳政道不過三代法不貳後王夫孔子之所取而荀子之所去然則荀子以書為不足於政乎天時地化人事之紀蓋三代異正而孔子於時則行夏或忠或質或文蓋三代殊尚而孔子於文則從周二者前乎此堯舜何其未嘗用後乎此時王何其莫之革也然則荀子於言道不過三代法不貳後王其意亦奚不可哉孟子取龍子之言曰治地莫善於助莫不善於貢夫道誠不可以過三代之治有法善有法不善則後王所循雖欲為不貳可得乎孔子孟子荀子學者之所從焉以正疑殆今必居一於是願折𠂻之無略王通之世何族其學何授問孔子沒孟軻氏作孟軻氏沒荀况揚雄氏作荀况揚雄氏沒聖人之道殆不傳魏晉而下士無山林川泉之材學不知其所宗營營馳騁於末流道以益晦而數百年間河汾之陋乃有王通出焉通尊孔子其才自視三子比考其書殆庶幾於知孔子校孟軻不皆醇而於荀况楊雄未悖也其書所述世家次叙與諸父族子具存其弟子門人若公卿大臣事業班班有見於唐然而不因通書知之則與通並時或學於通而達曾莫有一人道之者蓋篤信好學如韓愈於軻於况於雄皆發明之而不及通然則通之世果何族其學亦誰授哉去通之世若此其未逺也近通之居若此其甚也而顧且疑焉有不能辨則後此者柰何邯鄲鬻曲者託之李竒人知其非李竒也而皆棄今通書固在考之聖人為有合叅之二子為未悖不可以棄也諸君博洽願以所聞質之欲悉考三王之學問六經之説道為難知道之説皆㣲見其意而學者之於道㣲見其意而顯言之如隔雲霓望日月可見而不可知翛然自喜曰是所以為道不識夫明而晦者何為哉自其淺者學焉目前之事顯而日用者非一如觀鳥獸也如觀草木也見則可知而人皆以為近甚矣夫求道者之蔽也平居相與言則土苴治天下而有所用之則適効一事或以病於乏材凡此奚補也昔之人學射者不學射先學視學御者不學御先學趨道之所繇有逺近學之所至有先後故反之於躬行則如攻堅木先其易者節目在後此所以教人者雖入孝出悌洒掃應對為近且末而有庠序之所宜先講者也三王之學其法具在今欲悉考其説與諸君一二肄之以致所達於上可得而詳聞乎四民問古者司空居四民時地利而太宰以九職任焉閒民無常職也而所執者猶有事故少而習長而安教足以本之於其俗業足以守之於其世而民不離先王之法壞而死徙或出鄉四民或雜處其言哤其事亂教不同業不一而能不精由管仲之説以觀後世處士必就閒燕去而役田壄則非也處農必就田壄去而役官府則非也處工必就官府去而安市井則非也處商必就市井去而安閒燕則非也車服無制喪祭械用無數故民志無自定善惡無自别勤惰無自簡禁令無自行難以合易以離易以薄難以厚其弊樊然莫正也今欲法先王以施政事則將一旦而遷焉聽不能無譁抑為之宜不亟則求其於國有利而無害於民有從而無違於古可考也誠信之説問道莫若誠心莫若誠遇事應物莫若誠天地得此動静有常日月得此信出信入信死信生舜孔子聖人也得此而後明象憂亦憂象喜亦喜其道一以貫之顔淵賢人也明而後得此三月不違仁故曰道莫若誠心莫若誠商丘開有在於此揚於地無䃣韓娥有在於此歌哭易情華周杞梁之妻有在於此而變國俗荆軻衛先生有在於此白虹貫日太白蝕昴齊庶女有在於此雷電下擊李廣有在於此射中石沒鏃故曰遇事應物莫若誠然則誠之至亦神矣哉記曰誠者自成也成有虧乎否耶將學焉則所繇者何路所出入者何門及其至也何得哉以信為近耶則誠非信也蓋信不足有不信以信為非耶則修辭閑邪凡所以立而存之又自此始也然則四五者柰何請循其本遷固之失問春秋不作而遷固以良史名其言暴耀旁肆横發貫穿甚博而至其収歛則羅覼事理甚細不遺讀者亹亹數千載間如相對語此范曄而下所不若也雖然曄之説曰遷文直而事覈固文贍而事詳今考其書所謂直而覈贍而詳者其是其非其言果何質也道不同不相為謀為異端故也然則遷之叙六家可謂知道者非耶中人可與上下而上智與下愚不移為分定故也然則固之叙九等可謂知人者非耶王通曰史之失自遷固始也然則前乎此姑勿論後乎此可無得者歟而遷固之所以失又何事也願并求昔之説折𠂻安在將獻諸上以佐有司之闕錢幣人之生須菽粟以食布帛以衣生理之所不能一朝闕則皇皇從之為二者故也聖人有以日中為市不欲使各滯其用以相妨將使之通功易事而兩得則錢幣於是乎生焉事無常勢時有輕重故民患重則有子權母而行焉所以為輕民患輕則有母權子而行焉所以為重輕重之權惟其時也然則今欲施之柰何古者生財有大道故菽粟布帛之出如流源狼戾純束鄰里足以相仁則錢幣安得而重哉耕之為事也勞織之為事也擾方春而作寒暑易矣然後僅得衣且食則不昏作勞之民以是為趨利緩故游手而坐都市朝懷千金暮賈百金則飲酒博奕嬉戲以自如操菽粟布帛而貿者適市見欺十償七八則售矣於此雖欲錢幣輕安可哉夫先王有所不得已而權焉以濟民用今使天下皆棄本而爭趨末則可乎饑未嘗食之也寒未嘗衣之也山嶽之臧不竭鼓鑄之工不息而天下之民皆曰錢幣為不足然則操利勢者宜何如以究斯患哉願極言之禮樂問王者功成作樂治定制禮夫時異事異禮樂非亡也而所病者才難以賈誼之臣而文帝之問顧止於鬼神以太宗之君而房杜之才不閑於禮樂故二主者終其施設治功如此可太息也家人有器焉終嵗不用則扞格而難操乃至具名物而藏有司曠時不一試則亦以陋矣主上復古百度修理征伐四克可以歸牛馬銷鋒鏑而肄鍾鼓玉帛之事者莫盛於斯時然而凋落已久有其廢之莫能舉者將一朝而復之則病古今殊習無所從正蓋髙論者主情而棄文齷齪者循法而遺意甚者苟且便安而曰不敢此何為者也且井田之不可施於田肉刑之不可施於刑則勢有所未利論禮樂則雖制作設施小不備而中和之用在人者猶是也革而化之借使先王未之有者便則為用其誰曰不然願釋三累而聞折𠂻之説河决問聞而知之孰與見而知之之詳粤之鎛燕之函秦之廬胡之弓車夫人而能為之生於其土者習於其事然則河之說居水濱者所知也禹疏百川作十有三載乃同其致力焉者河為多凡所以載之髙地播為九河同為逆河若此者用力已勤矣亦行其所無事者非耶世非不逺也自三代至於唐然而中間數决者惟西漢地非不廣也自積石至於海然而中間數决者惟東郡是二者其故獨安在也意者天災流行有縁其類致者耶將隄防人事有豫不豫者耶抑㑹其適然是固無情有不足窮者耶為之說者非一家也而要其歸莫詳賈氏敢問三䇿者施於今孰去孰取小吳之役仍嵗所病且轉敗而為功乎其舉以不煩為善則諸君之慮豈特版築茭薪之間而已也焉政問自昔為國馬政尚矣阜馬佚特駣有教駒有攻而執而散而圉以綱惡而頌良比毛而齊物即田而從戎其事載於經可考也牡馬騋牝王室之所廢公室之所修詩人與之然則馬之於政豈緩哉平城之役猛將如雲謀臣如雨而困䮾白騂驪之騎絶漢之戰匈奴孕重墮殰罷極苦之而以馬少不能復出故後之制軍彊弱視焉上有常徳以立武事將賢士勇器利食充而眷顧未忘有稽天討者萬一在此比設監牧之官又詔民蕃馬意良而法美矣為今之民慮馬取於五路取諸其産則或良而病不皆出取非其産則或出而病不能皆良又有合二者之説徙西北什一之種變淮浙荆湖之類則卑宜髙小宜大而又所病者淮橘汶貉地氣之化也夫講萬嵗毛仲之術以錯諸今以民則不勞以馬則可用其説何取兵法問用兵之法太上貴仁義其次務節制下政無之齊隆技擊魏恃武卒秦矜鋭士是數國者措諸兵法為不得已雖然法無常是與事軫轉觀其所以日夜教訓整齊其民而用之豈固無得哉錙金論賞利在一首疾呼斬决忽如飛鳥此齊技擊之得也然何為而不可以遇魏之武卒犀兕三屬服矢五十贏粮而趨及暮百里此魏武卒之得也然何為而不可以遇秦之鋭士忸以慶賞猶以刑罰獲五甲首而𨽻鄉里此秦鋭士之得也然何為而不可以當桓文之節制而桓文之節制在兵法為可道在秦兵之精悍為不宂者何以也謂數國者皆干賞蹈利之兵庸徒鬻賣之道苟便一時無所長短則其得失宜雜利害各異而卒之秦所以强魏所以弱齊所以又弱者其故且安在也反而用之使騎劫將强田單將弱則强弱之勢於此乎未辨敢問兵之得失利害勝負之筭在將非也齋戰疾皆子之所謹則諸君亦安得曰未之聞也而已哉漢唐將相問道二文武而已安危之所注意焉者在相與將天下之所少非羣有司之材也張良帷幄蕭何鎮撫韓信戰功三人者皆稱賢於髙祖其功為孰盛陳平智王陵戅周勃厚三人者皆銘功於劉氏其賢為孰先少卿寛弱翁嚴兩人者為相不同同有聲於漢應變者崇守文者璟兩人者為相不同同有聲於唐李將軍簡程衛尉煩兩人者為將不同同有聲於漢汾陽惠臨淮威兩人者為將不同同有聲於唐是十數子者去就取舍參差齟齬不啻十指然皆以濟治何哉相之材曰坐而論道將之材曰智信仁勇嚴謂十數子者其才足以堪此否耶曰不然乎則語治若漢唐其相其將其才猶不足紹而况治不若漢唐者柰何諸君夙夜强學以待問則於有司一二之訪不可以滅裂塞也用法問天下有治法無治時聖人有因時無因法前主所是著為律後主所是疏為令今夫所是者情也一人之情千萬人之情是也則立法以御世舍情何以哉政不足以仁民而民䧟於罪焉者多則因事設法綿綿日出覃若蔓草降秦而言求其不苛且濫若漢與唐者幾希蕭何所作其存不可以枚數也而歴世所傳律令具在本朝因之以為理其日改月降損益濟治則以年繫之曰某勑者而已事或先王未之有則以勑從事凡此以趨人情之所安否乎然律令不變如經勑損益之如緯前之所下今日而益今日所用後日而損欲吏習而民安可得哉夫教化未明習俗未成則解而更張所以為善治政行豐美之後則法也猶四時也與民為信焉者也其可以無素定耶嘗試稽之三王騐之漢唐宜之當時成一代書以遺天下其筆則筆削則削是非詳略柰何士大夫學焉以入官大者出入經術細者析毫剖芒屈指而甲乙明白當事至於坐堂據案木索在前愀然有非其情者則施設論决若不在於已出曰法吾無如之何也豈國家至仁惻怛先有司之意耶諸君舉於鄉而所習者有在於是則平日之論議願遂聞之儀禮問六經行於今其殘不完者惟禮而禮之中儀禮為最完竊復之文王周公所以用其意者亦精密矣或曰日昃不食肉肉必乾日昃不飲酒酒必酸先王之為禮必其强人以所甚難三揖而後升百拜而一獻授受盥洗奠執繚絶至於使人幾不勝其故何也蓋自韓愈猶苦其難讀以謂於今誠無所用之則後世學者有而不講亦固其理夫四民世事則士尤不可以不知學誦先王之言而服今之服用今之器雜委巷之説相與次且齟齬於其間然且安之不亦鄙而可憐哉將學焉則又忠信彊有力者常寡也凡此者柰何嘗試談之蘇門六君子文粹巻六十二
