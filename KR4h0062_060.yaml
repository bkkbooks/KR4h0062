body:
  text: 蘇門六君子文粹卷六十濟北文粹六宋朝補之撰舊唐書雜論出元稹為同州刺史元稹為承㫖學士中人以崔潭峻之政爭與稹交而知樞密魏𢎞簡尤與稹相善穆宗愈深知重河東節度使裴度三上疏言稹謀亂朝政罷內職李賞告度言稹結客王昭等刺度隱而不發詔韓臯等訊鞫害裴事無驗而前事盡露出為同州刺史因表謝上自叙云宰相惡臣不出其門又云自離京國目斷魂銷每至五更朝謁之時實制淚不巳右元稹傳第一百一十六􅐃初登制䇿為諫官少年氣鋭論事有理似欲自激昻於忠善者而資憸弱喜近權利因崔潭峻及宮人誦歌詞獲知穆宗昵其浮華使冒台鉉雖刺度事無驗而其他踪跡不能掩也宰相果惡人不出其門罪也然稹之寵用宰相苟賢乎欲不惡不可得巳至言五更朝時不能制淚此妾婢媚主乞憐求復之詞嗚呼鄙夫可與事君也哉元稹在越八年元稹改越州刺史放意娛遊以黷貨聞於時凡在越八年右稹傳稹罪貶無足言然在越凡八年知唐猶久任刺史也元稹出郎官稹為尚書左丞出郎官頗乖公議者七人然以稹素無撿操人情不厭服右稹傳無瑕者可以戮人信矣王守澄以計中申錫文宗常患中人權柄太盛自元和寶厯以至宮禁之禍及王守澄之領禁兵有鄭注者依恃守澄為姦利宋申錫時居內廷文宗察其忠厚可任以事從容言及令與朝臣謀去之未幾拜平章事云云申錫除王璠為京兆尹以密㫖喻之璠不能密而注與守澄知之令豆盧著告申錫與漳王謀反崔元亮等泣諫貶漳王巢縣公申錫開州司馬右宋申錫傳第一百十七文宗始相申錫以謀守澄既與之相期矣而為守澄輩所覺反以計中申錫文宗怒幾致顯戮賴羣公卿士力爭而免然終不省其誣人情之暗豈至於是耶申錫賢有望可任而守澄雖悍猶知畏戢不敢肆其凶暴而止者前不能用申錫以除守澄而後復委心狂譎之李訓欲盡剪士良輩數十百人甘露之事無謀輕發為國深禍又知涯餗實寃而聽士良肆其酷不為分别惜哉文宗可謂有其志而已不足與有為也宋申錫不死為幸史臣曰申錫小器大謀不死為幸右申錫傳易曰幾事不密則害成申錫之敗坐任王璠非其人不密取禍也申錫未遽為小器而謀守澄未足為大自古以身任國事不顧危亡事不成而身罹咎何可勝言死與不死不足以論幸不幸也裴度諌憲宗釋裴寰五坊小使嘗至下邽縣縣令裴寰嫉其凶暴公館之外一無曲奉小使怒搆寰出慢言憲宗怒促令攝寰下獄欲以大不敬論武元衡以理開悟帝怒不解裴度極言寰為令長愛惜陛下百姓豈可加罪上怒色遽霽翌日釋寰右裴度傳第一百二十高宗庸主尚能悔中使採竹縱暴之非而不加長史擅囚王人之罪下制慰勉發於至誠以憲宗之賢不能不昵五坊鷹犬之臣欲以近讒殺守法吏非賢相忠言幾陷不道荀卿論蔽之為禍可勝言哉憲宗疑度初度入蔡州或譛度沒入元濟婦女珍寶上聞頗疑之右度傳淮西之舉非度流涕極言則搖奪者久矣觀憲宗之意度未行惟恐失蔡既行猶懼不得蔡既任度巳得蔡捷書始騰而浸潤以至忘未賞之大功疑無驗之小節嗚呼狹矣裴度言异鎛帝以程异皇甫鎛平蔡時供饋不乏二人並拜同平章事度延英面論曰异鎛錢榖吏非代天理物之器也三上疏請罷己相位上都不省為鏄所搆憲宗不悅右度傳憲宗非征利之主任异鎛斂財正為平蔡而平蔡之功始終在度异鏄雖有供饋之勤憲宗寵之不當厚於度也事定之後度為社稷計言二人不可大任憲宗姑自揆其本心權宜任之則度之言不難入也而四方既寧耳目之奉巳萌營欲侵侈甘近奸而昧逺圖卒相姦佞而踈忠良可勝歎哉裴度晚節避禍度素堅正事上不回故纍為姦邪所排幾至顛沛及晚節稍浮沉以避禍右度傳度始為中丞藩臣憚嫉巳有刺客之變而勇不畏難竟殱冦孽晚以昌言詆魏𢎞簡劉承偕之姦加以元稹李逢吉之徒搆誣百端而張權輿非衣之謡仍出於昭愍時度之不及於禍幸也盜起禁中宮車晏駕繼以甘露事四宰相喋血都市度猶橫身抗議全活者數十家唐史臣有微管仲吾其左衽之論度之終始為國亦足矣或謂度晚節浮沉以避禍非也既明且哲以保其身聖人稱之况度不但保身而巳也至謂效王播進羡餘為士君子所少豈度心哉蕭何買田宅以自汚亦或以為不如張良棄事辟穀是不然何人物雖愧良而兩人皆髙祖所謂人傑賴以取天下者非其功髙地危有逺禍意計皆不出於此韓信之事斷可識矣買田辟穀何足以議其汚與潔哉齊映為帝執轡齊映從幸梁州每過險常執轡馬駭帝令捨轡映堅執久之及止帝奬無巳右齊映傳第八十六皂𨽻有職雖艱難輿衛不具未至乏持轡者也而映屑為之自託愛君恬不羞辱意欲因危以求親徼幸於他日者後卒以信任至宰相既貶乃進八尺銀鉼其行事終始如此李石請內置赦書一本開成元年改元大赦石等商量節文放京畿一年租稅及正至端午進奉並停三年上曰吾欲行其實不欲崇長空文石對曰赦書須內置一本陛下時省覽之右李石傳第一百二十文宗懲訓注事有誠心於治而石孤立自信奉上不欺亦欲以情實致理善哉文宗之言與石之對也王者詔令如天之行四時萬物所信而自昔赦文蠲逋洗罪意皆盛美而奸吏刻害公然違之詞理疑似之間持為異論主澤不宣下無控告而在上亦不能察石言內置一本時省覽之其㫖深矣然石處危朝權在中人上不得專而石亦操事堅急傍無援助幾淪賊手不終其志惜哉敬宗焚李逢吉謗書王守澄每從容謂敬宗曰陛下登九五李逢吉之助也先朝定儲二惟臣備知杜元頴李紳勸立深王而逢吉固請立陛下帝雖冲幼亦疑其事㑹逢吉進擬言紳在內時嘗不利於陛下乃貶紳端州司馬後禁中得穆宗時裴度元頴與紳所獻疏請立敬宗帝感悟悉命焚逢吉黨所上謗書紳黨得保全右李紳傳第一百二十三甚矣敬宗之昏且庸也始疑逢吉之黨搆紳不能自决竟貶之後得紳疏乃正為立巳者則逢吉姦罔不可掩如此當正典刑矣而不辨乃悉焚書名為息謗實為逢吉等滅跡非洗紳也李珏不欲文宗聽陳夷行言文宗以杜悰領度支欲加户部尚書陳夷行曰一切恩權合歸君上陛下自看可否李珏曰太宗用宰臣天下事皆先平章謂之平章事若事事皆决於君上則焉用彼相昔隋文帝一切自勞心力臣下欲論則疑云云右李珏傳第一百二十三君人之道欲威福在辟當如夷行言欲疇咨僉允當如珏言夷行介直嫉同列阿黨擅權其言陛下自看可否者忿激而言至云一切歸君理未然也珏論雖似知君臣大體者然方時矛楯亦意不便夷行之論侵之而為是言不能自脫於朋比之汚不足多也楊嗣復欲循資用人文宗曰天后用人有自布衣至宰相者還得力否嗣復曰天后重行刑辟輕用官爵皆自圖之計耳凡用人之道歷試方見能否當艱難之時或須拔擢無事之日不如且循資級古人拔卒為將非治平之時蓋不獲巳而用之也右楊嗣復傳第一百二十五嗣復與李珏朋比以排鄭覃陳夷行覃夷行皆傷訐直而文宗用是意屬嗣復輩為罷覃等又嗣復父於陵以考牛李制䇿上第見排於李吉甫嗣復因善其父門下人事事與之同黨人蔓延惡甲逮乙不為朝廷計至於如此文宗雖患之而無剛明之才聽言屢惑兩可不察竟逐正人嗣復事主不可謂忠而人物亦無足言然其對文宗言天后輕用官爵皆自圖之計用人當歷試乃見能否拔卒為將非治平之事此其智識亦可謂宰相器也楊虞卿諫穆宗穆宗盤遊無節楊虞卿上疏諫曰臣聞鳶鳥逐害則仁鳥逝誹謗不誅則良言進云云右楊虞卿傳一百二十六論王德之事蓋有是說惡者尚有以容則善人之奬可知矣然後世俗薄邪正混殽真僞凌雜先君子有言惡紫恐其亂朱惡鄉原恐其亂德也蓋鳶鳥逐而後仁鳥至誹謗熄而後良言出虞卿小人朋李宗閔謂之黨魁安得長者之言哉授張仲武留後陳行泰殺范陽節度使史元忠張絳殺行泰張仲武為北雄武軍使遣吳仲舒表請以本軍伐叛李德裕因奏行泰絳皆令大將上求節旄所以必不可與今仲武上表布誠先陳欵密因而拔用即似有名乃授留後右張仲武傳第一百三十德裕在朝威令行於四方以澤潞之近且彊劉從諫與禛巢穴深固如此而毅然建謀不搖羣議指日蕩覆力豈不足以圖新亂之范陽未立之仲武哉范陽去朝廷逺非澤潞腹心疾比也且北迫戎虜自安史以來狃習僣叛易擾難靖若加兵則山東皆動或緣以生事又姑息自河北故事未可遽改行泰綘為叛而仲武請伐叛雖未有功情有間矣因而撫之尚有名也後亦卒因仲武捍回鶻威加北狄始謀為不繆矣不然將卒殺帥因人邀節旄與夫阻兵自表伐叛而意實在節旄者亦相去幾何哉田歸道執詞獲免田歸道押干騎宿衛於𤣥武門敬暉等討張易之昌宗也遣使就索千騎歸道既先不預謀拒而不與及事定暉等將誅之歸道執詞免令歸私第右田仁㑹附傳第一百三十守道不如守官歸道有黨奸拒正之心誅之可也既不預謀復無符詔卒然索之有死而巳暉等本緣國事無意黨己以其詞直置而不罪可謂公也韋機囚朱欽遂韋機遷司豐撿校園苑有道士朱欽遂為天后所使馳傳至都所為恣橫機囚之髙宗特發中使慰諭機而欽遂配流邊州天后不悅至其孫嶽因召見則天謂曰卿是韋機之孫勤幹固有家風也卿之家事朕悉知之因問家人名賞慰良久拜太原尹右韋機傳第一百三十五則天雄猜忍鷙其在上元間僣橫始萌而機發暴其私事銜之固宜不釋後巳革命專國見嶽而記機姓名此在常情禍不可測而乃奬其勤幹有家風拜以要官若忘前事者何哉則天智度絶人豈非未得志則陰謀中物以立威既權在手則時有縱捨以收譽故以一女子盡服天下之英豪而臣之得其死力良有以也高宗賞王方翼永淳二年詔徴王方翼將議西域事於奉天宮謁見賜食與語方翼衣有戰時血漬之處髙宗問其故具對熱海苦戰之狀高宗使袒視其瘡歎曰吾親賞賜甚厚右王方翼傳第一百三十五方翼戰功載良史傳可也謁見乃服數年前血漬之衣鬻功覬利奸鄙甚矣方翼高祖妹同安公主孫也高宗賞其功耶則不當言親緣親而賞豈無他時如是欲有功者勸難矣楊元琰以先覺獲全張柬之在荆州楊元琰泛江中流言及則天革命慷慨有匡復之意及知政事奏元琰為右羽林將軍定計誅張易之等賜鐡劵恕十死俄而柬之敬暉等為武三思構元琰覺變請削髮出家中宗不許暉聞而笑曰向不知奏請髠却鬚髮豈不妙哉元琰竟以先覺獲全右楊元琰傳第一百三十五柬之暉等忠亮有謀足以成大功而小不忍亦以貽後禍惜哉惜哉示不為巳甚忍武三思不知三思乃不能忍巳始意固巳疏矣而區區賜功臣鐵劵恕十死豈不兒戲也哉元琰初慷慨若可觀至恐懼求削髮事智謀俱窮宜為暉所輕笑史臣方之先覺未足以當此以中官馬尚言肉賜從官中官馬尚言出納詔命宰相呂諲昵之有納賂尚言求官者諲補為藍田尉尚言事泄笞死以其肉賜從官食之右呂諲傳第一百三十五坐贓獲罪有典刑矣以肉賜從官桀紂之暴不過如此諲為宰相交通尚言尚言誅磔諲不得罪又不可知者改馮伉為醴泉令馮伉為膳部員外郎充睦王以下侍讀李抱真卒伉為吊贈使抱真男遺伉帛數百匹不受屬醴泉闕縣令宰相進人名帝意不可曰前使澤潞不受帛者此人必有清政遂改醴泉令右馮伉傳第一百四十郎官王府官宜要於縣令也而伉以清見知方改醴泉唐重縣令如此近時郎官得郡為失職內重甚矣𤣥宗以堇酒試張果𤣥宗遣徐嶠邀迎張果至東都謂力士曰吾聞飲堇汁無苦者真竒士也㑹天寒使以堇酒飲果果乃飲三巵醺然如醉因佯顧曰非佳酒也乃寢頃之取鏡視齒乃盡燋且䵩以鐵如意擊齒墮藏於帶乃懷中出藥微紅傳墮齒之斷復寢良久齒皆出矣粲然潔白𤣥宗方信之右張果傳第一百四十一神仙之有無不可得而知術士變化亦何足深怪璽書馳使以迎之詭謀毒飲以試之身以欺待物物之微若漚鳥者尚覺而去之何足以致異士哉睿宗以金山公主嫁默啜默啜殺我行人假鴻臚卿臧思之命張仁亶充朔方道大總管以禦之睿宗踐祚遣使請和制以宋王成器女為金山公主許嫁之默啜乃遣其男楊我支特勒來朝授大將軍右突厥傳第一百四十四默啜自則天時連嵗入寇掠監馬萬匹虜趙定男女八九萬人又殺行人其暴患中國前古未有也借使中國畏其強其罪未問閉關謹備示不忘報可也卒然求和不使引咎遽許降女禦戎無謀莫甚於中睿間蘇門六君子文粹卷六十
