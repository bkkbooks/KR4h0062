body:
  text: 蘇門六君子文粹巻七十濟北文粹六宋晁補之撰序杜輿子師名字序盱眙杜君從學於眉山先生先生名之曰輿字之曰子師子師道先生之言曰夫能載而後可與言輿能衆而後可以言師夫能載則能衆矣故輿有師義則又從先生之門人晁補之求識其説補之曰甚矣先生所以望子師者至矣夫車之有輿也猶宫之有堂也猶人之有腹心也崇墉長廡溝之於其外閭然後門門然後堂而堂者宫之所宅也目視耳聽手扞衞而足運趨元首加焉而腹心者人之奥也故謂之輿則一車之任舉在矣立轛横軹輈環灂而牙固抱二十有八為其蓋弓三十其輻合之於一轂以濟其中之所無有而後可以受天下之有凡物之不至者託至焉是其材君子之材也其器國器也御閑而右勇善用其材者也得時則駕見險而能止不犯難者也以經營四方與舟楫之絶江河同利故天下無不待之以濟而附者不一是之謂能載則能衆也曰雖然孰能任之孟子所謂異人以存心者能任之如以其同而已同乎此必不同乎彼則亦秪以異何以能衆吾且以其異而衆無不同以其所以同者莫適同而已然後君子之道大而為衆率賈誼曰鳳凰翔於千仭兮覽徳輝焉下之鳳不世見故人未始識鳳人未始識鳳則藩籬之燕雀蓬中之斥鷃何從識之雖然鳳舉而鳥朋矣鳳非以其異故能同耶不然則鳥之從烏扈之羣扈亦可以為同耶而同者狹矣故曰甚矣先生所以望子師者至矣昔者伊尹其道有在於此思天下匹夫匹婦有不被堯舜之澤者若已推而納之溝中而天下亦皆以是歸之道足任而時可為也易曰大車以載積中不敗是其所以能有大也陳蕃亦可謂有其志矣不掃一室而欲以身援天下志大而力不勝義可以立而身見危是知其不可而為之者也易曰輿脱輻夫妻反目天下不可輕為而近用也然亦不可咎也山以其髙而獸往之川以其深而魚聚之君子以其道可以任重而致逺故窮則得士達則得民不幸而終其身不試而君子論之與禹稷同道子師勉之外弟楊若字知類序驥有四足足以靡丘陵跨燕越不期於在六轡也然有是足覊之者至矣鷙鳥有六翮足以絶浮雲捎林莽不期於掣韝上也然有是翮呼之者至矣士有才術足以知往古治當世不期於仕而遇合也然有是資用之者至矣故物必有餘而後用無不足而求用閑其馳驅以待覊者時其翺翔以待呼者馬與鳥無是情也然則治其可合者以求合豈士之情也哉今世之學者不求若古人而務一時之合自始讀書則曰世之所用何尚有司之所取何先治其學之類者去其學不知類者而求合焉世之用捨不可常而有司之去取無特操則業成而不售半塗而改盡棄其學而從事於其所不學至於白首紛如也乃始歎息於不逢若此豈足以言知類也哉余外弟楊君名若少而篤志嶄然於儕輩中善問而識所從既學經又學為詩賦皆欲求當時之所謂善且嘗効者而師之余曰書無所不當知獨一經乎哉文章無所不當為獨詩賦乎哉治其狹以求適於廣則是以箸為梁木也十圍百圍則求方圓長短者無之而不可矣然則求若古人何如亦曰養其大體而已矣孟子曰指不若人則知惡之心不若人則不知惡此之謂不知類吾弟之學也無以不若世之所用有司之所取者為羞而以若古人者是求則雖欲不為世之所用有司之所取亦不可得矣故余請字曰知類從兄字伯順序名者所以制義出禮而字者相期於實以不虚其名者也蓋余從兄名隆之而字不足以稱其實余為之説曰物未嘗有必隆者亦未嘗有必不隆者也封土以為臺巍巍者先圮焉架木以為宇翹翹者先橈焉泰山之隆百仭而跛牂履其蹊以絶其嶺勢附於下也吳牛之力百鈞而童子拊其角坐其背知役於人也故曰物未嘗有必隆者有人焉力不能勝一匹雛而天下不敢為之先彼其所以能隆者亦必有道矣易曰地中生木升君子以順徳積小以髙大夫順徳不躐等君子之所以積小也如此而後可以基髙大此為隆之道也故余請字曰伯順袁疇字耕道序開封袁君名疇字耕道其友字之也記曰人情者聖王之田也而傳曰人情甚不美妻子具而孝衰於親爵禄具而忠衰於君名譽足而信衰於友夫人之情可惡如此年運而往每具而輒衰聖王何取於田哉夫以堯之水至於方割懷山而襄陵非禹則土皆不粒也然謂土實不粒則不可以禹所湮之餘龍蛇虎豹始驅似不可人而有稷焉敎民以藝之則粒矣山澤原衍地有剛鹵肥确不同而斵耜揉耒火耕而水耨農無不可為人情亦有賢不肖邪正異趣而追琢學問求其放心聖王亦無不可治蓋不為不治則如堯方割未乂之初為而治之則如稷播殖之後是乃聖王之所以取乎此者也人情無禮則荒故修禮所以耕之此學之始也義欲列蔽度宜譬榖有九種視地力故陳義所以種之學欲閑邪存誠譬惡莠恐其亂苗故講學所以耨之君子仁以居體仁譬則積而充也故本仁所以聚之樂以治心樂譬則飽而嬉也故播樂所以安之禮義仁樂四者人情之田具而學其中耨欲數數者然也此記之説聖王之所以田人情者盡矣揚子曰耕道而得道獵徳而得徳夫耕道而不得道安取於耕道故君子以謂治國不以禮猶無耜而耕至於安之以樂而不達之以順猶食而弗肥也此學之終也然則耕道其務始於禮乎非忠信不可以學禮非彊有力不可以行禮譬農必於忠信之類也必勤苦彊有力之類也壤土之民怠恃其地之良而弗彊也瘠土之民勞憂其田之下而自力也故瘠之獲常倍於壤而田父之尤其子以得壤為不幸迺若耕道才良而志修又博之以文地與力皆美矣耕道既識此而疾驅田已之田而食已之力嵗晚而功休既飽而嬉倚户以永歌不已樂哉而世方有捨其田而芸人之田者亦晨夜不暇息霜雪皸瘃觸隆曦而汗得不償勤至於終年號寒而啼饑所求於田者外也耕道反之詩曰自今以始嵗其有君子有榖詒孫子于胥樂兮司馬遷之父名談其書趙談云同子驂乘諱其父也名譽足而信衰於交交字諱先子易之王勲字重民序進士太原王勲文學志意在塲屋前輩間或字之曰子功余改之曰重民蓋言王功曰勲而其事則民為重也重民曰請極其義余曰周官所記列於今學宫重民能習之雖然嘗試以所學於孟子者為重民言而重民擇焉學之為王者事一也而古者取於王之事近後世託於王之説逺故不同蓋孟子嘗曰保民而王至其言王道之始則特在於使民養生䘮死無憾之間然而不王者未之有此取於王之事而近者也王莫先於仁義而為莊子之言者曰仁義先王之蘧廬止可以一宿事之破䃣而後有舞仁義者不能救也此託於王之説而逺者也夫昔之所病儒者一師而俗異今為孟子又為莊子是二師也夫安得不離近易言逺難知則亦無惑乎士之皆託於逺以趨同而自誣不悔也自荀子不好孟子又非之然其言曰道不過三代法不貳後王過則蕩貳則不雅此兩君子者惟一師故不異而莊子又甚焉曰藐姑射之山有神人其塵垢糠粃猶將陶鑄堯舜故後生簧鼓讀論語未半紙而爭言堯舜之上皆洋洋滿其意夫堯舜且不足道而王何足言王何足言而民亦安有哉以往事論之彼衞鞅安知王不知對孝公談何等而孝公時時睡不應顧出而自矜大者曰其志弗開悟矣欺哉願重民反之抑夫子聖人所重民食䘮祭聖人固為王不為霸豈以是為土苴而先之乎故王功曰勲民功曰庸而要聖人之所重者言之勲必自庸積此余所以字重民之意也道有終始之序故昔之學射者不學射先學視學馭者不學馭先學趨夫論政於不飢不寒之間而計功於無思無為之際可謂知所先後矣抑重民博習彊記其文詞浩浩非七八月之間雨集而盈者其必决而注之海於從政乎何有而士或以其所趨愈鈍而笑之子亦所趨愈鈍者然譬夫入室必自門始不可以躁也若夫子之牆數仭不得其門而入有人焉適立於巷驟而語其中百官倉廪室家之美不疑而大夸曰如此匪穿窬斯誕已其可哉石逺叔集序文章視其一時風聲氣俗所為而巧拙則存乎人亦其所養有厚薄故激揚沉抑或侈或廉穠纎不同各有態度常隨其人性情剛柔靜躁辨訥雖甚愛悦其致不能以相傳知此者則古人已逺若與之並世而未之接得其書讀焉如對而語以之逆其心曰此何如人也此何如人也無不可言者雜説書母丘震御印厯紙後古者人主之職在論一相相得其人矣至百工有司之廢置皆相之任也舜選於衆舉臯陶湯選於衆舉伊尹傳以謂不仁者逺矣夫舜與湯人主之師皆論一相以逺不仁其道曠千百世所當循而不改者然自昔盛世君子多小人少好惡明於上是非公於下故未嘗求賢而賢至疾不肖不為已甚而不肖者不待黜而革後世道徳不同而俗隳賢不肖陵雜而人才益微至五代分裂大壞極亂四民皆䘮其業而武夫鬭士充朝廷而布州郡當是時聖人出將何以救其弊哉書陳唐父綿州守遺愛事後孔子曰善人為邦百年亦可以勝殘去殺孔子之所謂善人者蓋嘗歎息以為吾不得而見之夫若是其重且難遭也然使其得位而為之其功猶在於百年之後今方百里如千里者皆邦也古者諸侯世守而今以守令治逺者二三嵗近者滿嵗又其近者數月而徙幸而治且有聞者則徙逾亟曰一人去有一人焉充之則已矣昔子産為一年而人歌之曰取我田疇而伍之取我衣冠而褚之孰殺子産吾其與之三年而人又歌之曰我有子弟子産教之我有田疇子産殖之子産而死誰其嗣之夫子産古之遺愛亦可謂善人者非耶而用其民一年不惟未信而已也至相與訟怨而蘄殺之三年而後怨者化而懷仇者慕而如父母然使孔子論之至於勝殘去殺猶未也則責治之効欲其緩而逺者如此故唐盧懷慎亦深言數易地之弊以謂人知吏之不久則不從其敎吏知遷之不逺則不盡其力至於禮義之不興風俗之不一户口之所以流散倉庫之所以空虚患皆繇此而後世官日以冗遷易旁午民不得休蓋其初嘗怪三代雖逺聖人之事不傳下漢而言龔黄卓魯政事之才亦豈乏遂不可得而見吏治苟且滋甚如此特責其古人百年之事於後人不煖席黔突之間夫豈惟遂霸恭茂之徒歛手而未得施而賢如子産方用以得殺無足怪也蘇門六君子文粹巻七十
