body:
  text: 蘇門六君子文粹卷二十六淮海文粹二宋秦觀撰進策官制上臣聞王者用人之要術惟資望而已歲月有等功勞有差天下莫得躐而進者謂之資行能術業卓然高妙為世所推者謂之望用人以資而已則盛德尊行魁奇雋偉之人或拘格而邅回如張釋之十年不得調揚子雲位不過侍郎之類是也用人以望而已則狂繆之流矯亢之士或以虗名而進拔如晉用王衍唐用房琯之類是也古之善用人者不然以資待天下有常之士以望待天下非常之材使二者各有所得足以相推而不足以相礙故自一命以至九命自受職以至作牧非有功不遷非有缺不補而天下不以為淹或舉於耕或舉於版築或舉於屠釣加之士民之上委以將相之權而天下不以為驟何者資之所當然望之所宜爾也國家以寄祿格為有定之制而以職事官為不次之選於先王用資望之術可謂得其意矣然臣愚猶以為未者太必於用資太不必於用望也何則夫郡守者民之師帥天子所與共理者也衣冠而坐堂陛之上則賔客造謁於前掾屬趨走於下政教賞罰軍旅之事一皆聽其可否所為是則千里蒙其賜所為非則數十萬室受其害可謂天下之重任矣今將相大臣自朝廷而出者不過為郡守而仕嘗再為通判者苟無大惡顯過有保任人亦必至於郡守是將相大臣與保任嘗再為通判者相去無幾耳夫賢者能使所居官重不肖者反之今二千石所以不至尊重難居者非特法令使然亦其人材之所致也豈非所謂太必於用資乎館閣者圖書之府長育英材之地也從官於此乎次補藝政於此乎遷升故士非學術藝文屹然為一時之望者莫得而居之可謂天下之妙選矣今中材凡吏一為大臣之所論薦則皆得居其位嘗有金榖之職兵刑之勞則皆得假其名嗚呼比歲以來校書正字之職龍圖集賢之號何其紛紛也傳曰惟名與器不可以假人此不幾於以名器而假諸人乎臣所謂太不必於用望者此也昔漢制郡守入為三公學者以東觀為老氏藏室道家蓬萊山言其清祕常人所不能到也願下明詔應中州已上非更臺省寺監漕刑之任者不得為郡守慎惜館閣之除以待文學之士則用人之術庶乎其盡矣官制下臣聞國家次五代一切之制百官稱號最為雜揉名存而器不設文具而實不應所謂臺省寺監者朝廷之官也而其泛及於州縣管庫之吏其濫至於浮屠黃冠之師乖違之條爽繆之目至不可勝數先皇帝惻然憫之始詔有司作寄祿格以易天下之官而歸之於臺省還之於寺監然後循名可知其器而緣實亦得其文可謂帝王之盛典矣然有所未盡者臣竊昧死而妄議焉向之則自正議大夫以上遷進太略自中散大夫以下清濁不分也夫遷進太略則大臣僥幸而其弊也至於無以復加而法制亂清濁不分則小臣偷惰而其弊也至於莫為之寵而資望乖舊制侍郎至僕射凡十二遷其兼侍從之職者八遷九遷其任執政之官猶六遷也蓋侍郎以上皆天子之臣非多其等級則勢必至易極易極則國家慶賞將窒而不得行此制官之深意也今寄祿格則不然自正議大夫不問人之如何四遷而至特進故大臣為特進者遇朝廷有大慶賞則不得已而以司空之官豫之夫司空者職事官也寄祿無以復加而豫焉豈非所謂亂法制之甚歟舊制少卿之官率一秩而有四名太常光祿衛尉司農是也郎官員外率一秩而有八名如禮工祠屯主膳虞水之類是也京朝之官率一秩而有三名如太常祕書殿中諸丞是也蓋入仕之門有制策進士明經諸科任子雜色之異歷官之途有臺省寺監漕刑郡縣之殊非錙銖而較之色色而别之則牛驥同皂賢不肖混殽而天下皆將泛泛然偷取一切不復淬勵激昻以功名為己任此亦制官之深意也今寄祿格則不然自中散大夫以下至承務郎秩為一名而已故嘗任臺省之職或任漕刑之司者人心有所不厭而莫為之寵則往往假以龍圖集賢之號夫龍圖集賢之號所以待天下文學之士也而以諸吏莫為之寵而假焉豈非乖資望之甚歟蓋爵祿者天下之砥石聖人所以礪世磨鈍者也夫不為爵勸不為祿勉古之人有行之者蒙榖是也齊生死同貧富等貴賤古之之人有行之者莊周是也今朝庭之臣皆得莊周蒙榖而為之則爵祿之器雖不復設可矣如其不然則遷進太略清濁不分之弊安得而不革哉朝錯曰爵者上之所命出於口而無窮韓愈曰聖君所行即是故事自古豈有定制也願詔有司以寄格再加論定稍放舊制自正議大夫以上更增四秩之號自中散大夫以下秩之號為三等之名如此則遷進頗詳而法制不亂清濁稍異而資望不乖是亦先皇之志也惟陛下留神省察財用上臣聞先王之理財也若持衡然天下之財不使之偏歸於公室亦不使之偏入於私家惟其適平而已故邦國有以供祭祀奉養祿廪賜豫之費而民有以給朝哺伏臘冠昏喪祭之資其取民之制謂之什一什一者天下之中正也多乎什一小桀大桀寡乎什一小貉大貉魯哀公曰二吾猶不足桀之道也白圭以二十而取一貉之道也推此言之則先王理財之意惟其適平而已自什一之法壞天下之財始失其平其偏歸於公室也則有鬻鹽冶鑄以管山海之饒𣙜酒酤以漁井邑之利算舟車告緍錢以摧抑商賈造皮幣省酎金以侵牟封君甚者至令吏坐列肆販物以來利焉其偏入於私家也則有以農田而甲一州販脂而傾都邑賣漿而踰侈灑削而鼎食貨脯而連騎馬醫而擊鐘甚者至纍萬金而不佐公家之急是以民常困於聚斂之吏而吏常嫉夫兼并之民所謂事勢之流相激使然曷足怪哉本朝至和嘉祐之間承平百餘年矣天子以慈儉為寶貢賦經常之外殆無一毫取諸民田疇邸第莫為限量衣食器皿靡有約束俯仰如意豪氣浸生貨賄充盈侈心自動於是大農富賈或從僮騎帶刀劒以武斷於鄉曲畢弋漁獵聲伎之奉擬於侯王而一邑之財十五六入於私家矣熙寧元豐之間大臣用事始作法度與時變通青苖免役市易之利相次而作有司日夜手畫口説區處於中使者旁午冠蓋相望奉行於外而言利之臣析秋毫矣江淮則增煮海之息閩蜀則倍摘山之贏青徐則竭冶鑄之利其他希風旨效計數無厭之取額外之求蓋不可勝數而天下之財大半歸於公室矣陛下即位之始深知其弊凡法度之不便於民者一切罷去吏嘗以掊克進者相繼而黜數因赦令而弛逋負大出廪廥以振乏絶於是公私之財滋向於平然而有大弊者士大夫矯枉過直邈然以風裁自持不復肯言財利之事易曰天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義而洪範八政一曰食二曰貨以此見理財先食貨者帝王之要務所以安中國服四夷者也特不可使之偏入於公私耳今國家北有抗衡之敵西有假息之羌中有大河之費數萬之吏取給於水衡之錢百萬之兵仰食於太倉之粟公私窘急可為寒心此正人臣揚𣙜斂散以救虗盈以濟用度之秋也而恥言財用之事是晉人而已矣晉人王衍者口不言錢而指以為阿堵物臣竊笑之以為此乃姦人故為矯亢盜虗名於暗世也何則使顔閔言錢不害為君子盜跖呼阿堵物豈免為小人哉晉人尚清談而廢實務大抵皆類此矣昔管仲通輕重之權范蠡計然否之策蕭何漕關中之粟財利之臣也東郭咸陽之鬻鹽孔僅之冶鑄桑洪羊之均輸亦財利之臣也士大夫言財利有如東郭咸陽孔僅桑洪羊所為也則不可有如管仲范蠡蕭何之所為也亦惡乎而不可哉財用下臣嘗以為君子理財之術莫若盡地力節浮費二者而已何則理財之要在乎原其所自有而為之道要其所從無而制之法風霆雨露之發生山林川澤之滋養財之所從出也不原其所自有不要其所從無切切焉從事於闔闢斂散之中則是賤丈夫爭錐刀之末耳豈君子所謂理財者耶是故原其所自有而為之道則莫若盡地力要其所從無而制之法則莫若節浮費君子理財之術蓋無以易於此臣請為陛下遂言之夫理天下之財譬如治水增繕隄防決之於鄰國非治水之善也橫賦強市取之於百姓非治財之善也善治水者以四海為壑善理財者以天地為資今天下之田稱沃野者莫如吳越閩蜀其一畝所出視他州輒數倍彼閩蜀吳越者古揚州梁州之地也按禹貢揚州之田第九梁州之田第七是二州之田在九州之中等最為下而乃今以沃野稱者何哉吳越閩蜀地狹人衆培糞灌溉之功至也夫以第七第九之田培糞灌溉之功至猶能倍他州之所出又况其田之數等乎以此言之今天下之田地力未盡者亦多矣李悝曰治田勤則畝益三升不勤亦如之地方萬里增減輒為粟百八十萬石然趙過為代田一畝歲收常過縵田一斛以上善又倍之秦漢開鄭白渠溉田四萬四千餘頃至唐大歷初兩渠所溉才六千三百頃耳以代田鄭白渠事言之則治田之勤不勤何止畝有三升之損益也今二千石雖兼勸農之事而例為虗名莫有任其責者為今之計莫若詔天下州置勸農一司以守將為長聽於倅介之中自擇一人為副先籍境內定懇田畝與夫陂塘溝渠之數而周知其利害歲時出行諸郊召見耆老問以疾苦及所願欲而不得者為罷行之而罰其遊惰不聽命者歲終部使者第其殿最以聞功效尤異者寵用之如此則天下之田皆與閩蜀等而地力盡矣古者吉凶之服則一比共之祭器則一閭共之喪器則一族共之吉凶禮樂之器則一鄉共之凡嫁子娶妻純帛無過五兩凶荒則又殺禮而婚夫一鄉者五百家而五兩者五匹而其用財可謂約也今則不然嫁子娶妻喪葬之費其約者錢數萬其豐者至數百萬中人之家一有吉凶之事則賣田疇而鬻邸第舉倍稱之息猶弗能給然則今時吉凶之費絶長補短殆二十倍於古也財用安得而不竭乎周之太宰王之大臣也其職曰以九式均節財用漢之許劭魏之毛玠唐之楊綰人臣耳而能使一時士大夫心化其風損車馬毁池觀減騶馭散音樂以此見法制者雖盛世不可去而風俗者雖衰世亦可行也今令雖有儀制之文毛舉數事不能委曲為今計者莫若自宗室外戚以至品官民庶之家宫室輿馬飲食衣服皆倣典禮而為之度數稍寬其制使可久行其冠婚喪祭之事則視歲上下而隆殺之使諫官御史得以彈奏於中而漕刑守令得以舉劾於外敢不承者雖貴且親必罰無赦然後陛下崇節儉尚敦朴以為之率棄難得之貨却無用之器罷不急之務以為之先如此則天下淫侈之俗曠然一變而浮費節矣賈生曰今背本而趨末食者甚衆是天下之大殘也淫侈之俗日以長是天下之大賊也殘賊公行莫之或止大命將傾嗚呼如賈生者可謂知理財之術矣蘇門六君子文粹卷二十六
