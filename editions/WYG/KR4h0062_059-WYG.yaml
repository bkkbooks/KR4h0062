body:
  text: 蘇門六君子文粹卷五十九濟北文粹六宋晁補之撰舊唐書雜論元振誣來瑱來瑱追入京樂襄州因諷將吏上表請留肅宗聞其計而惡之後以裴茙代之戰敗擒茙茙賜自盡瑱入朝程元振居中用事發瑱言涉不順王仲昇賊平來歸證瑱與賊合賜死鄠縣代宗後悟元振之誣構積其過而配溱州右來瑱傳第六十四謂瑱言不順與賊合皆誣也然瑱阻兵留朝命不肯之淮西至與裴茙忿辯交兵巳勝擒茙乃始言上而謝罪方瑱有一於此足以誅雖無元振等誣構其能免乎元振罪惡應貶亦不待䧟瑱乃得禍史語非也嚴震薦嚴礪超嚴震爲梁州刺史山南西道節度使朱泚令穆庭光等誘震同叛震斬庭光遣吏迎駕及入駱谷李懷光來襲頼山南兵擊之而退勸課鳩聚以給行在民不至煩供億無闕震卒薦宗人嚴礪超授節度使諫官御史以爲除拜不當貶苖拯萬州刺史李繁播州叅軍礪在位貪殘士民不堪其苦右嚴震傳第六十七奉天之難震獨忠藎議幸成都堅求駐蹕以爲李晟聲援及晟表至亦請駐蹕梁洋卒復京城震之謀也德宗念其忠故曲從所請貶逐言者超用嚴礪而礪無素望竟以贓廢葢震之薦士牽於親愛而不思德宗聽言重以舊功而輕授君臣之過皆微而政事之所害大矣賈至言科舉取士係風化楊綰遷禮部侍郎奏貢舉之弊尚書右丞賈至議曰食垂餌者皆小魚就科目者皆小藝四人之業最關於風化近代取士靡然向風致使祿山一呼而四海震蕩思明再亂而十年不復向使禮讓之敎𢎞仁義之道著則忠臣孝子比屋可封逆節不得而萌也人心不得而揺也右楊綰傳第六十九論科舉取士而以安史之亂爲證語似迂闊然賈至可謂深知風俗盛衰爲國家安危之本者也賈誼論秦之所以亾而言抱負其子與翁併踞借父鋤耰慮有德色母取箕箒立而誶語風俗如此本先壞久矣非陳項起而後亾也東漢之衰亦非一日然其士大夫才謀不足而節義有餘世祚將移而以弱子虛器統持天下曹袁人傑圜視而不敢取惟二三子以區區之忠忿維之也中庸曰小人之中庸小人而無忌憚也而小人果不可以無忌憚以曹操等事言之非畏威與力不足取也爲名分故也唐末陵夷大壞猶秦而昭宗羣臣豈復東漢之比故朱全忠敢肆其兇暴逆天下之心而取之而天下不敢爭然其所以能取亦其所以能自斃何則盜亦有道盡廢天下之義理則雖與之天下亦不能一朝居也李懷光郭子儀寬猛不同李懷光爲朔方都虞侯性清勤嚴猛而敢誅殺雖親戚犯法皆不撓避郭子儀性寛厚不親軍事紀綱任懷光軍中尤畏之亦稱爲理右李懷光傳第七十一常怪郭汾陽稱仁厚長者至或以爲威略不及李臨淮然汾陽用兵恩德結於人心雖蠻夷貪狠皆願親而死之眞吳起所謂父子之兵者正使其素拊循士卒與勲名之重足以鎭之而致然若專以寛一切不親事則何以振肅而每用成功乎及觀其以紀綱任懷光而懷光以嚴治其軍乃喟然而嘆曰葢有此耳夫寛者爲長爲上之道也居寛而使寛者濟之何以集事且久而不亂哉然則言威略不及臨淮者自其異者觀之耳人才各有所長未知孰勝而昔人嘗謂寛難而猛易則難者固勝爾劉晏以利塞讒口劉晏乗機無滯然多任數挾權貴固恩澤有口者必利㗖之唐史臣以謂苟不塞讒口何以持重云云右劉晏傳第七十三何以聚人曰財夫爲人國者能使民不加歛而國贍功亦足道矣事有難成而易敗故杜預建策平吳亦賄中朝或問之曰吾懼爲害不求益也晏之事近此雖然晏財足濟國觀其初上書元載以㝠勤其官而水死託此自誓旣委重任多歴年所且以商利爲名怨之府也韋堅楊愼矜等事斷可識矣故其自謀如此但預志混宇内非苟持富貴者以是能全其令名以終而晏事卑功下成則欲享其厚利圖全而得禍固其所也顔眞卿守城捍賊祿山反河朔盡䧟獨平原城守具備使叅軍李平馳奏之𤣥宗初聞祿山之變歎曰河北二十四郡豈無一忠臣乎得平來大喜曰朕不識顔眞卿形狀何如所爲得如此右顔眞卿傳第七十八魯公早嘗爲御史有聲矣特國忠惡而出之有君如𤣥宗有臣如魯公且在御史非不親且近也而天子至不識其形狀臨事節見乃始驚歎夫賢人君子固難進不苟自售而讒謟之蔽明亦甚矣馬璘忌李晟威名李晟爲涇原四鎭北庭都知兵馬使節度使馬璘與吐蕃戰於鹽倉兵敗晟率所部横擊之㧞璘出亂兵之中以功封合川郡王璘忌晟威名又遇之不以禮令朝京師右李晟傳第八十三晟㧞璘死中其事璘忠且有恩如此而璘猶忌之至不容於麾下士之託身事人亦難矣哉李晟將誅李楚琳李晟收復京師仍充鳳翔涇原節度使初帝在奉天鳳翔軍亂殺其帥張鎰立小將李楚琳至是在朝晟請以楚琳俱往鳳翔將誅之上以初復京師方安反側不許右李晟傳德宗時朝廷益弱藩鎭益彊四方圜起而僣叛而晟忠義威略足以走李懷光剪朱泚而復京師其領鳳翔而請楚琳以往葢因欲以申朝廷之典憲而讋叛軍亂將使知悔罪而効順爲計甚遠且不可失之㑹也而德宗昏怯流離之餘不復圖遠使鎰之無辜竟莫伸洗楚琳奴𨽻得以次且嗚呼惜哉以謂初復京師務安反側則前此涇州亦殺其帥馮河清而立田希鑑晟至鳳翔首誅希鑑而戮害河清者三十人而涇人益靖不敢思亂何獨楚琳之慮耶李聽不與東宫馬李聽爲羽林將軍有名馬穆宗在東宮令近侍諷聽獻之聽以職總親軍不敢從及卽位之始幽冀不庭太原與二鎭接境方議易帥上曰李聽在羽林不與朕馬是必可任授河東節度使代裴度右李聽附傳第八十三聽領親軍不敢私與東宮馬是也穆宗不以爲恨卽位擇帥而首及之此在人主亦難能矣然穆宗無知人之明聽無專閫之才徒取一節輕付重任馴致魏博之敗亦可深戒裴澥不欲三司使俱往盧南史貶信州員外司馬得㕔吏一人月俸紙筆錢一千文南史以官閑冗放吏納錢刺史姚驥劾以爲贓又劾南史買鈆燒黄丹德宗遣監察御史鄭楚相刑部員外郎裴澥大理評事陳正儀充三司使同往按鞫澥獨留奏天寶大厯以來未嘗降三司使至江南今忽錄此小事非爲損耗州縣亦恐遠近聞之各懷憂懼德宗忻然曰卿言是矣行首一人行可也右盧南史附傳第八十七稱德宗不務大體以察爲明若此者非一事然裴澥以一言悟之至忻然以改然則人臣患不能諫不當患不從以德宗能然則賢於德宗者皆可以語上矣代宗赦田承嗣田承嗣攻衛州殺刺史薛雄迫中使孫知在廵磁相諷其大將割耳􅋇面請承嗣爲帥詔宜貶永州刺史仍許一㓜男從行如不時就職則所在加討按兵法處分詔下承嗣懼而麾下大將携貳蒼黄失圖奉表請罪乞束身歸朝代宗重勞師旅特恩昭洗悉復舊官仍詔不須入覲李靈曜叛承嗣率衆赴之及馬燧李忠擊敗之詔復誅之復上章請罪又赦之右田承嗣傳第九十一藩鎭席父兄之業兵彊將附國家勢未能討因而撫之此無如之何者也承嗣初以安史逆黨不誅而寅緣有魏非素能拊循魏人得其死力者也擅殺刺史迫中使其罪巳暴一旦詔命遠貶將卒不附狼狽請命惟恐莫獲此几上肉也胡爲赦之借曰重勞師旅不加戮剪遷之遠州亦使巢窟不就遽還舊鎭仍復官爵且止毋入覲此何爲者也承嗣旣知朝廷無能爲自此疆僣亦熾而悅又鷙悍難馭卒爲河北患垂四十年嗚呼惜哉高郢面折懷光李懷光節制邠寜奏高郢爲從事懷光叛郢言西迎大駕爲忠其子璀候郢郢諭以逆順又與呂鳴岳張延英謀間道上表事洩二將立死懷光乃大集將吏白刅盈庭引郢詰之挺然抗詞觀者淚下懷光慙沮而止右高郢傳第九十七懷光不畏天子至殺郢何足道哉郢初勸迎駕與諭璀逆順尚或可容至上表事洩葅醢必矣而郢面折懷光勇過三軍退不自疑竟免於禍自昔以忠義犯難而死者甚衆非勇而死之爲難勇而能讋不義以不蹈其禍之爲難也方其陳兵盛氣將立屠之而郢挺然不屈意誠理直兇獷爲柔易曰履虎尾不咥人亨高郢以之德宗定子弟姑妹禮制德宗仁孝動循法度雖子弟姑妹之親無所假借建中初詔親王子弟帶開府朝秩者出就本班又以郡縣主出降與舅姑抗禮詔曰自家刑國有愧古人乃定制皇姬下嫁舅姑坐婦執笲降拜右德宗諸王傳第一百新書稱德宗猜忌刻薄以其行事考之葢確論也而此言仁孝動循法度溢美甚矣然人亦各有所長德宗始卽位不無意於政事故澤州奏慶雲詔曰以時和爲嘉祥邕州奏金坑詔曰以不貪爲寶至於定子弟姑妹禮制及給錢買田業減籠花至三萬皆恭儉自内始者推是意也雖文景之迹何異然文景稱恭儉而德宗名刻薄爲治不可以無誠心靡不有初鮮克有終惟無誠心故也外爲甚美之名而内踐苛忍之實則雖有政事之美亦揜而不彰故曰古者言之不出恥躬之不逮也范希朝不受賄獻振武有党項室韋交居川阜陵犯爲盜蕃落之俗有長帥至必效奇駞名馬雖亷者猶曰當從俗以致其歡希朝一無所受積四十年皆保塞而不爲横右范希朝傳第一百一待遠人當從其俗謂弗擾之也禦夷狄者不一而足綏制有方豈必通賄獻而後得其歡哉不然貪吏以藉其口非敵情也德宗叱叚平仲德宗春秋高多自聽斷事或不理中外畏上嚴察無敢言者叚平仲嘗謂人曰平仲一得召見必當大有開悟云云與陳歸當奉使近御座粗陳本事上察平仲意有所畜以歸在側不言因兼留歸問之聲色甚厲平仲錯愕都不能言因誤稱名上怒叱出之坐廢七年然亦因此顯名右叚平仲傳第一百三順㫖得喜逆意近禍人臣誰不顧順而得喜也至或甘犯危機不顧後患冀幸萬一開悟主聽其不爲巳謀而爲國事明矣孟子曰訑訑之聲音顔色拒人於千里之外訑訑不好善耳未至於以威怒凌暴之也而人固己遠去千里如德宗之事平仲未開一詞安知其意所在而盛氣固閉忿如待讐傳所謂歐藉嫉咄則奴𨽻之至者德宗是巳雖然君子信而後諫未信則以爲厲巳也其平仲之謂乎李􅅠辭相李􅅠爲淮南節度使先是吐突承璀監淮南軍貴寵莫貳􅅠亦以剛嚴著而差相敬憚未嘗相失承璀歸遂引以爲相􅅠登祖筵聞樂而泣下曰宰相之任非吾所長也行頗緩至京師竟以疾辭授戸部尚書右李􅅠傳第一百六􅅠嘗䧟李懷光軍中輸忠朝廷節義素著及爲藩鎭稱有威重其恥緣承璀以得相至聞樂泣下竟辭疾改授可謂終始不汚矣不然從昔位此者多矣誰肯自謂我非宰相之才而不爲耶至其孫磎得相爲劉崇望哭麻不知退避乃十章自辨竟以得政然不數月遂及王行瑜之禍人情相遠至於如此劉禹錫詆張曲江劉禹錫積歲在湘澧間因讀張九齡文集乃叙其意曰世稱曲江爲相建言放臣不宜與善地云云議者以曲江爲良臣識祿山有反相羞與凡器同列而燕翼無似終爲餒魂豈忮心失恕陰謫最大雖二美莫贖耶右劉禹錫傳第一百十禹錫若守正比義而以獲罪如是言之可也旣不自愛朋邪近利以得譴逐流離遠徙不安於窮又不悔吝巳失而以私意不便詆曲江當國嫉惡之言盜憎主人物之常態誰爲忮心失恕耶故凡小人詆君子不足瑕疵適增其美孟子所謂詖辭知其所蔽淫辭知其所䧟者要以觀照如是等軰窮本見情使善者伸爾公輔之量以和爲貴史臣曰溫柳二公以文行餙躬砥礪名節當官守法偘偘有大臣之風而竟不登三事位止正卿所以知公輔之量以和爲貴漢武帝畏汲黯而相公孫𢎞太宗重魏徵而委房𤣥齡其㫖遠也右柳公綽溫造傳第一百一十五宰相誠自有體然政繫國之安危事干民之利疚剛柔時用不專以和爲貴也淮南舉兵反獨憚汲黯貞觀太平惟鄭公勸行仁義之初兩公可謂有宰相之量矣以謂二主待之比𢎞𤣥齡有輕重又以謂其㫖遠者何其謬耶張禹經術君子長者言其量亦不愧和矣正以乏方重大節故朝廷不尊爲史者無輕立論哉蘇門六君子文粹卷五十九
