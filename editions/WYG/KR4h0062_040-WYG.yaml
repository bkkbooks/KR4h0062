body:
  text: 蘇門六君子文粹巻四十豫章文粹三宋黄庭堅撰題跋書陶淵明責子詩後新添觀淵明之詩想見其人豈弟慈祥戱謔可觀也俗人便謂淵明諸子皆不肖而淵明愁歎見於詩可謂痴人前不得說夢也書贈韓瓊秀才新添讀書欲精不欲博用心欲純不欲雜讀書務博常不盡意用心不純訖無全功治經之法不獨玩其文章談說義禮而己一言一句皆以養心治性事親處兄弟之間接物在朋友之際得失憂樂皆考之於書然後嘗古人之糟粕而知味矣讀史之法考當世之盛衰與君臣之離合在朝之士觀其見危之大節在野之士觀其奉身之大義以其日力之餘玩其華藻以此心術作為文章無不如意何况翰墨與世俗之事哉書王荆公騎驢圖新添荆公晚年刪定字說出入百家語簡而意深常自以為平生精力盡於此書好書者從之請問口講手畫終席或至千餘字金華俞紫琳清老嘗冠秃巾衣掃塔服抱字說追逐荆公之驢徃來法雲定林過八功徳水逍遥洊亭之上龍眠李伯時曰此勝事不可以無傳也書劉壯輿漫浪圖新添子劉子讀書數千巻無不貫穿能不以博為美而討求其言之從來不可謂漫未見古人如將不得見既見古人曰吾未能如古人也不可謂浪年未四十而其學日夜進不可謂翁題李太白詩草後新添余評太白詩如黃帝張樂於洞庭之野無首無尾不主故常非墨工槧人所可擬議吾友黃介讀李杜優劣論曰論文政不當如此余以為知言及觀其藁書大類其詩彌使人逺想慨然白在開元至徳間不以能書傳今其行草殊不減古人盖所謂不煩繩削而自合者題元聖庚清水巖記新添彼險而我易則傅說熈然於版築之間無驁世不顧之譏彼易而我險則虞芮二子釋然於岐山之下得遷善不爭之美由是觀之險易之實在人心不在山川夫竒與常相倚也險與易相乘也古之人正心誠意而游於萬物之表故六經我之陳迹也山林冠冕吾又何擇焉因聖庚論好竒履險故發予之狂言題李漢舉墨竹新添如蟲蝕木偶爾成文吾觀古人繪事妙處類多如此所以輪扁斵車不能以教其子近世崔白筆墨幾到古人不用心處世人雷同賞之但恐白未肯耳比來作文章無出无咎之右者便是窺見古人妙斵試以此示无咎跋法帖新添此字與東方朔畫賛相似而子瞻謂畫賛亦非右軍書人間愛憎常自不合如退之柳子厚論鶡冠子可知也跋洪駒父諸家書新添唐太宗英睿不羣所學輒便過人計神堯初定四海太宗年二十許爾字畫已能如此所以末年詔敕有魏晉之風亦是富貴後能不廢學爾崇寧元年閏月初六日當塗江口折柳亭中書跋顔魯公壁間題新添余觀顔尚書死李希烈時壁間所題字泫然流涕魯公文昭武烈與日月爭光可也正色奉身出入四十年蹈九死而不悔祿山縱大獵九州文武成禽魯公以平原當天下之半朝廷勢重頼以復立書生真能立事忠孝滿四海不輕用人國史載之行事如此足以間執讒慝之口矣汝蔡之門所謂建諸天地而不悖質諸鬼神而無疑使萬世臣子有所勸勉觀其言豈全軀保妻子者哉亷頗藺相如死向千載凛凛常有生氣曹蜍李志雖無恙奄奄如九泉下人我思魯公英氣如對生面豈直要與曹李爭長耶跋髙獲敬公傳新添余嘗怪蔚宗不以髙敬公入獨行傳而載之方術盖敬公使鮑汝南北出至三十里亭而致雨其言不類儒者爾雖然董生以術厭勝水旱班孟堅不列於眭京之間善論人也如敬公操行知識豈可以方術域之耶跋砥柱銘後新添余觀砥柱之屹中流閱頽波之東注有似乎君子士大夫立於世道之風波可以託六尺之孤寄百里之命不以千乗之利奪其大節則可以不為此石羞矣營邱王蕃觀復居今而好古抱質而學文可望以立不易方人不知而不慍者也故書砥柱銘遺之跋雙林心王銘新添費畔召云云至終章佛肸召云云至終章學士大夫每於此處惟以歸潔其身君子不器解其章句其心未嘗不怏怏良由未嘗學明巳事不識心耳若解雙林此篇則以讀論語如啖炙自知味矣不識心而云解論語章句吾不信也後世雖有作者不易吾言矣蘇門六君子文粹巻四十
