body:
  text: 蘇門六君子文粹巻八宛丘文粹一宋張耒撰論蕭何論髙祖與蕭相國為三傑之首及論功行封為諸將百計諭曉卒以何為第一髙祖之待何也可知矣髙祖之有何是人之有五臟木之有根魚之有水也使何雖有大過猶將容之然一日為民請苑中地髙祖發怒奮然如斥奴𨽻使有司械繫辱之而不疑此在常人為之則必以為狂易反常而髙祖獨安為此其心葢有説也髙祖知何之才而不能不疑者也何之居闗中用鮑生邵平之説而帝乃大悦夫二生之説淺夫畏嫌之常情也而其術足以當帝之心是帝於何未有無間不疑之至信也吾未能安枕於何之心則其心惟恐其恃功驕恣而以我之不忍侵辱之也故以天下之大功一日有㣲罪則以奴𨽻之辱加之而不疑使何意知吾之不憚侵辱之如此務以逆去其驕蹇之意此髙祖之術也其後絳侯立文帝以天下與人論功宜何如一日有疑謗下之獄吏㡬死而僅免夫文帝非不徳絳侯其心未免於疑如髙祖之於何也雖然絳侯吹簫之覉民其驍武勇鷙疑其恃功而喜亂恐其甚驕而逆折之可也若蕭相國謹畏徳厚之君子雖共天下可以無疑而馭之乃與韓彭同術然則文帝得之髙帝過矣司馬遷論上司馬遷作伯夷傳言非公正不發憤而遇禍災此特遷自言為李陵辨而武帝刑之耳論管晏之事則於晏子獨曰使晏子而在雖執鞭所忻慕焉遷之為是言者盖晏子出越石父於縲紲而方遷被刑漢之公卿無為遷言故於晏子致意焉耳方李陵之降其為漢與否未可知而遷獨激昂不顧出力辨之如此㡬于愚乎與夫時然後言片言解紛者異矣不知其失而惑天道之是非何哉至於時人之不援已於禍而拳拳於晏子遷亦淺矣司馬遷論下司馬遷尚氣好俠有戰國豪士之餘風故其為書叙用兵氣節豪俠之事特詳其言侯嬴自殺以報魏公子而樊於期自殺以頭遺荆軻皆竒誕不近人情不足考信侯嬴既進朱亥以報魏公子不自殺未害為信而樊於期自匿以求苟免尚安肯憤然刼以浮詞以首遺人哉此未必非燕丹殺之也予讀刺客傳頗愛曹沫豫譲之事沫有補於國而讓為不負其君然皆不合大義而庶㡬所謂好勇者如聶政荆軻之事此特賤丈夫之雄耳予觀竇嬰田蚡灌夫之事考嬰與蚡皆庸人不學其所立無可稱録而灌夫屠沽之人也鬬爭於酒食之間不啻若奴妾是皆何足載之於書而遷序聶政荆軻竇嬰田蚡之事特詳反覆叙録而不厭盖其尚氣好俠事投其所好故不知其言之不信而忘其事之為不足録也司馬相如論司馬相如雖以文章事武帝而慨然有君子之風盖其心不専以其技易寵祿又有不忍欺其所知者東方朔論上林苑害民田號為正諫咈人主之欲而相如上林其終所陳與方朔何異且相如事景帝㳺梁覉旅不偶亦思退矣起而逢其合持末技以求售此常人之情惟恐失其意也愛惡未可必而諫及之此其心似不志於利者也其後為帝開夜郎通西南夷既至獨得其父老之説頗自悔其失作書為諭蜀而實以風夫既以開其利於前矣徐覺其害又不忍黙黙此其心似不忍自欺者與夫遂非而忍愧者亦異矣始相如亦自以慕藺相如彼其從來有足觀者矣趙充國論予讀趙充國傳觀其用兵决策若可以有竒功然提大兵對五萬之先零持乆數年而不决其取之也又非有竒變可喜之功盖嘗疑其多畏而少斷及見其言兵勢國之大事當為後法而後知其非徒然也夫先零之事㣲矣然其規畧即古之謀臣智士之遺法也古之善計者未嘗一日不志於功名而不肯為徼幸之利而其術本於觀時時非吾之所能為而吾能引而致之不然則安坐以待其疲捨是未有肯妄動者夫提兵决戰斬馘捕虜與敵鬬吾可以有功而不可以無患也未可以無患則變生不常而勝負未有所在謀人之國都而吾之勝負未有所在是天下之危道也充國赦䍐开以離其支黨遣其降者以亂其腹心培之於覆亡乃徐待其勢而後振之夫充國豈以謂力戰决死為必敗哉以謂善戰者其法不當出此故也昔予嘗怪武帝用衛青霍去病出萬死百戰以踐蹂匈奴之强此兩人斬馘降虜不可勝數單于逺遁漠南空虚而終不能得志至其晚年漢與匈奴兩不振矣唐太宗與頡利臨渭水而盟方是時内有太宗之雄而李靖李勣為之將帥致頡利於室中而閉其門覆軍殺將何求而不可太宗意不出此而其後頡利危殆國中空虚李靖以五千騎談笑而滅之夫武帝之無大功何也戰匈奴之强而不能致匈奴於弱而後戰而太宗之明知頡利之方强雖足以取而未可以無患李靖以孤軍而功過衛霍之百戰彼惟投其時故也其後太宗舉國以取髙麗猛將鋭卒自以無前而頓兵堅城逡巡而退何則盖蘇文之雄而欲以亡國處之過矣髙宗之時盖蘇文既死則用一李勣取之而有餘夫勣之才豈過太宗哉敵之時異也勾踐與范蠡百計而謀吳勾踐不能忍而欲發也數矣蠡獨不可而至稻蟹之變則遂起而不疑何則彼之至計不獨以一戰為也故充國以善戰之才謀五萬之家至百計蹙取彌年而後成彼非惡速也以謂此用兵之法也衛青論自古中和深厚之士可以保富貴處功勲而不足于名髙輕俠慨慷之士立可喜之行者可以為名髙而多履危禍二者若皆有所不足然可喜以取名者其技止此耳使為中和深厚必不可得而中和深厚之士其於取名驚世或者能之而有不為也司馬遷論李將軍之死曰知與不知皆為流涕論大將軍曰以柔媚於上其於天下未有稱也愚意李廣之所為青之所不願而非不足也以青為奴虜庸人遭時幸㑹以取富貴者耶則汲黯不拜大將軍曰使大將軍有揖客顧不重耶青繇此益重黯李敢怨其父死至擊傷青青為諱不言青知揖之重於拜權足以報敢而為諱之懲田竇之事至絶口不薦士不斬蘇建使歸命天子言之如不快人意而其知時見逺皆中㡬㑹青顧不能交灌夫藉福之歡而為决意斬伐者之所為耶凡此類非庸人可能也彼非庸人而為此則必有道矣而遽欲賢廣而貶之不亦過哉夫好名之士常鼔舞於壯鋭可喜之節而不快於持重逺見之士廣之所為天下之輕勇者好之其明者未必善也後世論郭子儀李光弼二人者未嘗不右子儀夫善戰而有謀果敢而精鋭是數者子儀皆若不及其寛緩仁愛宜若魯鈍矣而卒過光弼者何也子儀之所長光弼之所不能光弼之所長子儀或未必待是故也淮南王與伍被為反計而被獨稱大将軍以折之彼其仗節死義則憚汲黯用兵決勝則忌青然則為天下未有稱者又果然哉陳湯論予觀漢公卿論陳湯矯制斬郅支之賞其守常不通者則曰是不當賞且開後奉使者乗危徼幸生事夷狄而竒其功憤其為庸臣所詘者則稱譽賛説大功不録小過大美不疵細瑕宜加尊寵以勸有功此劉向之論也夫奮不顧身决計出竒以孤軍取單于之頭梟之槀街自漢擊匈奴以來未有能如此者而欲以一切矯制生事謂之有罪而赦之不使有尺寸之賞此天下皆知其不近人情而人不服也然湯之還使朝廷遂厚賞之一不問其矯制如受命討伐而有功者則亦不可何則人臣不待命而有功以要我則亦為國者之所病也故劉向之論善矣而未盡也元帝遂從而賞之愈於不賞可也所以為説則終亦未必以服惡矯制者之論惜乎無有以是説告之者矣所惡夫賞矯制而開後患者謂其功可以相踵而比肩者也隂山之北凡㡬單于自漢擊匈奴以來得單于者㡬人終漢之世獨一陳湯得單于爾其不可以常徼幸而立功者又寡少如此則裂地而封湯乃著之令曰有能矯制斬單于如陳湯者無罪而封侯吾意漢雖欲再賞一人而未可得何遽有邀功生事之憂哉故上足以尊明湯之有功褒顯之無疑下不畏未來生事邀功之論天下之善計也古之為法者行法而不失人情當夫事實而亦不使之不可繼凡若此也昔者韓患秦之無厭也下令曰有能得秦王者寡人與之國大夫皆諫曰不可賞不可以若是其重也韓王笑曰得秦王而寡人與之國是賞有再乎且得秦王矣寡人其憂無國哉是賞湯之説也蘇門六君子文粹巻八
