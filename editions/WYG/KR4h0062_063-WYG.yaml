body:
  text: 蘇門六君子文粹巻六十三濟北文粹六宋晁補之撰䇿問性問記曰人生而静天之性也静之為名善惡不得而居孔子曰性相近此生而静之説也學孔子而近者如孟軻荀况揚雄或以為善或以為惡或以為善惡混而孟子道告子之言曰生之謂性性猶湍水又曰性無善無不善又曰有性善有性不善而至於韓愈又以謂性有三中人可與上下而上智與下愚不移夫性一也自六者觀之其源既已大異而末學之辨波瀾滋廣道之不明也道之不行也以學者不盡其性而已孔子之言經也經不可刋反經以正諸子之異則或善或惡或善惡混必居一於是矣以夫生而静且相近者為性則其曰生之謂性性無善無不善者其説亦奚不可也然而告子未嘗知義惟曰從其白於外也是豈性之説也哉孟子曰萬物皆備於我矣反身而誠樂莫大焉誠之在我者如是則諸君之語性不可以外諸已而求也陣法問古者以農教戰以戰教農農戰非異道也自夏后少康有田一成有衆一旅而法始興至周井九百畆其中為公田數起於五成於八此陣法所從出也兵法曰餘竒為握蓋大將所居以制四面八陣而要其説四為正四為竒所謂竒正者於八陣安所設也以為非古歟萬二千五百人以為軍萬之有二千二千之有五百則餘竒為握其意猶是也諸葛武侯用以彊蜀疊石八行以遺後世而天下莫或知者將其法已亡無所從考也抑前者㣲其傳後者昧其習耶不然無所貴於兵不足盡究耶夫魚麗鵞鸛伍承彌縫之説於傳具在豈皆無考乎唐太宗南征北伐遂一天下而李靖長於為陣其狀屢化無常乍方乍圓忽然而陰忽然而陽靖亦多才矣哉上以常徳立武事練將訓兵皆有圖法將本三代之意合諸家之術而修諸有司農隙講事則諸君之學無所不在盍少申之使有司得詳乎六經問在則人亡則書聖人不作其道載而之後世者六經為備故能知六經之説則治在我記曰入其國其教可知也夫六經同道而不同者辭耳人之學之遂至於動作威儀言語之異凡此何以也或失則愚或失則誣或失則奢或失則賊或失則煩或失則亂豈六經亦有弊歟抑若是果先君子之言耶非也以謂法而不説故而不切約而不速則其精㣲蓋非一言之所可盡然而有曰以道志以道事以道行以道和以道陰陽以道名分者要其歸極此否乎聖人之言逺如天賢人之言近於地天不可俄而度則其言待近者而後喻今曰九師起而易道㣲三傳作而春秋散則數君子者豈皆於經無補秪以為害而得罪學者如此其甚哉願討論之揚雄論周官左氏司馬遷當否問孔子沒儒者能以其學明天下莫如揚雄雄習孔子後世學焉以要諸聖則其為説宜若考之而無不當者今雄書論周官曰立事左氏曰品藻太史遷曰實錄夫周公之徳與周之所以王郁郁乎其文之盛抑立事而已也不然則雄之言何獨取諸此也富而艶其失也誣則左氏之品藻也何有甚多疏略或有牴牾則太史遷之實錄也何有然而曰品藻曰實錄辭達如揚雄豈苟乎哉或曰有所是有所非亦品藻也於此乎長而已不害其為誣無所增無所損亦實錄也於此乎長而已不害其為牴牾則雄之意又信若是者非耶聞也見也無所從考則君子不論三者其書固在非疑且殆則學者之所講安得而闕也將問自昔觀士莫難於論將何則人固未易知知人亦未易也則世必有前識若蕭何者然後可以得淮陰於未識不然則如趙括之可窮以辭天下幾何不繇是而信之人有不能治一妻一妾者有不能芸三畆之宅者持籌而坐百萬並進則翛然不勞於其間平居無事袒裼按劒志厲青雲而聞金鼓之聲失氣不振此情之反也然則將其可以不試歟世方尚文無所用此則置勿論而萬一臨事不知其安所取之孫武之試於吳也以婦人孫臏之試於齊也以上中下馬夫舍其卒伍而用婦人用馬非將之常也兩人者唯其無所不可用以有功故卒之武能將吳以入楚臏能將齊以却魏用其試也今天下以將名官環列輔郡者且數十人亦盛矣或者不敢以其能之於從容閒暇而信其用之於倉卒擾攘也則凡欲觀此柰何驪山之閲雖郭元振幾困而薛訥解埦乃獨不動若是者曰能可乎為講其術饋運問論天下之勢非平居養兵之為難兵出千里坐而餉焉使不乏之為難一人荷戈前敵一人持糒從後亦足矣然且樵蘇有後爨之憂師徒無宿飽之具敢問此其為難者何也王離涉間圍鉅鹿章邯築甬道而輸之粟知兵如項羽渡河沈船以示士卒必死九戰乃絶甬道敗秦軍敢問甬道柰何其施於今將可用者非耶諸葛武侯出祁山以木牛運出斜谷以流馬運夫萃數萬之衆嶇﨑險絶間而食有餘斯已竒矣今考之蜀志其説甚詳蓋象牛馬引重致逺而力不窮其法至於頭腹背肋舌齒之細寸尺具在而患未始用不知用之又柰何嘗試使考者述焉損益其法以佐軍用則凡此亦利乎不利也古者務食於敵不有智將誰能知之抑必假人力轉移以賙急則穀者蓋兵之司命不可以不先講也常平問管仲相桓公通輕重之權曰嵗有凶穰故榖有貴賤令有緩急故物有輕重人君不理則蓄賈遊於市乘民之不給百倍其本矣故為之輕重歛散不失其時此常平之法所從始也漢數征伐天下虚耗而耿夀昌以善為筭得幸令邊郡築倉榖賤增價而糴榖貴減價而糶名曰常平其法視時而低昻嵗上中下穀無常價而價不失平綦賤以貴入故不傷農綦貴以賤出故不傷末賤下極則雖貴入而實非貴貴上極則雖賤出而實非賤故不害於公設有旱乾水溢食至足而民莫知此其為法蓋後世未有改也主上稽古既富而教故所務尤先於理財比復大農官置常平使者法甚美也雖然法在國行在人趨時若猛獸摰鳥之發而猶或後故賤不以時入則害公貴不以時出則病私甚者至利於積泉而憚於積穀故法滋害是豈朝廷所以先有司重民食之意哉夫積泉則有貫朽之憂蓄榖則有紅腐之患今欲通其變使無偏弊則非疏通明於治體者孰能知之軍政問國家患投募之冗游手無賴者起而為兵難以練易以驕故為之法曰使兵出於農户二丁取一四則二之以為保甲人農則朴朴則易用此於先王之意蓋未悖者也井田不修民得賣買先王之籍掃地而盡以區區之齊而管仲相焉自五家之軌合為三軍而政事乃定蓋不皆法先王而後世亦莫之或加此其為得者何哉雖然是政也政行乎平居在君兵用乎倉卒在將有教士三萬人足以横行天下而使不肖者用之則十步之内不能以前却如節設有賞罰誰能賴之吳起之制軍曰雖絶成陣雖散成行投之所往天下莫當名曰父子之兵夫説以使民民忘其死唯東山為盛不知出此而驅民於萬死一生之地可使相親如父子此非吳起所及也安得長者之言哉嘗試陳之太元問孔子沒聖人之道得孟子而傳孟子沒後世學者思之㣲莫如揚雄揚雄為太元凖易數起黃鍾厯本太初儀用渾天規模乎始而盡弊乎終終故窮窮故變變故神㣲六經與孟子後世立言者莫能加則太元之為書豈諸子而已哉易曰乾元用九乃見天則夫數始於一成於三變於九九律之首也其起黄鍾蓋取諸此然猶有疑者言天與厯者從昔數家叅差不齊而其名察發歛大較所加亦各有騐今獨本太初而用渾天何哉不然則雄為思之㣲於此不革而因將必有當也抑所謂凖易者亦凖其數非耶諸君之學要以無所不窺平居立言採其辭以為美繢綉錯然觀者不厭雖然擿我華而不食我實則可乎願相與思其義稽之於大道効之於氣物騐之於人事發䝉振落以攄未悟者之疑欲建四時之官如何問古者命重黎司天地命羲和宅四方至周六官蓋兼重黎羲和之職以施六事法至詳也周衰六官咸廢王制殄滅而陰陽干行事與時迕漢代秦立稍欲復古舉賢良咨羣䇿而陰陽災異之學自此始起大要倣易春秋洪範月令以為解而配之人事若風馬牛其應益闊故時君怠焉以為難知因棄不務而任人寢輕凌雜術技甚可嘆也夫一官廢則一事弛馬毉牛人用有所在不可以不修也而况其大者哉今欲遵魏相之言如漢故實分命四人各舉一時則其設官當以何名其名職當以何事其擇可任之人當以何術凡此於先王遺文足考也願遂聞之取士問孟子有言若夫豪傑之士雖無文王猶興天下安能必得豪傑之士則夫待文王而後興者中人皆然陶冶而成之孰非可用此濟濟多士所以稱乎詩也主上修身以道而取人以身設為學校庠序以教之自中人以上庶幾成材而下者䝉被聖澤習俗寖善繇周而來至於今未有也雖然天爵所以崇仁賢而人爵所以勵不肖聚天下之士付諸有司中年之考校非有誠心樂善之美則綉其鞶帨以近名譽者孰從知之先王之教也建首善自京師夫使居邑國者則有終南嵩少之諺得不太息於斯歟將所養非所用所用非所養則凡欲救此者亦必有道不然則教行豐美之後有不帥者簡而放焉於此其時也抑為之法者柰何鹽法問金玉珠貝象骨犀角虎豹之皮天下言寶貨盡此而不知聖人特以權使人為之通有無足財用而人之於此亦豈若飲食不可須㬰已也哉天下有非金玉珠貝象犀骨角虎豹之皮而列寶貨者海濵斥鹵滲漉所加不養而滋人之賴之與榖同化唯鹽而已十口之家十人食鹽百口之家百人食鹽未嘗勸課而旦暮欲之所以養生不能乏者然也古者與民共財平民力田有餘譬諸釣弋人自取給不營於上故法無弛張而利常阜後世費日益廣與其一切皆取於民則牢籠不毛烹煮水鹵收其棄利猶法之善也今夫地井皆幹於公浮食竒民無所踰禁財足賴矣然議者曰資商以阜通而官收其筭與官轉輸而民不得私賣買孰便於公孰宜於民抑旁出以供比鄉其力有勞逸欲均其價有低昻欲平二者何去何從其詳可得聞歟管子曰假名有海之國集鹽於吾國夫以千里為國不必去其國也然集鹽有道况以天下為國則出之吾國東移之吾國西豈固難哉欲使法行如古於國可以取盈而家獲作鹹之利將不必釡十五吾受而官出以百其饒如此然後為美也財用問時天時力地力惟酒與食爰作稼穡斯民也三代之所以無凍餒也夫天有時地有力而作者則在人風雨霜露神氣之養九土之所宜十二州之所出魚鹽米粟絲麻紵絮玉石金錫丹砂珠璣皮角齒羽竹箭柟梓果菜之産其饒若煙海民情所喜好被服飲食奉生送死之具夫人而得賴焉故財有餘於取而人不爭天子富有四海視備色聽備聲食備味而邦君卿大夫士庶人其養以是為差㣲其權以役使天下農而食之虞而出之工而成之商而通之天下不知財所從來如管夷吾計然范蠡白圭猗頓之徒皆以匹夫操是權而私之在國則霸强在家則潤屋此為術豈固無足傳者哉後世壤地充斥物非加少也然僅僅不足更費漢事匈奴冶山煑海種藝長育通有無易貴賤生財之術十倍前世而國用民力增窘蓋自天子不能具純駟將相或乘牛車男女力作日夜無休時而不足當卒嵗之衣食夫貧富之道莫之予奪而古者巧有餘如彼後世拙不足如此其故何也豈時異事異天地之物固亦有贏耗之量耶將為舒用者疾耶抑輕重取予之非其數耶不然則山澤之藏常羡矣旦旦而取之不可以為羡耶記曰與其有聚歛臣寜有盜臣二臣者均不可養借有數子者嘗試與論衣食之原人棄我取人取我予猶諸地上之遺也可以無與民爭錐刀於不足而皆贍則夫為術亦必有道願商略之吏部問尚書之設吏部實先諸曹夫羣天下之才而官之其賢不肖能鄙相與殊情其惰若勤其過若功參差異宜使一人焉長之一人焉貳之必若權衡之於輕重誠陳於此而物辨乎彼無所或欺顧豈輕哉上若稽古訓迪厥官而吏部之選為特盛豈以夫八柄之所廢置有在於兹者然也今官制三省之屬與寺監掌貳内自兩制外逮使者皆命於朝廷而吏部所掌間擬丞簿捨是則郡守以降凡州縣吏目常調者而已校其有勞無罪與其嵗月之久近任舉之多寡流品之清濁以為升降按格而授之不逃錙銖法故良矣然天下之士必其在數者而才則用之必其不在數者而才雖才也以其不在數者則不用必其在數者而不才雖不才也以其在數者則用之若是可乎以為舉而付諸有司有司聽其自擇則廢置之權王所獨任雖太宰能以其事詔之而已有司何預焉亦將使之遵成法治成事一斷於格無所專達則又以中銓名職卒所謂甄㧞者安在抑上欲有用非親且近不求諸有司之所升降取捨則長民秀才何自而知哉繇漢而來此職寖重其間能以鑑裁清白名一時誰者為盛幸條其説以備上之采焉射問徳成而上藝成而下堯舜三代官人以徳使人不失徳若夫藝古人多有之而豈其所先哉周官六藝射居其一以謂射者雖男子之事其容與節皆比而持弓矢審固亦藝而已矣於徳何有然攷諸禮經聖王務焉以選諸矦卿大夫士以觀盛徳者在此不已重乎曰與之習禮樂反求諸已不怨勝已者可也用是擇士使與於祭則羿逢蒙若養繇基尚矣抑鄉之所升於司徒司徒之所升於學司馬之辨論其才而官之者於是有未必用耶不然行同能偶而後以射别之則卒其所取乃不在於射也學者之論莫若折衷於夫子矍相之圃使二三子出延客揚觶而語或去或處至僅有存者凡此又何意也願并聞之老子問揚子曰老子之言道徳吾有取焉爾及其搥提仁義絶滅禮樂吾無取焉其善言老子者獨揚子引而合之中庸無間然晉之衰二三子學其説而不明自何晏王弼唱於其前以謂無也者開物成務無往而不存夫無之以為利有之以為用此老子語也獨曰無可乎阮籍王衍又相與學而過之籍有重名衍為三公天下化焉清談有餘而無補於捄亂其君子皆以在位曠達不事事為髙其小人皆以在下無法守為便故風俗靡靡棟折墻壞痿痺不能舉至有不喜送喪裸袒言笑縗絰飲酒子字其父而不以為非獨一裴頠憤其不尊儒區區焉舉衆論而排之曰老子有以而然其舉静一之義合於易之損益艮節論老子用無心於合易設有合特四象而已乎否則頠之意殆將以知白守黑受天下垢絓諸子之委轡也至於阮瞻對王戎則又曰將無同以聖人貴名教而老莊明自然從而異之抑瞻與戎亦可謂知言者非耶道徳仁義禮儒者同焉今必曰絶仁棄義禮者亂之首則二三子亦安得不翛然喜之至為是頺弛而不振哉而王通猶曰非老莊之罪其故何也原廟問事死如事生事亡如事存孝子之於事親無所不用其極也則禮雖先王所未有而後世以義起之亦何不可哉上以至徳順民得萬國之驩心而四海以職來祭其在宗廟所以觀徳於天下者禮既備矣而老佛之宫往往祖宗神御所在意者嚴事未極故合諸一宫因漢制為原廟嵗時饋食如家人禮此大孝不匱有加無已天下之所以頌歌而順化者也然竊聞之叔孫通漢儒宗名知禮其一時損益固不必皆出先王而要之討論潤色大意猶是敢問原廟之制與夫薦獻在漢禮有可言者歟其作仿於通耶亦前此矣顧苐弗深考耶且曰益廣宗廟大孝之本則宜無不可而必其無壞複道因以為名則方其築武庫南民知其不為原廟柰何欺之哉通於是欲名知禮得乎嘗試言之蘇門六君子文粹巻六十三
