body:
  text: 蘇門六君子文粹巻二宛丘文粹一宋張耒撰論憫刑論上昔者先王之時議事以制不為刑辟者何也夫天下之情無窮而刑之所治有極使天下之吏操有限之法以治無窮之情而不得少議於其中而惟法之知則天下之情無乃一枉於法而失其實歟是以先王之時一權諸人而不任法是故使法出於人而不使人出於法至於後世其所以治天下之具不能如先王之盛時淳厚之徳衰而吏有率私以立法恃其無法而放肆者故後世始有刑法之書以治天下然天下之弊雖不可以不救而天下之情不可枉也是故法簡網疎而人與法兩立而不偏廢穆王之刑以謂輕重諸罰有權夫五刑之屬止於三千者法之所不可移惟其輕重之間有所謂權者是故猶不廢行法者之志方是時罪入於法之内則歸之法罪出於法之外則歸之權雖不如先王之盛時而天下猶未受其弊嗚呼柰何一歸之法而不任人也自秦漢以來治天下之具苟且滅裂務使天下為不可欺而待天下之吏以謂不可使少行其意也故一切任法而廢人予嘗悲夫後世任法之弊也蓋其弊非獨法不足以盡其情而其極乃至於變其情而合諸法蓋罪無必而易移法有限而難動故罪輕而法重也不幸無輕刑以處之則有入之重者矣罪重而刑輕不幸無重刑以當之則有出之輕者矣變罪而附法失情而合文不畏情之不盡而慮法之不合葢其間有所謂疑慮而正諸有司者十不過一二而已矣嗚呼任法以治天下而天下無正刑矣予嘗推其原而後悲夫天下之事未始不自夫賢不肖始也先王之時天下之事簡肅而精修其人才皆足以過絶天下而上有聖哲之絶徳故堯舜之際與夫三代之盛時至於鳥獸之無情隂陽之不可測而人之才智皆能為之故其後有豢龍御龍之官而四時之官皆能候天地之氣導其節而制其和由是言之則人之所以精思極慮以治事赴功者何如哉自聖人之亡其後世比於先王之盛固已少減而天下之事日以繁亂詭偽生於其中而信厚之徳薄人之賢者不及於先王之時而間之以不肖至於近古而任人之道蓋已大壊賢不肖混亂而不可知天下之事日已廢缺夫惟得人如先王之時故可以舍法而不任而賢不肖之相半也故人與法並行後世非無賢也而要以不可知故一歸之法推其原求其本則法之弊葢出於人之弊也夫惟能隆任人之術詳於擇人而後法可以少簡姑無望其不為刑辟人與法並行者可以庶幾矣憫刑論下立法以糾天下之過者必欲天下行之而不敢逆然而常至於沮而不行者何也是其立法非人之情故也何謂非人之情夫天下之所共惡者而特輕之天下之所共恕者而特重之不當恕而强為之仁不必惡而過為之罰凡此者天下之情所不安者也今夫天下之情有所謂很惡而不逞舉指而惡之者幸而入於刑而考於法則輕而不足以懲之則夫行法者必有不平之心焉故必入而處之於重夫如是則是好為輕者之有所不行也夫人固有不幸而入於刑者有誠犯而其心無他者不幸而遇之而考於法則重則行法者必有不忍之心焉是故有出而寘之輕夫如是則是好為重者之有所不行也昔者聖人之於天下其言無不聽其令無不信然卒不可變者天下之好惡也惟其然故天下之所惡聖人不强恕以為仁天下之所哀者聖人不深治也故法立而天下安之傳之後世而不敢易夫犯天下之所惡而吾報之以所惡天下之所恕而吾寛之以所欲則天下之吏雖不知吾法之所為而固已隂服之矣吾之法因彼之情故也故欲吾之法立於天下者莫若原天下之情而無所出入使天下無不樂之心而後可也後之惑者不深求先王之意而求夫恩威之名而不究其實以謂恩主於貸而有罪者舍之以為恩思有所禁則小過者行之以為威行之者不快而被之者不服則何怪乎吾之法不立哉或曰吾之法過於威耶則不惟行吾法者有不樂於其心而固取亂於民使過於輕耶民將懐我彼行吾法者之不快是何足顧也嗚呼是大不然也天下之情自顧其所為誠有拂於人而人不加怒彼固以為可欺而㒺人之心至矣故人之不察其過而知徳者君子也尚何懐之有哉夫治天下者何必苟為惠以諂天下之情也殺之而當其罪雖曰殺而天下恱服矣法制論昔者聖人之立法告天下以其意而已故常立其大防而其節目委曲所以施於事者聽夫人之自為而不於其一切先立於我是故法立而意行意行而利至葢天下之事繁細瑣屑其情狀萬變故不可以一致以吾一人區區之聰明而先為之經畫於此而使之一從於我則事將有格而不得成者夫其勢不可以有成而必求行焉則物有受其弊者矣天下之法常壊於此而世之惑者未之或知也今夫世之教戰者其為行列什伍亦不過數者而已彼豈不欲盡歟勢有所不可也何則敵人之智百出而不可測而我安能委曲而豫測之耶必曰必如是而後勝如是而後敗其委曲瑣屑一切先為之所使無顧於敵者之何如而惟我之為聴夫如是則必敗而已矣善教人者曉之以其道而不示以其事故告天下使無違吾意則其委曲瑣屑雖小不盡而吾之意猶在也嗚呼三代之聖人其聰明聖智足以深見天下之賾隠然其制法也亦何以異於此欲均天下之田而為井田欲分天下之地而為之諸侯九夫為井人得百畝而耕之使夫大不得以兼小强不得以并弱而後又為溝洫之制自一夫而積之至於萬夫公之地方五百里而男之地方百里使之大小有序而又列為九服之逺近夫分田建國之法如是而已矣夫天下之地髙卑之不齊廣狹之不一水泉畎畝之差殊與夫名山大川汚池藪澤之地常居十五則亦安能較然如畫於一枰之上哉彼聖人之法不為之纎悉瑣屑以盡之而特設其大端而已何也蓋聖人之告天下者特其意而已蓋當是時公卿大夫凡當其職者皆得出其智以盡天下之變因規而為之規因矩而為之矩使之各稱其宜而不亂是以天子拱已優㳺於上而所以均齊天下之理亦莫不如意而天下安享其利人人皆得措手足於其中初若莫可據法而吾之法卒立乎天下此先王之所以有所動作而天下樂之雖天下之大事而為之無難者也不善為法者則不然窮析天下之理於一身之聰明持區區目前之智而斷萬里未來之勢故其法不患於不詳而天下卒不能行而不知其患乃出於好詳是故善用法者有違法無違意不善用法者有違意無違法法可違也意不可違也夫天下之情常樂於有所為而困於齟齬而不得放夫使人人足以自致而其終不失我之所欲則亦足矣何必區區乎使之從我而後可也知人論甚矣用人之難也天下之實才常深伏而不發非遇事焉則有終身不可窺者故其勇足以暴三軍服四夷而其外如怯其節足以斷大事成大功而其外若不能有所為者方其未發也其言語動作坦然無以異於常人卒然即之而不知其器是故非有深智英明之君不得而用之而世之小人常有以自蔽其不肖以惑世主之聽而卒敗天下之事可勝嘆哉彼小人者其中實怯而視其外即發揚振厲而若勇其中實庸而聽其言則辨給開敏而若才卒然即之若真可與有為者是故世主徃徃甘心而不辭至於謀窮計失而後悔悟嗚呼用人之難也如此葢嘗聞之古之求知人者於人也不觀於形似而察其中於已也不逆於耳目而逆於心察其中則見其所窮逆於心則為慮也深彼小人將欺我也不過多為形似以動吾耳目之間而已彼安能為實哉而吾應之也常出其所不意而後小人之情見而天下之實才亦雖欲伏匿而不得蓋昔者霍光之所為固非有征伐攻取之謀而文采縁飾之可喜也樸然庸人而已爾非有武帝之聰明不足以知之故卒然用之而不疑與之以兵尊之以權提孺子之天下使之謀之而光果有以當之也蓋當其初委任之際朝廷之臣孰不以為過之而至其有所立則有震懼而不敢與者然則光之平生之所為豈可以占其後之所發哉議者不知武帝之用光蓋本知人之明而遂以謂當時之臣惟光可以勝其任彼徒見其成功而後知之不知當時之人才足以治軍旅決成敗而書生儒者之論孰非仗節死義之人安肯棄而不求而授一木强之霍光哉唐之文宗昭宗其憤亂也甚矣不愛髙爵重禄以致天下之士投至誠而與之此其志皆可與立功而其取人無術故徒以益亂彼李訓張濬者其言動作止如可以立功者也大言而不顧敢為而不憚故二君惑之雖有間焉不可得而入其後卒然而發以區區之宦人不能少制其亂提兵數萬而不能取李克用之一鏃卒之身滅國弱為天下笑彼二君惑於形似故也李係好言兵而王鐸與之兵李元平好大言而闗播授之權卒於無成為天下笑嗚呼使人之知人獨視其外而可以不疑則知人者帝何其難之也馭相天子能使天下之權在宰相而進退宰相之權在天子夫如是者可謂知馭相矣夫天子之所以必尊宰相者非以私宰相也而其勢乃所以自尊今以天子之輔相左右朝夕之所接以取謀而使天下之人有輕之之心則天子之勢亦卑矣夫人之情涉江河而畏險則終身不敢行海何則彼以謂江河為可畏而況於海乎彼且以謂宰相為不可慢而況其君乎嗚呼又非特如此而已也使天子之力足以辦天下之事則何所俟於相以吾為不能獨治也而後擇相而委之委人以事而奪之權猶為不任而已矣故必使之可取可舍可賞可罰舍吾疑之之心而使少行其意而後彼得以自盡夫如是故不幸而有過吾有以責之夫使宰相之勢無以異於羣有司必使之一聽於我而後可則彼有罪而吾將無以責之而彼且有藉其口矣故曰宰相不可以無權夫與人以權者必使之其利在我以謂與爾以權者凡以為我也斯可矣使竊吾權而據之乆而不還以為已私利則吾將折而受制此天下之大患也今夫世之畜犬與鷹者方其逐禽於野則必解羇弛禁縱之而不制然至不順而害人則吾必能制其命夫能縱之而不足以收之則幾何其不為患也誠得天下之至賢如伊尹周公霍光孔明之徒不以天下易匹夫之命者而任之則何所復求然天下之賢不可以常得而吾之任人或以才而忘其汚或以功而舍其素未必皆天下之至賢也夫使擅天下之權於掌握之間而吾無有以制之而望其不為亂其庸可得乎故古之待大臣者天子為之致恭盡禮而至其有罪而不恕有殺而無罰夫惟能致禮則宰相尊而有罪不恕也此所以為天子之權歟故曰必使進退之權在天子夫曹操司馬懿父子初不過得竊天子之權攻伐出處放意恣行而已而漢魏之主惟其無有以制之是故養其勢固其身而卒盜其位若唐徳宗則疑宰相而不任懲奸臣之弊而謂天下之人舉不可信乃一切自用其聰明當時宰相奉行文書而已故當是時藩臣有輕朝廷之心彼一人之聰明而當天下之亹亹則數見其所窮而左右大臣皆有苟且之志而無出力死難之意則宜其陵犯而無忌也嗚呼與人以權而我不能收漢魏之主是也畏權之去我而奪人之職者唐徳宗是也是二君皆過矣嗚呼天下之事不可以無術也而馭相為最難或者不知其故以為先王之時一本於忠信而無術不亦繆乎夫坤之道臣道也而象為馬吾未見馬之可以亡馭也馭之以術何害於忠信耶將論天子之臣自公卿大夫雖或闕焉而不足為急其不可一日闕者其為將乎夫將之所以為急者非以夫任之有以過夫公卿大夫也為其事之不常有而人之能之者少也今夫醫之為藥也金石草木之珍世之所共有者未必藏也至於逺方之物山海之竒産與夫人力之不可以常得者則必預蓄以待其用今夫百姓之不安而財用之不登刑罰之不平而禮義之不興其為患大矣然其為事也天下之所習知故其為術也人人皆足以措手足卒然求其人而易得也講其術而易曉也譬之於金石草木之珍其所治者大矣然人人之所知而有之雖不素有無害也或一旦之急提百萬之卒以與人戰勝則生敗則死天下之人無事則廢而不講有事則避而不願見者也故其為事不常有於天下幸則千萬人之間而有一人焉學焉而知其術用焉而見其利故人之習之者少非卒然可以朝求而夕得苟取而驟用者也譬之有疾於此而待逺方之竒藥豈不殆哉先王知其然故雖隆仁義禮智以化天下之俗消伏悖戾好爭之心而常隂求天下之竒才以待不測之患葢嘗寓其法於六鄉六遂之間使卒乘車徒之制素具而朝廷之公卿大夫外之諸侯之君朝聘宴饗從容歡欣之際必陳弓矢以講射而四時之隙則命有司以講武以天子之尊而馳騁於草野親金鼓干戈之勞以射取禽獸蓋饗宴者人情之所樂而弓矢者威武之事田㳺者逸樂之事而殺獸者征伐之容蓋先王所以蔵天下之所畏於人情從容之際凡此者所以隂養天下豪傑之氣使之一旦習知其術安之而不懾也是故先王之於將也非特能求之而又能養以致之至於後世秦漢以來其慮天下之變已不能如先王之時而獨知求而用之而已養之有術以致其才求之有方而知其實此先王之法也故其術無窮養之無術而知求之愈於不求焉可也比於先王之時則十已失其九矣嗚呼先王之法後世既亡矣安坐而不求求之而非其道者未見其可也蘇門六君子文粹巻二
