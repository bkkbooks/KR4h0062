body:
  text: 蘇門六君子文粹巻十一宛丘文粹一宋張耒撰議至誠篇上昔先王之為天下非徒為政刑以齊天下之民苟為無事而巳也必有禮樂以成之禮行而天下無違俗樂作而萬物無邪心無違俗故恭遜孝悌行於匹夫匹婦之愚無邪心故蕃阜和樂至於昆蟲草木之細至於如此而後天下大治純被而無有可間矣先王之為是禮樂者豈與後世異哉其存乎刑名見乎度數者典之有司著之文字雖厯千百年可考也舜之大韶周之衰猶能奏也三代之車服宿儒老師能説也後世之君曷嘗不舉先王之禮樂以施之宗廟朝廷哉然而先王用之而能治寓意於迹迹修而意行示教於物物陳而教達後世之君能用之而不能化能舉之而不能治迹修矣而人不化其意物陳矣而下不諭其教是何説也誠與不誠異也先王之為禮樂豈以為備故事修文物而己哉其心之於禮樂既己誠之矣操至誠無間之心於内則其動于外也心之所存必能發之於器器之所示必能致之于物故人望其齋莊恭肅之容而無慢心聞其和豫雅正之音而無邪氣夫豈特容與聲之所能為哉其誠之所動物雖欲不感不可得也故物之於誠不能逃也立誠于此物遭而不化者非物之罪也是其中必有不足者矣物之出於誠猶氷雪之有於火火至矣而氷雪不息者非氷雪能拒之也其炎有不足故也故誠薄於此而求物之應不可得也誠至而物欲不從亦不可得也宗廟之間不恭而肅墟墓之間不哭而哀堯舜之政不令而從以夫在此者不欺故也後世之為禮樂者其心之于禮樂既以判然為兩矣舉是物曰此為禮也奏是音曰此為樂也心之所存不在器器之所作非其誠故禮樂之動也如偶人焉有其形而無其神如象龍焉有其似而無其威夫禮之為容樂之為聲譬之人則其形譬之龍則其象也至誠以主之者先王所以為其神與威也夫人不畏人之形而畏人之神不畏龍之象而畏龍之威神足而畏威加焉則何怪乎見者之變哉内無至誠無間之心而待備禮樂之聲容何以異操偶人象龍以求人之畏之也故三代之亡厯數千百年而禮樂之效卒不如先王之時者豈其刑名度數不足之罪哉所以行之者其誠與昔之人異矣故曰熊渠子夜行見寢石以為伏虎張弓而射之滅矢飲羽下視而知其為石也却復射之矢摧無迹弓矢未改也石猶是也而一中一否者所為射之心不同故也而衰世之士方且區區於綴緝先王之遺文補完經師之故説掩巻長息而傷禮樂之不明嗚呼是亦愚矣心誠恭歟酌水而獻之見者不敢慢矣先王之禮其在後世者未少也心誠正歟操絃而鼓之聴者肅然矣先王之樂其在後世者尚多也故不取之心而求之物欲望禮樂如先王之時何可得哉昔者子思為中庸之説以導孔子之意始之於天命之謂性而其本一言以盡之曰誠而已故曰誠者天之道也誠之者人之道也又曰惟天下之至誠為能盡其性而卒至於參天地贊化育夫君子為善豈以謂人以為此善也吾行之人以為彼惡也吾去之歟其心之於善也無有驅而納之者忽然自至矣於惡也無有畏而刼之者判然不為矣凡此者吾心之於善誠好之其于不善誠惡之故也心誠之而無隙則物不可得而間物不可得而間則心一一心以格物則物為之動物為之動則天地之逺化育之㣲鬼神之無形隂陽之不測吾從役之矣故傳之所載古之為禮樂者其能交鬼神致異物調寒燠而感動植者非髙論也至誠之説曰不見而章不動而變無為而成天地之道可一言而盡禮樂之本盖出諸此而已矣至誠篇下禮樂之壊數千百年而臣拳拳敢以至誠為興禮樂之論而妄以其説獻陛下者誠見陛下有可以致先王至誠之道故也昔者子思之論至誠其説有二有自誠而明者天之道也學雖未博問雖未審而為善之誠先立矣誠先立而資學以眀善者謂之自誠而明可以為善矣而未固也可以語道矣而未盡也博學而審問慎思而力行其心眀乎善而無疑然後其誠立於中而無間此之謂自明而誠故或始於學或終於學恭惟陛下睿智神聖過絶天下自明而誠者非陛下事也然臣竊見陛下克自勤厲好學而博覽内無聲色畋逰之嗜以敗冲和之心外無竒技異能之好以亂専一之慮樂善好士尊儒尚徳陛下之於學其汲汲如此者豈非陛下有至誠之性於始而資學問之益于後盖子思所謂自誠而明者哉夫操至誠上聖之性充而達之於禮樂此臣之所以拳拳不勝大願也故臣之愚伏願陛下照之以至眀動之以篤誠使有司不以禮樂為治國之故事先王之遺物時時陳之為朝廷之一事耳為禮於此者曰吾君非安於此也是為容不得不設也作樂於此者曰吾君非樂聴此也是備物不得不用也有司且為是説而况於庶民乎庶民有知也尚復不諭而况於動天地而感動植乎故使百姓以禮樂為異觀而治國以禮樂為贅疣者其始以不誠敗之故也夫陛下之於道徳既誠矣不可間矣盡萬物不可得而眩之矣夫禮樂者亦道徳仁義之器耳充是心而達之於聖奚有難於此哉臣之所妄為此説者盖今朝廷禮樂之行上自士大夫下達於庶民未能感化動盪如先王之時耳陛下將大眀先王之禮以示天下齋莊之心乎則聖心拳拳若夫不為則不可以終日其意以謂吾之為是非以備無故也陛下將大興先王之樂以除去近世淫慢之音乎則聖心確然誠樂乎此而求吾之心其為是非以為好古設也信篤于内色見于外則得是禮也將有安之之誠聴是音也必有樂之之意精神心術與禮樂相和同而為一何施而不化何動而不應哉以陛下之至神亦養之而巳夫誠之所存見其効而莫知其故臣以謂陛下之於禮樂既己如此則民之望陛下之車服聞陛下之和鑾者其心必與平日且異矣夫惟使民觀天子之動作而其心與平日異焉此所以有間可入而動盪其心之端也夫磬者器也擊之者物也磬之聲非其人之聲也然聞者知其人魚微物也未嘗知音也或聞琴而躍何也誠動其中則無情之聲知以其類為應物感其心則至㣲之物不待音而感能通天子之至誠而達於治世之禮樂而民不化上之心者臣未之聞也自三代以來先王之術不明後世言治者不過取給目前以夫所謂贊化育參天地交無形而接不測皆以謂高言無實之論故臣願陛下充至誠於禮樂乆而不息積而愈神則凡先王之時天地隂陽之應難至不可得之報凡教化之深㣲神妙者將日至而月盛矣臣嘗以謂漢之好禮樂者莫如顯宗其於禮樂之文者亦勤矣而行之無其誠不聞有至誠善學如陛下之聖也唐太宗有好學樂善之實雖未明道徳性命之理其於至誠則亦近矣然無慨然撥去末習比隆先王禮樂之意伏惟陛下有至誠而朝廷事事必欲仰法堯舜三代之隆此臣之所以為是説於今日也衣冠篇自陛下即位以至於今上自朝廷下及閭里事無大小一切務以法度從事而消去積習簡慢之俗其為法詳矣然上自乗輿公卿大夫而下及士庶人衣冠車服之制獨未為之别以明辨上下等威而消去天下奢侈僣上之心而朝廷將示榮辱勸沮之意于下宜莫深於此者此臣之所以謂當在百度之一而以法律從事也夫三代盛時衣裳弁冕珮玉之制學者皆能道之而世亦以謂陳爛之言厭聞之矣臣不復一一以言而今所大患者軍旅之長武力之臣技術之官其冠服與公卿之所以異者㡬何哉府史胥徒之冠服豪民大賈之車馬與縣令刺史之所以異者㡬何哉古者尊卑共朝貴賤聚享不問而知其官不察而知其别今也貴賤錯陳上下共處而冠服一㮣雖畧有所别然不問不知其官不察不知其别盖今所謂緋紫之假綬者與府胥小吏之所服何以異哉其弊乆矣非今日之積也而改之未有害也而其難於改者盖有二説焉言者曰隋唐之餘制不足法也將遂行三代衣冠之制三代之法詳細委宻不能盡知驟而施之顛倒且不能辨况通其意乎一佩而聫衆玉一車而駕四馬今之士大夫不能是也故其説格而不行臣知言者之未之思也夫三代之為冠非上世無冠而先王首為之也三代之為車亦非上世無車而先王自造之也先民之免於巢居而穴處也乆矣其不被髮而處徒步而行也亦久矣先王能因其有冠而加以尊卑之制因其有車而立之上下之等而世之不復三代之衣冠車服也乆矣其不能佩玉而趨四馬而駕也亦乆矣見被髮而後冠恥徒行而作車哉先王因民之所用而遂文之則今之衣冠車馬而為之尊卑上下之别不亦可乎使先王而出於今亦且因之矣何能必師其既陳之餘迹而不師其因名而為制也説者又曰今之服大抵南北之餘制隋唐以來習行至今驟而為之别則民望之將驚駭以為笑臣則謂之曰自穴居野處而為車服以堯之簡質而虞舜作服夏之忠也衣冠車服非舜之時也商之質周之文其衣冠車服又再易矣自是以來其錯亂訛舛展轉而相變以至於今則凡㡬驚駭而為笑矣今之衣冠車服自生民以來有之乎則憂其驚駭而為笑可也如其初未免乎嘗駭笑也則何獨至於今而始憂乎此俚俗愚人之論而不可以施於廟堂之議故臣願陛下詔有司取今車服之制上自公卿大夫而下達于士庶人與胥史工商之徒皆因今之物而稍為之别使不至于相亂而不可辨則亦嚴等威定民志之大端也或者猶操前説而論難則臣既能詰之矣蘇門六君子文粹巻十一
