body:
  text: 蘇門六君子文粹巻十五宛丘文粹一宋張耒撰議説平江南議余聞諸故老言樊若水不得志於李氏乃獻浮梁自采石濟江卒用其策取江南余嘗恨焉若水李煜之臣叛其主而來且不當受况獻策以滅其國乎是時藝祖西平巴蜀南朝胡越威徳響振而李氏自周以來國蹙民懼亡可立待朝廷使沿江諸郡大治舟師順流而下繇歴陽趨金陵李煜不足亡也何患無策而用此姦人叛夫之計乎晉文不以原易信而諸侯服漢髙帝斬丁公以正君臣之大義余謂當縛若水送李煜使甘心焉不然正其叛主之罪而誅之以示天下江南君臣當望風向義之不暇豈不諒乎偉哉惜乎當時在廷無為此言者也韓信議二首或問韓信服髙帝乎余曰韓信為髙帝將數年常將重兵滅大國而動以武涉蒯通之邪説信無所顧召之而至令之而行何為不服然則何為卒反余曰信服髙帝之智力而不服其為人是以反也然則何也夫信之反非重失楚也在夫偽遊雲夢而執之也夫偽遊雲夢之計是市井下俚之智而萬乗之主親行之此信所以怏怏北面而薄其君之謂不足為其下也夫暴奪人之富貴而幽囚之欲使夫雄傑者帖然而無怨非服之以徳屈之以禮則不可夫以下俚市井之策而詐韓信彼身可執心輕其上矣彼且聞其計出於謀臣則君臣皆輕是不反何待然則為髙祖者奈何必得夫反形明白乃明其罪引天下兵誅之耳信雖難制然不過數年而定一偽遊而縛韓信自爾出令天下誰敢信之歟自古有所負而功名見於世者未嘗有肯以身輕就人者也何者彼輕就人者其規矩凖繩將在彼矣夫如是則我之所有安得盡布之哉且寳鏌鎁之利者不以試薪售和氏之璧者不登門是彼皆不求人而人求之若不得已焉而後即之者亦自其理然也韓信當秦之亡天下之窮士也非有孔孟進退之節然蕭何獨察其非汲汲於求顯待之不厚禮之不至則不為用也故以髙帝之倨必使其築壇齋戒備禮而後官之舉之三軍之下而加之諸將之上而不疑知不若是信將不滿而無留心矣諸葛亮戰國之策士也髙卧於隆中其主就而後起而後能使劉備三分天下而伸於强敵彼孫武求試兵法於宫人叔孫通度上所能行而蕝禮其事業功名卒以不顯有以也夫楚議楚雖三户亡秦必楚楚人之志也而言卒驗何也曰殺人者必見殺虐人者還自虐自有覆載以來未有能免者何則天道也秦滅六國秦雖滅乎楚楚怨秦最深怨深者復之必力人事也此理之所必至也又何怪焉老子議夫人之生不殺之於袵席飲食之疾病則殺之於盜賊刑戮者過半矣則人之於死實未嘗知畏也而世之馭物者而欲物之畏不過示之以死亦惑矣故曰民不畏死奈何以死懼之苟為畏死耶則吾取為竒者而殺之宜民之不復為竒也天下未嘗無刑而為竒者不止則死之不足以懼物也明矣故曰若使人常畏死而為竒者吾得執而殺之孰敢也夫物不患無殺之者也萬物冺冺必歸於滅盡而後止則以常有司殺者殺之矣竊司殺者之常理而私之以行其畏非徒不足以懼物而未有不及者也故曰常有司殺者殺夫代有司殺是代大匠斵代大匠斵希有不傷其手矣然則操政刑生死之柄驅一世之民使從之殆非也文帝議余嘗愛漢文帝以趙佗稱帝於南越遣陸賈奉咫尺之書馳一乗之傳曰今兩帝並立而無一使相通是争也未嘗怒其為帝而佗心感竭誠屈服自痛不須㬰而去其僣號諺云人之飲酒勸之飲愈不飲禁之飲愈飲夫佗之帝也必意漢惡其逼我而矜張以伐之夫如是則足以自張於國人而意亦且少申矣今乃不然漢天子視我為帝漠然如未嘗有則吾何以取重於國退而視其黄屋左纛非甚童騃必且以是為果何用之物哉冒而居之且甚不安夫行所不安而求所無用佗老賊必不然也幸賈之來恨去之不亟耳文帝之策可謂得矣其智可謂絶人矣是合老子所謂不争而善勝者也吳王不朝賜以几杖故卒文帝世不反孝文之術每務出此而賈生者乃欲以改正朔易服色盛言嵗賂匈奴為倒懸之勢欲以動之宜其以為兒子之論而不信也諱言髙宗自誅長孫無忌放禇遂良等後天下以言為諱者二十餘年其後一御史嘗抗論一不急事時謂鳳鳴朝陽方其以言為諱也武氏不出房闥而取其國天子自殿陛之下門闕之外顛倒錯亂無由知之而其左右忠臣良士豈無良策善計亦不敢告故以牝奪雄坐房奥移廟社犯天下之至順為天下之難成而有功此譬如盜入主人之家執其主塗其耳目而惟其所為何求而不得哉張子曰天將亂人之國則必使諱人之言人之愛其身其寢食起居有少異焉而人告之則必信之又従而治之夫如是則可以終身而無疾今其寢食起居類非平人之狀而其親戚朋友旁視而不敢告一日疾作而死矣太宗以蘭陵公主園賞言者其直百萬非好名也事當然也敢言漢王鳳以外戚輔政殺王章以杜天下能言之口而梅福以南昌尉上書顯攻之而不忌唐文宗時宦人握禁兵制天子樞密使權過宰相誰敢少忤其意而劉蕡對策肆言其惡斥其簒弑廢立之罪而明皇時李林甫為相幾二十年固寵市權愚瞽其君内助楊氏之勢外成祿山之亂補闕杜璡嘗再上書論事斥為下邽令林甫以語動其餘曰立仗馬終日無聲飫三品芻豆一鳴則黜之矣後雖欲不鳴得乎繇是諫諍路絶矣夫林甫之威未慘於漢庭之外戚唐文宗之宦官也而梅福劉蕡敢犯之而林甫徒以區區貶斥而天下之士震怖如畏虎狼此其故何也王鳳得政之初帝失徳未深猶可與論道理商成敗而漢之公卿猶有賢智忠義之士也文宗太和二年名臣在朝者如裴度李綘韋處厚之徒猶數人公卿侍從之間差可告語其勢猶足以持典刑也故此二子者非妄發恣行而心實有所恃也若林甫之時人主淫昬於上視天下之治亂如越人視秦人之肥瘠不可與言矣而朝廷之士有一介之善略能别白黑者林甫斥逐之而無餘矣國空無人上下内外皆従君於昬者也而天下之士雖欲有言何恃以救其禍乎此人之所甚畏也嗚呼國無善人國非其國也可不懼哉明皇嘗論李林甫曰此子妬賢疾能無與為比則其時人物可知也進誠明説帝王之徳莫大於務學學莫大於根誠明之性而蹈乎中庸之徳也生而不動之謂誠知而不為之謂明正而不邪之謂忠是故誠者立善之本也明者致道之用也中庸者常徳之守也三者立天下之能事畢矣聖人者得乎神者也因誠而後明必資乎學全盡以居之神固以行之酬酢萬物而無失於曲當此之謂誠則明矣賢人者思誠也因明而後誠在也擇乎善所謂善者可欲之謂也性也正而公者也所謂惡者有所不為之謂也情偽也邪而私者也存其所謂正而公者而去其所謂邪而私者此之謂擇善矣精一以守之中正以養之持循戒懼於不聞不覩之際此之謂慎獨而固執之矣乆而不息則形形而不息則明明而不息則動動而不息則化化而不息則神髙明博厚而配乎天地此之謂明則誠矣子思曰溥博淵泉而時出之溥博如天淵泉如淵言其誠之篤也誠之者篤則其為之者至是以其政不肅而行其教不言而諭其事不勞而成舉而措之天下之民無不従服而不知為之者故曰凡為天下國家有九經所以行之者一此之謂誠明之學齋説上先王之為祭祀也非以徒厭吾心而已其心庶幾以為實也於是乎有齋焉夫齋者聖人之所以交鬼神而求接其所不可測者也夫鬼神可得而交不可測者可得而接則祭祀者豈特塞其情而已耶夫天下之物莫妙於人心其静而不搖則萬物不得藏於私其誠而不散則天地隂陽之無情而吾可以動焉其為物也至虚而易染至明而易汙葢人之生自幼以至於老無非假物以滅其真益私智以盜其和其虚而明者日夜暗蔽而不發故其智之所至不過其耳目情智之所及而不足以行逺於是自其形之所不能接者棄而不治以謂是果不可得而交也豈知夫天下之亹亹皆不能出於吾心使還吾之初而不喪則吾未見夫不可為者葢聖人之於祭祀也其至誠惻怛之心將求見其所祭者於是有齋焉夫齋也者去其所蔽滌濯昬䝉而發其虚明之天質者也是故謹戒静肅使夫亂吾心者一不至於吾前故静乆則虚虚極則明至於明矣則荒忽而不測流散而無形者昭然吾得以接之矣古之言齋唯揚雄知其説其言曰存忘形屬荒絶者其惟齋乎故余於齋而得心術焉齋説下聖人之於齋也將以清其心而接其所祭交其形之所不及而格其心之所不至葢其道非出於祭祀而後設也其原乃出於治心推其治心之術而用之於祭祀而已矣然則何謂心術葢齋者聖人之所以洗心滌慮以盡天下之理者也彼其心淵静冲泊萬物不足以入之故舉天下之亹亹日夜交於前而不足以入吾之靈府動静並作而不相亂往來同應而不相舎凡吾所受於天者無纎毫為之蔽心完質具而天下之道盡矣大至於天地廣至於萬物至賾不能伏其情至逺不能遁其實而天下之理窮矣故能賛造化參天地鬼神協其吉凶隂陽闗其動静推是道於祭也有不格者乎故齋而後臨祭者是清心以鑒物之説也聖人之於孝也篤於誠而盡於禮設之以稲粱庶羞以達其欲求之於隂陽内外以致其氣然以謂是為未盡而思所以必致之故考功推本而制為齋戒之義還吾本真以格物之散復吾清明而求物之隠故曰齋之日必見所祭者嗚呼祭之有齋也祭之道極矣詩説十二首衛武公仕於厲王之時而自警曰慎爾出話敬爾威儀無不柔嘉夫柔其言言遜也葢邦無道矣惟危行言遜可以免於禍故也桑柔曰告爾憂恤誨爾序爵夫爵未嘗無序也序之者使賢者尊不肖者卑而已召旻曰彼䟽斯粺不能序爵故也巻阿之詩曰爾土宇版章夫治天下者雖無事於恢大幸而治得於内則土宇廣於外葢人歸者衆則各以其地附之矣故周公之時斥大九州之界建侯之數過于商之末世而考之傳記無周公斥大之事所謂治得於内則人附之者衆非周公侵伐攻取而得之也夫土小地削非政之病然政亂於内則人相與携持而去人去之則地隨以削故芮伯所以憂心殷殷念我土宇而凡伯之刺幽王以日蹙國百里而上陳先王之盛時曰日闢國百里也葢土宇版章與夫蹙國百里者所以觀治亂之迹也姜嫄生后稷而謂之生民者葢后稷教民食食者民待之以生故也故思文祀后稷之詩曰立我蒸民莫匪爾極蓋免於死之謂生免於仆之謂立食而後免於死亡顛仆之患則后稷之於民實生之者也治人之道尚明故施政之堂曰明堂事神之道尚潔故文王之廟曰清廟禦侮之道尚肅故宫室之墻曰蕭墻明不蔽也清不汙也肅不亂也老子曰自後者人先之成王率時農夫播厥百榖而曰駿發爾私使之先私而後公故也治田者曰雨我公田遂及我私先公而後私故也夫惟成王自後是以民先之有客宿宿一宿為宿宿宿者凡一宿者再也有客信信再宿為信信信者凡再宿者信也夫如是而猶欲縶其馬既行矣又薄言追之則微子所以為在此無斁而周之臣子為好善而不厭也執競武王無競惟烈此方言武王之事而不及其成故曰執競而已武奏大武而後曰於皇武王無競惟烈武王之事既成而見於樂則大矣美矣執競不足以言之也故曰於皇武王也皇之為用者道其事則美也故於大武言之蓋武盡美矣成王之時天下已定矣乃曰將予就之繼猶泮渙然則承文武之緒而天下猶泮渙離散之患者何耶蓋文武之徳大矣泮然而離無有不至渙然而散無有不及洋溢滂肆至於成王將繼而圖則所謂我其收之也示我顯徳行者夫徳行固道之顯者也而成王尚欲使示之以顯徳行者葢學之始其道當然也以其徳行之幽者未足以知之故曰示我顯徳行非獨成王為然伊尹之告太甲言明言烈祖之成徳夫以言為未足而明言之未足以言祖之道而言祖之烈未足以言徳之妙而言徳之成則亦以太甲始進於學故也成王懲周公之事將毖後患使後之知人不復如前日之惑而首之以求助何也葢昔之不知周公之聖出於無助故也何以知其然耶夫成王在廷之臣聖莫如周公而賢莫如召公周公之為師召公固不説之矣召公且不説則在廷之臣豈復有能辨而言之者也此成王所以懲前日之事出於左右無有助之者則其懲後患而首之以求助不亦宜乎破斧刺朝廷之不知葢舉朝廷而刺之舉朝廷之不知則孰為成王之助哉閔予小子遭家不造方是時成王初即政溢者未收泮渙者未圗則法度未立而功未成故曰不造告成大武則成王既除喪而即政其武功足以嗣其先君故曰矯矯王之造夫成王寵受武王之武功而武功則矯矯然征伐四方以成祖考之業而王業於是成矣葢治至於可以用師者治之成故善人為邦至於可以即戎而後為功也周公之戒成王以立政卒之以告爾戎兵以陟禹之迹豈非語戎兵者政之終歟成王之征伐其見於書則伐奄伐蒲之類是也思馬斯臧良馬也故曰臧思馬斯才戎馬也故曰才臧者言其徳才者言其用陳於禮者尚徳用於戰者尚才故也思馬斯作者作用馬也故曰作用者習戰習其動作之節而已矣思馬斯徂駑馬也故曰徂言姑足以行而已矣駑馬馬之下者也故其類亦下故也有驒有魚豪骭曰驒二目白曰魚驒則無取於良二目白者目病也是謂四種之馬答閔周或問王風之詩凡十篇而閔周之詩四焉方是時平王東遷豊鎬為墟文武之舊已掃地矣此黍離所以閔周也兵敗禍結國勢危蹙此兔爰之所以閔周也風俗衰薄室家不相保此中谷有蓷所以閔周也國家有是三者閔之宜矣君子陽陽之序曰君子遭亂相招為禄仕全身逺害而已葢君子猶未去也辭尊居卑辭富居貧甘為勞辱而不恥耳未至於大亂何遽閔之哉答曰序此詩者其知道乎國家之患莫大於有君子而不能知小人在位而賢人在下也其小人不為盡心未害也至於君子不為盡心苟求免於饑寒熟視其禍而不肯救者國必亡故曰邦無道富且貴焉恥也彼皆恥之而甘貧賤誰與圗其國乎不亡何待此知㣲君子所以嗟傷而閔之也彼黍離兔爰中谷有蓷之亂苟有君子其至是乎蘇門六君子文粹巻十五
