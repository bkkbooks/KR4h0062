body:
  text: 蘇門六君子文粹巻五宛丘文粹一宋張耒撰論文帝論昔者絳侯既平吕氏親握國璽授之孝文當是時劉氏之後惟大臣所立文帝為諸王特以其賢而取之其初未可以必得也絳侯以天下與所不可必得之人恩徳至厚也文帝之報絳侯者宜如何哉雖分國以王之天下未以為過也然内難既定君臣之分既明爵賞禄賜所以慰答昔日之功者未聞有卓然過於常時何其不旋踵而逐去之速也予嘗觀漢之大臣多禍少全武帝以來不啻如殺囚𨽻獨文帝時公卿被誅者無幾人然則文帝之待大臣亦有恩矣當是時大臣之有恩者宜無有過絳侯然匹夫一言罪辜未明廷尉折簡以召之如取孤囚侵辱困苦僅免於死文帝非昏蔽無知之君何獨於勃少恩若是哉葢嘗深思其故而得其説夫髙祖之將有大功者至文帝時幾盡矣非以逆誅則以疑死彼皆心有所恃矜其功能日邀其上不得所欲則狼顧而起絳侯吹簫之羇民也用兵十餘年習見天下之勢喜事而尚武其驍雄之習豈能帖然無毫釐於心哉以英雄之資挾立君之威臨視其上無異於保姆之提嬰孩如是而能不驕者伊尹周公之所難也驕則縱縱則亂因以生文帝豈無愛勃之心哉視前日之誅死族滅者皆恃功邀君驕蹇放縱之所致而絳侯之迹異於韓彭者無幾耳吾亦畏其有所恃而驕驕而不己則亂亂而不誅則廢法從而誅之則傷恩甚矣嗚呼理至於是曾不如抑逺困辱使之慊然内顧而無所恃鋤去其驕慢之心全其生保其家使其子孫長有國土之為愈也然則文帝之恩亦深矣且能尊霍光者莫如孝宣委天下之政與之而不敢専光死又立其子兄弟聨兵女充後宫賞賜寵錫不以數計天下翕然以謂孝宣無負於霍氏矣然光死未幾妻子為戮以天下與人而身死之後弱子單孫之祭曾不得享天下之人聞之誰不為霍光痛心者嗚呼使宣帝既正君臣之分則遂攬天下之政光既死視子孫之賢愚而授之官與之位而收其權取其尤無良者而屏逺之霍氏雖欲為亂不可得也然則霍光無後者非宣帝誰為之乎天下之事要其終而後知君子之用心絳侯無禍於身則知文帝之所以裁之者乃所以深報之也霍光無後於漢則知宣帝之所以寵之者乃所以深害之也語曰嬰兒常病傷於飽也貴臣常禍傷於寵也然則文宣之報功其得失具可考也景帝論景帝稱竇嬰沾沾自喜多易不足以任宰相持重乃相衛綰夫自喜多易固不足以持重是也而求持重者必如衛綰則己甚矣古之知人者不觀其形而察其情得其妙而遺其似夫天下之善惡其似者固未必是而其真者或不可以形求也綰車戲之賤士也其椎魯庸鈍偶似夫敦厚長者之形耳夫敦厚之士其用之也必有䝉其利者矣豈謂其無是非可否如偶人而巳哉苟以是為長者而用之則世之可以持重者多矣夫惡馬之奔踶也求其無奔踶可也得偶馬而愛之可乎景帝之相綰也是愛偶馬之類也帝之惡周亞夫也曰此鞅鞅非少主臣也卒殺之夫天下之情其未見於利害之際者舉不可知而要之易劫以勢者易動以利不輕許人之私者不輕行其私亞夫之不納文帝於細栁與夫不肯侯王信可謂不可以勢劫而無私意矣仗節死義與夫見利而心不動非輕勢而滅私者莫能可以相少主共危難者意非亞夫不可而帝乃反之是徒以其剛勁不苟其形若難制而慢上者故殺之而不疑嗚呼景帝者求人於形似而失之者也昔者髙祖求傅如意者而不可得一周昌能强項面折而髙祖遂以趙委之夫昌之不能脱如意於死其勢葢有所迫而所以任昌者固相危弱之道也嗟夫周昌以此見取而亞夫乃用是不免則景帝之與髙祖其觀人亦異矣文皇論古之人主自中庸以上為理所屈皆能行之而誠未必加也若漢文帝之於務農唐太宗之於從諫幾於誠矣或問二君之誠孰愈予謂文帝於言不足而意有餘未嘗為外貌觀美繁於詞令而形於制度不過詔令丁寧而己而身之所履則可信不誣矣知稼穡者必尚儉彼身衣弋綈足履革舄集書囊為殿帷罷露臺却走馬此其意可見也太宗每見賢臣則求諫援引古今出入經傳慷慨古昔語必成文此雖無害於聞過而有好名之心焉此於誠有所不及也意有餘者忘言實巳修者忘名理之必然也文皇常恨不撲殺此老文徳皇后問誰帝曰魏徵夫太宗之信用徵如此而猶有殺心焉則其平日之厚敬而深信之或未必情也且好諫者不諱其過而魏徵以諫草與史臣帝聞而怒遂有仆碑罷婚之事何怒之深也如此二事或疑其不誠予謂或有之髙宗論髙宗之滛昏孱暗又内為悍妻所制外聚羣不逞於朝而禍不及其身者有以也非幸也其智葢有以自衛者彗見東方言者以謂髙麗將亡之祥帝曰髙麗小夷且亦吾民也夫是言能出諸其口則有不可欺者以廢子賢之故怒其人嘗與賢交通令其父訓其子父殺之帝聞而不喜也更貶其父夫刑政能如是則希其意者必相戒而天下聞之必有父子之義焉夫能酌理而不可盡欺叅以義而其諂有所不受使其應物之際十五出此足以完其身矣明皇論人主當務好要而不當務無為夫無為之為言妙矣此羲農堯舜得道者之事也而庸君昏主聞其説而樂之深居奥處䝉塞耳目是非過前而不察奸臣愚弄而不悟視人之利害國之存亡若越人問秦人之疾痛者曰我無為也躭樂飲酒便嬖女色晏朝早罷㳺蕩無度亦曰無為也是故莫若好要吾不治事付人以事而觀其成吾不吝權分人以權而觀其趣事成而利則可成而害則必治其故而賞罰行焉分吾之權而志於公則任之盜吾之權而行其私則棄之而用舍分焉此之謂要知好要則進乎無為矣唐明皇用李林甫十餘年盡失賢者之助太宗之法度廢革略盡貞觀之風俗變壊無遺林甫朝夕所從事者非聚斂奢侈以蕩移人主之心意則羅織刑獄以破滅人之家族也閨門之内干戈碪鉞未嘗絶而間為神仙鬼神之説以動其心而明皇恬不為慮漫不知察利器去手而不覺一敗塗地沒世不復凡此者其始好無為之説者也後之人主可不戒哉代宗論予嘗論代宗唐之庸主也而承安史壊亂之後肅宗草創事出一切人情震搖易以生變此非常才所能定而代宗承之又嘗一為吐蕃所驚跳奔於陜然國遂以定不及其身者何也今考代宗行事有類英主者二焉誠率是道而充之其身安而國定葢無足怪何也能容大功之臣背之而不疑犯之而不怒而外無姑息之迹一也僕固懐恩李光弼二人之功著矣懐恩之恃功犯上自敵以下誰能忍之而代宗不與之較故優容包納卒待其自斃豈不曰與之較力則彼驍虜也與之較理則彼戎狄也其乘氣而兇悖葢將亡也是其料懐恩於目中矣李光弼身兼將相功無與比而幸陜之役堅坐不應此其意非持兩端則髙卧以觀變也代宗恩禮終始不衰豈不曰光弼之功而傷之天下其謂我何彼之不赴吾急吾不問則己問之則必討彼非束手受死者而吾使誰敵之哉代宗之待二臣如是天下不謂之姑息者理當然也徳宗之於懐光則姑息之迹不可勝揜矣人有當其意則用之衆不與則必殺之其用其殺莫或能間之者焉始用元載委己聴之載惡己甚誅之而不疑寵魚朝恩幾危郭子儀然其横也則殺之程元振之寵固矣栁伉一言而逐之易如反掌卒棄不用元載之獄問目皆從中出則是平日載擅權於外而代宗居中無不知也去三大奸如殺犬羊中外不驚上下厭服觀此則昏且孱者不能為也是二者英主之所難代宗有焉所以能保國而安身者哉徳宗論徳宗憤藩鎮之强潛有鞭撻海内之志竭其帑蔵空其禁衛以事於伐叛然師出無功兵連禍結大盜竊發身播國殘滅亡之禍間不容髪自是之後亂不得熄至於憲宗用一裴度決䇿出師淮西既平山東河北强藩大鎮弭耳聴命終憲宗之世海内略定二帝於用兵伐叛則同而功烈何其相萬也管子有言攻堅則瑕者堅攻瑕則堅者瑕徳宗始使馬燧李抱真討田悦魏鎮自承嗣以來兵强國富屹然大鎮非可易攻者也二將之力弊於田悦而王武俊朱滔相煽而起自魏至燕數千里間莽為戰場而四方諸侯始輕京師淮西雖積於叛然數郡之地也暴取其財虐用其民為日乆矣危亡之機巳見而元濟昏立倔强其間此特不欲取耳取之可以必得豈與河朔諸鎮比哉憲宗乘其機察其時一舉而滅之而李師道王承宗之徒或誅或臣而四方靡然效順矣此無他徳宗先攻其堅敵未亡而已之氣先索力先弊矣己索之氣既弊之力人所易侮此朱泚懐光所以陸梁而不忌也憲宗先攻其易碎其巢穴戮其鯨鯢兵雖未出而氣巳震於天下師道承宗所以消沮而不能抗也有扛鼎之力者使之負石而趨終日則必蹶立談之間而磔嬰兒則賁育在旁必且心悸此攻堅攻瑕之論也唐莊宗論古之善戰者不患乎敵强而我不若也而所大患者與之為敵而兩無有以相制也夫兩無有以相制則勢足以相擾而不可以有成惟其曠日持乆兩憊而不振如是而後有起而收之者雖然非有優㳺乆逺之心誰能安坐而待之而至其兩憊而不振也吾亦安能必其變之所在則是吾與敵人常戰於不可知之間夫豈不殆哉是故古之善戰者必有以審天下之勢而為之計取之以可必之計而待之以可成之功夫如是而後能有立今夫天下之勇夫其才足以相勝其力足以相困奮臂角力以戰以死其勢終日而不能解至其能者則不與之角爭於手足之間而獨徘徊待伺一發而擣其虚中其要害之地而使之雖有手足之技不能以與吾較夫如是者勝敵之道也故力弱於敵則謀之力倍於敵則乘之力敵勢均則擣其虚襲其所忌而不可戰葢昔者唐人以河東之地南向以爭天下百戰而無功以朱温之强親冒矢石與唐人從事於河上不能有河北尺寸之地其力之不足以相制亦明矣譬如兩人終日而博也代勝代負而不決勝者欲罷而負者留之負者欲退而勝者激之葢終朱温李克用之世更勝迭負而卒不得其志至於莊宗力戰不顧思決成敗而不可得方其盤桓於楊劉徳勝之間葢常蹙而不振矣其後郭崇韜為之決入汴之䇿而後天下歸於唐夫梁人之有汴是猶人之有腹心也使吾之力雖不足以過之耶一日而潰其腹心則彼手足雖全而不為用此擣其虛襲其所忌之道也故莊宗之取天下其要在此而或者猶歸罪於段凝之區區何異夫披心抉腹而責手足之不救也昔者莊宗與劉鄩戰於莘劉鄩趨黄澤乘虚而襲太原中道而敗乃不能進夫劉鄩之襲太原是莊宗趨汴之䇿也彼鄩以謂人得糧十斛而後可以有功彼誠見天下之勢非朝夕之所能成而其決䇿不顧以趨太原所以擣唐之腹心也歟夫莊宗能知其勢而為之防故唐不亡而梁人惟不能蔽其所忌故莊宗所以得志夫古之善戰者觀天下之勢而後戰從之者此之謂也蘇門六君子文粹巻五
