body:
  text: 蘇門六君子文粹巻五十五濟北文粹六宋晁補之撰西漢雜論路溫舒搢奏獄吏爲諫宣帝卽位溫舒上書言宜尚德緩刑云云秦有十失其一尚存治獄之吏是也譽䛕之聲日滿於耳虛美薰心實禍蔽塞此乃秦之所以亾天下者也夫人情安則樂生痛則思死捶楚之下何求而不得故囚不勝痛則餙辭以視之吏治者利其然則指道以明之上奏畏郤則鍜鍊而周内之葢奏當之成雖咎繇聽之猶以為死餘辜何則成鍊者衆文致之罪明也上善其言遷廣陽私府長右路溫舒傳第二十一班固以賈山鄒陽枚乘路溫舒四人者傳相附以其上書論事類也然山於孝文恭儉之主至借秦爲喻及諷其與賢士共射獵雖憂深思遠有防豫之忠而文帝亦何至是哉陽乗遊吳與梁不得已而說而吳梁何足游且說哉溫舒遇宣帝有爲議與時㑹意刻覈之風其弊爲酷烈故得指秦失而宣帝至是亦深見采納世被其利過三人遠矣固之言曰山自下劘上陽乗游危國然卒免刑戮者其言正也溫舒辭順而意篤遂爲世家宜哉是故於四人者未有間也山陽乗皆浮於辭類非深切事情而溫舒論失之存獨指獄吏與言虛美薰心實禍蔽塞及獄吏成鍊之情可以爲百世戒確乎其言如饑之粟病之藥也凛乎其志有治世大臣之風矣固以其上書論事類乃溫舒言可施於事非三人之類也藉福說田蚡上議置丞相太尉藉福說蚡曰魏其侯貴久矣素天下士歸之今將軍初興未如卽上以將軍爲相必讓魏其魏其爲相將軍必爲太尉太尉相尊等耳有讓賢名蚡乃微言太后風上於是乃以嬰爲丞相蚡爲太尉藉福賀嬰因弔曰君侯喜善疾惡方今善人譽君侯故至丞相然惡人衆亦且毀君侯君侯能兼容則幸矣不能今以毀去矣嬰不聽灌夫出蚡遂怒曰此吾驕灌夫之罪也廼令騎留夫夫不得出藉福起爲謝按夫項令謝夫愈怒不肯順蚡乃戲騎縳夫右田蚡灌夫傳第二十二藉福似專爲蚡游說者故其意毎助蚡然敎蚡以下嬰讓相則智矣至說嬰兼容按夫使謝則無意於害竇灌者蚡能用嬰夫不能用故蚡全而兩人死也田蚡迎淮南王覇上淮南王安入朝時蚡爲太尉迎安覇上謂安曰上未有太子大王最賢髙祖孫卽宫車晏駕非大王尚誰立哉淮南王大喜厚遺金錢財物上自嬰夫事時不直蚡特爲太后故及聞淮南事上曰使武安侯在者族矣右灌夫傳第二十三蚡嬰三人者皆召權利以氣相傾而交禍蚡雖免於誅而死不旋踵見怪物焉班固以謂凶德叅㑹其才不足相優劣也雖然嬰爲差賢其救夫死亦出於義何則方梁孝王倚太后愛而景帝未立太子酒酣上從容曰千秋萬歲後傳王太后驩嬰獨引巵酒進上曰天下者高祖天下父子相傳漢之約也上何以得傳梁王太后由此憎嬰及栗太子廢嬰爲傅又力爭不能得謝病去嬰爲人臣於此亦足賢矣蚡以大臣當淮南王以藩臣入朝迎安覇上乃私許安以宫車晏駕而立安夫爲人臣如此而不族豈不幸哉武帝英主自初卽位故已嫉蚡專曰君除吏盡未吾亦欲除吏又曰遂取武庫及東朝廷辯内史是魏其侯不堅上罵内史曰吾并斬若屬矣則帝意直嬰無意族夫可知徒以黽俛從太后而兩人族嗟乎人君雖謹於奉親而族人之家刑亦可以濫設哉至淮南王反乃始歎息謂蚡在當族然亦竟不正蚡罪非也韓安國說梁王梁王以至親故得自置相二千石出入遊戲僣於天子天子聞之心不善太后知帝弗善廼怒梁使者弗見安國爲梁使見大長公主而泣曰何梁王爲人子之孝爲人臣之忠而太后曽不省也云云公孫詭羊勝說王求爲帝太子及益地事陰使人刺漢用事謀臣及殺吳故相袁盎云云景帝遣捕詭勝必得安國聞詭勝匿王所廼入見王而泣曰主辱者臣死大王無良臣故紛紛至此今勝詭不得請辭賜死王曰何至此云云安國曰今大王列在諸侯訹邪臣浮說犯上禁撓明法天子以太后故不忍致法於大王幸大王自改大王終不覺悟云云右韓安國傳第二十二漢初接秦雖經術粗立然卿大夫論事猶習捭闔務以奪人梁王倚帝弟僣踰而安國稱其忠孝以解上意而全梁意雖愛主然梁安得爲忠孝哉非正論也然使安國非君子愛人以姑息而已者耶則進爲罔上退亦適足以驕王而未足以全梁至勝詭爲姦而安國正色不撓諭以禍福明甚王雖驕卽知懼而出勝詭使天子全兄弟愛而梁以安葢爲漢語則佑梁爲梁語則尊漢然則安國非愛人以姑息者也謀也韓安國以五百金遺田蚡安國坐法失官家居武帝卽位田蚡親貴用事安國以五百金遺蚡蚡言安國太后上素聞安國賢卽召以爲北部都尉遷爲大司農其年蚡爲丞相安國爲御史大夫右韓安國傳第二十二漢賢臣如安國者少安國而賄况其下者也武帝立武始侯昌趙王彭祖薨時淖姬兄爲漢宦者召問淖子何如對曰爲人多欲上曰多欲不宜君國子民問武始侯昌何如曰無咎無譽上曰如是可矣遣使者立昌右景十三王傳第二十三趙敬肅王傳傳曰無德而富貴謂之不幸王同姓非以賢勞也若武帝之言所以親其族而保全之至矣必才者耶地大力豐則叛否則以奢淫敗昌無行事記立與薨而已此武帝處之得也中山靖王勝來朝武帝初卽位大臣懲吳楚七國行事議者多寃晁錯之策皆以諸侯連城數十泰强欲稍侵削數奏暴其過惡諸侯王自以骨肉至親云云今或無罪爲臣下所侵辱有司吹毛求疵笞服其臣使證其君云云建元三年中山靖王勝來朝天子置酒勝聞樂聲而泣云云具以吏所侵聞於是上厚諸侯之禮省有司所奏諸侯事勝爲人樂酒好内有子一百二十餘人右景十三王傳第二十三中山靖王勝傳厚親親之禮王者之盛德也然漢諸侯皆奢淫不循制故晁錯議削於其前主父定制於其後猶不能救武帝感勝之言而隆私恩在武帝得親親之禮矣而勝樂酒好内至有子一百二十餘人外浮辯而内濟姦欲勝不足道也去附作歌去爲望卿作歌曰背尊章嫖以忽謀屈奇起自絶行周流自生患諒非望今誰怨昭信欲擅愛請閉諸姬去憐之爲作歌曰愁莫愁居無聊心重結意不舒内茀鬱憂哀積上不見天生何益日崔隤時不再願棄軀死無悔右景十三王傳第二十三去附傳去犬彘行燔燒烹煑生割剝人大惡仍重不足汙册牘然其歌詩成理類善屬辭者漢尚文武帝好賦諸王不學者能言如此其習俗使然也李廣善射孝文十四年匈奴大入蕭關而廣以良家子從軍擊胡用善射殺首虜多爲郎騎常侍數從射獵格殺猛獸文帝曰惜廣不逢時令當高祖世萬戸侯豈足道哉右李廣傳第二十四爲國患無人才不患無其時人才無時而不可用也又如孝文時内難方夷外懼未釋宜日夜求才若不及之際也有臣如李廣足任將帥且在左右又自知奇其能若遇時萬戸侯不足道者矣何孝文能用馮唐之言還魏尚於其遠而不能用已之所知起李廣於其近也傳曰天下雖安忘戰必危豈必如高祖新造擾攘之國然後爲有其時自太尉入北軍諸呂蹀血漢未嘗一日而去兵終文景世之盛匈奴侵盜干戈日尋所急者將帥之才耳柰何自文帝以奇廣乃至武帝三世不用廣雖曰用矣亦不盡其才厪厪乎以諉人役尚不足欲責其成功可得哉霍去病軍數有天幸廣結髮數奇功名一切聽於天命不復計其才不才則廣之不獲於衛霍間何疑哉廣孫陵亦有廣風其不逢類廣觀武帝以廣爲青前將軍且密戒青不令廣獨當匈奴乃移前并於右廣欲一當匈奴竟不可又遣陵爲貳師將輜重而陵願自當一隊乃怒曰將惡相屬耶卒與步不與騎二事類也廣不爲前軍徙囘遠陵步兵少無後繼安得功利又大將軍方以姊子夫寵貳師以女弟李夫人寵皆躐士大夫擅兵柄武帝固信青不信廣任廣利不任陵廣與陵僅在其指蹤厮養間敗死固宜嗟乎武帝安知用奇士哉司馬遷雪李陵韓延年戰死陵曰無面目報陛下遂降云云羣臣皆罪陵上以問太史令司馬遷遷盛言陵有國士之風身雖䧟敗然其所摧敗亦足暴於天下彼之不死宜欲得當以報漢也右李陵傳第二十四武帝始不察路博德羞爲陵後距疑陵悔不欲出固非矣又竟不遣博德使陵以少擊衆尚殺匈奴數千人單于震恐亦名將矣如遷之言其所摧敗亦足以暴於天下此知陵者之言也至言陵欲得當以報漢陵以匹夫没强虜何能爲耶使其有謀不過投隙率邊人㧞身來歸必不能舉匈奴内屬明矣陵自爲蘇武言令漢且貫陵罪全其老母庶幾曹柯之盟陵誠自信才足以爲此夫齊事與匈奴事異也匈奴之俗䘮君有君刼一單于可病吾國則立一單于以信吾國陵且與俱斃何以報漢故遷與陵之言皆非也其勸武降而不得泣曰嗟乎義士陵與衛律之罪通扵天至此則陵之悔其身之不幸復以自還而將死矣然則陵有功耶罪耶曰漢用陵不盡其才兵少而數勝亦功也使如韓延年死則後世復何議忍死而降曰吾將有爲孰明之以謂安知其不能有爲則母誅陵不可還而可死又竟不死是陵於忠孝皆負矣曰罪可也衛青爲大將軍天子使使者持大將軍印卽軍中拜青爲大將軍封青子伉爲宜春侯子不疑爲陰安侯子登爲發干侯青固謝曰臣幸得待罪行間頼陛下神靈軍大㨗皆諸校力戰之功也臣青子在襁褓中未有勤勞上幸裂地封爲三侯非臣待罪行間所以勸士力戰之意也伉等三人何敢受封上曰我非忘諸校功也今固且圖之又蘇建盡亾其軍獨以身得亾去自歸青議郎周覇曰自大將軍出未嘗斬裨將今建棄軍可斬以明將軍之威云云青曰青幸得以肺腑待罪行間不患無威而覇說我以明威甚失臣意且使臣職當斬將其歸天子天子自裁之於以風爲人臣不敢專權不亦可乎右衛青傳第二十五青無卓犖才能其起奴𨽻臨士大夫也徒以其肺腑寵又班固言其軍數有天幸不破敗也合二幸以得封侯爲大將軍似不足言也然其所以起微賤極安榮而不顚則非徒二幸亦青知止足持滿畏罪以能保之也其曰伉等三人何敢受封是言也則雖以奴𨽻加士大夫之上可也至周覇請斬蘇建以明威而青自言以肺腑待罪不患無威深斥覇論以謂甚失臣意則非徒可以加士大夫之上葢堂堂乎有漢大臣之風矣雖欲不貴且侯而永終譽亦不可得也封霍去病爲冠軍侯霍去病大將軍青姊少兒子也及衛皇后尊去病以皇后姊子再從大將軍大將軍受詔與壯士爲票姚校尉與輕勇騎八百直棄大將軍數百里赴利斬捕首虜以二千五百戸封去病爲冠軍侯右霍去病傳第二十五李廣結髮與匈奴大小七十戰竟以不封引咎自刎而去病一戰卽封遂顯名雖論功成敗行賞罸自殊亦用有當不當然也李陵孤立自請擊匈奴而無左右强近之援武帝則曰吾發兵多無騎與汝竟以是困至去病以肺腑從軍則獨詔大將軍與壯士大將軍又爲擇輕勇騎予之去病封陵降此何怪哉夫士求有用於時必量其上之信否未信而試不得已而用且内無助而遠求功廼徒欲以其才力蘄必成故多敗而中才則率多成功然則廣與陵可謂才矣而未可謂能自用其才也寗乘說青王夫人方幸於上寗乗說青曰將軍所以功未甚多身食萬戸三子皆爲侯者以皇后故也今王夫人幸而宗族未富貴願將軍奉所賜千金爲王夫人親壽青以五百金爲王夫人親壽上聞問青青以實對上乃拜寗乘爲東海都尉右霍去病傳第二十五寗乘所說秦漢以來游公侯貴人間策士之常談也青懼滿求安而聽焉青固宜保富貴者未可以長者之遺風責青也二者臣子之自謀得矣而寗乘拜爲東海都尉何哉董仲舒對策武帝卽位舉賢良文學之士前後百數而仲舒賢良對策天子覧其對而異焉右仲舒傳第二十六傳稱武帝初立魏其武安侯爲相而隆儒矣及仲舒對策推明孔氏抑黜百家立學校之官州郡舉茂才孝亷皆自仲舒發之然武帝名隆儒旣異仲舒對至三策之可謂勤矣對畢不以居内而以爲諸侯相何耶曰不合乎則如傳所載旣用其言矣用其言踈其人然則武帝名隆儒實好大喜功與儒者議闊而不好也抑世皆疑仲舒語徒以白魚流火爲受命之符非三代得天下以仁之意又推說園廟災顧下比京房翼奉軰至使弟子不知以爲大愚抑末也不足以論仲舒劉向以謂伊呂無以加之而子歆意其不可亦縁當時毀譽雖然何必爲伊呂顧其言深切可施於事者何如漢承秦大壞仲舒以謂非有文德以敎訓於天下誅名而不察實爲善者未必免而犯惡者未必刑是以百官皆餙空言虛辭而不顧實外有事君之禮内有背上之心造爲餙詐趨利無恥又好用慘酷之吏刑者甚衆死者相望而姦不息俗化使然也宜少損周之文致用夏之忠者此最深切非世儒守經不知務徒語三代則欲一二守文不復可否或名夫治莫盛於周而周之文致廼有時乎不可用亂莫亂於秦而欲革秦弊乃獨在乎損周政世務名而不語實者安能知之宗三代而實違之者非能及也顧其言深切可施於事不以與周反與夏同然則何必伊呂姑要與治同道而足如醫治病不問其藥血脉治而人命延有謂之俞扁無不可者風俗善而世祚久謂之伊呂可也則劉向謂仲舒爲王佐才非過也蘇門六君子文粹巻五十五
