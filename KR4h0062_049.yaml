body:
  text: 蘇門六君子文粹巻四十九濟南文粹五宋李廌撰贊藺相如賛并引戰國之所謂君臣何足道哉交際不以道以勢進退不以義以利聚而為上下散而為我爾頃刻間爾朝為上卿暮為逐客刑於此相於彼恬以為常吁可哀哉於是時始終一節忠貫金石有若大夫者不其偉歟天下傾府庫捐重寶獻土地質子女以餌秦秦貪嗜無厭奴𨽻列國唯唯奉承甘為臣妾趙之於秦僅比支郡宜其吞聲飲憤以媚意愛聊緩誅咎國有君子義不自衰以小抗大以弱拒强終為敵鄰嗚呼當太平盛治之世六合為家大夫之迹不可傚也以大夫之心推以事君可師哉過澠池之舊墟想當年之髙㑹雖非長卿之才亦有平生之慕因作賛曰鐵可折白可湼大夫之節身且潔玉可攻金可鎔大夫之忠直而恭秦方虎趙方鼠秦方斧趙方俎愎而恐狠而悚威蓋岐雍大夫之勇懦以剛變禍以福轉功踰百戰大夫之辨曹沬劫盟計窮妄出侵疆雖復齊伸魯詘荆卿復讐嗟哉鄙夫昔恥未刷燕已為墟斬優備武夾谷相盟大夫慕此有兹令名舞陽横盾毛生奉槃聊効萬一猶有可觀竊食太倉孰非事君邇來寥寥獨無斯人嗟予之生在於嵗後雖慕景行有志未就行邁靡靡軔車澠池大夫閔余有以相之師友談記講擬人必於其倫太史公嘗講禮曰擬人必於其倫先儒之説謂擬君於君之倫擬臣於臣之倫臣以謂此特位而已擬人必以徳為貴桀紂人君也謂匹夫為桀紂其人必不肯受孔孟匹夫也謂人君為孔孟其人必不敢當范太史講礿禘烝嘗而曰祭之本在民太史公講禮王制曰礿禘烝嘗此祭之名天地社稷五祀名山大川之在其地者因國之在其地而無主後者此祭之事犆礿祫祭之類此祭之禮然非祭之本祭之本諸侯得一國之歡心以事其先君天子得四夷之歡心以事其先王者是也夫犧牲幣帛粢盛酒醴皆出於民力古者先成民而後致力於神凡以祭之本在於民而已范太史講司徒明七教又講王制司徒明七教以興民徳曰夫以身率於上而効之曰教教之於治雖甚迂濶然古之言治者必以為先放勲曰勞之來之輔之翼之又從而振徳之舜舉八元命契孔子曰道之以徳齊之以禮有恥且格秦任刑罰不務徳教故不旋踵而覆漢承秦弊初以法治天下惟賢臣賈誼董仲舒嘗言之文帝能聴賈生故斷獄數百幾致刑措武帝不能聴仲舒故斷獄數萬幾致敗亡唐太宗初亦不以教化為意惟魏鄭公勸行仁義四年之間遂至大治然則為治者不可不先以教化為本也范太史講王制不率教至於屏之逺方又講王制不率教移左鄉右鄉移之遂不變屏之逺方曰臣以唐虞之學不過有朴作教刑與撻以記之雖周禮至詳至悉亦無流放之刑此當是商之法湯制官刑儆於有位其用法甚嚴為太學養士之禮既重則不率教之罪責之宜不可輕夫命三公九卿大夫皆入學至於王親視學皆不變彼以九年之間而不能自遷於善是長惡不悛弗順教令者也屏之逺方斯亦不足䘏矣然王為之三日不舉豈其意哉成湯伊尹相與維持天下之法其嚴密如此若夫周之法則以寛仁為主雖霍叔同管蔡之惡亦降於庶人者三年而復其國非若商政之峻也商尚質周尚文商周之法皆欲人之為善而已子由論學有大小不同門下先生蘇公子由嘗論孔子曰文武之道未墜於地在人賢者識其大者不賢者識其小者又曰女為君子儒無為小人儒又曰君子上達小人下達又曰管仲之器小哉又曰小人哉樊須也又曰硜硜然小人哉所謂小人者非世俗所謂無禮無義不仁不智之小人也以其所知所能行皆小者近者非大者逺者禮樂射御書數凡形器度數之内其粗迹而已若夫君子聖人則所知所能行皆造道徳之妙非形器度數之所能盡此其所以為大也詩有小雅大雅所言皆聖人妙道徳性所以立道所以立政其變雅者不能而反之者也此皆所以為大也葢小雅變雅所言王者政事治天下之法能與不能而已舉此求之則其類自見今詩之篇有曰大明又曰小明小宛小旻小弁之類皆因雅而為言皆當時並有小大之名其不見於經者或刪定或已亡之也子由論史記史記作商紀記紂以西伯昌九侯鄂侯為三公九侯有好女入之紂女不喜滛紂怒殺之而醢九侯鄂侯争之强辨之疾并脯鄂侯西伯昌聞而竊歎崇侯虎知之以告紂紂囚西伯羑里作周紀記崇侯虎譛西伯於紂曰西伯積善累徳諸侯皆嚮之將不利於帝帝紂乃囚西伯於羑里閎夭之徒患之乃求有莘氏美女驪戎之文馬有熊九駟他竒怪物因殷嬖臣費仲而獻之紂紂大說曰此一物足以釋西伯況其多乎乃赦西伯賜之弓矢斧鉞使西伯得征伐曰譛西伯者崇侯虎也視此一事書所因之事不同然崇侯以文王歎無罪殺三公而譛之逢君之惡也忌文王修徳而不勸紂之改行長君之惡也在崇侯皆為有罪矣豈太史公欲互見乎紂喜閎夭之獻釋文王之囚乃許專征伐復告之曰譛之者崇侯虎也其意葢欲文王甘心焉然文王遂伐崇以討其罪自古人君之惡無烈於紂然崇侯虎之罪竟不能逃其刑小人讒諂譛賢人君子於盛明之朝而欲逃責難矣范太史講月令太史公講月令閒題凡數千言備陳歴世遵隂陽為政事之迹與魏相柳宗元之説反復甚明前世論時令者莫能過也且曰儒者多言不必從月令政時令論立説誠有以破漢儒附㑹災異之弊然洪範以五事應五行有休徵咎徵符契甚明後之人君不可不為鑒也太史公講月令閒題曰行春令則云云者人君更政令非天之時氣也故此之時必當行其本時之令以順之若逆之則五行相尅之氣隨類來應如人五臓相勝則有受尅之處其不和之氣自來為病也今人見時之氣寒燠非候曰行某令行某令者非也廌在元祐三年省試䇿問有魏相時令者廌之所對大略與太史説同但其卒曰王者應天以實不以文故人和而天地之和應不必法其繁文末節但時和嵗豐家給人足則便為太平之實若求夫朱草生鳳凰至等瑞皆漢代君臣不務本而區區尚其虛文也漢之好復古者無若王莽而劉歆又以儒術縁飾之奏祥瑞作頌聲者甚衆有益於治可救其亂乎詞多不能詳姑記其大㮣昔既不效何必道乎師友法言經史繁簡不同左氏傳春秋二百四十二年其書止十九萬言太史公史記上自黃帝下至漢武三千餘年止七十萬言而班固漢書十二帝間二百三十年乃一百七萬言雖稱良史善叙事至於案牘之文卑陋之事悉皆載之其失春秋之㫖逺矣春秋葢二萬言而已歐陽公五代史得春秋之法歐陽公五代史最得春秋之法蓋文忠公學春秋於胡瑗孫復故褒貶謹嚴雖司馬子長無以復加不幸五十二年之間皆干戈擾攘君臣之際無赫赫可道之功業故也史記譏武帝司馬遷作史記大抵譏漢武帝所短為多故其用意逺揚雄班固之論不得其實見班固司馬遷傳秦皇帝本紀皆譏武帝也可以推求史記得詩春秋之義史記其意深逺則其言愈緩其事繁碎則其言愈簡此詩春秋之義也陳省副文集後序不朽有三曰立徳曰立功曰立言有一於斯可以無愧於後世其徳可尚不必有功其功可紀不必有言其言可傳不必其人之賢也況兼善而有之者乎蘇門六君子文粹巻四十九
