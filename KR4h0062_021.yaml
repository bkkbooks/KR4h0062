body:
  text: 蘇門六君子文粹巻二十一宛丘文粹一宋張耒撰序送秦少章赴臨安簿序詩不云乎蒹葭蒼蒼白露為霜夫物不受變則才不成人不涉難則智不明季秋之月天地始肅寒氣欲至方是時天地之間凡植物出於春夏雨露之餘華澤充溢支節美茂及繁霜夜零旦起而視之如戰敗之軍巻旗棄鼓裹瘡而馳吏士無人色豈特如是而已於是天地閉塞而成冬則摧敗拉毁之者過半其為變亦酷矣然自是弱者堅虚者實津者燥皆歛藏其英華於腹心而各效其成深山之木上撓青雲下庇千人者莫不病焉况所謂蒹葭者乎然匠石操斧以游於林一舉而盡之以充棟梁桷杙輪輿輹輻巨細强弱無一不勝其任者此之謂損之而益敗之而成虐之而樂者是也吾黨有秦少章者自余為太學官時以其文章示余愀然告余曰惟家貧奉命於大人而勉為科舉之文也異時率其意為詩章古文往往清麗竒偉工於舉業百倍元祐六年及第調臨安主簿學子中第可少樂矣而秦子每見余輒不樂余問其故秦子曰余世之介士也性所不樂不能為言所不合不能交飲食起居動静百為不能勉以隨人今一為吏皆失己而惟物之應少自偃蹇禍福響至異時一身資養於父母今則婦子仰食於我欲不為吏亦不可得自今以往如沐漆而求解矣余解之曰子前日春夏之草木也今日之病子者蒹葭之霜也凡人性惟安之求夫安者天下之大患也遷之為貴重耳不十九年於外則歸不能霸子胥不奔則不能入郢二子者方其覉窮憂患之時隂益其所短而進其所不能者非如學於口耳者之淺淺也自今吾子思前之所為其可悔者衆矣其所知益加多矣反身而安之則行於天下無可憚者矣能推食與人者嘗饑者也賜之車馬而辭者不畏徒步者也苟畏饑而惡步則將有苟得之心焉為害不既多乎故隕霜不殺者物之災也逸樂終身者非人之福也送吳怡序吾友吳熈老好學樂善敏於為吏不苟於其職嘗主簿於蘄之羅田部使者才之使尉黄崗余舊與之相聞而來黄崗也余方坐事屏居而熙老獨喜從予游余謂之曰余棄人也又負罪於有司子與罪人游且累君熈老不然尤喜予翰墨言語得之輒寳藏余年老多病學問日衰落文字尤荒梗熈老所求十不能答一二而熈老意益勤不倦夫人之好惡之不可解如此居黄崗無數月又遷蘄水丞將去黄求予言贈其行余為之不能無言曰子盍觀於貨乎所操者愈竒則藏之也愈深知之者愈寡然一旦而得所售則萬金之直有不較而樂輸之者方其未售也閉肆而處終日寂然其隣里莫知也而持盤賣餅兒日一操盤而出自譽其貨呶呶也十人之聚則往即之自旦至夜勞力如此得百錢之直之外則偃然有過望之喜矣夫所操者不厚則自處也薄夫自處也薄則亦無所不至矣其理然也君子進徳修業夙夜强學其所操者豈萬金之貨也哉吾願熈老好學愈勤樂善愈富為吏而有賜於民多積而深藏之自愛而重出之則將名譽出於四海出入紫闥訏謨黄閣可跂而俟也敢以是為遺行之言秘丞章䝉明發集序古之論人者考其人不計其功士固有其才可以有為而不幸不及施與既施而中奪者何可勝數而中才常人乘時以功名顯者世常有之孟子曰若夫成功則天也夫成敗繫天者其未可以賢不肖必也司馬子長論李將軍為將其言哀痛反復深悲其無功以謂百姓知與不知皆為流涕至論霍去病無他美獨曰常有天幸不至乏絶夫子長不少假借於屢勝之去病而獨拳拳於老死之李廣何哉彼惟深痛夫庸人冒時以取名而豪傑之士制於命而不得少伸其志故其與奪之際如此嗟乎夫獨人事哉凡物亦然大夏生殖而叢棘能有所庇疾風裂寒大木百圍僵仆而死秋水時至溝畎有一溉之功而嵗旱淵竭江河不足活魚鼈物固繫其所遭者哉今年春予遇友人㑹稽章邦老於宛邱一見予再拜泣涕出其先人秘丞君詩文三編及其行狀求予文以為之序其文章議論甚髙而歎其不大設施也送秦覯從蘇杭州為學序秦子善文章而工為詩其言清麗刻深三反九復一章乃成大抵悲愁鬱塞無聊者之言也其於物也秋蛩寒蟬鵙鴂猿狖之號鳴也霜竹之風氷谷之水楚囚之絃越覊之呻吟也嘻秦子内有事親之喜外有朋友之樂冬裘而夏絺甘食而清飲其中寧有介然者而顧為是耶世之文章多出於窮人故後之為文者喜為窮人之辭秦子無憂而為憂者之辭殆出此耶吾請為子言之古之所謂儒者不主於學文而文章之工亦不可謂其能窮苦而深刻也發大議定大策開人之所難感内足以正君外可以訓民使於四方鄰國寢謀言於軍旅敵人聴命則古者臧文仲叔向子産晏嬰令尹子文之徒實以是為文後世取法焉其於文也雲蒸雨降雷霆之震也有生於天地之間者實賴之是故繫萬物之休戚於其舌端之語黙嗟夫天地發生雷雨時行子獨不聞之而従草根之虫危枝之翼鳴呼以相求子亦窮矣夫古之所謂儒者所用之國無敵若臧文仲叔向子産晏子令尹子文其望孔子亦逺矣而其功烈亦足以振顯一時故猶能以儒者之效名一世夫不足以治國而能知今古考妖祥紀事實多聞而博通則古者太史氏之職而初不以是為儒者也楚左史倚相能讀三墳五典八索九邱而楚之治國不責倚相繇是言之古之論史與儒異事而司馬談為太史號通古今善文詞猶曰文史星厯近乎卜祝之間主上以倡優畜之其尊禮不如公孫丞相汲黯此則漢之初猶有古之遺俗在也嗚呼儒之名實不正乆矣自漢以來聖賢之學廢而孔子之徒皆以其師之書自重於世聚徒而授之若是者當時皆以儒之名歸之而司馬談序九流儒者才當其一彼未嘗見其真而信當時之所指故從而論其失而班固以謂出古司徒之官嗚呼何其陋也儒者之治天下九流之列皆其用也顧與淺術末數各致其一曲者同哉吾意今儒者之所學古太史之流而非世之所急也子饗其全無食其餘據其源無挹其流子方從眉山公其以予言質之而歸告余也賀方回樂府序文章之於人有滿心而發肆口而成不待思慮而工不待雕琢而麗者皆天理之自然而情性之道也世之言雄暴虓武者莫如劉季項藉此兩人者豈有兒女之情哉至於過故鄉而感慨别美人而涕泣情發於言流為歌詞含思凄惋聞者動心焉此兩人者豈其費心而得之哉直寄其意耳余友賀方回博學業文而樂府之詞妙絶一世携一編示予大抵倚聲而為之詞皆可歌也或者譏方回好學能文而惟是為工何哉余應之曰是所謂滿心而發肆口而成雖欲已焉而不得者若其粉澤之工則其才之所至亦不自知也夫其盛麗如游金張之堂而妖冶如攬嬙施之袪幽潔如屈宋悲壯如蘇李覽者自知之蓋有不可勝言者矣李徳載字序表弟李成甫名公輔告余以不安其字也求易之詩不云乎其車既載乃棄爾輔載輸爾載將伯助予無棄爾輔員於爾輻屢顧爾僕不輸爾載夫車之所載或安焉或輸焉繫之於輔之棄與不棄而已則輔之於車功亦大矣雖然輔之於物有功於車而非車也考一車之物而輔不與焉然正六轡謹輪輻僕在前馬伏軛而輔不至則車不安登險而憂傾涉淖而憂濡視車中之載如寄物焉且天下之物固有不相有而相須不同域而相成者豈獨輔也哉千金之裘成於工人之寸針南越之箭激於飛鳥之遺羽玉藴於石而金發之兵切於膚而甲拒之故其在人則學是也夫學之於人非性之素所能也而性不得學則不明故夫子曰我非生而知之好古敏以求之夫人之於天者其道素具矣四端之於我非外鑠我者也堯舜之於塗人其本則一而已彼為是堯舜塗人之别者學不學異也性在已學在物自外而視之相去亦逺矣而堯跖繇之物固不能無所待而獨成哉夫學有道道有序循其序而積之者行而能逺涉而能髙夫下則鳥獸蟲魚器材服物之理無不通中則修身正家治天下之業無不立上則達性命通死生觀天地俯方物獨立於萬物之上而無與為侣而學庶乎至矣雖然有患忽小而務大躐等而求至者吾惡之乆矣自燕之秦者必之晉自魯厯楚者必歴衛天下之所共繇亦不能越者也夫無見乎小而能明大與不涉乎等而能速至者其可信也哉故保性以為車力學以為輔而載爾徳焉則周流天下徜徉海外以求子所欲其有不得者乎子以徳載易之蘇門六君子文粹巻二十一
