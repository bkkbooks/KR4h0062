body:
  text: 蘇門六君子文粹卷二十二宛丘文粹一宋張耒撰雜著與大蘇二書昨日欵奉教誨開益多矣但所論司馬遷十二諸侯年表并周與吳實十四國周不在數固無足疑并吳為十三而不數吳者竊詳考之吳比諸國見於表最晚魯成公六年當吳夀夢元年始見於表然吳已有國十餘世矣遷不自共和而叙年與諸國一概者考吳世家去齊卒夀夢立自去齊以上皆不著即位年數略叙傳世而已是遷自去齊以上但得其世而不得其即位之年無從為譜自夀夢以後世家每世輒載其即位年數年既可考故自夀夢表乃見之與十二國自共和至春秋終不得一例既謂之年表而吳之年脫略不備但如附見故止謂之十二國其序曰譜十二諸侯自共和訖孔子吳既不全意不成為譜耳而遷於是諸國初無抑揚也不然吳楚之僣何有輕重遷遽進楚而退吳何也考其本末理似應爾不審定是與否更俟來教又昨日捧教賜下情感慰唐六臣傳前略得聞教誨但意所未諭者非以為史不得少有抑揚夫無抑揚褒貶何用為史顧所以抑揚之當有道耳彼六人者為唐大臣挈國而輸之賊北面而事之為史者曰汝唐臣也無臣梁之理汝雖苟免吾從而正其罪而其人之罪無所逃此其意何有不可但其書謂之五代史記而中有一卷忽謂之唐唐非五代也標卷為唐於史之名似不順耳雖不云爾尚可以貶辱也班固書有後漢事范曄書亦有前漢事某以謂若因及之雖上越數代猶為無害但立名標卷似不應爾若魯春秋中忽有一篇為後漢則事似難行不審以為如何此亦小不至者不當反復致論姑欲受教耳答李文叔為兄立諡簡耒頓首昨日辱示尊兄墓銘即當書納而䝉問以所未安既有所疑不敢默也為兄作諡固善但古者賤不誄貴幼不誄長誄與諡一道也自下議上不順又以尊臨卑則公議不得盡伸俾無以盡善惡之實况於骨肉宗族而可以相為立諡耶古之私諡者甚多如王通死門人私諡文中孟郊死韓愈張籍諡以貞曜然後讀通所著書續經其狂誕野陋乃可為學者發笑郊以餓士偶工於詩耳世之言通與郊之實不過如此文中貞曜竟何補哉古者生無爵死無諡孔孟顔閔不聞有諡雖其門人朋友尊愛之如此亦不敢為作諡此數君子後世豈以無諡而遂不傳哉繇是觀之諡不能使欺者傳無諡不能使實者沒賢兄之懿人實聞之其不至公卿而死不得使有司顯議而公諡之其為不幸無可言者但其德美之實苟不可泯滅自應傳世而今乃兄弟生徒為之易名則失薄俗之喜以嫌處物者久矣孰肯為弟不私其兄哉既嫌於私則聞者不信不信則并與其實而敗之矣所為愛之正以害之也願更審度此一節其他尚有一二事容面論之蠟紙且留此俟改定即當下筆僣易死罪書五代郭崇韜卷後自古大臣權勢已隆極富貴巳亢滿前無所希則必退為身慮自非大姦雄包異志與夫甚庸駑昏闒茸鮮有不然者然其為慮也實難不憂思之不深計之不工然異日釁之所起往往自失至深至工是故莫若以正夫正者操術簡而周智者為緒多而拙夫正者無所事計也行所當然雖怨仇不敢議之况繼之者賢乎郭崇韜於五代亦聰明權智之士也佐莊宗决策滅梁遂一天下自見功髙權重姦人議巳而莊宗之昏為不足賴也乃為自安之計時劉氏有寵莊宗嬖之因請立為后而中莊宗之欲又結劉氏之援此於劉氏為莫大之恩而莊宗日以昏湎內聽婦言其為計宜無如是之良者然卒之殺崇韜者劉氏也使崇韜繆計不過劉氏不能有所助而已豈知身死其手哉好謀之士敗於謀好辨之士窮於辨惟道德之士為無所窮而禍福之變豈思慮能究之哉書宋齊丘化書齊丘僞唐謀臣其智特犬鼠之雄耳何足道哉其為化書雖皆淺機小數亦微有見於道德其能成功有以也吾嘗論黃老之道德本於清净無為遣去情纍而其末多流為智術刑名何哉夫惟靜者見物之情而無為者知事之要據其要而中其情者知術之所從出也仁義生於思思生於人情聖人節情而不遣也無情之至至于無親人而無親則忍矣此刑名之所以用也齊丘之道既陋而其文章頗亦髙簡有可喜者其言曰君有竒智天下不親雖聖人出斯言不廢書韓退之傳後有問於張子者操賞罰榮辱以勢臨天下者莫不欲天下勸沮於其賞罰取舍於其榮辱而其勢常有所不行蓋有益勸而人益羞愈沮而人愈慕若韓退之於唐殆若此矣退之所自負與世之所推者於德莫如好直於藝莫如文章然以直取禍則逐山陽貶揭陽以文章招纍則其文辭一世莫尚試於有司屢試而屢黜平生所述國家大事獨有平淮西碑耳然刋者未畢而磨者至矣是宜沮喪湮滅與時俱亡泯然無所見於世矣然每斥而名益彰每沮而事益顯抑者之力不勝譽者之舌雖退之亦自謂動而得謗名亦隨之是誠何說也張子曰是何足怪昔者先王之賞罰榮辱所以天下奔走而從之者惟其取天下之所欲勸者而賞且榮之取天下之欲沮者而罰且辱之故賞一人而人勉惟恐其不若也罰一人而人懼惟恐其似之也且先王安能以巳之所好惡而力驅天下以從我哉直取天下之榮辱而制天下之向背耳彼唐之汙政其昏惑瞀亂無所取衷好惡可否於一巳之私智而濟之以蔽欺之姦何怪夫所沮者人慕所進者人恥歟且彼惟不可抑也是以愈抑而聲愈振子獨不見夫千仞之水決而注之川乎大木梗之大石捍之排以巨峽迫以髙麓而後怒號哮吼聲振百里抑之者愈大則其聲也愈暴故小遏之則小鳴大塞之則大震何則彼其勢惟不可止故也何怪夫身益困名益聞也藥戒張子病痞積於中者伏而不能下自外至者捍而不得納從醫而問之曰非下之不可歸而飲其藥既飲而暴下不終日而向之伏者散而無餘向之捍者柔而不支焦鬲導達呼吸開利快然若未始有疾者不數日痞復作投以故藥其快然也亦如初自是逾月而痞五作五下每下輒愈張子之氣一語而三引體不勞而汗股不步而栗膚革無所耗於外而其中薾然莫知其所來嗟夫痞非下不可已余從而下之術未爽也而吾之薾然者獨何歟聞楚之南有良醫焉往而問之醫嘆曰子無嘆是薾然者也凡子之術固為是薾然也坐吾語汝天下之理有甚快於豫心者其末必有傷求無傷於終者則初無望於快吾心隂伏而陽蓄氣與血不運而為痞橫乎子之胸中者其纍大矣擊而去之不須㬰而除甚大之纍和平之物不能為也必將擊搏震撓而後可夫人之和氣冲然而甚微泊乎其易危擊搏震撓之功未成而子之和氣嘗已病矣繇是觀之則子之痞凡一快者子之和一傷矣不終月而快者五則子之和平之氣不既索乎故膚不勞而汗股不步而栗薾然如不終日也且將去子之痞而無害於和平子歸燕居三月而後豫之藥可為也張子歸燕居三月齊戒而復請之醫曰子之氣少完矣取藥而授之曰服之三月而疾少平又三月而小康終年而復常且飲藥不得亟進張子歸而行其說然其初使人悶然遲之蓋三投其藥而三反之也然日不見其所攻久較則月異而時不同蓋嵗而疾平張子謁醫再拜而謝之坐而問其故醫曰是治國之說也豈特醫之於疾哉子獨不見秦之治民乎勑之以命捍而不聽令勤之以事放而不畏法令之不聽治之不變則秦之民嘗痞矣商君見其痞也厲以刑法威以斬伐徑捍猛鷙不貸毫髮痛剗而力鋤之於是秦人之政如建瓴流蕩四達無敢或拒而秦之痞嘗一快矣自孝公以至於二世凡幾痞而幾快矣頑者已圯强者已柔而秦之民無歡心矣故猛政一快者歡心一已積快而不已而秦之四支枵然徒有其物而民心日離而君孤立於上故匹夫大呼不終日而百疾皆起秦欲運其手足肩膂而漠然不我應矣故秦之亡者是好為快者之過也昔者先王之民其初亦嘗痞矣先王豈不知砉然擊去之之為速也惟其有懼於終也故不敢求快於吾心優柔而撫存之教以仁義導以禮樂隂解其亂而徐去其滯使其悠然自趍於平安而不自知方其未也旁視而悶然者有之矣然月計之嵗察之則前嵗之俗非今嵗之俗也不擊不搏無所忤逆是以日去其戾氣而不嬰其歡心於是政成教達安樂悠久而無後患矣是以三代之治皆更數聖人厯數百年而後俗成則余之藥終年而愈疾者蓋無足怪也故曰天下之理有甚快於余心者其末也必有傷求無傷於其終則無望於快吾心雖然豈獨於治天下哉張子再拜出而記其說書唐吐蕃傳後自漢以來其能制四夷使不為中國患者莫若唐然獨一區區之吐蕃能困之豈其制之未得其術耶自太宗以來固已屢失其術而其尤可笑者平凉之盟也匹夫操刀而殺人則必從容伺察待其不備而後發執刀而呼曰束爾手吾將汝殺則雖賁育不敢施於三尺之童何則人固不可易也不然則必待狂疾者也使之束手而殺之告之殺而不避也則亦必狂疾者也吐蕃之於唐固非有深誠篤信之可以不虞也方德宗之時吾方疑之彼曰必使多爾大臣而後盟惟杜希全李觀而後可擇其地利則曰必梨木林而後可彼得殺吾之大臣而劫二將以空涇原靈夏之備而擇險阻之地以為設伏之利此其必變之迹特未曰吾將變耳彼乘吾疑而直行其謀而求我成之其易我也甚矣而唐之將相大臣晏然不之虞如接君子長者與之握手壇上而不少備此何以異於將殺之則告之束手而偃然不拒而待死者哉彼渾瑊者忠有餘而智不足者也古之善將者逺至於鄰國之動靜皆知之夫豈有他術哉測之以謀而伺之以實爾夫縛其二將而不知三萬之卒伏於肘腋而不覺也則安在其為智也嗚呼平凉之盟所以大可歎也彼尚結贊之智何足貴也是殺人而告之束手者之智也其為智亦殆矣彼李晟之智知不可與盟也是知人殺之則避者之智也其可否之間亦明矣當是時唐之臣如渾瑊馬燧者亦可謂善將矣而猶如此况無二臣者哉題賈長卿讀髙彥休辨白樂天事髙彥休作唐闕史辨白樂天無因母墜井作賞花新井詩賈子又從而續辨之張子曰二子謂之愛白公則可矣未可謂知白公也古之聖賢誰能無謗何獨樂天也哉有謂舜囚堯而奪之位伊尹放太甲而王世未嘗有辨舜與伊尹之非篡者也其心誠知其不然則辨無自而萌於心是其為說無待而自然人之飽者人誣之以饑未有自疑而辨其非饑者人知舜與伊尹之非篡如自信其飽雖或從而誣之而不在辨之之域矣故凡世之辨已與辨人其言雖工而察其心之始萌蓋其於信嘗有所不足而後不能無言彼雖不能無疑於其初其考於理較於迹而後能消其不信之心於是乎有辨故曰二子未可謂知白公也嗚呼小人之害君子也亦多術矣謗之於意外惑之於疑似世之君子傍視而不平者起而與之辨起於知之所不足故縱言極口而益召天下之多言多言繁興而是非足以兩行於世夫惟真知而泯言者而後謗止夫世之真知君子者才幾人則小人之毁賢敗善何時而止耶悲夫書東坡先生贈孫君剛說後春秋傳曰使勇而無剛者嘗冦而速去之夫果敢不畏之謂勇無所屈撓之謂剛或謂申棖為剛者子曰棖也欲焉得剛夫使不以義屈於人而無邪欲以亂其中則其行已施於事者為仁孰禦哉此剛者必仁之說也蘇門六君子文粹卷二十二
