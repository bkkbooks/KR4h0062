body:
  text: 蘇門六君子文粹巻五十四濟北文粹六宋晁補之撰西漢雜論商君敗俗商君遺禮義棄仁恩并心於進取行之二歲秦俗日敗右賈誼傳第十八商君以其術强秦秦卒并天下而誼原其弊以謂俗敗於二歲之間夫舍禮義仁恩則雖得天下不能以一朝居然則秦之亾則其并天下始也傳曰秦失之彊賈誼譏上遇之有禮故羣臣自憙嬰以亷恥故人矜節行云云是時丞相絳侯周勃見就國人有告勃謀反逮繫長安獄治卒亾事復爵邑故誼以此譏上右賈誼傳第十八誼初見用勃間讒之流離濵死而歸及勃以反見捕人莫言而誼獨以體貌大臣諷上勃幸已釋然上深納其言養臣下節夫誼乃可謂公爾㤀私異乎放於利而行多怨者矣賈誼三表五餌賛曰觀孝文𤣥默躬行以移風俗誼之所陳略施行矣以漢爲土德及欲施五餌三表以係單于其術固已疎矣右賈誼賛改正朔尚黃用五旣不經見於道抑末曰疎可也中行說敎單于得漢繒絮馳荆棘中以示不如旃裘之完善也得漢飲食皆棄之以示不如湩酪之便美此敎匈奴無爲所不能以敗其長技誼之三表五餌意亦出此術豈遽疎哉漢數和親匈奴屢侵邊惟所頼於漢者微也今國家歲以繒綺飲食餽北北人習而安之其風俗亦大異初開國時矣故兵不輕動動亦易制葢誼之言更千嵗而益驗術豈遽疎哉袁盎以絳侯爲功臣絳侯爲丞相朝罷趨出意得甚上禮之恭常目送之盎進曰丞相何如人也上曰社稷臣盎曰絳侯所謂功臣非社稷臣云云方吕后時諸吕用事擅相王太尉本兵柄弗能正吕后崩大臣相與共誅諸吕太尉主兵適會其成功云云丞相如有驕主色陛下謙讓臣主失禮竊爲陛下弗取也後朝上益莊丞相益畏右袁盎傳第十九諸吕之誅也少帝非孝惠子大臣疑所立以謂駟鈞惡戾薄氏君子長者故定策迎代王太尉握兵奉璽卒立孝文漢之賢君孝文一人而已則太尉非社稷臣而何方吕后稱制勢無劉氏戇如王陵廷爭不可智如陳平依違未言當是而責太尉本兵柄弗能正則吕后帝母罪所不加是祿産不得而誅大臣反受其咎投䑕忌器禍機一發當何如哉卒之吕后死而祿産誅劉氏固安社稷固定太尉忠誠主兵之力也則太尉非社稷臣而何若非時危疑社稷無主平居討亂謂之功臣可也而勃擇立孝文謀深而慮遠終孝文旣立德尊而澤厚豈特爲漢賢君隆四百年之業而已哉而後之人君師其恭儉幾至刑措者皆足以久安而長治則勃之爲社稷臣也多矣且盎非純臣亦策士也陽抑勃而陰助之豈正論哉高帝嘗曰周勃厚重少文安劉氏者必勃也則高帝以其社稷遺勃已久矣楊雄亦曰絳侯勃之果終之禮樂可謂社稷之臣矣雄儒者宜責大臣以禮樂然聖人不作禮樂終不得而興謂後世終無社稷臣其可哉若勃以掌握嗣君而意得甚孝文以得勃立已而禮恭之臣主俱失盎能抗論使益莊而益畏則盎得矣袁盎譛趙談譎鼂錯盎嘗引大體慷慨宦官趙談以數幸常害盎盎患之盎兄子種爲騎常侍諫盎曰君衆辱之後雖惡君上不復信於是上朝東宫趙談驂乘盎伏車前曰臣聞天子所與共六尺輿者皆天下豪英今漢雖乏人陛下獨奈何與刀鋸之餘共載於是上笑下趙談談泣下車鼂錯爲御史大夫使吏按盎受吳王財物抵罪詔赦以爲庶人吳楚反聞錯謂丞史曰袁盎多受吳王金錢專爲蔽匿言不反今果反欲請治盎宜知其計謀丞史曰事未發治之有絕今兵西向治之何益且盎不宜有謀錯猶豫未决人有告盎盎恐夜見竇嬰爲言吳所以反願至前口對狀嬰入言上乃召盎盎入見竟言吳所以反獨急斬錯以謝吳吳可罷右袁盎傳第十九同子驂乘袁絲變色天下後世以爲美談夫使誠實在於明君則固讜言也然盎以患談害己用種微謀而發之託公以濟私雖外若忠其實誠不足道也錯始議削諸侯盎曰削之亦反不削亦反顧吳楚實反而以誅錯爲名錯何罪哉使盎爲國計斬一錯信可無血刃而解吳楚雖非所以令諸侯姑曰紓目前患猶可也然盎以錯嘗按已而免爲庶人會錯欲復按盎而竇嬰又與錯有隙事急投嬰繇嬰得對假正以遂奸豈惟忠不足道葢罪人也班固言盎雖不好學亦善傅會仁心爲質引義慷慨仁心盎不足當也引義時時至焉若曰亦善傅㑹則盎之情也智能先事而謀談錯無所施自以爲得而不足以免安陵郭門之禍亦何爲哉若止上不馳峻坂却愼夫人坐塞梁王求爲嗣語而班固與其數直諫若此則可鼂錯學申商學申商刑名於軹張恢生所爲人峭直刻深孝文時天下無治尚書者齊有伏生故秦博士治尚書年九十餘老不可徴乃詔太常使人受之太常遣錯受尚書伏生所還因上書稱說遷博士右晁錯傳第十九孟子曰矢人豈不仁於凾人哉矢人惟恐不傷人凾人惟恐傷人巫匠亦然故術不可不愼也凡世之所須闕一不可四人者各以其技食功心何所異而矢人與匠獨被不仁之名故擇術者必愼其初晁錯治尚書眀帝王之論與董賈同稱惟其初以申商刑名之學雜之故不純於儒至欲用術數敎太子終被峭直刻深之名豈必其資近是耶亦術不可不愼也觀其論三王莫不本於人情如生而不傷厚而不困扶而不危與夫取人以已内恕及人所惡不强所欲不禁至諷孝文以絶秦亂法除苛解嬈寛大愛人者此豈申商之所及哉然錯己學其術矣不幸議論時時有之故世得以議已欲一洒之不可也若其所行事亦不過患諸侯强大欲稍削之與按袁盎受吳王金諸侯誠驕盎誠賄固不得不治此豈一切俗吏刑名刻深之意乎會盎讐錯得以吳楚反事藉其口而錯竟以寃誅其後鄧公對孝景以錯尊京師萬世之利而卒受大戮内杜忠臣之口外爲諸侯報讐而景帝亦喟然恨之班固亦曰錯雖不終世哀其忠則是錯之始死其是非固已白矣而司馬遷獨以爲變古亂常不死則亾夫錯預爲國計慮山東反者抗言而削之豈變古亂常哉若指其所欲更令三十章者耶則當時文帝旣不盡聽而諸侯固已讙譁以不盡聽未嘗行之言而實其變古亂常之罪嗟乎遷亦不能無牽於世議哉文帝賜鼂錯璽書傳曰狂夫之言而眀主擇焉臣錯愚陋昧死上狂言文帝嘉之乃賜璽書寵答焉曰皇帝問太子家令上書言兵體三章聞之書言狂夫之言而眀主擇焉今則不然言者不狂而擇者不眀國之大患故在於此使夫不明擇於不狂是以萬聽而萬不當也右鼂錯傳第十九人臣言事而報以璽書漢法與故事所無也出於文帝嘉錯而爲之故傳云寵答夫人君自以謂大患在於不明以不明擇不狂自以謂萬聽而萬不當天下其憂不治也哉嗚呼非其誠心樂善㤀萬乗之隆而懼薄氷之危安能以一切之言而慮動乎心其聲於言惟恐不及至於如是之深切哉三代以降人君謙以來下如文帝者寡自漢至唐惟太宗一人而太宗後少懈於文帝愧矣故特出之三章不足道也張釋之以貲爲郎張釋之與兄仲同居以貲爲騎郎漢書註如淳曰漢法貲五百萬得為常侍郎十年不得調亾所知名欲免歸袁盎知其賢乃請徙釋之補謁者旣朝畢因前言便宜事文帝曰卑之無甚髙論令今可行也於是釋之言秦漢之間事右張釋之傳第二十入物者補官古無此也出於秦漢兵興用度不足權宜爲之然賢如釋之顧出於其間至位九卿漢廷臣無出其右者卜式亦以貲官爲御史大夫至與汲黯同稱質直夫人材豈有流品之異哉至於袁盎父故爲羣盜漢用盎材亦不問其所從來盜子猶可貲何不可乎雖公孫𢎞晁錯之徒以科舉進亦未有以的然先數子者後世一切以科舉經術取士公卿貴人捨繇科舉則不能至至入物補官僅得一命以脫民伍多矣何古取之雜不必以學雖賤且易如彼而賢者多後世擇之精非學不用雖貴且艱如此而不肖者衆也政敎在上風俗在下未易論也自其次言之以天下爲一家無爲同異以君子待小人則中人慕義皆勉而爲君子以家爲天下則人自有心以小人待君子則中人趨利皆流而爲小人則亦無疑乎取之雜而賢多擇之精而不肖者衆如此其反也嗇夫利口上登虎圈問上林尉禽獸簿十餘問尉左右視盡不能對虎圈嗇夫從旁代尉對甚悉詔釋之拜嗇夫爲上林令釋之前曰夫絳侯東陽侯稱爲長者此兩人言事曾不能出口豈效此嗇夫喋喋利口㨗給哉且秦以任刀筆之吏爭以亟疾苛察相高其敝徒文具亾惻隱之實且下之化上疾於影響舉措不可不察也文帝曰善乃止不拜嗇夫召釋之驂乗拜爲公車令右張釋之傳第二十文帝以尉亾頼嗇夫善對欲官之而釋之引類至論秦之所以亾自此嗚呼釋之可謂見微知治亂之本者也唐賈至亦論科舉取士之敝其末曰至使祿山一呼而天下瓦解思明作亂而十年不復意以謂風俗壞郡邑無人故盜起而民從亂不可禁雖然科舉致宼事不相沿也然魯酒薄而邯鄲圍嗟夫王者之舉措可不謹其微也哉文帝不能用頗牧文帝輦過問唐曰吾居代時吾尚食監高袪數爲我言趙將李齊之賢父老知之乎唐曰云云陛下雖有亷頗李牧不能用也上怒起入禁中云云上以胡宼爲意廼卒復問唐曰公何以言吾不能用頗牧也唐曰上古王者遣將也跪而推轂云云軍功爵賞皆决於外歸而奏之此非空言也臣大父言李牧之爲趙將居邊市之租皆自用饗士賞賜决於外不從中覆也委任而責成功故李牧乃得盡其知能今臣竊聞魏尚爲雲中守軍市租盡以給士卒出私養錢養士五日一殺牛以饗賔客軍吏舍人是以匈奴遠避不近雲中之塞云云夫士卒終日力戰斬首捕虜上功幕府一言不相應文吏以法繩之其賞不行愚以爲陛下法太明賞太輕罸太重且雲中守尚坐上功首虜差六級云云削其爵罸作之繇此言之陛下雖得李牧不能用也文帝說復以尚爲雲中守右馮唐傳第二十閫以外將軍制之賞賜不從中覆固古任將之術也然兵法曰將能而君不御者勝夫必有將如李牧以忠於趙爲心有不欺上之意動靜必得賞罸以情如是而君不御委任而責成功使得自盡焉可也若將不賢且不能而君不御輕用民死厚爲己私稱不實之功規無厭之利又皆决於外不從中覆姦人之所以爲資也可勝察哉雲南大覆師中國之精銳再舉而盡而當時權臣掩其敗狀叙其戰功以𤣥宗之明竟於不悟而稔范陽之覦致劒南之役嗚呼有君如漢文有臣如馮唐魏尚而後可與言此哉汲黯清淨孝景時爲太子洗馬以嚴見憚武帝召爲中大夫以數切諫不得久留内遷爲東海太守黯學黃老言治官民好清淨擇丞史任之責大指而已不細苛東海大治召爲主爵都尉列於九卿治務在無爲而已引大體不拘文法右汲黯傳第二十黯爲人脩潔方正秉義嫉惡故漢君臣皆嚴憚之而黯亦居之不疑自丞相𢎞上晏見或不冠而不冠望見黯避帷中則黯爲上所敬如此下憚之可知矣淮南王謀反憂黯守節而至說𢎞曰如發䝉則黯爲遠臣所憚如此近臣憚之可知矣然則黯爲人類以嚴勝者而考其行事乃大不然黯在朝數犯顔直諫而居官臨民則務清淨責大指不苛細不拘文法凜乎可謂有持平不撓寛大長者之風矣張湯深文巧詆䧟人於㒺黯嫉其刻嘗質湯於上前曰公以此無種此豈嚴者之所及哉渾邪王之降也長安令以馬不具當斬而黯曰令無罪賈人與市坐當死五百人而黯曰愚民無知此豈嚴者之所及哉然則黯平居嚴而臨亊寛昔臯陶叙九德曰寛而栗夫栗則不寛寛則不栗自其性之弊不能及也故寛而栗成德爲難乃黯平居嚴而臨事寛則黯於臯陶九德葢具寛栗且有常人君彰之則國逢吉而天下治凜乎可謂有持平不撓寛大長者之風矣而世之好爲一切之論者徒以黯喜面折人之過不合者弗忍見至士不附因病黯以嚴夫面折人之過不合者弗忍見此自黯之短然猶出於嫉惡者至黯愛君恤民仁心爲質引義無窮則嚴何足以名之哉自昔君臣勢異至論其行事則一以孝文爲君寛矣而其除肉刑葢以嚴致平亦猶黯以嚴名而持議乃出於寛夫人豈可與世之好爲一切之論論君子哉汲黯直諫其諫犯主之顔色嘗慕傅伯袁盎之爲人右汲黯傳第二十傅伯梁人爲孝王將其事不詳見袁盎數直諫愛君有足道者故黯慕之雖然盎有邪心其下趙談車以欲害已其致晁錯誅以欲按已皆所謂身私而託公而黯排公孫𢎞張湯葢引義廷爭奮不顧身無介然之私盎豈黯之徒也哉淮南王遷死上哀不食盎曰陛下有高世之行三此不足以毀名上廼解雖出於愛君然曰孝過曾參讓過許由則近諛矣而武帝曰云云黯曰陛下内多欲而外施仁義奈何欲効唐虞之治乎上怒變色而罷朝夫人君謂其下聖已則皆自聖非文帝之賢何足以受之唐虞仁義之不可以僞爲也内實不至而外慕其人焉天下毎不治故黯以是動武帝而不䛕然則黯雖戇不能使君必信而其所以愛君異乎盎之愛君矣汲黯近古社稷臣黯多病最後嚴助爲請告上曰汲黯何如人也曰使黯任職居官無以踰人然至輔少主守成雖自謂賁育弗能奪也上曰然古有社稷之臣至於汲黯近之矣右汲黯傳第二十揚子或問社稷之臣曰若張子房之智陳平之無悞絳侯勃之果霍將軍之勇終之以禮樂則可謂社稷之臣矣夫四人者以羽翼太子寤高帝而立惠帝張子房之智也許呂后以王諸呂王陵爭而已不爭呂氏死乃與絳侯誅産祿陳平之無悞也入北軍一呼士皆左袒爲劉氏乃定䇿迎代王絳侯勃之果也引昌邑王下殿而泣送之取宣帝民間而北面之霍將軍之勇也此其於國皆當伊周之任因禍而爲福轉敗而成功者故楊雄以謂皆近世社稷之臣若黯位纔九卿職但諫諍且未嘗遭變也而嚴助已信其輔少主守成則賁育弗能奪如此其重而武帝亦不疑而許之曰近古社稷之臣何哉傳曰本强則精神折衝豈惟國勢於人亦然内誠中正則利貫金石而不禦雖莫見於事而其精神固已外讋矣以淮南王之謀不憚下丞相𢎞而獨憚黯其平居守義有以讋之也故鄭昌以謂山有猛獸藜藿爲之不採禮曰夫微之顯誠之不可揜也如此何必良平勃光所遇之功哉孔子曰可以託六尺之孤可以寄百里之命臨大節而不可奪也君子人與君子人也鄭當時置驛馬以請謝賔客每五日洗沐常置驛馬長安諸郊請謝賔客夜以繼日至明旦常恐不徧每朝候上間說未嘗不言天下長者聞人之善言道之上惟恐後然在朝常趨和承意不敢甚斥臧否右鄭當時傳第二十班固語孝武時人材之盛曰推賢則韓安國鄭當時信哉是言非仁心愛士慕義無窮則孰能若此也故孟子以謂不祥之實蔽賢者當之漢詔亦曰進賢受上賞蔽賢䝉顯戮漢一時名臣好善者不可勝數而韓鄭獨稱推賢豈但人事應受上賞而天亦不得以不祥䝉之不然則以舞文酷吏之張湯身爲世戮天當勦絕其類而徒以達賢克開其後而有子如安世君子長者富貴令終如此不然是遵何德哉雖然古者行已畏人知君子之好善也性不能已非有爲爲之也若言人之長恐不及亦足矣至置驛於郊以夜繼日則凡惡近名畏招權利者所敬而避也當塗大臣同時有位宜任此責者多矣而當時以列卿居京都四郊之來者皆欲迎受而身主之何哉夫戰國公子以得士相傾奪賔客無誰何歸斯受之彼有爲爲之也而當時長者何所傾奪而爲是豈去戰國未遠其氣俗尚爾當時但貪於得士㤀避此耶士所深忌者在近名近名則懼毀懼毀則必患失當時不幸類此故其弊至於在朝趨和承意不敢甚斥臧否以東朝觀之初是魏其不堅故上怒曰公平生數言魏其武安長短今日廷論局趨効轅下駒吾并斬若屬矣夫平生長短兩人於上前未病於公至公議當任則不堅何哉然則當時知名士上意亦倚以爲决者非其臨事失望媕婀之態見則廷臣森然皆不語者何繇獨得轅下之罵哉孟子論柳下惠聖之和以爲百世之師然語和之弊曰不恭極不恭之實曰君子不由夫柳下惠一人之身也引而上之其和乃可以班於聖排而下之其不恭乃不得爲君子嗚呼愿而恭難哉賈山不爲醇儒賈山祖父袪故魏王時博士弟子山受學袪所言涉獵書記不能爲醇儒右賈山傳第二十一不根持論學者之深病則涉獵書記乃山之所以見輕也然漢之所謂醇儒者守一經專門名家載其師之說世世不易章句訓詁僻陋而迂滯以爲道之精要安知儒哉世之所謂醇儒者志道而游藝有斐君子如圭如璧如金如錫從容則守正臨大節則不可奪如此其可也是以儒服者遍魯國而以儒自名者一人若守經而已何服乎儒者之多也哉然詩禮之流大儒小儒所以發䝉則守經之陋至死不易尚猶庶幾此張禹韋賢之徒所以皆得名爲醇儒而山軰見輕葢世䘮道而然否則未知其孰賢也賈山諫文帝射獵今方正之士皆在朝廷矣又選其賢者使爲常侍諸吏與之馳驅射獵一日再三出臣恐朝廷之解弛云云陛下親自勉以厚天下是以元年膏雨降五榖登此天之所以相陛下也刑輕於他時而犯法者寡衣食多於前年而盗賊少此天下之所以順陛下也今從豪俊之臣方正之士直與之日日獵射擊兎伐狐以傷大業臣竊悼之右賈山傳第二十一論周以九州之民養千八百國之君君有餘財民有餘力而頌聲作秦以千八百國之民自養馳騁弋獵之娛天下弗能供也自謂至言其言可謂至矣夫天下之大生物至夥豈但足以奉一君葢以天下之財力養天下之萬衆本自不乏而人君縱欲有一於此則力罷不能勝其役財盡不能供其求夫財力之盈虧固豈難知可四言而盡也曰節以制度而已矣以文帝之恭儉身衣弋綈夫人衣不曵地愛中民十家之産其視天下如恐傷之雖山亦自以謂帝親自勉以厚天下者何至荒於射獵一日再三出哉儻其所好未免乎此時時有之而山憤悱愛君不自知其論之已甚至借秦爲喻無所不至嗟乎使山遇武帝窮侈其獻言當何如哉傳以謂山善指事意文帝終不加罸夫古之人君能以小過受大諫惟文帝爲不可及也鄒陽諫吳鄒陽枚乗嚴忌知吳不可說皆去之梁從孝王游陽爲人有智略慷慨不苟合介於羊勝公孫詭之間疾陽惡之孝王孝王怒下吏將殺之陽從獄中上書云云孝王立出之卒爲上客右鄒陽傳第二十一善哉陽之諫吳也可謂微矣濞數十年謀反白頭舉事事未發而陽讁其反謀豈不殆哉濞寔陰連齊趙外事三越以孕大禍而陽爲不知者言胡亦益進越亦益深爲大王患之蘇林以謂微言梁并淮陽之兵漢折西河而下以破難其計故錯亂其語若吳爲憂助漢者其意深矣濞之不納則未知其智足以察此與懵不之察也其智足以察陽之知其謀而難斥言耶則固不敢誅陽誅陽則是自發其機其事敗矣其懵不之察以陽爲誠不知其謀而謂陽信其憂助漢耶則曰陽不足以知吾事亦不誅矣故姑爲不納此陽所以觸危穽履猛虎而脫身無足疑也至其從孝王也孝王倚帝少弟與太后之愛出入驕恣而又昵其邪臣勝詭計無不從陽與枚嚴適至其國以陽之智略一啓口論事而勝詭固已惡之孝王怒至下吏將殺陽然則陽嘗動吳之禍機以婉而無殃未嘗深預梁事一介於勝詭以不合而幾死士之游世可不知此也哉吳則於陽之辭察與不察皆不敢害陽惡暴已私其勢然也雖使傍有讒者而終無殺陽之理自其已事梁則倚帝少弟與太后之愛嘗貴驕顯求漢嗣非濞疏遠陰謀者之比也枚先生嚴夫子皆不敢諫而陽爭之其將見殺宜也勝詭握梁權陽爲梁囚從獄中上書而言秦信左右而亾周用烏集而王勝詭見之當如何哉至以謂使寥廓之士囘面汗行以事謟䛕之人而求親近於左右則士有伏死堀穴巖藪之中耳安有盡忠信而趨闕下者哉夫陽正以忠信介於謟䛕見惡而得囚又昌言忠信力指謟䛕不屈以求免然而勝詭終不能見害孝王卒以爲上客然後知士從容則可以謀全窮則不可以計免亦直而已矣孔子曰水火尚可以忠信誠心親之而况於人乎後孝王敗勝詭皆自殺孝王乃得陽而益親然則孝王豈終不肖者哉班固論齊桓公管仲相之則覇豎貂輔之則亂可與爲善可與爲惡是謂中人孝王信勝詭而危用陽語而安夫人主有中人之質孰不可與語上哉枚乗說吳王爲吳王濞郎中吳王之初怨望謀爲逆也乗奏書諫吳王不納去而之梁吳王遂與六國謀反舉兵西鄉漢聞之斬晁錯以謝諸侯乘復說云云吳王不用乘策右枚乘傳第二十一濞始萌反謀而未發也鄒陽枚乗皆其客皆諫陽詞微乗詞危濞雖皆不聽而亦皆不害之葢害之則事未發而先聞是以不敢此濞之情也至乗已去吳濞已舉兵遂事不諫乗復說之何補哉夫濞爲藩臣連六國之兵以鄉漢借使錯誅而兵罷濞復能㤗然無事而歸國漢終能漠然不問而舍濞哉乗之智亦足以及此儻曰愛漢與吳之民命其可矣至梁孝王顯求嗣漢乗與陽亦皆其客陽諫而乗不敢至此愧陽矣何則濞始微謀惡先誅士後已舉事何䘏人言乗揣其情庶幾言之而無患至孝王無所忌憚欲必其求雖漢廷臣悍如袁盎而敢於刺殺之至害乗與陽何足道哉故陽以爭下獄垂死乗以不敢諫依違得全怯矣且乗名梁客食其食而不救其禍於陽得無愧哉故班固亦謂陽有智略而乗不及此其意也然乗文詞過陽其所爲七發葢相如比自陽以下不及也蘇門六君子文粹巻五十四
