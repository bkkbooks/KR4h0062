body:
  text: 蘇門六君子文粹卷五十七濟北文粹六宋朝補之撰舊唐書雜論明皇祠后土汾陰后土之祠自漢武帝後廢而不行開元十一年上親祠改汾陰為寶鼎二十年中書令蕭嵩上言十一年親祠祈榖自是纍年豐登有祈必報禮之大者且漢武親祠前後數四伏請準舊行賽謝之禮上從之右志第四祠后土非古也曠代不講而明皇行之行之十年不復講矣而蕭嵩勸之嵩為公相不能止人主非禮之動又勸之異哉武后請高宗終服上元元年天后上表曰至如父在為母服止一期雖心喪三年服由尊降竊謂子之於母慈愛特深推燥居濕咽苦吐甘恩斯極矣所以禽獸之情猶知有母三年在懷理宜崇報且齊斬之制足以差減請終三年之服高宗行焉至開元中盧履氷上言則天將圖僣篡預自崇光請升慈愛之喪以抗尊嚴之禮易曰臣弒其君子弒其父非一朝一夕之故云云右志第七武后之請意誠在於自隆履氷之言是也然卒緣人情遂不可改鄭國為間説秦鑿渠意不在秦然渠成亦秦之利傳曰有其舉之莫能廢也何必武氏之改哉陳子昻徐有功爭后徐敬業作亂則天欲以威制天下漸引酷吏遣萬國俊至廣州遍召流人擁之水曲以次加戮麟臺正字陳子昻上書言刑非王者之所貴詞甚激切疏奏不省司刑少卿徐有功常駁吏所奏日與之廷爭全濟不可勝數右志第三十武氏初萌僣意矯情盜名如漢王莽而才過之此惡人而擇利審害者也置匭達寃於闕下而遣使戮人於海隅取好譽於前立實威於後故不出房闥而國祚遂移當時大臣皆拱手聽命朝不圖夕而子昻乃獨以疏賤抗言其過雖不見省亦不罪也至有功以職事爭則不唯不罪而又從之何哉蓋亦心知死者之寃而利在殺故寧藉酷吏使驅除豈昏不察哉又時時聽納有所縱捨以微收天下豪傑之心故曰才過王莽當時忠賢事之者衆如狄梁公之不屈不但免禍而亦終用其言相張柬之寧不知是數人將有為哉自知以女子在此位足以次且終吾身而已天下之祚必有歸也故晚節稍弛權以圖存又賴承之者其子也以不及於大戮故曰擇利審害裴寂無捍禦才劉武周將黃子英宋金剛寇太原裴寂自請行賊斷其澗路師遂大潰城鎮俱沒髙祖慰諭之後令鎮撫河東寂恇怯無捍禦之才惟發使絡繹催督居人入保百姓惶駭高祖釋之有所巡幸必令居守右裴寂傳第七世謂寂與劉文靜同輔唐起義以比漢蕭曹非也沉毅有謀初觀隋之亂即有大志惟文靜一人而已且與秦王不謀而合遂以宫人事脅寂令啓髙祖師自此興耳寂既無他長高祖亦徒以副監歡昵之故而私德之倚以心腹於佐命何有哉文靜高才獨秦王深知高祖雖緣以起事而所待文靜與寂薄厚有間矣以疏處嫌卒被怨叛之戮而寂又忌忮而擠之死去蕭曹遠矣嗟夫惟太宗為知人善馭功臣哉張長遜偽為詔書張長遜以五原郡降授太守尋除豐州總管是時梁師都薛舉請兵於突厥欲令渡河長遜知之偽為詔書與莫賀咄設示知其謀突厥乃拒師都等高祖嘉之右張長遜傳第七春秋之義大夫出疆有利國家專之可也長遜守邊知梁薛乞師之謀若復而後圖之則兩寇交合虜兵南矣矯詔以伐其交義與計兩得也雖然當危迫可也若漢陳湯功不可不賞而匡衡執不肯賞為平日慮也李密移書郡縣密為書以移郡縣云云因其倒戈之心乘我破竹之勢曽未旋踵瓦解氷消坑卒則長平未多積甲則熊耳為小右李密傳第七檄詆隋主之惡惟恐不盡以重天下怨怒亦無足怪此密之檄也而自贊魏公神武齊聖七德九功之美起事而驕非所以善其始也齊桓公九合諸侯一匡天下恩信著矣振而矜之叛者九國况以是曉新集烏合去就未可知之人哉是驅而離之也且坑卒多於長平豈佳事耶君彥詞失密用之又失君臣之知並皂而同驅君子是以知密之無成功也至溫大雅為高祖作報書稱鑾輿南幸恐同永嘉之勢其言甚順而有禮夫高祖君臣豈與密輩角材而較智其文詞舉動之際勝負固已預分矣故人哭李密密傳首京師李績為黎陽總管請收葬詔許之績發喪行服備君臣之禮三軍縞素故人哭之多歐血者邴元真之降王世充也密故將杜才幹恨元真背密伏甲斬之以其首祭密右李密傳第三隋末羣盜並起密於衆人中粗有文理慷慨不吝財賞能得士死力雖敗而滅而諸將故人心不叛之近田橫兄弟之為人也徐世績訶單雄信太宗圍逼東都單雄信出兵拒戰援槍而至幾及太宗徐世績訶止之曰此秦王也雄信惶懼遂退右單雄信附傳第三褁糧坐甲固敵是求援槍而至正欲取秦王耳而世績訶之曰此秦王也則惶懼遂退然則秦王盛名讋於人心者已久倉卒聞訶忘其本圖勇智俱廢而秦王遂免其成大業豈偶然哉李密不取伯當之言不取伯當之言遂及桃林之禍右李密傳贊初密歸朝不得志復謀叛王伯當止之不從竟敗死密雄桀雖無帝王度然終非事人者也項羽不肯渡烏江而李密肯為光祿卿奉朝請而已哉使密能忍志事唐唐亦能終容之否乎史臣之論非也刋定開皇律令時制度草創命劉文靜等更刋開皇律令而損益之高祖謂曰本設法令使人共解而往代相承多為隱語執法之官緣此舞弄宜更刋定務使易知云云右劉文靜傳第七法緣人情詞欲明達高祖可謂慮深而議當矣後世法既滋彰下益多偽至或歲歲刋律令而書生秉筆者又往往自矜夸曰語簡而該為工翦裁窘約詞不宣意巧者寅緣為姦而暗者出入抵捂可勝歎哉太宗戒劉文靜持久殷嶠從擊薛舉時太宗有疾委軍於劉文靜戒之曰賊衆遠來利在急戰難與爭鋒且宜持久待糧盡可圖嶠退謂文靜曰王體不安憂公不濟故發此言宜因機破敵何乃以勍敵遺王也遂陳兵於析墌為舉所乘大敗右殷嶠傳第八劉文靜亦不可謂無謀者也臨敵不自慮而惑嶠説遂以喪師太宗雖病卧而逆告以持久之計卒如其所料而嶠一自用則敗潰隨之嗚呼太宗為不可及也夫道彥渝盟襲赤辭膠東王岷州都督道彥遣使告諭黨項申國威靈多有降附李靖之擊吐谷渾也朝廷復厚幣遣黨項令為鄉導首領拓跋赤辭詣靖軍請諸將曰往者隋人來擊吐谷渾我每資軍用而隋人無信必見侵掠今將軍若無他心我當資給糧運如或我欺當即固險以塞軍路諸將與之歃血而盟赤辭信之道彥至濶水見赤辭無備遂襲之虜牛羊數千頭於是諸羌怨怒屯兵野狐道彥不得進為赤辭所乘死者數萬人右懷南王神通傳第十隋人欺誕結怨黨項隋滅而黨項怨之未忘也彼不貪厚幣而輕許我盟約堅定而後助我軍口血未乾遽往襲之是蠻夷常信而中國常欺邊將貪小利敗遠圖自古而然况所得不如所亡利亦果安在哉夫一喪師未足道而使四夷言中國乃不可信如此後雖欲為信可得哉道彥不誅唐無政也太宗勞陳叔達陳叔達拜禮部尚書初建成元吉嫉害太宗高祖惑其言將行貶責叔達固諫乃止至是太宗勞之曰武德時危難潛搆知公有讜言今之此拜有以相答叔達謝曰非獨為陛下社稷計耳右叔達傳第十一人主以天下為度記舊事用公器賞私恩雖不言已可愧又顯言之狹矣叔達不受是也封倫陰附建成封倫以建成元吉之故數陳忠欵太宗以為至誠賞賜以萬計而倫潛持兩端陰附建成卒後數年太宗方知其事右封倫傳第十三倫仕隋附楊素又為宇文化及數煬帝罪其險詖無行天下所知也以高祖太宗之明謂屈突通之忠於隋而信任之又貴倫至台鼎何哉書曰難壬人壬人之不可不察自堯舜以為戒矣倫更兩朝皆首鼠不忠而人主不能察不唯不及禍又親昵之語曰色取於仁而行違之在邦必聞倫之謂也溫彥博譛李靖李靖復定襄常安之地斥土界自陰山北至於大漠御史大夫溫彥博害其功譛靖軍無綱紀致令彼中奇寶散於亂兵之手太宗大加責讓靖頓首謝久之太宗曰隋將史萬歲破達頭可汗有功不賞以罪致戮朕則不然當赦公之罪録公之功右李靖傳第十七靖破蕭銑下東南數十城號令嚴肅軍無私焉謂無綱紀誣甚矣且彥博自忠良帷幄獻替何庸害將帥之功或者以職事所聞言之然太宗至引隋將誅死事責靖是忘其大功而疑其所未必然者亦過矣豈自古人臣功大難賞人主所忌必借一事豫折伏之如是以為駕馭之策乎則與所謂有功見知則悅者豈不異意也哉太宗將伐遼李靖請行太宗將伐遼召靖問曰公南平吳會北清沙漠西定慕容吐谷渾也惟東有高麗未服公意如何對曰殘年朽骨惟擬此行病期瘳矣太宗愍其老不許右靖傳房喬將死惟諌伐遼而靖老病聞命踴躍靖才智信堪此行然戰將耳非知遠經國器也太宗付託李績李績遇暴疾方云鬚灰可以療之太宗乃自剪鬚為和藥績頓首流血以謝帝曰吾為社稷計耳又嘗間燕顧績曰朕屬幼孤云云績雪涕噬指太宗寢疾謂高宗曰汝於李績無恩今責出之我死汝當授以僕射即荷汝恩必致其死力乃出為疊州都督高宗即位召為左僕射右李績傳第七太宗知績不負李密固可以託孤矣且以天下傳子何所疑而為是哉績事太宗寵遇已極誠忠臣耶身受非常之眷自當以道事君同其休戚豈必嗣主有恩如私臣者而後可哉無罪而出之欲收恩於高宗太宗待績既已薄而績又無學問知忠於所事而不能為國遠慮使其主不陷於惡然後為忠至阿其所好倉卒定立武氏禍流國家新史以謂不幾於一言而喪邦者意自古如此者少獨績事當之也張亮養子五百太宗謂侍臣曰張亮有義兒五百將何為也正欲反爾命百僚議其獄多言當誅惟將作少臣李道裕言亮反形未具太宗既盛怒竟斬亮於市歲餘刑部侍郎闕奏皆不可太宗曰朕得其人也往年道裕議張亮反形未具此言當矣遂授道裕刑部侍郎右張亮傳第十九亮延術士問弓長之讖又養子五百人何為乎道裕言反形未具非也君親無將亮之狂悖足以得死但法吏惡文深道裕論附輕其人平允可知太宗用之是也然則太宗非因言者之衆而拒道裕也不得不拒非拒道裕之獨而誅亮也不得不誅非記人前日不用之言而用其後日之身也不得不用其慶賞刑威於此兩得矣司馬遷明李陵非降漢武疑其為陵遊説而當遷腐刑陵或能報漢亦未可知而漢武疑遷以有此坐至道裕言亮反形未具而亮狂悖實已著矣太宗不惟不罪道裕而又用之其明智大度豈漢武所能庶幾哉太宗論李績道宗薛萬徹太宗嘗從容語從臣曰當今名將惟李績道宗薛萬徹三人而已李績道宗不能大勝亦不大敗萬徹不大勝即大敗右薛萬徹傳第十九程不識李廣俱以邊太守將屯及出擊胡而廣行無部曲行陳善就水草頓舍人人自便不擊刁斗自衛云云程不識正部曲行伍營陳擊刁斗至明云云是時漢邊郡李廣程不識為名將云云然廣士卒多樂從而苦不識廣才氣無雙所謂何至學孫吳者也自其迹觀之太宗論績道宗師有紀律近程不識論萬徹驍邁出倫近李廣而實非也不識恐未足以擬績等輩而廣豈萬徹之流哉為將當以紀律謀策慮勝而動績道宗其人也萬徹能勇而已何足與議此夫不大勝亦不大敗是常勝之術也非大勝即大敗是勝敗常未可知也且一大敗何以善其後也武后戮岑長倩而用其子羲張嘉福等請立武承嗣為皇太子岑長倩以皇嗣在東宮不可下制獄被誅數十人坐同反之罪長倩子羲有能名則天嘗令宰相各舉堪為員外郎者韋嗣立薦羲且奏曰恨其從父長倩犯逆為纍則天曰苟有材幹何恨微纍遂拜天官員外郎由是緣坐近親相次入省右岑文本傳第二十武氏以牝雞託正陽之威逆理而行之天下不能誰何雖專以告訐斬伐讋人心然亦有道焉曰內亂而外治內不亂則不能次且自快外不治則此位不可以持久故誣長倩以大逆而録子羲以要官示不以私病公此豪傑尚氣者之所以屈心而狙詐冒利者之所以致死而胥臣之也韋嗣立可謂善薦士矣若避長倩不辜之嫌而蔽羲之實能則非公也不白其纍乎則讒害者接踵而入故先舉羲才而微恨其纍則不疑而聽矣魏徴録諫章以示史官徵自録前後諫諍言詞往復以示史官褚遂良太宗知之愈不説右魏徴傳第二十一此事史書之不知信否然太宗始得天下而勸行仁義卒致太平者鄭公也當時謨議往往在人耳目徵雖不自録人將不録之耶不然不欲隱君之美非但掠巳美也馬周亦於獻替有補當時而臨終索所陳事表章一秩手自焚之曰管晏彰君之過求身後名吾弗為也周之事君日淺雖忠亮有謀不減鄭公而知識勳勞名德之舊則少後之至其不伐則鄭公之事可慙矣蘇門六君子文粹卷五十七
