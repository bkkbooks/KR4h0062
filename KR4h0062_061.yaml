body:
  text: 蘇門六君子文粹巻六十一濟北文粹六宋晁補之撰五代史雜論李克用幾危者數李克用追黃巢於宛朐不及而還過汴休軍封禪寺朱全忠饗克用於上源驛克用醉卧伏發郭景銖滅燭以水醒面而告以難隨電光縋尉氏門出還軍中天復元年全忠大舉擊晉晉人大懼㑹天大雨霖梁軍多疾解去二年梁軍遂圍太原克用大懼謀出奔雲州又欲奔匈奴而梁軍大疫解去右新史唐紀第四巻全忠所忌惟克用幾危者數矣而卒免既而李氏果代朱氏豈非天耶李克用為燕出兵乾寜元年冬李克用攻幽州李匡儔棄城走追至景城見殺以劉仁恭為留後四年仁恭叛晉克用以兵五萬擊仁恭戰於安塞克用大敗天復六年梁攻燕滄州燕王仁恭來乞師克用恨仁恭反覆欲不許其子存朂諫曰此吾復振之時也今天下之勢歸梁者十七八強如趙魏中山無不聽命是自河以北無為梁患者其所憚惟我與仁恭耳若燕晉合勢非梁之福也夫為天下者不顧小怨且彼常困我而我急其難可因以徳而懐之是謂一舉而兩得此不可失之機也克用以為然乃為燕出兵梁圍乃解去右新史唐紀第四巻莊宗之得天下此其機也人情快目前之忿而暗身後之利其察不察間不容髪惜其雄勇有逺略如此至其得天下而為之殆今日不為明日計而蔽於所好權在近習國將顛而不知至身死人手為天下笑夫性習之相逺不至於是將凡人之情困則忍而思深樂則不圖後理固然哉李嗣源勸莊宗入汴李嗣源勸莊宗入汴嗣源以千騎先攻封丘門王瓉開門降莊宗後至見嗣源大喜手攬其衣以頭觸之曰天下與爾共之拜中書令右新史唐紀第六巻自李克用力戰伐與梁為敵國莊宗能繼其業遂得天下斯亦難矣方莊宗之入汴梁固未滅也㑹其得意遽思與人其之唐社稷未立天下之定於我未可知而所以許嗣源者己極矣好勝尚氣喜於意外一旦之獲而不圖後日無以復加之弊其亡非不幸也太祖養嗣源為子明宗養從珂為子明宗本蕃人太祖養以為子賜名嗣源莊宗遣嗣源討趙在禮於魏軍變遂入汴廢帝本姓王氏明宗掠得之養以為子名曰從珂愍帝以為北京留守遂據城反以兵入京師右新史唐紀第六第七巻莊宗之入汴也嗣源先攻封丘門克之即拜中書令明宗之南也得從珂兵在後而軍聲大振即封潞王夫養非族類以為巳姓而用其功以取天下功髙位迫而不知圖之禍可勝言哉然莊宗始與梁戰河上明宗功為多晚節溺於倡樂明宗取之其理固宜至明宗春秋己髙從珂之勢既迫大臣屢言忍而不斷以貽後患為可惜也夫雖然明宗與從珂所以簒人而有之其跡略同而明宗於五代享國差久而從珂不旋踵而敗則亦各才之分也髙祖徳劉知逺明宗與梁人戰徳勝晉髙祖馬甲斷梁兵幾及劉知逺以所乘馬授之復取髙祖馬殿而還髙祖徳之愍帝出奔遇髙祖于衛州知逺遣勇士石敢侍髙祖以虞變耶律徳光送髙祖至潞州臨决指知逺曰此都軍甚操刺無大故勿棄之後徙知逺領歸徳恥與杜重威同制杜門不出髙祖怒欲罷其兵職趙瑩以為不可遣和凝就第宣諭乃受命右新史第十巻五代惟梁唐並立夾河百戰而唐得之梁又内亂其失國固無可疑者晉取於唐漢取於晉周取於漢皆勲臣阻兵以危疑促禍推其草昧君臣之分未定而藉人之力以取大寶一人得之一人從而伺之至其己迫反為所取曾不旋踵悲夫徳不足以相君臣又牽於舊恩以不早辯其失也尚誰咎哉故必有聖人出而後天下大定非數也理也王檀招納亡盜王檀字仲美京兆人事梁為天平軍節度使嘗招納亡盜居帳下帳下兵亂入殺檀右新史第二十三巻古姦雄擁地阻兵招納逋逃苟須其力以濟者多矣檀事梁無貳且納盜以為爪牙歟則恩不足懷威不足制而養虎自遺患可為世之奸豪戒也王䖍裕立梁旗幟以解晉兵王䖍裕瑯邪人邢州孟遷降梁為晉所圍太祖遣䖍裕以精兵百人疾馳晉圍入邢州遲明立梁旗幟於城上晉人以為救兵至乃退巳而晉兵復來䖍裕不能支遷執䖍裕以降於晉見殺右新史第二十三巻韓信用市人戰所以能變化若神者其技惟不窮於㧞旗立幟之間故也䖍裕以百人入晉圍晉遽為解去亦竒矣得其一説而不知所以善其後至其復來安坐而受縳真兒戲哉李茂貞犯京師昭宗以宰相徐彦若鎮鳯翔李茂貞不奉詔昭宗以茂貞不遜不能忍以問宰相杜譲能讓能以為茂貞地大兵強而唐力未可以致討鳯翔又近京師易以自危而難於後悔昭宗怒曰吾不能孱孱坐受凌弱乃責讓能治兵而以覃王嗣周為京西招討使令下京師市人皆知其不可茂貞遂犯京師昭宗為殺兩樞密賜讓能死讓能曰臣固先言之矣唯殺臣可以紓國難昭宗泣下霑襟右新史第四十巻唐之衰也以六軍之士不能當一鎮其所繇來漸矣其患如大疽之著要害終潰而死而讓能曰姑舍之以待其自潰而巳夫豈無一朝之䇿徼幸於復全乎史稱昭宗為人明雋初亦有志於興復而外患巳成内無賢佐頗亦慨然思得非常之才而用匪其人徒以益亂夫國之將亡雖有天命然拱手而待滅亦良可惜矣李克用請擊李茂貞茂貞與韓建王行瑜犯京師謀廢昭宗立吉王保未果而李克用亦舉兵茂貞懼乃殺宰相韋昭度等而去晉兵己破王行瑜請擊茂貞昭宗詔罷晉軍克用嘆曰唐不誅茂貞憂未巳也右新史第四十巻唐所以未即亡正以强藩自相持也使克用遂滅茂貞唐之亡更速云莊宗斬張彦而入魏梁末帝以魏軍素驕難制乃分相澶衛三州建昭徳軍魏博貝仍為天雄軍以賀徳倫為節度使分牙兵之半入昭徳効節軍將張彦執徳倫縱兵大掠末帝諭以詔書彦裂詔書抵於地乃迫徳倫降晉徳倫惶恐曰惟將軍命乃奉書莊宗莊宗入魏徳倫以彦逼己陰訴於莊宗莊宗斬彦於臨清而後入徙徳倫為大同軍節度使右新史第四十四巻莊宗所以得入魏繇彦叛梁而降晉也其迫徳倫以降晉於梁則負矣而宜無以得罪於晉也然而徳倫訴之莊宗莊宗終以逼其長為不順而斬彦彦死而魏人之心滋益服鳴呼莊宗可謂有君天下之度矣張全義不欲掘梁太祖墓張全義臨濮人亡入黄巢賊中後事梁為魏王莊宗入汴自洛來朝泥首請罪改封齊王初莊宗欲掘梁太祖墓斵棺戮尸全義以謂仇敵今巳屠滅其家剖棺之戮非王者以大度示天下也莊宗以為然右新史第四十五巻全義草賊耳其諫莊宗意雖徳梁而為此説亦庶乎長者之言也太祖以文珂代王守恩王守恩為静難軍節度使西京留守加同中書門下平章事時周太祖以樞密使將白文珂等軍西平三叛還過雒陽守恩以使相自處肩與出迎太祖怒即日以頭子命文珂代守恩留守守恩方詣館謁坐於客次以竢見而吏馳報新留守視事於府矣守恩大驚不知所為遂罷去奉朝請於京師右新史第四十六巻周太祖雖時巳貴方將兵有功而守恩亦位髙悍倨難制至以尺紙自外易留守頃刻而代而守恩束手從命上下帖息不敢有一言其取大位非一日之勢也劉處讓為樞密使唐制樞密使常以宦者為之自梁用敬翔李振至莊宗始用武臣而權重將相髙祖時以宰相桑維翰李崧兼樞密使劉處讓與宦者心不平之楊光逺之討范延光也以晉重兵在己掌握舉動多驕恣其所求請髙祖頗裁抑之處讓言此非上意皆維翰崧等嫉公耳兵罷光逺訴之髙祖不得巳罷維翰等以處讓為樞密凡所陳述多不稱㫖處讓丁母憂遂以其印付中書而廢其職右新史第四十七巻劉處讓傳樞密使自唐以宦者為之内持權脅制人主其患非一日之故也莊宗改用武臣而安重誨之徒實制朝廷髙宗奪以付宰相名實稱矣雖其初宦者武臣不悦至為罷維翰等然卒廢樞密使不畀近習握兵之人自此始可謂有逺慮者也髙季興朝京師荆南髙季興初為汴州富人李讓家僮梁祖竒其材開平中為荆南節度使同中書門下平章事唐莊宗時其下勸季興入朝京師既歸莊宗心悔遣之季興曰吾行有二失來朝一失放還一失且主上百戰以取河南對功臣誇手抄春秋又曰我於手指上得天下其自矜伐如此吾可無慮矣右新史第六十九莊宗能嗣其先志復讐攘敵遂滅梁而有天下當此之時威震諸侯季興惶懼首以身朝如莊宗之言未大失也而季興遽知其無能為自此遂安枕無勤王意而莊宗不終其業亦卒如其所料觀季興雖始以奴𨽻乘時亂離至擁旄鉞然智識如此其跨有十州傳子若孫豈偶然哉契丹請聽盟約契丹初嘗推一大人建旗鼓以統八部某部大人遥輦立時劉仁恭據有幽州數出兵攻之每嵗秋霜落則出兵燒其野草契丹馬多饑死即以良馬賂仁恭求市牧地請聽盟約惟謹右新史第七十二巻論者謂戰國時如燕趙小國内禦强秦外攘戎狄孤立而無患不聞其以幣賂事人而偷安也其説信然觀仁恭非有英傑之才内困太原之討且殫其力以求附梁慮亡不暇而猶能外病契丹至反以馬賂仁恭求不侵擾惟恐不得然後知昔燕趙之所以守其國者亦必有説而後世猥曰契丹强大非古之比至以中國全力不能一日忘北顧憂夫使邊臣慮國如燕趙仁恭之圖己事而朝廷不預此唐之盛時所以用三節度捍邊而無憂也蘇門六君子文粹巻六十一
