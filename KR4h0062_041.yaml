body:
  text: 蘇門六君子文粹巻四十一後山文粹四宋陳師道撰論霍光論有其才而無其節者司馬懿是也有其節而無其才者荀息是也有是二者成功而去伊周是也有是二者守而不固霍光是也光取武帝孤幼之託天下之寄黜昏顯明全而歸之承征伐之後公私兩弊而十數年間内豐外服光之功有三焉然以私愛冒大義鄰於奪矣其幸宣帝智而不爭使之爭則未可知矣昭長而宣立既不能去又不歸政光之失亦三焉史氏謂不學無術闇於大體而或以謂人倫逆順雖不學而知之日磾匃奴而著忠孝何待於學嗚呼學則明否則蔽理之常也不學而能者資也資可常乎夫義有由之者有畏之者由之者道也畏之者學也學而後知畏也畏聖人之言也光之不勝私以其不知畏也光善人也使其學而畏其肯出此乎豈特如此其肯以婢為妻乎則除惡於未然光之三失其皆出於此乎或者又謂節而不才然保人之幼全人之國天下危而復安此皆才之大者至其結婚金與上官以宰相子守關與武庫親同列而慮患有急而收符璽又皆有以過人特其才有能否爾雖然中人而下亦不能具也或又謂日磾不肯納女後宫而光以為后日磾殺弄兒而光隂䕶妻為不知光之守節誠有不如至其功亦非日磾所及也始光推日磾而謂匃奴輕漢此其智有過人者惜乎不之盡也商君論士之為善終其身則善不勝言也其為惡也亦然故君子論其大焉以先王之法義而議公孫鞅之行治莫非罪也而論其大者有四焉鞅之術屠也政其身也故政不行則屠秦之民政行則屠諸侯之民去殺則無行焉夫愛人者人愛之惡人者人惡之則屠人者人豈㤀之哉而又導之以殺驅之以戰則民知殺而己懐殺人之心操殺人之具以事其上其不亾者昔未有也故其利足以兼諸侯而其禍亦以亡秦此所謂白晝而攫金者也金則得矣而身隨之愚者不為也鞅之亡秦其罪一也政以保民也而殺以行政化以革姦也而姦以成俗用秦之民如牛羊然市無完人道有流血鞅之賊民其罪二也君不患不善而患無其志志者適道之源也孝公雖未善抑有志矣因其志而導之猶順流而下也而鞅損而小之蔽其良心逄以桀惡百世之後名為暴君談者不置也鞅之賊君其罪三也鞅誠用趙良之言捐國去位興賢以易政作徳以變俗豈徒安秦所以安其身也狥已怙終卒車裂之鞅之亡身其罪四也夫四罪者人有其一王者之法不待教而誅而鞅具之耶是故秦覇者之罪人而鞅秦之罪人也始鞅之説孝公以王道而不用也説者謂鞅捨己從人苟合者也是不然夫懐璧以適市其價百萬而償以萬則賈者不售也若石則售之矣鞅之所以懐石也而市之玉耳故其價易當也王者之法政以成天下之務者所以治也故曰如有用我者期月而已三年有成王道之始也成天下之俗者所以安也故曰如有王者必世而後仁王道之終也而鞅以謂王者之效不及其身數十百年而後見其不知也明矣夫王帝皇者古今之異號耳而鞅以謂有帝道焉有王道焉其陋甚矣而始說之以王道者豈小人之心欲有所用乎上以探主之意又以堅其意下以引就其説又以拒人之說也則聽之者可不察乎夫孝公之用鞅也以國聽命以身受教威福並立而不忌朝無公臣而不疑刑及骨肉而不怒毁者通國而不奪故鞅得終其術可謂善用矣以用鞅之道而用賢其王可立而待也當是之時子車在鄒子休在楚不為無賢也逺者有所不知而趙良之近而又不知可不惜哉是故有國者不患不能用人而患乎不知人也取守論世之説曰文武異道取守異宜武夫䇿士可以進取儒者可與守成秦以用武而亡宋襄公以用儒而敗故漢取以詐力守以仁義文武迭用而各得其宜也是不然猶之於人也有喜則有怒可笑則可哭未有喜而不怒笑而不哭者也喜怒同出於人文武同出於道譬之人焉自本觀之手足耳目皆身也言動視聽皆用也自末觀之則手足異號耳目異使而世以為異者有見於末也古之取天下者以身其守之者亦以身故君子修身而天下平修身非以致天下而天下歸之林非慕鳥也淵非召魚也而魚鳥從之者悦其所也古之人行之者文王是也而於詩見之周南所以取也小雅所以守也而孔子著之以為法也後之取天下者以兵兵者爭而己矣以詐勝詐以力勝力致其爭也至其盡敵則無所與爭而君臣相屠矣故其語曰兎死犬烹鳥盡弓藏盖其所取者乃所以殺其身也譬之於盜足以致財而不足以為王秦漢是也湯武之兵非取天下也取有罪也古之守者以天下計故堯禪舜舜禪禹湯放桀武王伐紂周公居洛曰有徳易以興無德易以亡豈為子孫計哉其取之以天下其守之以天下故五覇迭興不得以私也後之守者以子孫計其得之以爭其守之也畏人之有爭心也故秦墮名城銷鋒鏑殺豪傑愚黔首以止爭也漢髙祖曰安得猛士守四方以禦爭也此其所以異也私欲也故世以為異者有見於後也儒者難與慮始可與守成叔孫通之言也通之佐漢而進羣盜壯士其學既不足於取而天下既定因時便事使為朝㑹祭祀弁服之制以為仁義守天下之具孟子曰禮節文儀者也禮以為節儀以為文夫朝㑹祭祀弁服之制是儀也禮之文也豈仁義之實哉則通之學文不足於守也然而漢之所以持世而遺後者其蕭何之法乎通何與焉古之於仁義有四焉由之者道也無為而無不為舜禹是也為之者善也好仁而惡不仁湯武是也假之者為人者也不善其身而善其政五覇是也修之者為道者也故曰囘心三月不違仁其餘日月至焉而已矣七十子是也漢之於仁義非善其身也善其政而已非明於己也有見於古而已其不迨於五覇者所謂政者未盡善而所謂義者未盡明也其假之者而不至乎宋襄公有亡國殘民䘮身之道而以不鼓不成列不禽二毛為仁是不知務也譬之於盜寡取以為亷忘其財之盜也子魚曰愛其重傷則如勿傷愛其二毛則如服焉此仁人之言也襄公何知焉正統論統者一也一天下而君之王事也君子之所貴也吾於詩春秋孟子見之也周南自風而雅王者之事也召南自家而國諸侯之事也公羊子曰王正月者大一統也孟子曰伊尹孔子得百里之地皆能朝諸侯而有天下也夫正者以有貳也非謂得之有正與否也天下有貳君子擇而與之所以致一也不一則無君無君則人道盡矣吾於中説見之也王子曰中國有一聖人明之中國有並聖人除之夫列國並力而不相尚君子必致於一者不欲天下一日而無君也吾於春秋見之也詩降於風書絶於文侯之命則天下無王矣春秋所以作也天下無王而正月必書王者所以君之也由周而上天下為一學者所不論也由周而下至於五代其所論者五焉有其位而不一者東周是也有天下而無位者齊晉是也有其統而為閏者秦韓是也無其統而為偽者魏梁是也上無所始下無所終南北是也五之說有三而其用一三者天地人也天者命也天與賢則賢天與子則子非人所能為也故君子敬焉地者中國也天地之所合也先王之所治也禮樂刑政之所出也故君子慕焉人者徳功也徳者化也功者事也故君子尚焉一者義也可進則進可黜則黜而統有歸矣吾於詩與春秋見之也西伯諸侯也君子與其王平桓周之餘而君子奪其王也隱公攝位而先君之元子君子與其君也桓公世子也王與諸侯大夫國人君之而王法之所討君子黜之文王西夷之人秦與吳楚戎蠻也君子進而中國之也杞夏裔也君子斥而夷狄之也自周之東夷於諸侯其所有號耳故詩降而書絶之君子盖有待也夫詩降而書絶則天下無周矣王者可以作也而卒無以代之徒以先王之世天下須君而復與之豈君子所欲哉桓文一中國却外夷出民水火之中有功矣而天命未改故管仲不得而革也夫周存之者天也文武之澤也黜之者人也天下之法也此周與齊晉之辨也秦之昭襄始亡周而臣諸侯及始皇又合六國而為一而學者不以接統豈不已甚矣哉以秦之暴疾之可也而不謂天下為秦可乎奪之其誰與哉新莾漢之盜也而漢討之是猶夏之窮羿衛之州吁而齊之無知也而學者疑其年吾於春秋見之也魯昭公之失國寓於諸侯而季氏服君之服行君之事者七年君子以其前繫之昭其後繫之定則以元始屬之建武其可矣此秦新之辨也三國之一吾於續書見之也漢中邦之舊也劉葛之所造也君子之所向也而地則四隅也徳逺而功邇君子不得而私焉吳魏皆有志於天下又皆有功於民而魏則中國也於是與之其得已乎此曹魏之辨也自晉而下則為陳陳亡於隋則有中國自隋而上則為魏魏而上為燕趙趙繼晉者也晉之亡猶秦也非人亡之也舉天下而弃之智者得之而謂之逆乎其亊則漢唐其名則覇其義則雖非桓文亦非晉之罪人也則有始石氏羯也慕容氏鮮卑也然居中國之位有中國之民而行中國之政矣是猶書之秦春秋之吳楚也燕趙不為夷而謂魏為狄乎南北之變吾於元經見之也晉之東猶漢也屬而繼宗古之制也其所貴者以中土之無代也君子因其舊而與之猶周也皇始授魏進之也天也而帝晉者人也魏可貴而未貴晉可賤而未賤故君子持之也持之者待其定也晉宋有其志又有其功而魏未有以勝之武文没而孝文興於是南北定矣故宋亡而帝魏也孝建之後可以奪矣而君子不忍者武文之澤也故因其亡而取之或曰魏假之華齊梁陳斥之蠻無乃悖乎曰夷而變雖未純乎夏君子進之也夏而變雖未純乎夷君子斥之也矧其純乎孔子曰一日克己復禮天下歸仁而不考其素善其變也又况終身由之者乎色斯舉矣而不察其著惡其變也又况言咈行乎此南北之辨也學者擬梁而於新唐非其族也且其取之奪也非討也吾於春秋見之也楚比盜也而棄疾殺之君子書之曰公子棄疾殺公子比以情不以迹也梁之存猶魏也此朱梁之辨也吾於正統質之經以定其論質之公以濟其義折衆說之枉而歸諸正庶乎其可也蘇門六君子文粹巻四十一
