body:
  text: 蘇門六君子文粹卷四宛丘文粹一宋張耒撰論秦論賈生論秦曰仁義不施而攻守之勢異也世以為確論豫獨謂之不然夫攻守殊事而相關異設施而同利害其守之安危視其政之善惡其報應如表影聲響之不差也譬如人之殖産也耕我之田盡力以事之嵗收千石封之倉廩而實之賈百金之貨於鄰國而贏千金焉鄰里不我怨有司不我罪如是乃安坐享其富而貽之子孫則安樂而無後患今有人侵人之田奪人之産又殺人於道而奪之金如是乃欲封之倉廩藏之府庫而守之以君子長者之事怨讐百作而披攘之矣故如是而取之必如是而失之安有以盜賊所以取之而能以君子之道守之歟秦王始滅韓齊大率十年間耳皆滅人之國虜人之君其毒至慘也夫此六國諸侯者其上世皆有功於民又皆據國數百年其根本深結於人心者固一旦芟夷蕩覆之其勢必不帖然而遂己如塞大水伐大木其漸漬之末流播散之餘種將且復漲而暴興不得其寂寥氣盡則不止秦雖欲反其所取之道守之而其機巳成其勢必復矣故秦之事不可為也嗚呼秦滅六國不十餘年而六國並立秦以不祀其效豈不然歟故賈生之論戲論也樂毅賢將一戰勝齊下城七十齊不能支曾未三年七十城者翻然為齊乃無一城為毅守者以是失之豈不然哉毅賢尚然況於暴秦乎魏晉論嗚呼魏晉之亂亡其可悲也國中之人皆恐懼畏服從大盜招之而無不應舉國以與人而猶恐其不受也其所以循致而至於此者何也蓋其國輕久矣夫國重者存國輕者亡何謂重其人可以禦侮旁視者有所忌則重矣鱓鱣王鮪之在江湖非不大也然漁者徒手取之鱠之俎上而無難曾不如蛇虺之據穴國之輕亦猶是矣人主非不尊公卿大臣非不貴百官庶府非不具然庸怯和易說之如發䝉舉之如挈虛朝之慮不至夕今日之智不及明日夫如是國雖存大盜拱手舉之矣是謂國輕凡人臣之能為國重者非有服天下之名節則必有過天下之才智成湯既沒太甲失道伊尹放之可謂亂矣而諸侯不爭商卒以安者伊尹之節天下之所不敢議也晏子之在齊叔向之在晉宫之竒之在虞諸侯不敢侮此以名節為重也管仲用而威公霸郭子儀存而吐蕃罷兵李德裕草檄而澤潞亟滅此以才智為重也夫天下之人其好爭未嘗一日忘也非有大愧恥於其心而不忍為則必有大恐懼於其身而不敢為夫名節者所以愧恥天下之不義而才略者所以恐懼天下之好亂舍是二者雖聖賢無他道矣魏之亡也司馬師殺其君如屠犬馬而大臣震悸莫敢嘆息王祥鄭沖舉國而與之夫是數人者亦知是為不義也而不敢不聽者彼惟素無以動其國人而又取諸胸中而無有也晉之臣才者先叛王敦桓溫才過一時卒皆不臣劉裕才過數人者而遂取之何則國中之人莫之與敵故也夫挾好亂之資而顧其國莫之與敵則取之之心生矣故為國之患莫大於不崇名節而消天下之精鋭彼晉之公卿朝夕從事者非毁名節則尚無心方此時雖有有志之士亦且去之矣此蔡謨之所以不為司徒而曰吾恐後世之笑也天下之事有名實不可以不辨也輕名節者曰吾惡天下之矯激也黜才能者曰吾尚德也夫矯激者安能真為名節也利至則變矣世蓋有利至不回害至不避而可以矯激抑之哉夫如是而未免於矯激則庸庸者而後可矣且東漢之亂而曹操之雄至死不敢取惟畏天下之清議故也黨錮雖弊猶能存國古之所謂德也非無才之云也才不足以言矣傳曰仁者必有勇勇者不必有仁有德者必有言有言者不必有德夫言與勇才之類也而仁與德者必能兼之則世有無勇之仁不能言之德乎子産惠人也謂之衆人之母可謂德勝矣然其抗晉楚何其勇且辨也夫以無所用之質而冒之以仁義之容文之以禮樂之言治國而不能靖民臨難而不能却敵而謂之有德此固天下英雄之所侮也嗚呼為國者蓋察諸此矣晉論天下有大分君臣是也夫以天下之衆而事一人考其勢較其力則多寡異矣然天下之人不問於賢不肖俯首聽從莫敢或較一有不順則羣起而誅之夫非獨君臣之分為然也自是而下之至於一鄉一邑之際苟有尊卑大小之分者莫不皆然夫天下之分惟其出於父子兄弟之際者皆其天屬宜無足怪下至於一鄉一邑而上至於君臣是果設為尊卑而不敢犯何為而然也蓋嘗求之以謂天下之分起於天下之理夫理者本於天地而莫知其所從始者也惟其理設而不可易故分立而不可犯夫生民之初未有君臣以相臨官師以相治也紛紛藉藉以力相勝於是民始大病之而後有能服其黨者焉夫能服一鄉則一鄉尊之能服天下則天下尊之是故君臣之分遂立而不可變夫民之於君乃其自立以自治也夫惟其仰之以自治是故順命受教俯首聽從而無足怪自是而推之至於一鄉一邑亦猶是也余嘗悲夫晉之事也自三代以來其國之多故者莫如晉外有夷狄之强內有大臣之變泯絶荒亂有不忍觀者然後裂為東晉而晉亦微矣然猶相與維持至十餘世力盡勢窮陵遲百端而劉裕乃得之自劉元海以來天下分為十六國若苻堅石勒之徒皆有過人之才闢地數千里據有甲兵士民之衆又有忠勤效死之臣其所建立亦有足觀者然皆不過一再傳而遂亡方其興也宜若可以久安至其一敗遂滅不振蓋嘗觀苻堅之敗於夀春此其力猶足以善其後然提其餘衆困窮而無所歸蓋嘗求之至於君臣之分而後僅得其說夫晉之有天下積久而天下之所服也夫惟人安於所服故天下遂守其君臣之分而不敢犯人人惟恐其失之是以播遷流徙甚弱而難滅忠臣義士力以救其敗若苻石之徒雖其甚强有力然天下之情不愛其德而惡其亂不幸不能制而後使得倔强於須臾幸其敗也則起而共亡之矣或以謂君臣之分其始出於相制苟為君臣焉斯有分矣晉與夷狄何擇也夫天下之情固有所習也習而安者衆之所歸也嬰兒愛其乳之者鄰人之母乳之則不愛也均為乳也而愛惡存焉習與不習故也然則晉之初天下固習乎魏也而晉之不亡何也夫晉之不亡是幸而不至於敗而遂成其業者也十六國之顛沛此敗於分之不正者也夫好博者不皆貧也然謂博可為而不貧則不可其言固天下之理也唐論上昔者天下之事常患於不得己而為之夫事至於不得己而為者非其心之所樂而勢有所迫故也勉强而為之既立而不可變則將拱手而待患是故古之聖人其深謀逺見所以憂慮天下之故者莫不備具先為之防曲為之備使天下不幸有不測之變而吾常從容制之而不亂無鹵莽苟且之計以為後世之患嗚呼此先王之制後世之所以不可及歟竊嘗譬之世之淺人有居於河瀕而幸水之不至也則安然而不為之備一旦水至則倣徨四顧莫知所為於是毁室徙薪而塞之而後免於沒溺之患然是人也能解目前之患而退有失所之憂既巳失於其初而後將復之則薪與木者既巳溺於水而不可動矣彼其初豈不愛室與薪哉勢有所迫故也故天下之勢亦何以異於此聖人者惟先見其害而豫為之備而己然豈有他術哉是亦築防以憂溺貯水以救焚者之智也昔者節度之制起於景雲開元之間然其所治者不過於邉方控制之邦而己天寶之亂安史橫行於中原而莫之禁天子之兵弱而不能制則其勢不得不倚節度之兵而節度既己有功則雖欲變之而不可大抵至德之後天下之兵無慮數百萬皆屬於節度之府是以天下之兵仰食於度支賞罰於天子而權歸於將軍天子養之於上而將軍實收其歡心故驅之以不義之名置之於可畏之地則俯首盡力而不敢辭及天下既平前日之亂巳去而節度之患固巳不勝其深矣嗚呼天下之情不可使苟有所安也使安於義耶則吾固無求乎其他使其不義而安之則吾將欲改而不可得彼天下之兵其勢既己如此則人人有當然之心雖欲改之其道無由蓋肅宗之時大盜既平而天子之威不足以大屈於天下則其所不能變節度之弊宜無足怪然以憲宗之英明鋤蕩剗革而卒亦不能一之嗚呼勢之所習不亦甚固哉蓋嘗以謂唐之末年其君非有可亡之實若夫文武宣之三君其才可與有為而一時之臣又非皆不可用而其紀綱法度不須臾而壞蓋其大勢巳去雖有絶巧無所施之矣故唐之患不起於僖昭之間而起於天寶之際節度之强不起於河北之繼襲而起於節度之有功嗚呼使天寶之際不為是苟且急迫之制則僖昭之患何自而起而使吾初不倚節度之功則河北之區區雖欲傳襲其可得哉唐論中天寶承平兵不知戰大盜突起四海震動禦之無䇿君播國殘哥舒之敗固無足道者明皇欲下詔親征而姦臣嬖妾沮撓其事意當是時天子臨戎其有濟乎愚嘗論之天寶盜起雖上有昏德聰明杜塞抑當時朝廷無人矣故為是猖狂不審之謀夫天子臨戎其利有二天下莫能當而明皇皆不得行之幸而不行使果行之其狼狽有甚於此者何謂二利一者壓之以尊名重勢敵人雖强不忍冒犯順之危而起侮上之怒二者天子所統必天下之重兵選卒天下莫能抗也明皇之時天下之勢其重在西北而京師輕也久矣大獄屢興縉紳切齒用兵無度百姓怨苦內煽淫佚荒亂失度尊名之不競也甚矣祿山教戰久矣其將卒皆蕃戎徑卒非復唐人也彼惟恐犯順之不深侮上之不快則明皇之於尊名重勢所不得行之一也天下徑兵皆在西北藩臣握之府兵既壞天子侍衛長征彍騎而己有急而募不過長安市人子而以之抗燕代之徑騎此驅羊戰狼則明皇於重兵選卒所不得行之二也親征不可則無策乎曰知兵者必知敵人所恃與所惡使之行所惡而違所恃如是者百戰不殆祿山之利速戰也所恃范陽也十年教其民千里而用之其鋒不可當雖太公穰苴必姑避之故賊必乘其鋒而用之彼惟恐戰之不速敵人之不我拒也然祿山之勢雖强渡河而南則羇客也故心不固而易搖其恃范陽如虎豹之有山林急則必投之以自藏方祿山之南也厚集潼關之師深溝高壘勿與之戰委河南而與之是時李光弼郭子儀皆在河北遣一將搗范陽獨守空虛之東都不過半年其勢潰矣此至計也其後祿山既死慶緒北走而史思明己有范陽慶緒卒困死河朔以此知祿山失范陽則必斃於河朔諸帥也其後史思明陷東都李光弼牽之於河陽而思明不能西以此知厚集潼關之師不戰以老之而祿山無能為也祿山傾國逺鬭委其所恃而不顧固己犯天下之至危而唐之君臣不知出此唐為無人也夫唐論下昔者先王之兵愛其君而後死其將以為凡吾所以致力不顧以衛其將者無他焉以謂吾兵之勝負者非吾將之利害而所繫者吾之君耳是故功成事立而其君安然享之而無虞其不善用者則不然其兵死其將而忘其君方此之時三軍之士惟其將之為聽故不患將之不足以立功患乎功成而上不享其利夫惟欲兵之愛其君而死其將則莫若兵出於府而將出於衛使將之於兵得以用而不得以有之方其有事也厲兵秣馬以問有罪將軍之恩惠則足以取信於下而士卒之顧其將非我終身之所仰則雖愛而不私夫惟愛而不私是故驅之以義則有功而不可使為不義之行彼死其將而忘其君者是節度之兵也方是時天子能使其將而不能用其兵可使征可使戰而不能得其私天子常斂士卒之怨而將軍者實尸養士之恩嗚呼此豈非天下之大患歟蓋自天寶以來藩鎮之禍迭起而不可制而河北三鎮天下指為僣亂不臣之邦棄之而不問以謂是誠不可得而為也嗚呼盍亦深思其術哉夫以漢之時而七國連衡以叛其上而諸侯擅地天子無有以制之此其為患豈特唐之方鎮也哉其後主父偃為之一言使得自封其子弟而漢之君臣無一鏃之費而坐享泰山之安彼唐之節鎮何以異此歟彼桀黠而不顧肆傲以慢上者是誠何恃而敢為爾哉蓋其股肱肘臂有為之出死力以為之者使其孑然而自為則吾一將之敵耳故李訴之平蔡一得李祐則吳元濟束手而無能為矣然一節度之所領不下數郡之地而我何不遣一介之乘假賞功之令拔其臣屬之尤才者使帥其屬城而為之使如是而陰離之使其兵分地析則昔之豪黠而難制者不過一二耳提一空城而守之雖欲不臣其可得哉或曰彼臣屬將佐安能叛其素所愛耶名為裂地而謀相通則安在其為利哉是大不然夫人惟貧也而後肯役於富惟賤也而後肯役於貴故兩貴不能相役兩富不能相下彼其臣屬將佐之愛其帥者豈有他哉彼其有功能賞之有才能用之是故恃之以自固使其位有節度之勢則將反顧其上而疾之何則勢均位等則必有相疑之心嗚呼使彼誠相軋而生疑則吾之計行矣或曰我一日盡斥其臣佐則彼安肯安然而遣之者耶使彼遏吾命而不行則無乃益召天下之亂乎是又大不然也夫使受命而遣之耶則吾固何求使彼敢遏吾命而不行則反手而內禍及之何者使人有可以得富貴之門而有蔽於其前則必羣擊而競排之彼一日出於行伍之間而有一節度之權我則顧其私而止之夫如是而後能安者世之所未嘗有也昔者烏重裔為滄景節度凡屬城之刺史各還於朝廷使得自𨽻其州兵嘗曰使二千石各有鎮兵雖有安史無如之何而河北之所以能拒命正以能奪刺史縣令之權耳當是時惟重裔之鎮獨禀命受代然則分其地而離其兵者真弱節度之術也五代春秋時季梁在隨宫之竒在虢皆明安危曉利害强國憚之而不敢易豫竊怪五代之君雖起武夫悍卒未嘗學問不足以得士而一時將相謀臣當其敗亡之際皆足蹈坎井頭抵株木安受禍患而無䇿事成則相與苟且富貴事敗拱手受戮豈紛亂之極而人才亦從而不振歟而余深考之而得四人焉皆智士也或用或不用也則繫時君之昏明安重誨在明宗世常恨不為國家去潞王時潞王蓋一罷鎮節度也而重誨獨知禍之原在此其後卒覆國者潞王也清泰帝時石敬塘在太原欲叛有狀時廷臣有吕琦者言於朝曰敬塘必結契丹為援可先以重幣結契丹以分敬塘之援卒之立晉者契丹也使明宗與清泰信其言而先為之所可以紓禍也必矣契丹大舉入晉志吞南夏而其母述律乃獨非之曰譬之五國以一漢人為主可乎耶律德光果不能安於南夏狼狽客死於路大勞甚費而於契丹初無大利也德光喪歸其母不哭曰待中國人馬如故然後葬汝嗚呼若此戎媪亦智矣李榖韓熙載少以功名相期熙載將仕江南與榖别熙載曰江南如用我當長驅以定中原榖曰中原見用取江南如探囊中物耳己而榖相周世宗遂臣江南兵不勞而國不費信乎其如探囊也何者自古秦滅楚晉滅吳隋滅陳長江復山不能為固天下有定勢非智力可强諸葛孔明且不能用蜀取魏江南豈有長驅中原之理乎榖於審天下之勢亦明矣此四人者三見忽而一用故惟李榖獨有功嗚呼天下何嘗無士哉獨不知之耳蘇門六君子文粹卷四
