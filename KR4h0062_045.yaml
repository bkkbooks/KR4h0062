body:
  text: 蘇門六君子文粹巻四十五濟南文粹五宋李廌撰進論聖學論臣聞効一官可謂卑矣古之人必曰學而優則仕治一邑可謂微矣古之人必曰君子學道則愛人子使漆雕開仕開曰吾斯之未能信蓋以學之弗優不敢効官尹何為邑子産以為未聞政學蓋以學而後從政乃可治邑彼子路使子羔為費宰孔子以為賊夫人之子子路復曰有民人社稷焉何必讀書然後為學孔子惡其佞夫効官治邑也必由學而後可況奄有四海為天下君乎一日二日萬幾何以俾有條而不紊萬邦有衆何以俾樂推而不厭一言其㡬興喪繫之好惡所示靡然成俗如之何俾百工熈哉庶事康哉嗚呼為君實難可不學歟乾之九二曰學以聚之問以辨之寛以居之仁以行之君徳也古之聖君任賢所以能不貳去邪所以能不疑作福所以能賞善作威所以能罰惡葢以聖人之道而折衷之斷然晢矣所以能折衷聖人之道者由其中有學問以為之主也髙宗既已學於甘盤復師資於傅説觀其好學之誠意則曰爾交修予㒺予棄予惟克邁乃訓可謂勤矣此所以為商之髙宗成王席文王之大謨繼武王之大烈觀其好學之誠意則曰日就月將學有緝熈於光明佛時仔肩示我顯徳行可謂勤矣此所以為周之成王於皇有宋本支百世世有哲王故天縱陛下之聖徳温文日就天誘陛下之宸𠂻睿智夙成仁愛孝恭出於天性是皆生知天毓受道之質矣重念承平累聖之業御兹九有之師欲致乎治必先乎學學也者致治之道也古之聖賢不可得而見矣其言具載方䇿要之皆王者事爾人臣學之期以致君人君學之自致其治故天地之情隂陽之理吉凶之變失得之故備在乎易而卦者時也一治一亂或美或惡初不可齊亂可使治惡可使美察理之變為時之主惟君乃能之臣願陛下學易則體乾御坤進陽退隂觀道設教運神合徳使天下之時常為泰而無至於否嘗為晉而無至於剥天子之學易固當如此一國之事係諸侯之本天下之事形四方之風美盛徳告成功者皆在於詩四詩之名各辨其實不敢誣也臣願學詩則為政之大而無入於小雅為政以正而無淪於變雅無若東周降於國風必使功徳終美於頌天子學詩固當如此夫尊王正法謹始善終詳天地之災祥著君臣之美惡者無尚於春秋臣願陛下學春秋則師治而懲亂賞善而罰罪常為知孔子者無為罪孔子者夫堯舜禹湯文武成康之世其典謨訓誥誓命之文百王之心迹治亂之大略者無尚於書臣願陛下學書則考稽古之得失操制今之法令皇步帝驟王馳霸騖一皆得之陛下欲以正六職以治六官必也學夫周禮然後百工允釐庶績咸熈巍巍乎其有成功也陛下欲以正其威儀詳其辭令必也學夫儀禮然後五禮之合制見於典章文物之間六儀之中節見於動容周旋之際煥乎其有文章矣陛下又當發揮孔孟之正道鋤治百家之邪説在亹亹而已乾之象曰天行徤君子以自强不息詩曰勉勉我王綱紀四方惟陛下不倦以終之則日進無疆聖益聖矣天下幸甚伏惟陛下有聖人之材而君聖人之位能進聖人之學以充聖人之道則功利天地澤及萬世可侔徳商宗周成矣雖然陛下有好學之誠而無進學之説陛下有望道之心而無望道之人則或博而寡要勞而無功故陪卿之列賔師之選不可不謹臣願不可與迂儒共學迂儒好為太髙不經之論將使陛下畏道之難行或自畫矣不可與佞儒共學佞儒好為苟合過情之譽將使陛下志滿假而輕道術或自聖矣願陛下妙選忠義正直博學守道之士以備顧問則用力少而見功多適道正而為利博天下幸甚薦舉論臣聞薦得其人則受賞薦非其人則被罰古之道也必有賞以勸之然後可使舉善必有罰以威之然後可禁朋邪獨賞而已則競獵虚名冀僥倖以自進獨罰而已則雖有真賢皆疑畏而不敢進之鄂千秋之於蕭何一言而爵通侯驩兠之於共工一言而放崇山何勸沮之較著也夫人之情喜賞而惡罰國之格難賞而易犯人之所喜國之所難也人之所惡國之所易也可以賞而賞之緩則人必相謂曰慎無舉賢徒勞人爾賢則欲我舉而㤙則吝也況無賞乎苟可罰而必罰之則人必相謂曰慎無舉賢徒多累耳賞則未必予人而罰則信也況專用罰乎且古者進賢受上賞蔽賢䝉顯戮貢士之諸侯則至於加九錫不貢士之諸侯至於黜爵地以是推之惟恐有賢而不進也堯求若采而啟明之嚚訟乃被薦於放齊堯求治洪水而伯鯀之方命乃被薦於四嶽即其昧於知人則宜若驩兠之放可也堯則置而不問舜則不復罪之何哉葢人實不易知而嚚訟方命其惡在外而易辨靜言象恭其惡在心而難知以堯舜之聖猶且愛而畏之則放齊四岳之過舉豈與驩兠同科以是推之雖或可罰猶當恕之有賢而必進進之未當恕之勿責則是聖人之於天下求賢之意深罪不肖之意淺用賞之意多用罰之意簡願治之意詳施刑之意略故忠厚之化格於民心而天下無遺賢今也於薦舉之制疑若罪不肖之意深求賢之意淺用罰之意嚴用賞之意簡施刑之意詳求治之意略如之何致天下之賢以為吾用哉故有司妄測朝廷之意例以進賢為末發有罪為本發有罪為有功無過進賢為有過無功朝廷授我黜陟之權者本以我為徤吏耳不若峻法以寡㤙朝廷俾我薦舉之職者特循故事耳今又無賞而有罰故雖有薦舉之名而無薦舉之實非徒無實而又市之何哉借若甲為長吏於此乙為長吏於彼甲舉乙之所私然後乙舉甲之所私非有意於所舉之人也甲乙自為施報也惟其自施報乃假手自舉其所私非謂市之歟夫薦舉之意豈不欲得有道之士乎有道之士安能容悦以自獻豈不欲得孤寒之士乎孤寒之士其誰憐恤而為援故凡所克舉類皆肉食者締交黨與彌縫倡和之人未嘗聞拔一滯淹擢一豪俊真可用者如是欲羣賢連茹而升有是理乎陛下之聰明灼知邪正如别白黒則古之人所謂達視其所舉又曰觀近臣以其所為主者不待臣言而後喻也為今之計莫若先詔大臣議復薦賢之賞使天下無吝㤙之議庶幾勸沮之道人皆信之然後使凡薦舉者必如摘發之詳得以考稽焉葢今天下之長吏凡所摘發者必鋪陳其罪以聞於上曰某人嘗為某事可以抵罪期必抵罪而後已其所薦舉者則含糊其言假借其實文具而已未嘗鋪陳其事以聞於上曰某人嘗為某事可以任使期必任使而後已雖然固亦有鋪陳以聞上者必曰某人有幹才嘗於某處生財幾十萬某人有機略嘗於某處鞫獄幾十次矣苟使薦舉之奏如摘發之奏則下臣之善安有不聞達者朝廷聞而用之後更器使踐華要必使自言曰非某所薦安能至此陳平封侯而魏無知因以受賞者旌薦舉之人無忘其功則其徳厚矣彼周行而封列侯自諸侯而加九錫固不可指以為格願視其舉者之髙卑量為舉主之酬奬可也以今之法所舉之人一陷有罪則凡為舉主者坐之至有削品秩上印綬不少貸今舉主以所舉酬奬又何勸焉臣又竊以一郡論之夫一郡之内文武寮宷不啻百人而部刺史所舉之法嵗才二三而許之摘發者無員數謂凡可摘發者必摘發也至於薦舉奚獨不然豈使員足矣爾後雖有可舉置而勿恤嗚呼是朝廷許其蔽賢矣故坐席未温已舉所私所私既畢餘見真可舉者則謂之曰非不知君柰何舉之人數已足矣臣願陛下既下薦賢之賞乃詔天下長吏見可舉者舉之不必限之以數或無可舉則已之又不必充數則庶幾無憾焉古昔逮今長吏以薦舉為恩下吏以奔競為俗或賣交以進已或賂人以借譽或飲食玩好以豢其親信或姑息俯傴以媚其僕御或卑辭以足恭或面柔以求悦吮癰䑛痔曾不以為羞指天誓日曾不以為愧自非宣哲見幾之士未有不墮其彀中而謬舉者矣願詔長吏以阿大夫之所以烹即墨大夫之所以封者為之龜鑑勿妄許人以為國士也必欲公舉則使下吏明其功過於考績之書無崇虚文嵗終則取諸考課之書稽考而優劣之可舉者書其可舉之行能可黜者書其可黜之過惡揭於公堂使吏民得以議之以為可舉也然後舉之可黜也然後黜之則無僭無濫臣之説無遺慮矣然亦不可不防者天下被薦或多吏部病其難選也臣願以四科第之行同能偶也復以被薦多寡為差況朝廷必使直得其賢則又何多矣或多賢而多薦之無憚其勞此太平之光也浮圖論臣嘗厯觀前世之弊及其甚也必有有為之主以拯捄之獨千世承襲其弊而安受之者浮圖而已浮圖非無可觀也百氏之家一家之説也非不可為教也西域之國一國之俗也不幸王者迹熄之後聖人道㣲之時乘間竊入中國當時君臣辨之不早制之不剛俾盤根滋蔓為弊於後東漢明帝之罪也其間非無英睿剛克之君忠義正直之臣欲除其弊終亦不能者何哉葢銷之不以道制之不以漸故也蓋英睿剛克之君灼見非有益於吾民也必欲掃除之正如欲効華陀之治醫也將剖膚鑿骨湔腸胃以去其疾豈不雄哉柰何臣下或獻禍福之一言則惶懼隨之極且罷而不敢復言矣必曰姑且聴之此其所以長有也前日武宗是也毁天下寺宇四千餘區冠笄天下僧尼二十餘萬豈不快歟東西京藩府輔郡猶量留寺與僧豈禍福之説已貳於胸中耶何使絶無而僅有耶宣懿之世則一切復之終令彼勝於此乃所謂銷之不以道制之不以漸故乃爾也忠義正直之臣極言期有損而無補也必欲掃除之正如近時水官之治河也欲竭太行之土淇園之竹以塞怒流不已疎哉奈何世主疑禍福之多端則患惡及之遂及誅竄者矣必曰爾敢非聖人惟其謂之聖人此其徒聞而益熾也前日韓愈是也憲宗遣使迎佛骨於鳳翔王公大人灼體膚委珍貝以惑其法愈極詆其道且欲以佛骨付之水火憲宗怒欲誅愈以謝佛裴度崔羣力救其死猶逺貶海南濵於死所今彼盛於此乃所謂銷之不以道制之不以漸故乃爾也初欲抑之乃所以揚之初欲沮之乃所以長之故根日益大蔓日益滋以至於今日國家不惟安受千世之弊而不知捄又從而唱大之遂使賊人乘時所尚公肆厥姦與國爭雄被華堂大宇丹楹刻桷敢踰制於王宫撞鐘伐鼓聚黨數千敢僭禮於朝位已為可禁雖然彼所以侈其居盛其徒者本欲以誘愚夫愚婦而已柰何王公卿士競登其門而師之朝衣朝冠或立侍於其座或旅拜於其庭或尊之如天神欽之如父祖彼有道之士以學佛隠者固亦有矣而姦人假學佛以欺世者常多固不當事之如此以虧國體臣恐孔子復生於今日則羣公卿士忌嫉者衆矣不能如是以奉事之也詩有云入于幽谷遷于喬木孟子曰未聞下喬木而入於幽谷者今浮圗之教唱大於中而孔孟之道㡬墜於地矣凡學孔孟之道者相率而入於幽谷乎可不謂之大惑歟臣今不復更以傳弈之辨韓愈之疏言之直以文中子之言為信曰佛者西方之聖人也果為聖人豈不惡其徒憑籍其説以猖狂妄行於今之世哉為今之計不必推罪於佛惟治其徒苟惟其徒之罪又何難焉臣願陛下盛言其佛之長極言其徒之短臣請叙其説曰蓋聞佛者西方之聖人也以清淨寂滅為心戒定慈忍為行色空為道禪律為法凡願學佛者必當簡身周慎持法謹嚴枯槁其形骸齋戒其心志自治其身自求其道不可輒出户庭不可雜交民俗戒牒之文其宻如縷苟能如此雖異道不害為君子乃者學佛之人類皆㳺俠之輩或惰農之鄙夫或怠績之愚婦或好蕩之儇子或好倡之冶女居金碧之室食稻梁之勝幸災樂禍自為風俗姦人不義自為朋黨訊其何以謂之禪何以謂之佛則罔聞知者十常八九如此則大設寺宇乃為爾等容姦之地嵗度徒衆乃為爾等置畔道之人既蠧於國實敗汝徳自今以前吾一洗之勿問自今以始吾將使汝不出户庭專治其佛之説而躬行之所受戒文令禮部著以為令刑部防之以法期汝必行如不能然一聽歸俗願仍舊者真能奉其師之説聽其君之令者也然後以常住衣食之可謂待汝之意厚矣既仍舊為僧尼乃敢尚為過惡許人人得以告捕是不從君之教而背其師之説誅之刑之齋供禱祠任民自然不可以擾親戚故舊不可私其所昵假手以投男雖父兄不可以適尼之居女雖諸母不可以適僧之舍人人得以告捕抵法陛下果以此説下詔假學佛之衣服以蔵姦詐假學佛之衣服以墮農績皆不能自信而願去不可勝數良家子女觀其法之峻嚴烏敢違父母之養舍室家之倫避安逸從枯槁哉如此則良民自願為其奴婢者自寡矣雖然固亦有為之者矣不加多也莊子言魯多儒國君下令而敢儒服者一人而己亦是意歟此乃銷之有道制之有漸以嵗月之乆俟其自衰而已譬之以醫則緩以藥石治之俟其自平乃止不必用華陀之術也譬之以治水則固隄防以導之使復故道乃止不必橫塞其怒流也或曰子痛詆佛而抑其徒則吾徒獨不然乎一皆如孔子耶臣曰稂莠與五榖並生於田為之農者當鋤治其稂莠乎將鋤治其五榖乎五榖雖未必皆穎栗堅好要之吾所種也今千萬年無佛何加何損一日無吾道則如之何或曰子不畏禍福歟臣曰佛既為聖人則所當論者道也於其書而考之固亦粲然矣至於禍福報應之論特後之譯者妄爾雖或言之如莊周之寓言乎鄒衍之談天乎公孫龍之詭辭乎皆可稽考之耶願陛下勿惑禍福而忽臣之説慎兵論臣聞兵不可好好兵者嗜殺人者也戰不可忘忘戰者棄民者也臣嘗原兵之理我克敵敵克我要之各有相傷為民父母奈何使民兩有相傷中道無罪而害其生哉萬一正不獲意則權必用武乃濟然後哀矜愴惻而用之以犯難難平即止非復可玩此以殺去殺以戰去戰之術也司馬法曰不違時不厯民病所以愛民也不加喪不因凶所以愛夫民也冬夏不興師所以兼愛其民也後之人君豈䘏是哉爭城則戰矣爭地則戰矣爭長則戰矣爭利則戰矣有小忿則戰矣有違言則戰矣代翕代張代存代亡民不加多率以戰死獨何辜哉今日暴原野之白骨乃昔者暴原野白骨之子孫也人君當視人如已以已推人則好戰之心自平夫士卒之痛思已之痛士卒之傷思已之傷矢石在前白刃在左右法令在後萬死之間幸於一生其危心如何彼貴賤雖異位而喜懼好惡之心無二況復殺一人則父母妻子失所而無依者數人或至於殺其子孫則嗣續遂絶者夫推愛物之心猶不忍暴殄天物況人乎不戰而屈人兵者正慎於此故觀無衣之詩然後見興師之情觀楊之水之詩然後見屯戍之思觀葛生之詩然後見戰殁之感迨夫民日益寡國日益削力日益屈財日益殫於是惻然哀恫其前非殆矣主父偃曰務戰勝窮武事未有不悔者豈特悔而已禍亦隨之夫三世為將道家猶且忌之況好兵之主乎故禍莫大乎好兵好兵之心有二曰幸曰侈孔子曰不仁者不可以長處樂不可以乆處約帷樂與約處之實難自匹夫至於天下國家其召禍之漸均生於有餘不足有餘則侈心生不足則幸心生幸心之禍在厥身侈心之禍在子孫今夫國迫小而鮮長慮才褊急而多妄計貪而無謀勇而無禮惟試僥倖於一戰萬一償志於是乎幸心生矣幸心一生故不量力不度徳而所較非其敵志徒大心徒勞而所求非其道如卵投石如指撓沸自求危難屠其城夷其社覆其宗絶其嗣者踵相及孟子所謂縁木求魚無後災以若所為求若所欲後必有災是也不足為有天下者道若夫燕安閒暇財豐力富旁視四顧無一不可惟外事四夷然後快意於是侈心生矣侈心一生故好大喜功而不以休息元元為念窮兵黷武惟以無戰伐功為愧自求憂患困役傷財得寸損尺怨滿天地而禍及子孫衆仲所謂兵猶火也不戢將自焚者是也前王既以此致凶咎後王當以此為龜鑑古之好兵無功而其主非賢者不足道好兵而賢且有功者莫若漢孝武唐太宗夫孝武席髙祖文景之餘業太倉有紅腐之粟内府有貫朽之錢故放心肆欲玩兵耀武以事疆場内則有期門羽林孤兒佽飛騎士之兵外則有六郡良家之士總節制以統軍則有衛將軍之智提孤軍以深噪則有霍驃騎之勇又有李廣程不識蘇建貳師安國嚴助李息徐自為荀彘之徒以帥偏師楊僕路博徳李蔡王恢李陵李沮公孫賀公孫敖之徒以將别部擊匈奴救東甌平南粤誅昆邪平西羌伐朝鮮征大宛乃置朔方南海武威儋耳牂牁樂浪等二十四郡厥勛偉哉太宗以英雄神武戡定禍難以基王業自偏裨小校至於為帝大小戰無慮累百未嘗挫衂有若李勣李靖柴紹衛孝節薛萬徹之徒以平突厥有若道宗道彦樊興宗段志元髙甑生之徒以平吐谷渾有若侯君集薛萬鈞之徒以平髙昌有若李襲譽李大亮之徒以平延陀有若牛進達之徒以平吐蕃有若郭孝恪之徒以平焉耆有若李子和齊善張士貴張徳寶上官懐仁之徒以平諸獠有若契苾何力阿史那社爾之徒以平龜兹邦國既底定諸盜既勦絶其餘勇故氣猶未肯寧晚命馬周李勣張儉張亮為將統十六總管之兵復逺駕遼海親征髙麗厥勛偉哉以漢武唐太宗之伐功度越前世所殺敵人固不可億數然士卒物故亦已多矣故君子曰戾太子父子庶人承乾兄弟之釁實由於兵臣故曰兵不可好禍莫大於好兵好兵之禍雖無近殃必有逺憂則慎用兵而重民命者其得福必永矣或曰子論兵而以好兵之禍為先柰何為驚人主心兵可去乎臣曰知戰可慎民可愛兵可蹔而不可玩禍可去福可就然後可以用兵矣書所謂知稼穡之難乃逸之意歟故曰仁者愛人惡人之害人義者循理惡人之亂紀以慈為兵意是乃仁術又安可去太祖皇帝昭受昊天之成命市不易肆兵不衂刅與漢唐百戰以得天下固已異道五宗相承奉之以徳雖間用兵兵出有名未嘗有漢唐之侈心則基福而逺禍也其已乆矣陛下紹繼大烈可垂拱無為以荷天休然内寜必戒外居安必慮危故戰不可忘兵未可去戰雖不可忘當念民命之可重兵雖未可去當念好兵之貽禍鑒視漢唐之侈心緝熈祖宗之多福或有曰今太平可恃四夷無虞宜毁兵革銷鋒鏑者是自弊之論也願陛下勿聴或有曰今太平有餘四夷可討除宜興師旅闢土地者是召禍之論也願陛下勿聴臣願陛下妙選將帥必求其良訓練士卒必致其精謹烽候繕甲械積芻粟固營壘以待四圉不害中國之為强脱若攖吾憲吾以逸待勞以直待曲真天子之兵也蘇門六君子文粹巻四十五
