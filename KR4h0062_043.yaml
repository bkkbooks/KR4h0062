body:
  text: 蘇門六君子文粹卷四十三後山文粹四宋陳師道撰䇿問盍各言爾志問子曰盍各言爾志又曰言之不出恥躬之不逮也言不逺志行不違言古之學也願聞二三子之志以觀德焉敬在下風河患問河出積石行地萬里至趙魏而為患豈其勢之然耶自禹治水更商周至漢而為患漢之後復無聞焉至今而為患豈其時之然耶今自小吳之決失其故道議者多矣或謂故道可復或以謂因其勢而順導之二者何施而可也禹之治水其事見於書其理見於孟子諸君講之詳矣願聞其説以施於今備水旱問水旱有常數雖堯湯不能免而談者以謂能為之備也夫損上以益下非惠而不費之道而古語有之三年耕有一年之食三十年計之則有九年之水七年之旱無足憂者此豈所謂備耶國家承平百年而效未臻此其故何也究觀古今儒者之論富之之道母奪其田里之民以時耕斂則其弊安在願聞二三子之説以觀政焉治外之道問夷狄之為患舊矣詩書所載唐虞三代治外之道蓋可考也惇德允元而難任人蠻夷率服舞干羽而有苗格舜之事也以國與人太王之事也以大事小文王之事也通道夷蠻武王之事也薄伐玁狁至於太原宣王之事也其事同而治異何也豈其時之異乎擇於數者孰宜於今嚴尤以謂古無上䇿則數君子者皆非也耶文王既聖矣顧不能順之而事之何也舜既能之矣則何畏乎有苗何憂乎蠻夷猾夏耶豈詩書所載不可盡信歟二三子以謂何如汲黯問史稱汲黯之戅而武帝以謂近古社稷之臣何其異也黯固武帝所不恱而敬禮不衰不冠不見夫人臣而屈其主何以得之黯閉閣不事事而所臨三郡皆以治稱楚地盜鑄不禁宜用文吏以武勝而獨用黯何也淮南君臣謂丞相可説大將軍可刺而獨畏黯黯不可説也亦不可近乎願聞其説水患陳之為州舊矣而近嵗以來以水為憂秋夏之間四顧百里不見涯涘議者以謂浚八丈之渠達之於淮可紓今日之憂而潁人不善也議者又謂潁不與陳同利共患過為異論豈其然哉願聞潁之所以不利以告有司而定其論諸子各相是非問君子之道同而其所以異者人異師學異術也孟子之學出於子思子思出於曾子莊子之學出於田子方子方出於子夏荀子之學出於子弓子弓者仲弓也揚子之學出於莊君平君平出於老莊韓子之學出於子輿五家同出於孔氏而其説相反孔子稱夷惠而子輿非之子休譽子方而毁仲尼荀卿非子思孟子揚子雲下老莊荀而尊孟氏退之謂荀揚大醇小疵而孔墨同道然則孟子拒之非耶夫諸子之相非其相存耶而相違耶其屈人而自伸耶抑亦喜攻人之短歟不然其有説乎二三子明於六經而通古今之志願有聞焉祭天地問政莫大於祭天地又祭之大者學者詳焉古者祭天於南祭地於北王者臨之父母之義也國家三嵗一郊而不及地於是合祭焉元豐之間罷合祭而議北郊之禮而未及行命復合天地於泰壇而禮官以為非欲修方丘之祭而有司議其費然則何施而可也其詳著之推行經界問孟子曰仁政自經界始經界既正分田制祿可坐而定也井地之法既失其詳而唐之制授以口分永業賦以租庸調號稱近古尚可考也夫時異則事異事異則法異為今之政其所先者豈亦經界也耶使如孟子之言則唐氏之制願聞其詳其戾於古與宜於今者其説有幾推而行之亦必有道吾子其毋隱焉孔子周官教人先後不同人生而善猶須學以成之故自唐虞三代國鄉黨家莫不有教而其教之之道後無傳焉今自京師外及郡府皆置師弟子而又為之學以教宗子可謂盛矣夫世祿之家鮮克繇禮謂其居之然也與夫自奮閭巷約身苦志明習世故者固有異矣則教之之道宜何先焉昔孔子之教先詩禮而成於樂而周官國子聽於司樂何其先後之戾耶二三子以謂如何士之志士之行士有志同而行異又有志異而行同故君子論其本也東漢之末天下之士危言髙行忘生以正世而李杜為之冠卒至喪身破族而國隨之亡徐孺子隱身逃世默然自守以全其生行既不同志亦異趣君子何取焉二三子其詳言之太史公六家班固九流荀卿非十二子莊周語道術太史公之論六家班固之序九流知其各有所長亦各有所短也至荀卿之非十二子則咸無取焉莊周之語道術又皆出於聖人其故何也烏有同出於道而無一可取其相違戾莫甚於此豈其固相反耶抑各有在歟折𠂻於經君子何取焉願聞其説將相史稱相必曰蕭曹將必曰衛霍何佐漢信有功矣參不事事荒酒無度而與之等夫守而不失庸人之所能而稱賢何也青去病不學兵法以力取勝如史之稱特天幸耳安得賢二三子講之詳矣其著明之韓非韓非本道德而號刑名為説難而卒死之何其用之異耶李斯自謂不及非使秦用之其所成就與斯何如願聞其説孔子何以取子貢司馬遷稱子貢一出五國有變今考其辭反覆變詐戰國縱橫之士耳又稱好廢舉列之貨殖夫子貢孔門之髙弟而其行如此遷之言疑不可信考之論語以言語稱而又譏其貨殖則遷之言不為妄而孔子何取焉其明辨之伯夷與武王周公孰是商放桀武王伐紂書載其事伯夷叔齊扣馬而諫論語賢之四人之行不同而孔子皆取焉是非不明學者莫知所從孟子以謂伊尹伯夷皆聖人也而其所為若是之異乎豈清任之行不同如此則其所同者何也韓子曰若伯夷者特立獨行窮天地亘萬世而不怨者也夫以伯夷為是則武王周公舍已而從人矣以武王周公為是則伯夷行怪矣二者不得皆是也至其恥食粟而餓死豈真違世而取名者乎二三子何取焉士之言行古之取士以行後之取士以言舉之以行則患其飾智而競利試之以言則又患其不能行也然則何施而可乎今欲使天下之士行而不偽言而能行其亦有道乎二三子其詳之孔孟之言不同孔子不居聖而亦未嘗與人也伯夷叔齊賢人也博施濟衆堯舜病諸柳下惠則降志辱身矣而孟子皆以為聖夫孟子學孔子者也而其言異何也願決疑於二三子其詳陳之擇守令吏之近民莫如守令故選法尤謹歷嵗察亷而後得進宜得其人而反不稱所舉其弊何出其法何施而可也古稱得人必曰漢唐稱號循良其何人選用其何法其明著之天下之治莫先於地法而唐之制可考焉昔周公之為周其致君成俗則有德其持世遺後則有政政者法制是也故周雖衰有中材可以振起之而卒不振者無其人也後之君臣相與成國而一民功則多矣至其為治例多草創後無以守之惟管子之於齊房杜之於唐雖闕於教化而作為一代之制則幾於周不亦偉乎夫文公敬仲之法略見於周官國語其詳不可推究而世變俗移恐亦難於行也而唐去今未逺其書具在尚可考也孟子曰經界既正分田制祿可坐而定則天下之治莫先於地法而唐之制授以永業口分斂以租庸調學者之所知也願聞其説而施之於今何所因革推而行之以何道也其明著之蘇門六君子文粹卷四十三
