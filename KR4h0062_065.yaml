body:
  text: 蘇門六君子文粹卷六十五濟北文粹六宋朝補之撰書上皇帝論北事書臣朝補之謹齊戒擇日昧死上書皇帝陛下臣窮年抱經志願局促緑衣紵絮多學無益竊甘野人自曝之溫輒昧廣厦重裘之燠退無尸祝尊俎之位進干庖人操刀之職不計僭越冒言天下之事陛下赦其狂瞽而矜其市井草莽有介然之心一賜察省天下幸甚天下之治莫大於制禮作樂而臣之愚以謂二事有在於施設之後者其所先舉者以定天下晏然則禮不制而備樂不作而治凡此所缺特北邊一事而已臣思之至深以謂陛下神道設教紀綱既正天下大定燕居而髙拱百工安職四民樂業矣而不能無一朝之事或經聖慮者庶幾在此乃臣之狂瞽而深思所至有取萬一則臣區區窮年抱經志願局促猶不為緑衣紵絮多學無益夫豈惟天下幸甚臣之師教臣亦若此也北人強悍屢冒故疆使天下百年有為兵不得藏今四野肅清邊不告遽而縉紳先生四方寒士或北首憤悱爭道利害者非願於太平無為之時生事覔功特以中國之地前王之舊有未復而已獻言陳計者踵相接於國陛下優而容之如假種借耕久貸不償亦不以券責豈非周慎再思萬舉萬全以謂將欲取之必固豫之不欲以所重施所輕哉內治未具不遑外憂心腹既寧手足當治以今準昔莫利此時置而不念何以異夫宿雨坳池科斗所泳不以時去設不害事而蛙黽日喧乃臣之所願為陛下深思者特曰以中國之師責中國之地得地而師解不為無名如此而已陛下知兵之道愈於黃帝復古之功過於宣王披圖在目長想逺慮則窮髮龍堆引領內附不待前箸而臣私憂過計竊不自揆忘已之愚不敢膠柱鼓瑟御馬以書陛下一發天光使得竭忠則言而有罪非臣所敢避也夫北方之敵莫盛漢唐而所以制之亦漢唐為得三王以前事不經見戰國之際人自為防遍舉悉數則孰與四庫之書終始為備百職之謀同異致詳故臣輒皆置而不論論漢唐之所以制其彊者其彊可制則方其弱時不論可知漢病胸奴唐病突厥至於畿內鳴鏑渭橋按轡六軍敗于朔方百姓陷於絶域其形如此之逼也然而列五單于滅兩突厥擒回紇制延陀漠南塞北皆漢之賦盧龍松漠皆唐之府臣深思至此然後知北方之敵雖莫盛於漢唐而所以制之亦漢唐為得也冒頓烏維力足以弊漢而武帝雄才數戰不倦胸奴絶漠自以漢不能至而漢率二三嵗一出或二千里不見一人故胸奴至於奔走逃竄罷極苦之夫搏鼠當庭善遁易失灌垣熏穴則生無聊賴故欲戰在我則不欲戰在敵此其情自昔然也頡利突利進如飈風而太宗知兵善戰虜在其術中而不悟兩陳馳語二主坐擕六騎臨水羣酋奪魄指靈朔之境曰我將滅之命有司更所與書為詔若敕思摩孱懦至感恩流涕願為鎖鑰永鎮北門蓋五十年無突厥患臣嘗壯二主以謂得一時之權置三王之事則漢唐之事猶在中策何遽無策乎今臣又計之耶律雖桀驁其彊亦未有以過胸奴突厥者陛下神武不殺髙越前世制之得術可使繞指惟上之命何至越百餘年而不暇營哉臣請為陛下言契丹可取之形五古者外裔無大君長種落部族不相統攝捽摶鬬擊彊者為制往往而聚者百有餘處勝不相推敗不相愛尺地一民不自保而有也無城郭邑居故其民遷徙難制無耕田作業故其人食足不勞無文書約束故其人一而易使無營陳行伍故其人戰自趨利彼以其智力之全不治四者而一之於鞍馬射獵中國亦以其智力雜治四者日夜不息而以應敵人之至間故其自視常以無法勝中國利則烏合譟而從人不利則雲散四去欲追無所自漢時冒頓盡有北陲之地始不安其舊而有侈心尺地之民皆欲保而有之不能去也其後衛律教單于穿井築城治樓以藏粟或者以謂彼不能守降及唐世尤以合中國之好為重至佩印綬服爵命廢一置一皆决於朝廷其人之在中國者或樂而忘歸北方自是益雜中國之俗乃臣以今料之則盧龍范陽中國故地又非特如此而已城郭邑居耕田作業文書約束營陳行伍四者皆因漢俗而彼無一長雜處而交治欲其民胥聽約束而下已難堪此其可取之形一也冒頓烏維伊種皆席胸奴之始彊能以其力為中國患武帝中年力盡於用兵而朔方之患無嵗無之然胸奴卒不能踰塞而南以有漢尺寸之地而隂山草木茂盛單于之所依阻者漢輒奪焉胸奴失隂山之後過之未嘗不哭也頡利突利延陀之兵皆號精悍數入冦唐一旦至渭上薄畿內唐亦以其南征北伐之餘力完不弊日削月剝至奪其地而𨽻都護府不敢輒怨蓋未有坦然肆志擁據形勝之地負恃甲兵之强如耶律之侈者臣嘗計之其君亦非有冒頓頡利等輩沉毅雄勇之姿阿保謹特有天命而德光之暴以謂晉之立自我晉亦不勝其德而屈之故獻納不絶使者相望且將竭府庫帑藏以博其歡心而敵未饜也此如秦之并吞六國地不盡兵不止亦足悲也夫人之情勝則驕驕則不自彊乘秋未霜則水濱之腐草猶足以爭明於隂夜天寒既至萬物將肅則莫或使之一夕而零其理然也璟明與賢類皆柔懦不事事隆緒稱多謀不能復振焉宗真好樂兩母爭權至內相殘當是時皆有可乘之隙而中國不取迄於今四十年彼其君苟非有過人之才臣知今日之治與璟明宗真未大異也夫知敵之主知敵之將則每戰不殆彼曲我直我整彼亂此其可取之形二也石氏之割地當其需人之力制命在外無以異於晉惠公河外之列城買入而已無積仁纍義之資一朝而有天下舉天下之大鰓鰓然常恐其不能守何暇重割地哉譬窮室之人驟獲千金不能經營販夫孺子皆得以起而制其弊富家巨室力足以仁其四鄰則四鄰之外所衣食者猶我有也尚誰得而嗇之哉石氏既亡京師不守中國為之一虛當時人君內憂其腹心外病其四鄰中國狼顧自救之不暇故契丹得以竊計其不及圖已而跳踉虛喝求以堅中國不動之心至於柴周天下小定以其享國之日淺乃能用一朝之議一戰而勝以復三關繇是言之契丹雖强中國雖積衰之緒猶足以勝之况治朝哉耶律明時勢已浸盛柴周之取三關蓋人有告之者曰此本漢地何惜之有然則彼其平居驁然不顧跳踉虛喝豈固敢吝其非已有之分為所常守之資哉求以堅中國不動之心而已今國家百年太平而陛下神武不殺髙越前古心有所懷感動萬里柴周叔世臣豈敢議然以今天下言之運偶聖人時在千一富萬柴周力萬柴周將賢則萬柴周士勇則萬柴周斷而必行鬼神且避以攻外裔勢易破竹此其可取之形三也太祖龍興不折一矢不馳一馬而有天下天下稽顙而稱臣五國委命而下吏夏商之興莫若此之捷也當是時舉中國之兵十二萬而已太宗皇帝繼以神武之資經營四方至於大定并汾之討師久於外雖迄奏功然倉廪之羡士卒之鋭殫憊於河東太宗為社稷長慮慨然太息有恢復心士不弛弓馬不解勒倍道兼行越數百里一日出塞金鼓之聲如在天上敵不素備而燕城遂圍分軍收城所向輒靡天下以謂遂無契丹幽燕之人老弱登陴而望乘輿無意復戰彼之計自謂力不足抗乃為先聲張言兵至號五十萬太宗重愛民命不肯以力服人欲退修德以懷之而師久翺翔士馬南首亦有怠意幾舉而捨燕既釋圍而諸將所下輒復失之蓋臣聞之城中有謀執其帥而降者王師既還莫不泣下雖然契丹自是始有疑中國之心四方已定中國厭兵景德之役乘中國不虞大舉來攻章聖北巡天意助順彍弩竊發遂隕達蘭敵相顧自失屈首請命亦無復鬭志當時之議以謂乘勝席卷兩翼遮前大軍從後可使無遺噍而天子嘉其既服亦棄不戮彼始痛自懲艾以謂戰勝不可得而恃也夫太宗以收并汾之餘力計議無素倉卒北狩然而一舉幾復章聖以敵出不虞至圍輔郡出師逆擊然而一戰遂却况今陛下席祖宗積纍之舊敵不加彊而中國之盛則倍前日肉食之謀芻蕘之言垂數十年已審已備計成而動何慮不獲此其可取之形四也太祖神武有希世之謀御將訓兵臨機料敵出人意表舉天下之衆宰制役使如視嬰兒嘗謂契丹之衆不過二十萬吾以十縑購一人二百萬縑足矣以太祖神武左右之將不減衛霍滅越滅吳滅江南滅蜀滅河東天下已安四方之金帛充於內府士卒平居無事奕博超距志意無所騁當是時中國特不舉設有為彼孰能禦之者天下百年無水旱兵革法度致修人物阜安以三十年之通制國用山積水委漢唐所無則成太祖之志臣以謂固在於今日陛下建學設科使為士者知兵頒教立法使為兵者知戰十有餘年墮慢疲軟之氣既獲拯矣而堅甲利兵羡於四邊偏州小戍不移而具臣竊以北道三數者言之通都要路一庫之藏足以衣被十萬况濟之以大司馬之備也驃騎西征偏師南略河湟六城交州九郡歸命內附而飛挽之煩不及於邊民此其美古未有也舉事動衆宜百日之費者今千日之費不憂乏宜百金之賞者今千金之賞不憂匱蓋非徒以重費重賞為得也要以為前世之所不為者知今日之能為之而已順流建瓴如風靡草以臨不加彊之敵此其可取之形五也兵法曰形兵之極陛下亦既知形則不圖而何待臣請為陛下言所以破敵之策夫欲興大事所病者兵不衆食不充天下之言者必曰舉二十萬衆度百日糧鳴鼓而攻之以臨不加彊之敵如孟賁之戰嬰兒何往而不可入而臣獨計以謂非勝之難所以破之者實難以樊噲之驍悍自意得十萬之衆足以橫行於胸奴而或者曰樊噲可斬夫使好竒之人不度是非不量利害髙論而慷慨其言固甚可喜然空語無施於實事則陛下尚誰取之今臣則不然舉二十萬衆度百日糧非三年經營之不可借使以國家之盛一朝而可集銜枚縛馬口千里奄至為計甚祕而人固有知之者矣綿十許州塘水之浸以彼入非易故我入亦難阻塞而陳燕亦起而拒白溝之南兵雖衆食雖充非勝不能入也臣請為陛下效臣之狂計蓋昔者尉陀據越漢兵出豫章出㑹稽而唐蒙獨上書發巴蜀罪人下牂牁以出越人不意卒擒尉陀蜀姜維拒劍閣鄧艾乃潛自隂平馳無人之地七百里卒降後主兩人者若校之以事而索其情則皆近乎不知迂直之計而臣則以謂論越與蜀者不如是則不可得而入今敵之勢亦何以異此臣請先為樓船百艘精甲萬人浮膠東待渤海而勿發使大軍出次於王畿聲言以十萬出瓦橋瓦橋敵所備出亦此入亦此在兵法則所謂以正合者也潛軍其東以五萬則自滄趨平州同時而偕發潛軍其西以五萬則自代趨雲州同時而偕發平雲非敵之所素備則滄代之兵宜易入兩翼偕縱則燕之東西可擾矣東軍入平州戰且誘以稍西行附於瓦橋之大軍西軍入雲州戰且略翺翔乎蔚朔之間而東以牽制敵勢敵必分軍以禦雲州然後瓦橋之大軍與東軍合勢而偕入則涿州新城不戰而可收東軍既棄平州平州備少懈然後渤海之精甲可以乘間入平州平州下則營并舉矣乃間使渤海之師通髙麗曰中國責故地髙麗宜以爾兵從而析渤海之精甲三千背道絶險以徑中京之南繚古北之後奪關而守之謹守勿戰敵狼顧自救然後雲州之西軍鼓而東以取易州而與大軍合吾兵益張乃稍乘勝逐北則燕城可圍矣度燕城之大二十七里而止一人而守地六尺三圍之則滿卒三萬守地無餘以二十萬衆頓燕南攻而圍之若適三萬則是野戰以拒敵之大軍者猶十七萬也度敵之大軍亦不過二十萬盡燕城之大而以五萬人實之不能容矣敵之名統軍在燕城者其所護契丹奚渤海兵馬數才滿三萬而其曰侍衛在燕城者騎一萬步一萬而止借使臣所聞未實敵能益之度燕城之大不過容五萬則既渤蹊矣而大軍相待傖囊未决其勢不相救以三萬鋭師濟以臨衝雲梯之械并力而急攻間使張良陳平不愛千金從反間啖城中大姓之子孫能以禍福諭其衆使內附者許以封侯萬户之賞彼在契丹或身居將相而服衣食飲不免於輿皂之賤一聞德音宜有發憤內應如望并汾之師者一人有心則舉燕城之內其勢搖矣燕城可圖則山前後之地雖未盡復可徐致也臣又率臣之意料之使敵能出上策中國之師始動彼無空國逆戰亦以二十萬拒大軍而更練竒兵間道他徑反乘我隙我大軍逺戍深討而敵兵出於不意釋燕而自圖則前功一發而盡廢欲勿釋耶而自治未可安能治人然而舉塞上下許州言之大軍出瓦橋矣又五萬出滄五萬出代敵亦以其軍三析之而應我滄翼其右而霸與信安保定介其間使堅壁勿戰則敵雖出竒兵亦必不能入霸入信安入保定代翼其左而保與廣信安肅介其間使堅壁勿戰則敵雖能出竒兵亦必不能入保入廣信入安肅何則吾為之守者素也置是數者自渤海之東言之操舟於水固非敵之所宜便而其所不當忽萬一可虞意者其西北之彊乎昔唐安祿山以范陽亂稱兵道沙漠犯京兆不朞月耳臣嘗考之圖志則祿山所行自燕而西其跡具存不可不察也國家方恢復河湟全秦之力河湟之所仰或者思患而豫防之益全秦之地以待彼之出於不意如此而已臣又率臣之意料之合單于之才不聞其沈毅雄勇敢為難制如冒頓烏維頡利突利等輩比者其左右賢王谷蠡亦非有如張說所稱闕持勒暾欲谷之徒超卓過人之才帖帖然慕聖道學文字工言語是口尚乳臭安知出上策哉彼計出於數者而皆不能遂則臣之所料不過舉國興師烏合蟻聚而已使彼先能扼古北口而守之渤海之舟師無以伺其利則我東軍扼彌老符家私亭口之右以西軍扼桃峪紫荆金坡口之左使其東西不能出竒而後大軍鼓行而陳以挑其南彼進不能拒退無所逃不力戰求勝則必有內顧自保之心此在兵法所謂窮冦臣請勿薄勿逼緩而持之置曹王居庸等關而無奪以開其生路我亦視白溝之南塘水之浸所從歸者狹何以異於淮隂泜水之傳餐東西與北三靣薄阻而背阻塘水則士卒無所往其心宜固當是時陛下得人如韓信使乘其㑹則攘而扼之於井陘莫利乎此顧為陛下將者如何耳臨衝雲梯器械致修士力致完以中國之善攻而加不能善守之敵則二十七里之城而已何為而不下燕城下坐其積以賞戰士以臣度之三年可以無飛挽自京東西與河朔之列郡更輦緡榖以實之臨以重臣列亭障於外燕可守也陛下以河湟六城之富孰與全燕河湟遼逺城中素空匱中國且能保而實之則全燕之富其易守可知也惟其城郭邑居耕田作業文書約束營陳行伍無一不出中國之舊今以中國之法守之其民宜易安燕城既守則凡石氏之故地猶不盡舉者未之有也雖然臣猶有說者則在乎先勝而後戰夫入人之地欲其不迷不可以不知地索人之情欲其不匿不可以不明間地可知間可明而軍無選鋒則兵不可以交不選鋒而不較長短不合外助則雖多猶寡也臣請為陛下言所以必勝之道陛下誠得數十將用之則何患夫四五者為今之慮士已知兵兵已知戰而臣獨過計以謂令選於班列以將名官者患未試而已夫將欲興大事不可以無重臣重臣君所信功業已試可使士卒素附可使四夷知畏可使位重德亦重可使權重威亦重可使舉一軍二十萬之衆而重臣得其人軍之命定矣千夫長萬夫長才各不同則舉二十萬之軍大吏偏裨二百人而後可也夫安能皆得重臣者而使之將委之有司之選耶則天下必有蕭何之至明然後可以知韓信之未試不然則趙括之易言不窮天下幾何其不以言而信之人之才有不能治一妻一妾者有不能耘三畝之宅者持籌挾算擐甲百萬守地千里翛然不勞乎其間忘昔之短也平居自喜袒裼而按劍志如飄風而聞金鼓之聲失氣而死此人之情也然則將其可以不試哉天下之言兵曰微妙者祖孫吳然臣以謂是何以異於宋人之遺券密數其齒而曰吾富可待豈不誤哉陛下知人能哲興大事選大將帥既已得其人矣凡此臣不敢議然臣以謂舉二十萬衆而為之吏者二百人所試者在此而已子文之治兵終朝而罷不戮一人子玉之治兵終日而罷鞭七人貫三人耳然而君子與子文李廣之行軍逐水草不擊刁斗程不識之行軍嚴斥候擊刁斗自衛然而士卒樂李廣將之才固不可而一也孫武之試於吳也以婦人孫臏之試於齊也以上中下馬用之於婦人用之於馳馬非將之常也兩人者唯其無所不可用以成功故卒之武能將吳以入郢臏能將齊以却魏豈不用其試哉驪山之閲天子擐戎服以令賢如郭元振幾以失軍容而誅而薛訥解琬乃獨有不動之軍教使然也今天下之吏以將名官握兵柄習軍事者環列於輔郡逮數十人平居無事大車駟馬洋洋乎國中與之言兵而不能者幾人若此臣豈敢以為遂乏才哉凡所以必待試而後可用者特不敢以能之於平居無事而信其用之於倉卒擾攘也陛下知人則哲能官人用人之仁去其貪用人之勇去其暴用人之智去其詐皆得其所以用則向之四主者凡可以委之大將而已以二十萬之軍度百日而後罷厮役在焉人日糒二升則率兩日而食非萬石不可百日則百萬千日則千萬邊儲不足以給則不可不權而入之於民今天下之買爵者緍錢五千髙得一尉下乃助教極矣為之說者曰商賈之子孫不可以揭而加之於民上此為說者之過也天下無賴之民游手不業計窮力盡者皆起而為兵能犯矢石致頭首有一日之勞則紆朱懷金美爵厚廪往往而加之民上者皆是也何獨至於民而疑之天下之民不幸而陷於盜賊白日殺人而奪之財亦可棄矣甚者竄山林晨夜嘯聚州里為之搖動其中有一人焉造利而自言則賞千金而命之官未始疑也則夫商賈之子孫雖其類則賤矧未至於盜賊哉臣請賣爵如漢故事惟勿為郎而已其餘皆可易之以他秩得比朝籍與京師官率能入粟於邊滿三萬石者為之等級以授事定而止不過假百人粟可充也昔武帝用朝錯議卒弱胸奴乃臣區區意竊在此陛下幸聽焉則其詳有司可得而講也何謂知地夫四夷之與中國其土地風俗剛柔險易之不同猶之城市之與山林並得其宜各便其欲未嘗同也百蠻之地皆阻山負海逺者去王畿數千里一隅有故不得已而應就其近者調之則兵少不足以用欲置大軍則病道里之遼首尾衡决倉卒不救設或遂能致之其土地風俗皆非國之所習知萃百萬之衆而頓絶徼之下欲深入不可欲致敵不能譬之逐兔叢林遇穴而失則良鷙逸足猶翺翔倣徨雖巧而無所效其理然也東南西南羣夷皆絶逺致險論其近而與中國比者則莫若朔方蓋古之時本非與中國近且比也踰塞而北至於寒霜逺野人跡所不至者乃稍稍屯聚蓋李牧破林胡雖斥地千里而且不能吝自漢至唐迄於五代始侵尋蔓衍寖有中國之地自王畿而言則白溝之南千里而近耳置驛十數則舉朔漠之事十日而傳之可聞城郭邑居漢也耕田作業漢也文書約束漢也營陳行伍漢也舉山前後之地而言之無為而非漢者臣嘗披圖而觀起白溝趨燕城二百里而止居庸曹王大安黍谷崆峒之山環抱如箕而燕城峙其中自白溝而北衆山而南燕城之四隅在箕中者其地如掌繇燕城之三隅東西南北衆山之塞川關要害逺者不過四百里近乃二百里而止山非不可陟也水非不可涉也土地風氣水泉百物之産又非中國之所不習也徒可徒騎可騎車可車何動而不可圖正可正竒可竒伏可伏何動而不如欲顧為陛下將者如何耳何謂明間夫書生之論以謂仁義之兵無術而自勝比臣讀孫子至所謂賞莫厚于間事莫密于間非聖智不能用間非仁義不能用間非微妙不能得間之實臣始不信今乃知之夫使仁義之兵無術而自勝則敵衆我寡亦勝敵彊我弱亦勝敵實我虛亦勝敵逸我勞亦勝敵有備我無備亦勝而聖人者何事乎教民七年而後即戎而其曰不教民戰是謂棄之者又何用也夫仁義王者所以無敵于天下不得已而去焉兵可去而去仁義則不安至于不得已而用兵仁義非可忘而所謂權焉者蓋聖人亦多有之而未嘗去也孫武無王佐之才而其言有用于王者之事間非平日之所宜先也故非聖智不能用非仁義不能使非微妙不能得其實如此而已聖君參之以獲將士之心大將持之以制三軍之命士卒獲之以幸封侯之賞敵國取之則四境不能以是一日而安其理然也秦得由余而八國賓燕入秦關而東吳破漢厚閼氏而冒頓解唐語突利而頡利疑此中國之以間勝者也韓王信在外而丐奴入太原盧綰在外而丐奴入上谷中行偃在外而漢不得美幣市丐奴以至于唐突厥以萬榮侍子而冦瀛州回紇以僕固懷恩而入涇陽此敵之以間而亦勝者也自昔兵家之用間者一勝一負不可得而數此其理易知其事難成天下不乏張良陳平之智不愛千金仗社稷之神靈所麾前移所指前死五間俱起莫知其道是謂神紀裹幽薊之城百日而平使彼粟實可因而食使彼粟虛可因而墟也地可知間可明夫然後合三軍之士而表其技且勇者此之謂選鋒越有君子五千人秦之鬬士倍于晉若此皆選鋒也凡兵尚義而保氣義之所勝愚可明氣之所加柔可彊人之情非有鈍利之殊也顧上所以表之何如而已一夫當死市袒裼而呼則千人為之失色童子按劍而先登則七尺之丈夫全軀保妻子者猶為之却也然則人之情豈固難知也哉前有大壑臨之則魄墮而懼狼狽却踵則身在平地夫誰肯舉足而蹈其危使為士卒者知有死之榮無生之辱夫然後顧平地不為安蹈大壑不為懼則攻何患堅城戰何患堅陳哉吳起臨陳有一夫不勝其勇遽前取首而還吳起曰雖勇非吾法也斬之吐蕃逼奉天渾瑊進單騎馳之挾其一將躍而出一軍皆譟臣以為若此者皆可賞勿誅而吳起反之此用兵之過也鋒可選然而不校長短則臣以謂兵不可以交何則天下皆以北人為善用兵而臣獨計彼非能出奇合變循環無窮也顧其長在騎射而已自圖志言之多馬之地半出朔方而其能挽弓騎射蓋亦天性使然趙武靈王變服騎射而繇是以取中山此其為策之得者非以其所長制其長哉冒頓控弦百萬白登之圍騂䮾驪白各以其方之色自古以馬戰未有如此之盛者也漢武帝中年鋭意馬備阡陌之間盛或成羣比戰數勝丐奴罷極矣而其後亦以馬少不能復出則度漢之傑以其長弊丐奴亦在騎不在徒明矣唐薛延陀不知以所長抗中國而自恃其數以徒勝執馬者既收而徒不能復為卒以取敗自是益自知其短于徒中國亦慕其所長而術制之比者朝廷置騎射又教民蕃馬意良而法美矣而或者民之馬雖蕃而未教故臣以謂置義勇置保甲則民馬皆可以假而習夫馬生其水土則人心可知然而教訓之不安以之當馬之新羈朝夕馳騁乎荆棘斥澤之地體安而心調者恐非敵也陛下誠用臣說則義勇保甲之籍于民者方其教時皆使之知習騎騎不足則更借之乎民馬嘗入而籍諸官者畨假之則民力不勞而馬不病不過三年天下皆可用之馬以是佐軍則漢之戰何以易此雖然猶有所需者則外助而已自昔為國未嘗不其說以誚海濱之蚌鷸兩自斃而後人能并得之胸奴方病漢而烏孫昆彌亦自以不得與中國通漢籍烏孫撫諸夷以孤胸奴之外援校尉常惠護五將軍兵北擊而昆彌常力戰為漢軍鋒所殺過當胸奴遂虛于是丁令攻其北烏桓入其東烏孫擊其西而胸奴析其兵支三敵國以南與漢爭一旦之命卒以困弱至於裂五單于昆彌與有助也臣嘗譬之鄉邑之小盜三人而為輩則百不得以力擒一人焉爭財而不平則二人者不制而自弊何則其素相知者審也陛下南面負扆冠帶而朝百夷四海之內八荒之外心有所懷唯上之所命乃者髙麗折于遼不敢越遼而西以效其一日之力于中國陛下能撫之至絶海蹈越綿數千里而入貢闕廷陛下嘉納遣使報聘增美于祖宗之禮臣聞之其國見使者至皆歡喜擁道自慶未始獲也彼其折于遼久矣宜有所逞其志如烏孫昆彌者而臣未敢言焉凡此數者陛下得一重臣而委之與在廷一二之士嘗得預聞腹心者皆可以使之雜而議然後臣之策庶幾乎可效也兵既定石氏之故地已復臣請謹封疆嚴斥候戒邊吏無得以非中國之地而利絲毫以為功且示聖人以天下為度而致誠信以結之彼雖失燕知其本中國之舊而不以為吝中國亦與之講好修聘歡猶昔時可使如伯氏之奪邑沒齒而無怨言此百世之計也臣身未嘗為吏則凡國中之議是非利害不知其果何從姑以臣深思所得發于畎畝憤悱之忠而不能以自掩者獻之闕下陛下好問如虞舜亦幸擇焉韓愈曰惟此蔡功惟斷乃成故臣至此猶願致其愚者則曰必行而已以臣之幼而學壯而欲行之心而又幸出于聖人之世三代之時以戴非常之治沐無窮之休褒衣博帶學古人之事而名諸生之列每聞陛下德音雖在市井草莽欣喜自幸如第五倫其所願伸喙道說以求補于萬一者豈特此書之所叙而已然臣竊以謂禮樂為大而必其所先舉者已定天下晏然然後禮不制而備樂不作而治區區之愚蓋在于此臣身賤跡外其學甚野輒敢不避鈇質之誅而冒言其所不當預之事懷不能忍憤悱自致無以異于傳之所謂怒蛙而幸人君之一式陛下揭日月之光而蔀屋之幽得以容則臣疏遠之言庶幾乎可採而無罪若乃安畎畝之賤而不知聖人之世三代之時非常之治無窮之休親逢之會為難遭則臣之倀倀不出門庭其失時亦極矣伏惟陛下萬幾之暇一留神聽焉天下幸甚臣無任俯伏待詔激切之至臣補之誠惶誠恐謹昧死再拜蘇門六君子文粹卷六十五
