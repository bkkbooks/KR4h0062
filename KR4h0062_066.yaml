body:
  text: 蘇門六君子文粹卷六十六濟北文粹六宋朝補之撰書上皇帝安南罪言臣補之昧死言臣聞杜牧曰國家大事牧不當言實言之有罪則自以其書為罪言安南之舉賤臣輕言之亦罪也夫仁懷義率智謀信結而出之以勇闐然而鼓堂然而陳身被堅執鋭奮臂大呼以先三軍使三軍之士進旅退旅如驅羣羊如視嬰兒與之往與之來莫知所之若是者臣不能布策挾龜迎日計月望雲占風觀星候氣雷聲雨沐虹垂霧橫暈珥光怪背建向破從孤擊虛六窮三刑生王囚死以察害凶以明利吉使三軍之士逆之以止順之以行不厭不疑至死無所災若是者臣不能畫地聚米相險度夷左青右白前鳥後龜無當天牢無處龍首髙陵知逆背丘知向林木之隰葭葦之陂一迂一直一亟一遲使三軍之士所繇以入所從以歸交挂圯絶不失地宜若是者臣不能馳一乘之車掉三寸之舌不甲不兵以行賊營曉以禍福諭以利害使賊交臂受事屈膝請和可以無戰而屈人之兵若是者臣不能深溝髙壘清野以待示以所害欲戰不可三時務農一時習武百姓家給人足雞犬相聞使賊不敢南下而獵於嶺東出而漁於海徹關棄傳內外為一若是者臣不能臣負不能之才五且少孤不幸墮在荆棘泥塗之中荒楚幽穢不得預聞下士之議而私慕庶人所以傳語者是以不勝犬馬心願效一言雖然凡所言者亦非曰能之特以理勢之然否可道者也自交趾犯順侵軼郡縣溪嶺騷然檄書日聞陛下仁愛逺民若保赤子憂勤宵旰思所以禁止安集者臣雖不備行列有目有趾莫非王臣故忘其怯懦以自試鈇鉞之誅謹參古驗今先論其所宜勝與所為未可取者而次條愚計於後以備執事者擇焉傳曰不先時而起不後時而縮又曰敵加於已不得已而應之謂之應兵應者勝陛下以父道育四國四國所宜歡欣咸以子來而交趾不道乃干大順陛下謀於心謀於卿士以逮庶民設壇授鉞應而討之兵應者勝此其理勢必勝一也兵起之初五管莫備賊至城下匝合不知而雍州刺史蘇緘家世儒者不識金革汗馬之勞卒遇大變乃能奮不顧身閉城乘壘連鬬宛轉以嬰賊鋒兵敗不屈血染砧几妻子女婦駢頭為戮將吏偕死者至數十人逺近聳動爭欲仗節前驅者此其理勢必勝二也陛下即位以來精意武備設監置官以董軍器金鐵皮革筋簳膠漆精良百選刀矟矛槍戟楯蔽櫓矢弩胄鎧鼓旗笳角凡軍之須一切素具北益黃河之水以滿隋渠南盡豫章之木以為船一船所載當中國車數十輛舳艫相銜以濟南師此其理勢必勝三也交趾之地不過中國一大郡呌呼跳梁不足以越千里疲弊空窶不足以支數嵗陛下神武天旋雷動莫不蠢然况此小冦制之得術捐五管一城足以當賊有餘何至嘵嘵以煩執事者今析中國之衆五一以伐之如舉岱山壓鳥卵此其理勢必勝四也陛下謀臣計士布列中外適一事命一將皆試可乃遣而比嵗更武舉之科親延於廷諏以計策天下小兒孺子莫不踊躍憤悱爭試劍馳馬指畫論議以希功名其作新振起亦勇氣百倍矣交趾徼外小國其人腥臊雜處非素知兵能出竒合變也乍聚乍散非有常性鈔掠奪擊與邊人爭一旦之命此如攫鳥逸獸雖角牙爪嘴輕利足奮而不知人能以機械網罟獲之此理勢必勝五也雖然勝可萬全而有未可取也此事之情不可不察也陛下方拓西疆指圖授算以取熙河六城如探懷中物虜逃遁不敢窺境上將狃近功士飽新賞帶甲十萬乘勝南指有輕交趾心臣以謂姑無謂交趾小蜂蠆有毒不可忽也傳曰鳥窮則啄獸窮則搏人窮則詐昔魯人與邾人戰魯卑邾不設備而禦之邾人敗魯使我軍不知察此交趾示弱以堅我我迫其窮使姦謀得恃此其理勢或未可取一也中國隂陽之中土氣和適其生物如之故極寒甚熱皆是傷病百越之地少隂多陽其人疏理鳥獸希毛故性能暑三月五月春草黃茅嵐霧瘴氛上炎下潦颶風之所扇鼓且土多毒蟲蚺蛇沙虱過而踣者猶十三四焉今以大軍宿之其間久而不召強者病弱者死奚暇爭功利哉此其勢或未可取二也古者興師十萬日費千金故軍無輜重則亡無委積則亡無糧食則亡臣請以漢賈誼之所論羌軍質之暴師曽未一年兵出不踰千里費四十餘萬大司農錢盡乃以少府錢續之今交趾之逺非特羌軍也且輟畿內禁卒及調河北京東戍兵五六萬以伐之倍道兼行三月而後至以臣計之人日糒二升則五萬人之費日千石也行三月日千石舍未畢陳未定而十萬石之粟去矣使其淹回未有成績其為費可勝言哉孫子曰智將務食於敵食敵一鍾當吾二十鍾􅠇耔一石當吾二十石此計平地千里之法也今以京師直交趾五倍而言之則何啻二十鍾二十石而後可以當賊之一矧其俗又非専以五榖為養也木實草根魚鱉蚌蜃之為餔且其土之所出足以給其入安坐而待我若此雖十年不病闕食也傳曰粟不如者勿與持久持久非逺行之利此其理勢或未可取三也平陸之軍習於車攻間於騎鬬蹈蹂厚土大步疾走左旋右折出入往來蕩蕩坦坦不可障厄而以之入於東南之幽前則重山後則復溪左則大阜右則深谷積石叢篠車以摧輪馬以敗蹄擇土計地若不容足縱行則絶首尾衡行則絶兩翼往不知所如來不知所返而賊生死其地其人如猿狖上下坂險筋力百倍於華人倐起忽止適去已至從之如搏影不可得也傳曰不用鄉導不能得地利地利者兵之助故孟子所記亦先地利而後天時而將士非素知此其理勢或未可取四也畿內禁卒周天下之材選賞罰素信約束素明拳勇亦當百矣然臣竊計之設比營而擇或取左遺右或取右遺左參差不齊聚為一軍則少非同巷長非並舍賚賜不偕受調發不俱行雖一之以旗鼓晝戰目不能以相識夜戰聲不能以相知則臨事難濟而河北京東之卒又半雜新軍尫孱貧窶不任田畝徒博飲酒計窮力盡之人乃起而為兵一旦遂驅之戰不惟不足勝戈甲為病而其往也皆有戚戚羇旅之懷夫戰勇氣也氣不盈不可必勝此其理勢或未可取五也凡此較然易見雖五尺童子能道之而臣所以獨不自已區區為國私憂過計者非以交趾果能為足拇病也以謂逺勞王師戰久不決則士將不能無弊不可不察也夫交趾實古揚州之南境自三代盛時列荒服之外不及以政秦并天下略定揚粵以謫戍守五嶺與越雜處以至漢而任囂尉陀亦數以其地叛當是時有閩越東越南越東甌西甌謂之百越交趾百越之徼也其國距洛陽南萬一千里人皆雕題文身項髻徒跣俗相習以鼻飲父子男女同川而浴今其地負海倚山阻險僻迂師行之道可以為正為竒為伏者非特一途而已也蓋漢初遣王恢韓安國擊越亦一出豫章一出會稽時唐蒙亦使越越人食蒙以蜀枸醬蒙歸因又上書通夜郎浮船牂柯以出越人不意其後路博德為伏波將軍出桂陽下湟水按圖湟水蓋出於連州楊僕為樓船將軍出豫章下潢浦按圖潢浦蓋出於廣州故歸義越侯二人為戈船下瀨將軍出零陵下灕水按圖灕水蓋出於桂州馳義侯發巴蜀罪人下牂柯牂柯即唐蒙所通道起夜郎者也於是五將軍咸會越人或降或亡南越平為九郡至建武中交趾女子側二叛馬援將平之援始自合浦緣海而行隨山刋道蓋千餘里如浪泊禁溪無功居風下雋壺頭之路凡圖記可見往往援所行也今其計謀所長不可得而知所可知者其出入往來死生之地髣佛具在師行所從不可不察也臣又以今言之居後踵前固不必皆出前人之舊而其大概瀕湖以南要害之地朝廷因以分屯迭進至於明越餘杭海上諸郡負海無障塞中國所素不虞者臣願以粗修守禦備遊冦凡此非特以待交趾而已臣乂以今料之使賊能為狂計固不出於三若外有合交據關守隘以老我師我頓兵絶徼之下曠日持久欲戰不可引去則賊又復至回軍轉陳返而赴之賊又入保如初如是數年邊人未有息肩之期此計上也若開關闢户誤我以利誑我以弱設計誘我且戰且却我易而不戒乃亟入之以墮賊計中賊度我歸逺以竒兵斷我後我進無所得欲退不能此計中也若棄關不守鼓行出隘唐突侵軼疾戰自快輕勇悍亟分散四擊大則劫城小則掠屯其入吾之地恐不深其爭吾之利恐不及我主彼客彼輕我重我衆彼寡雖強可虜此計下也賊出上計利在賊出中計利害半出下計魚爛亡矣臣乂以今料之賊必不能出上計何則海外逺圖固非交趾之弱所能恃雖近有羣獠乂非固為交趾役也况敢侮王國乎意者輔車相依唇亡齒寒有不自安之心今臣姑置逺者而不論論羣獠之近者則亦不可無以待之今見朝廷舉大兵欲滅交趾彼其中能無介然疑似之心哉臣獨計以謂誠能擇使者如酈食其司馬相如陸賈班超等輩乘驛持節以寬大鎮之告以朝廷誅叛逆賊即伏行罷兵矣能從中國討賊及反間致頭首者計所得以賞以身從者賞以身以家從者祿以家以鄉從者封以鄉以縣從者侯以縣縱不能悉從可以少定其志則是不戰而賊之形已窘矣臣又料之賊無他助其上計不能悉用或者猶參上而雜中計參上計據關守隘以老我師我雖衆無所用之謂以大軍當其衢虛張形勢以疑賊而隂擇精兵為三四間道絶徑或薄其左或突其右設竒取之兵法所謂攻其所不守也昔蜀薑維拒劍閣鄧艾乃潛自隂平行無人之地七百里鑿山通道﨑嶇險絶以氊自裹轉而下士卒皆緣崖攀木魚貫而進卒降劉禪此設竒者也雜中計開關闢户以誘致我我雖衆亦無必入請留大軍屯其後而以驍鋭佯從之輕足利兵以為前行分屯拆隊伏於兩旁勿薄勿迫逺而挑之偶勝無追不勝疾歸棄金遺鼓拔衆以馳賊貪吾獲可邀於厄卒前遇伏其衆必覆兵法所謂引而去之令敵半出而擊之利者也昔北戎侵鄭公子突曰使勇而無剛者嘗冦而速去之君為三覆以待之戎勝不相推敗不相救先者見獲必務進進而遇覆必速奔從之遂破戎師此設伏者也賊出上中而不利將悉衆偕出以徼幸於其下計是固中國之利也請尅日而取之昔魏祖伐關中賊每一部至魏祖輒喜破賊諸將問其故魏祖曰關中道逺賊若依險阻征之不一二年不可下也今皆來集衆雖多軍無適主一舉可滅諸將皆服語曰連雞不俱棲可離而解賊衆之謂也此三説者譬之丸不能出於盤其大概如此然兵無常數故隨所動而應之前必有減竈之説而後繼之者得以起添竈之智顧為陛下將者何如耳賊出下計而又不利將大走逺遁亡海絶道以保窟穴臣請按甲勿從或曰按甲勿從何以立威於天下曩士卒所以犯晨夜冒白刃者懼不勝使幸勝奈何幾舉而棄之且賊窘窮無所知此如兩鼠鬬冗中將勇者勝臣則以謂不然兩鼠鬬冗中將內鼠勝且欲搏賊大海之間其勢必與之相從於舟楫夫使吾三晉齊魯之人失夷曠而為樓船鬬艦浮於狂瀾之中平居無事目亂心悸而况乘以倉猝微風搖檣一夫蕩櫓我衆駭矣又何暇與之校強弱勝負哉蓋前世語水戰以謂越人能入水負舟而杜牧所傳鄭年者能沒海履其地五十里不噎今海上賈人亦往往遇水冦鑿舟沉焉此其非中國所用以取勝故也故臣請按甲勿從而更設策修備以待之且陛下富有天下地漸日月之窟府籠山海之藏非以交趾嬴􅖮安定苟屚靡零曲陽比帶稽徐西於龍編朱鳶封溪望海卑陬不毛方尺圍寸之地為足有也又非以交趾生犀馴象古貝文螺琥珀翡翠鼊皮鮫革蕉紵桂蠧詼竒不法殫瑣極細之物為足寶也不得已而問其罪足以威攝小冦使之悔過效順歸命中國而已賊既定臣請循古更選仁厚勇略堪任將帥者以為五管諸州刺史太守以嵗月鎮撫其民而因其家之可任者置土兵如保甲以時教習土兵之外乃募遊軍而就擇將吏其地平居無事謹養而善别之以周知其心有故王臣失勢欲復見其功者聚為一卒有死事之人昆弟欲為之報讐者聚為一卒有貧窮忿怒將快其志者聚為一卒有故贅壻人虜欲昭迹揚名者聚為一卒有故胥靡負犯之人欲逃其耻者聚為一卒加賜而時慰焉使之居其地服其俗安其水土便其械用因其糧食得以無煩執事而坐制其弊乃可以得志此百世之計也臣身非安南將吏民庶又不親與交趾接也安能周知其虛實短長利害所在曰今日出某道取某屯明日出某道取某聚某道可以為正某道可以為竒某道可以為伏意者其大概理勢之所在故臣得以臆計胸度而妄議焉若夫知已知彼每舉不殆與敵變化循環無窮提軍挈衆動於九天之上此則大將軍之任非臣所得而前知也臣愚疏外不知事體昧死陳愚計臣謹上蘇門六君子文粹卷六十六
