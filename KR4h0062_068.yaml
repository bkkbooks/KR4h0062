body:
  text: 蘇門六君子文粹卷六十八濟北文粹六宋朝補之撰書答外舅兵部杜侍郎書補之再拜昨自蘇公以尚書召適與左右兵部同事意兩公平日未嘗相與處往未必合故嘗為蘇公極言左右居家行已蒞官及物之意蘇公固不以補之言為過及辱賜書道聯職甚親逺聞欣喜不已補之於蘇公為門下士無所復讚然剛潔寡欲奉已至儉菲而以身任官責嫉邪愛物知無不為繇是不忽細務其有所不得盡視去官職如土芥凡規模大較與左右近者非一事也來書猶怪其尚氣好辨此非補之所能知自非聖人各有所長亦有所短然伯夷班聖人之列矣而孟子尚以謂伯夷隘君子不由夫孟子所謂君子者必若孔子無可無不可而後可也不然望望然去之若將凂焉者苟病其未和則凡能慮禍忍詬摧剛為柔熟視出胯下者皆可以免夫此議矣隘者見排而不恭者并獲罪見排且獲罪矣而不害其并列於聖人則孟子之心蓋可見矣西漢名臣惟汲黯鄭當時汲黯好直諫多大體而性倨少禮面折不能容人之過士亦以此不附而鄭當時性長者常引丞史以為賢於已與官屬言惟恐傷之山東翕然稱鄭莊黯以倨得不附而莊見譽長者似莊勝也然至於淮南有邪謀數漢庭臣惟憚黯而莊乃獲譏趨和承意不敢甚斥臧否莊於此不反愧黯哉雖然汲黯為直不為忮鄭當時為和不為諛故良史同稱推賢則汲黯鄭當時此其大體皆有所長而亦皆有所短故補之以謂自非孔子無可無不可未免於見議者君子以同而異若是可也方今老成言行足以矜式後進者非左右乎俗異教離黨同門蠧道真十室皆是補之以謂衆賢和於朝則幽逺趨向自一而事無不可為不識左右以為如何後賜一言幸甚幸甚答劉壯輿論國語書補之再拜辱書以國語二事相切磋甚厚所援據通洽而議近正又以知别後學問之益殊欣喜也然齊桓晉文同功一體皆仲尼之徒所不道雖晉文入異此但一事未可言優於桓也亦不當稱周之盛德以類其迹之近似者以大重耳子犯之謀而疑後世凡聖人所以與霸者非與其假仁義也與其假仁義以成功而民賴焉方其走狄避患區區竊仁義之迹以圖濟其私未足稱於大君子之前也亡人從者其文義可觀而士溺焉若進疑於岐山盟津退不失為季札則僭且不類甚矣岐山盟津來書所謂擬人必於其倫者此甚不可若退為季札則非重耳之本心也岐山去國而成國無豳岐之異夫何所待盟津以國為天下退修德以待之非諸侯公子失國反國之比又重耳以讒出逃父之誅不與奚齊卓子爭立足矣國人自殺奚齊卓子國無君而已義嗣入可也胡為委幼且不肖之夷吾以敝晉而流禍如此其酷哉若曰桓討子糾則髙梁之事與生竇奚辨壯輿其未之思耶凡補之所為論者以摘夫假仁義之微情使當其分而止不欲使夫譎甚而疑聖也豈善冀芮之謀以子犯為誠不及者哉以謂夷吾亦晉嗣苟可以入而存國雖走梁而援秦奚不可者卒其不與夷吾則入晉而不能善晉也苟善晉春秋亦將與之使桓文徒竊仁義之名以濟其私而其成功民所無賴則春秋猶不與公羊論享國長短美見未見固非是要之春秋隨事褒貶無始終善者也其曰實與而文不與乃補之猶反是聖人於齊晉皆文與而實不與實不與者以其假仁義文與者無王不得已也孟子謂彼善於此為至論壯輿疑於王迹則假者之情後終不得而誅矣又荀息事始意壯輿許息之死再得來問乃與補之論其悖者無異荀息世未有知其非者也獨吾兩人非之耳凡小人之事主也生則阿其欲以蒙利死則擇利而背之荀息阿獻公之生罪也死則曰雖無益也將焉避之是豈小人之所能哉故後世惑焉以其復言亂信義之實而左氏述其忠正公羊類夫仇孔非壯輿卓然自信幾何不胥而靡也召忽死子糾天下不稱其是亦不誅其非始無善而終無惡也荀息死奚齊論者至今謂夫疑於信義也否則荀息何足議哉雖然荀息愚不幸既許其君以死矣至於不濟壯輿以謂寧死而不二之為良抑二而不死之為是將死與不死於荀息無輕重皆不可也天下固無皆不可之義壯輿必能處之矣惟其要終之義不足以救初之惡與其苟免如犬彘則死為可進故補之以謂進荀息以甚苟免之禍知宗元為學春秋而通者不然則可以死如召忽可以無死如管仲要其忠義所在何如耳張禹李績蒙喪邦之舊事與荀息類而禹績皆不死為愧於荀息若曰漢唐事禹績不得預其禍則狐掘之必狐埋之已首禍而身不預則何如餘非面不盡答劉壯輿書補之答示漫浪翁圖贊并所以名堂與亭之意以壯輿志業豈老且不售畸乖自放者之比其所以名者意不在是魯直為贊以反之此善諭人之意非反也合也揚雄為反離騷補之嘗謂屈原沒後惟雄為知原者故其言曰如玉如瑩爰變丹青如其智如原之如玉如瑩不可以丹青變而傷原之一其質不能與丹青變以異而見尤也乃聖人之智則異於是此但如原之智而已矣然則丹青豈果可以變玉哉若曰外與之化而內不化原其免矣故頗托騷詞而反之非反也合也始欲為詩寓此意其間而不作詩久深避以言來詬又雜為五詩以名堂與亭軒齋泉則意不屬姑書此託之圖後則猶詩也元次山介特名重唐世足以愧闒墮者百輩然語諸大方之家則未通也何足學哉記曰人莫不飲食鮮能知味也學猶飲食固有常珍奚事異饌合萬宇以聚廬載百族與並遊想壯輿亦俯仰此間又奚以漫浪而異為補之再拜記沈丘縣學記民可以誠化而不可以文治吏功可以嵗月致而不可以一朝成古者繼世以立諸侯又命之教而為學使各以其身化於其國然中材之君意竭於有為而先王之事業曠時而不一覩况夫後世吏不得久於其官而庠序之教已微吏有愛民不苟之心不幸或不得為而去或雖為之名具而實亡以其鹵莽滅裂僅存之餘而施之其久壞不安之俗故為其事而無其功豪傑逺識之士以謂是區區何益於為民而不為中材乍存乍亡而不肖者盡棄不省而好更張喜事者乃始務修此以盜名於衆人不為之中則學之存否於吏治之損益信未有繫也蓋如卓茂魯恭其治至使民相仁愛不犯有司而亦不聞其朝夕與民誦詩讀書舞樂釋菜常常從事於此而惟其誠心實事則固有以得之然俗吏至或一切務簿書獄訟財賦無愛民之意士亦不本鄉黨庠序而遊俠四方専以干祿於此以為文不足為或不得久而不為則至於俗隳弛已甚本又不立孰從而維之譙郡張柔文剛好學而有文為令沈丘嘗曰位無貴賤皆可以行志民無古今皆可以道理齊也則欲以其學試之沈丘使民於衣食必以時教民於相牧養必以孝弟廉耻三年而民有改文剛喜曰吾所知信是吾民可與言矣乃從其邑子論古之學者所以治心修身非干祿之意而士亦欣然相與化之乃建學孔子廟中貌象堂室東西序之房與祭器廪庖皆有所蓋為屋四十楹可以待鄉先生之講道而來子弟之願遊者屬補之記補之曰世之所患先王之事業不可為非先王之事業不可為而其勢不得為治天下有本而徒於其末救之則智不勝無以為之大而僅為之小則力不足雖然導民之道唯其所欲無不可成民嘗見者則識之嘗為者則能之耳目習熟於此而中心不喻人情無有也文剛於是能知其本則其所施設宜有先後非特以備觀美人為亦為而已武城弦歌夫子戲之曰割雞焉用牛刀然亦各以教其人使知道則子遊之意卒乎為是以為不告朔而餼羊可遂去則夫子之所悼也民常病詐而至其化上之所為則甚信晉之儉秦之好車馬鄭衛之音宛丘之婆娑以詩書所記行四方察其風俗無不近者當其一時上之所為豈自知能入人如此之深耶其漸靡使然朝鮮去箕子千載至漢時其民飲食猶以籩豆民不相犯耻淫僻其後吏及賈人往者稍侵之俗乃益衰朝鮮夷貊况中國哉後之來者嘗無忘文剛所欲為則沈丘之民雖使世世知好學俗純厚易治無不可也元祐二年五月十日朝補之記祁州新修學記先王以禮為天下禮行而民有耻以樂為天下樂行而民嚮方以庠序養天下之才而君子之學洋溢於四海先王之須數者以治如此而自後世視之則常若迂逺而不切於治之情夫古與今一也而先王之用禮樂則如帛縷之於衣榖米之於食每須而常效而後世之用之則如觀殊類之好而名異國之物雖存而猶亡射鄉食享裼襲之文而籩豆之器鐘磬柷敔綴兆之容而搏拊之節是先王之所朝夕用以為禮樂者也而行之於後世則文齟齬而情不安若度十指而合方圓非聖人復生不可得而定是先王之禮樂終不可用於後世也然而後世亦何嘗一日而無禮樂賢君良吏誠心於為治各因其世所用者而用之以合恭敬而交歡欣亦不見其少雖聲音服器滅裂於已壞之餘而參差於不同之緒至雜野人里巷之説而用之蓋禮樂自此而亡然亦或自此而存何則其文異其實在也至於庠序先王之所以教人事父兄親宗族而善鄉黨內之於治心行已外之於事君牧民蓋亦如此而止矣而世之為士者聞先王之教則漠然若非其身之所當任而惟其文詞記誦所以干有司者為師起粟闢屋而俟之三嵗而一取士集於堂者如市否則掉臂而不顧蓋僅有存者夫如是則州里之有學特以為求仕者之舍耳而於治誠何補哉然盡棄而不舉専以文法賦斂目前之所急者為務則民益野一州而有學則一州之為士者多一邑而有學則一邑之為士者多使夫世之所謂賢有智者不出於士則已賢有知者而必出於士則為士者多蓋先王之教所以在也河北自五代兵革遷徙之餘而士日少至本朝百有餘年朔方之民得安於衣食而偉人巨公間出於其地仕於四方以文學政事顯者往往而有祁州又支郡而求舉於有司者率常百餘人舊有學不復葺學者至散而入他郡宫苑使董侯之為守始至慨然以為先務而郡貧力不足以為乃斂菜圃之課當入於守者日二千錢舉而新之藉其圃之入以其半為學者之食其居處安其資糧足而無患矣復得前進士彭城趙君懷之以教授學者日至弦歌之聲逺聞使其子逌以書抵補之求為記補之以謂自三代之亡繇秦漢至於今所以教養人材者固無復先王之舊凡幾百千年矣而忠臣孝子仁義之人操守廉潔之士器足以任重而致逺明足以解疑而釋惑強足以勝難而處劇朝廷用之則重捨之則輕天下有之則治無之則亂者亦凡幾何人而豈其必出於先王之庠序亦各因其世之所有取之長才秀民傑然於衆人之中若物之精華不可得而掩終不以教養非是暗曖而不出亦何必曰春夏教禮樂秋冬教詩書十有三年而舞勺成童而舞象中年考數九年大成論辨而升黜之一切皆如先王時而後得哉有誠心若古之人則處今之事而要古之效何適而不可龔遂黃霸漢良二千石此兩人何必文武成康之吏其教民成俗亦何必文武成康之法而正使文武成康之用吏亦不過如此歸於治而已雖然此可為通人道難為守文不知變者言也董侯以文法中第而不用顧以其才雄於諸將武人之間而其政事施設先後如此惜也其試之小不獲試之大也故敘其意而刻之林慮縣學記先王之治其實不可為也而文可為夫文亦安足為哉蓋文者實之所寓而存也并文而去之實之所存與有幾然則存其文是存其實也遵古人之迹而為之加以誠心不倦而能久則實斯可幾也已食飲以籩豆夷而有先王舊也則朝鮮可求禮被髮而祭於野中國而用夷事也則伊川為戎此非夫文存則實存文先喪則實并亡者乎故魯不棄周禮則君子以謂未可動子貢欲去餼羊則聖人以謂我愛其禮此深知為治之意者其於守先王之故本末惟謹雖其既絶之緒不可復之餘而堇堇焉不欲其廢而不舉者如此也無棣劉君演好學良士其為林慮令也下車而問庠序之政若令之事莫先於此者而先聖之祠有堂而無序風雨屋壞雀鼠之所舍不足以備登降供禮事劉君愀然不樂以語其僚曰此於事若緩而急者吾聞之君子米鹽獄訟吏之力可以朝夕為者至為則為之一日去則已矣若夫事之大而緩者其舉百一蓋未嘗為而去者相輩也我不敢以後吾之所急顧一錢一工之在官者令不得専焉使吾常知所急不敢後日儲之不足嵗儲之有餘則學之成必其有時矣蓋自始至至將去踰二年而學成為屋五十有五楹貌象一新講有堂休有房廪廥饎㸑有所賓客諸生之至者曰美哉昉於此前此無有也於是乃介其主簿真定耿君輒求文於補之以記之耿君儒者道劉君所以治其邑事皆若此一二修舉類不苟然者士相與歌其能民聞其欲去而戚者甚衆也人之言曰以儒術緣飾吏事儒術之不可一日無也如此昔子産為鄭陳伐之子産能以其衆入陳蓋數俘而出致地而還以獻捷於晉而晉人猶難焉子産陳周之德數陳之罪甚順而有禮晉人乃受之仲尼曰晉為伯鄭入陳非文辭不為功夫子産之功不在其對晉時而晉之受之又不以其功可尚卒之其事所以顯而不泯者獨其文辭足以發非若俗吏一切用其力於簿書法令之間而不知緣飾有禮義何足道哉然則劉君以謂於事若緩而急者不可忽也智近齋記傳曰計人之所知不若其所不知宇宙至廣萬物至夥千古至逺衆理至幽而欲以七尺之軀方寸之地盡攬而悉儲之譬之芥納山人知其不可故神智大矣德配蓍卦而昔人猶或以謂智有所困神有所不通雖然聖人若常通而不困夫常通而不困豈特其生而知之皆備於我者能若是亦必曰好古敏以求之也而天下之不知者乃始曰聖人必其生而知之故不窮其曰好古敏以求之者孔子之所以自貶聖而不居之意是也不然祖述堯舜憲章文武律天時襲水土刪詩定書雅言執禮至於韋編三絶曰我於易則彬彬矣是固孔子所以學也豈曰我生而知之學皆可已哉雖然自其常通而不困語之神不可知而智則學者可以俱至舜稱智臧武仲亦稱智而臧武仲去舜逺雖才異亦學不造其極也學造其極則無不知故智之為言惟好學為能近平居無事反觀而內融上思千載若存若亡中攬四海若隱若顯下索將來若絶若續譬空中雨欲數其滴有不勝知者矣欲知之奈何惟學而已矣學則聖人之智可近而不逺故物量無窮而聖人之智亦無窮用無窮逐無窮亦窮則凡理之不可勝知者有不能外吾之所察易曰通乎晝夜之道而知此古人所以事至而辨物來而名也可謂不智乎事物之過吾前如日月更代而無止而吾之所以應之如井泉愈汲而愈不竭蓋學之效如此不可謂不智也頃余術不與時偶廢官休其廛八年而巷之草沒屐或唁之輒自語曰足固未嘗刖而士相與戒而逺之曰是其術也不利人眤且招悔而袁君耕道得往來從余者亦八年其意不衰或謝不見或乍見而不留卒不懟或旦暮見或易與言如家人卒不悔余歎曰甚矣耕道可謂好學也抑人所戒逺利近悔奈何耕道猶笑自如而余記誦益落文學益疏顧無以應耕道求又不敢以其不知而作者語之雖語之而知也無涯使耕道何自入故第誦中庸語曰好學近乎智以勉之好學云者非孔子顔淵不得以私相與然各從其志獨顔淵得好學而已哉時習之為説譬氷水為之而寒於水苟不已則所不知當益知故求智者莫近反而言之則好官爵好貨財至塞其心如蹊間之茅者皆愚矣人之所以無知若草木自愚其心者耕道可不反戒而逺之惟恐其似若彼之相與戒而逺我哉因為之名其所居齋曰近智耕道勉之乃棟牖花竹起居之佚視聽之適則不足道也大觀四年七月十有四日記蘇門六君子文粹卷六十八
