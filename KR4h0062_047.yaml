body:
  text: 蘇門六君子文粹卷四十七濟南文粹五宋李豸撰書上禮部范侍郎論廣文館生書某聞古之名臣所以下芻蕘者非以匹夫之論必賢於已而廣聽泛謀欲取其智以益已之智若乃用其智而果有功乃已之功也古之志士遇事感慨未能自試其才然時與事會憤不忍失必諷諸在位願行其説若乃行其説而伸其志乃已之志也夫士之先達固可自賢復能不遺微賤取其智以為已之功士之未達身雖困窮復能不以微賤自鄙得賢公卿以行其志非惟世無失時之事事無可悔之䇿即其人之材識志意亦可概見某遊執事之門有年矣雖碌碌不足比數然不自揆量常以國士自居而亦欲以國士上報異時執事拜諫大夫固嘗貢言欲補萬一自拜宗伯常欲復以愚意思未有以發日者獲侍尊俎竊聽論將置廣文館生之説退而思之欲擬作一議而又不敢輒陳管見以訂其論夫朝廷崇忠信之心惡誕謾之俗以三嵗秋賦四方遊士客於京師偽為僑寓之籍以誑有司者無慮數千務有以制之甚善甚善然國朝著令厲禁素密姦生詐起必朋比相容共為詆欺故欲嚴地著之法則地著無恥之人為容姦之地蓋有以百畝之田畝為一户户為一姓彼姓氏皆可通用符券皆能合式人人用之無不可者有司無得而詰也則地著之偽不可除矣欲嚴互保之法則彼冒户之士自為朋儔更相蒙蔽初未始有一日之雅而乃相保平生之行非惟户籍之不明言行之弗審雖易姓匿喪通囚間諜亦無自而知彼結保之數合或有司無得而詰也則互保之偽不可除矣而又況天府試期比諸路為晚彼無恥之士或易數名治數經州試畢而復試於天府已試於前場而復試於後場非惟自詭其名而冒喪代人者且士人應舉覔官將以事君而於試藝之初已誕謾如此欺有司乃欺君也欺人乃欺已也將安用之然欲廢開封貢士本額惟置廣文館生使各用本貫真户秋賦之年前期先試以補三千五百人俾就秋試其解額十一取之其意誠善矣獨不念開封雖偽户之士衆然畿內地著真貫之士亦無慮數百今也勿以首善之地當優之以為郡國之表直以亦為一郡彼諸道列郡猶且貢士而開封獨不然於義未安或曰朝廷既建太學彼解額最優奈何不以嵗月居之以應其格乎借不能居太學而今也又置館生汝則不預尚奚恤哉四方之士廢祀與養至京師復多假厚資可久居太學者或寡矣今雖設館生凡未補者非學試不中程則居學未滿嵗者也抑亦或以事而靡及或以病而弗堪或喪期之未終或米鹽之無暇或不及一時之補或雖補而偶失而乃使弗就秋試若在可閔某以謂君子制法當俾變通可推不謬於一曲則隨事制宜雖久不弊若夫更張前制必觀其甚弊之處而改作之無但苟易其文不究其實必當使自我亦至於無弊也已夫偽户之士非喜於冒憲而樂於行詐甘心逺客而願費資用止以本貫解額太寡故裹糧負笈雲集京師徼幸於一得而已若使置廣文館生雖曰使之真用本籍亦朝三暮四朝四暮三之術名苟易爾又況遂廢開封之額非允於衆論也歟某之意以謂莫若平天下之解額使逺方之士自不為詐之為愈天下解額既平雖日撻而使之為偽户亦不可得何哉今夫江浙閩蜀舉人極多而解額極少至有百分取一者矣京東京西河東河北陜西諸路舉人或多或少然解名例為最優故十取二三者有之十取四五者有之十取六七者有之至於解名有餘舉人不足者亦有之若乃通天下解名會計而總準之約為中制二十取一乃平無間天府無間五路通天下皆用此例然則孰有不均者乎然則逺方之士曰二十取一天下通法也自開封達於四方一也尚何樂於行詐甘心逺客而願費資用以為開封偽户者乎行將使士風丕變安居井疆養生送死謹身慎行蘄鄉里稱為善人矣是亦教化之本也或曰國朝以來最優五路一旦解名率與諸路均可乎曰惡是何言也而以謂河東河北與夫陜西舊所以優之者以近邉圉歟京東西所以優之者以近王畿歟夫五路諸路之士皆王士五路諸路之民皆王臣匪無偏無黨而有優有抑非王道之平也以邉圉王畿而優之愛人以姑息也或曰國朝以五路之士文不勝質故進之以諸路之士質不勝文故退之於五路當於短中求長於諸路當於長中求短吁是亦待五路之淺且五路諸科之額甚衆自諸科銷併改為進士之額已不加少諸路諸科之額素少而進士之額不增故不加多至於禮部亦各用其路所貢之士計其分數以取之以是五路之士得官為多天下之士應舉之法同而取數之法有異獨優五路無乃不可乎今誠能平其解額而禮部二十取一之數亦如之則王道之平也雖久不弊也愛人以德而非姑息也或曰子之説誠善矣然亦有可欺乎曰不過妄引稚儒張為虛數以給於有司而已今俾天下之士地著為學而安處於鄉不為誕謾而務為忠信雖張虛數其亦可與其進矣伏惟執事以道德文行弼亮人主方且朝夕納誨欲致吾君於堯舜三代之上故有猷有為必以忠信為主而又職當禮教位兼師儒凡厥士類莫不延頸企踵以須風化之厚令其所有天下當均普為心則天下之美歸之夫科舉之弊其已久矣實有待於執事之更張歟時不可失惟執事不以人廢言姑考其説或有補焉嗚呼此非嘗試之論也答趙士舞德茂宣義宏詞書凡文章之不可無者有四一曰體二曰志三曰氣四曰韻述之以事本之以道考其理之所在辨其義之所宜卑髙巨細包括并載而無所遺左右上下各若有職而不亂者體也體立於此折衷其是非去取其可否不徇於流俗不謬於聖人抑揚損益以稱其事彌縫貫穿以足其言行吾學問之力從吾制行之用者志也充其體於立意之始從其志於造語之際生之於心應之於言心在和平則溫厚爾雅心在安敬則矜莊威重大焉可使如雷霆之奮鼓舞萬物小焉可使如脈絡之行出入無間者氣也如金石之有聲而玉之聲清越如草木之有華而蘭之臭芬薌如雞鶩之間而有鶴清而不羣犬羊之間而有麟仁而不猛如登培塿之丘以觀崇山峻嶺之秀色涉潢汙之澤以觀寒溪澄潭之清流如朱絃之有遺音大羮之有遺味者韻也文章之無體譬之無耳目口鼻不能成人文章之無志譬之雖有耳目口鼻而不知視聽臭味之所能若土木偶人形質皆具而無所用之文章之無氣雖知視聽臭味而血氣不充於內手足不衛於外若奄奄病人支離憔悴生意消削文章之無韻譬之壯夫其軀幹枵然骨強氣盛而神色昏瞢言動凡濁則庸俗鄙人而已有體有志有氣有韻夫是之謂成全四者成全然於其間各因天姿才品以見其情狀故其言迂疏矯厲不切事情此山林之文也其人不必居藪澤其間不必論巖谷也其氣與韻則然也其言鄙俚猥近不離塵垢此市井之文也其人不必坐㕓肆其間不必論財利也其氣與韻則然也其言豐容安豫不儉不陋此朝廷卿士之文也其人不必列官守其間不必論職業也其氣與韻則然也其言寬仁忠厚有任重容天下之風此廟堂公輔之文也其人不必位台鼎其間不必論相業也其氣與韻則然也正直之人其文敬以則邪諛之人其言誇以浮功名之人其言激以毅苟且之人其言懦而愚捭闔從橫之人其言辨以私刻核忮忍之人其言深以盡則士欲以文章顯名後世者不可不謹其所言之文不可不謹乎所養之德也如此王通論鮑昭江淹等之文各見其性行之所長可謂知言矣古者登髙能賦山川能祭師旅能誓喪紀能誄作器能銘然後可以為大夫故訓詩典册書詔赦令文賦詩騷針誡贊頌樂章玉諜露布羽檄疏議表箋碑銘諡誄各緣事類以别其目各尚體要以稱其實如彼玉工圭璋璧琮珮玦珌璏追琢之工皆有制度其方圓曲直則各中其用也如彼梓人棟梁桓楹榱桷楶棁朴斫之工皆有繩墨小大長短則各中其用也若乃或混淪而無辨或散漫而無紀或錯亂而無序或晦暗而不顯雖曰謂之文亦不足觀也已德茂學問充富真積力久淵源汪洋根幹碩大發為文章蓋其波瀾枝葉實為餘事然既已能文而學文不已必欲離羣拔俗逺追古之作者方駕並驅則宜取宏詞所試之人種種區别各以其目而明其體研精玩習寤寐食息必念於是造次顛沛必念於是則將超然懸解躐等頓造徑至妙處一日萬里如是則一代文儒之宗捨德茂其何人哉主上紹休聖緒厲精治道方將追迹三王指揮四夷紉書汗簡紀述先烈泥金簡玉升中名山其潤色鴻業形容太平大著作大號令職皆在於詞臣德茂其勉之哉使後來賞音之士論一時之文人以謂何人之文但如孤峰絶岸何人之文但如濃雲震雷何人之文如輕縑素練而窘邉幅何人之文如豐肌膩理而乏風骨獨吾德茂之文如良金美玉無施不可則德茂之文信乎顯於當年與後世矣蘇門六君子文粹卷四十七
