body:
  text: 蘇門六君子文粹卷三十二淮海文粹二宋秦觀撰進論袁紹論天下之禍莫大於殺士古之人欲有為於世者雖負其豪俊傑特之才據強大不可拔之勢疑若殺一士不足以為損益然而未始不亡者何耶士國之重器社稷安危之所繫四海治亂之所屬也是故師士者王友士者霸殺士者亡世之論者曰以袁紹之亡繫於官渡臣竊以謂不然紹之所以亡者殺田豐耳使紹不殺田豐雖有官渡之敗未至亡也何則昔楚漢相距於京洛之間高祖奔北狼狽甚於袁紹者數矣而卒有天下項籍以百戰百勝之威非特曹公比也而競死東城其所以然者無他士之得失而巳故高祖以為張子房韓信蕭何三人皆人傑吾能用之所以取天下項羽有一范增而不能用所以為我擒以楚漢之事言之則知紹之亡果在於田豐不在於官渡也且紹之械繫田豐也何異高祖械繫婁敬於廣武乎髙祖圍於平城而還以二千户封敬號建信侯紹敗而還慚豐而殺之嗚呼人之度量相逺一至於此哉傳曰善敗者不亡故楚昭王珍越王句踐皆濵於絶滅而復續紹雖敗於官渡而冀州之地南據大河北阻燕代形勢之勝尚可用也向使出豐於獄東向而事之問以計策卑身折節以撫傷殘之餘親執金鼓以厲奔走之氣內修農戰外結英雄縱不能并吞天下豈遽至於亡哉方紹與董卓異議橫刀不應長揖而出及起兵渤海遂有四州之地連百萬之衆威震河朔名重天下不可謂非一時之傑也然殺一田豐遂至於此則天下之禍其有大於殺士者乎文若曰袁紹布衣之雄耳能聚人而不能用臣竊以為知言也魯肅論魯肅勸吳以荆州之地借先主先主因以取蜀吳王悔之歸咎於肅夫以肅之籌略過人而其昧有至於此乎以臣觀之吳人雖欲不借荆州以資先主不可得也肅策之善矣何則是時曹氏巳據中原挾天子以令天下毅然有并吞諸雄之心袁紹吕布皆為擒滅其能合從并力以抗之者獨仲謀與玄德耳此所謂胡越之人未嘗相識一旦同舟而遇風波則相應如左右手勢使然也吳人雖欲不借荆州以資先主其可得乎且吳不借荆州則先主必還公安不然則當殺之二者皆不可也昔高祖入關與秦父老約法三章秋毫無所犯秦民大恱項羽雖徙之於漢中而高祖還定三秦如探囊中物耳何則秦民之心巳繫於漢也方先主東下荆州之人歸者十餘萬或勸速行以據江陵先主曰夫舉大事必以人為主今人歸吾何棄去是時先主若還公安吳為讐也夫以董卓之罪上通於天王允以順誅之而李傕郭汜紏合黨與猶能為之報仇何則卓雖凶逆亦一時之望也先主以宗室之英名蓋當代士之歸者如水之赴海烏林之役曹公以百萬之衆泝江而下非其雄略則周瑜水軍豈能獨勝耶吳若殺之豪傑四面而至必矣孫氏之亡可立待也繇是言之先主借荆州之事拒之則為仇殺之則招禍因而借之則可以合從并力而抗曹公肅之為吳策者豈不善乎然則周瑜嘗欲徙先主置吳盛為築宫多其美女好玩其䇿何如此又大不可也先主嘗見其髀肉生慨然流涕歎功業之不建其在許也曹公與之出則同輿坐則同席竟亦不留此其志豈以美女玩好老於吳者耶史稱曹公聞孫權以土地借備方作書落筆於地彼知先主得荆州輔車之勢成天下未可以遽取也繇是言之借荆州之事豈惟劉氏所以取蜀亦孫氏所以保吳者矣諸葛亮論鼂錯曰五帝神聖其臣莫及三王臣主俱賢五霸不及其臣臣竊以為不然夫覆杯水於坳堂之上置杯焉則膠焦鵬之翮拔而傅鳲鳩則纍矣故有帝者之君則有帝者之臣有王者之君則有王者之臣有霸者之君則有霸者之臣諸葛亮雖天下之奇材亦霸者之臣耳何則亮帝王之輔肯為蜀先主而委贄耶王通以為使亮而無死禮樂其有興乎尤非也臣以為亮雖無死曾不足以取天下况於興禮樂乎何則亮之所事者蜀先主而所自比者管仲樂毅也先主雖號人傑然取天下則不及曹孟德保一方則不如孫仲謀其所以得蜀者以劉璋之暗弱而巳先主雖存司馬仲達陸伯言諸公皆無恙尚不足以取魏而死其能取天下乎管仲相齊九合諸侯一匡天下然不能先自治而後治人故孔子以為小器樂毅為弱燕合五國之從夷萬乘之齊然曠日持久不能下莒與即墨至間者得行捐燕之趙管仲樂毅雖得志於天下尚不能興禮樂亮而無死其能興禮樂乎夫古之君子進難而退易伊尹耕於有莘之野也則固巳曰使是君為堯舜之君使是民為堯舜之民蓋求之而不用其道則彼有不出而巳孔子曰如有用我者吾其為東周乎蓋用之而不盡其蘊則彼有不留而巳是故有所不出出則可以取天下有所不留留則可以興禮樂方先主之顧亮於草廬之中所言者取荆益二州耳至言天下有變則一軍向宛洛一軍出秦川所謂俟河之清人壽幾何者耶荆州之失大舉伐吳亮曽不能強諫及兵敗乃歎曰法孝直若在能制主上令不東就復東行必不危矣所謂虎兕出於柙龜玉毁於櫝中是誰之過歟以此論之亮不足以取天下而興禮樂亦明矣然亮與先主一言道合遂能霸有荆益成鼎峙之勢及受寄託孤義盡於主國無間言身死之日雖遷廢之人為之泣下有致死者雖古往社稷之臣何以加諸陳壽以謂管蕭之亞匹蓋近之矣然壽以謂應變將略非其所長信乎此非也亮之征孟獲曰公天威也南人不復反矣其卒於渭上司馬仲達按行其營壘處所曰天下之奇才也所作八陳圖後世言兵者必稽焉則亮之應變將略不言可知矣嗚呼豈壽果挾髠其父之故耶抑其所自見如此也臧洪論臣聞臧洪以袁紹不救張超絶不與通至於敗死以臣觀之洪實遊俠之靡也豈臣子之義哉何則夫欲生而惡死天下之真情也然古之君子或捐軀命棄親族不為苟得者非不欲生以其所欲有甚於生而巳觸鼎鑊冒鋒鏑患有所不避者非不惡死以其所惡有甚於死而巳使其所欲未有甚於生所惡未有甚於死則君子豈有矯世絶俗拂其所謂真情者耶詩云既明且哲以保其身君子之常也傳曰志士仁人有殺身以成仁無求生以害仁君子之變也不得巳而為之者也世衰道微士大夫講學不明於是始惑於輕重趨舍之際徒知保身之為易殺身之為難不知妄死之與苟生其失一也齊有崔氏之難其臣死者十有餘人晏子獨以為君為社稷死則死之為社稷亡則亡之若為巳死而為巳亡非其私䁥誰敢任之以晏子之言論之洪為張超而死者果何為也夫曹操吕布皆漢之姦臣然方是時操挾天子其勢為順布背朝廷其勢為逆使超去逆就順紹弗為救猶或可責矧叛操而歸布安能責其不救乎夫張超袁紹之於洪雖交有故新遇有厚薄然受其表用則皆主也使舊主為新主所殺洪絶之而致死猶或近義矧滅超者曹氏焉得與紹為讐乎繇是言之洪為張超而死者果何謂也孔融嘗為管亥所困太史慈為突重圍求救於先主先主從之遂解都昌之急蓋是時俗尚名節甚矣天下之士惟以然諾不終為愧禍亂不解為恥厥志有在生死以之故事成則為太史慈不成則為臧洪以臣子之義責之皆罪人也楊子以要離為蜂螫之靡聶政為壯士之靡荆軻為刺客之靡者耶孟子曰可以死可以無死死傷勇若數子者可謂傷勇矣亦足以悲夫王導論臣聞春秋書趙盾之罪而三傳皆以為實其族穿非盾也盾為正卿亡不越境反不討賊故被大惡之名臣始疑之及讀晉史見王導周顗之事然後知三傳之説為不誣矣何則經誅其志傳述其事也王敦之舉兵也劉隗勸帝盡誅王導之族導嘗求救於顗顗申救甚切而不與之言導心銜之及敦得志問顗於導不答顗遂見誅後見其表始流涕曰吾雖不殺伯仁伯仁繇我而死然則顗之死雖假手於敦實導意也若使後世良史書曰王導殺周顗不亦宜乎以此觀之則趙盾之事從可知矣夫盾以驟諫不入靈公使鉏麑賊之麑不忍殺又伏甲而攻之僅以身免故其族穿攻靈公於桃園然則靈公之死雖假手於穿實盾志也不然則其返也曷為其不討穿乎傳以為志同則書重信不誣矣豈非經誅其志而傳述其事耶然則穿首惡也盾疑似者也舍首惡而誅疑似者何也蓋名實俱善者天下不疑為君子心迹俱惡者天下不疑為小人有善之名無善之實有惡之心無惡之迹是為姦人姦人者嘗託身於疑似之間天下莫得而誅之此春秋所以誅之也太史公以春秋别嫌疑明是非定猶豫蓋以此矣漢淮南厲王母坐趙氏死厲王以為辟陽侯力能得之而不爭輒椎殺之唐髙宗欲立武后畏大臣異議李績曰此陛下家事無須問外人帝意遂定唐人以為立武后者績也繇此觀之誅志不誅事非特春秋古今人情之所同然也春秋能發之耳然則王導之罪與趙盾同乎曰非也導實江左之名臣東晉之興導力為多特其殺周顗之事有似於盾而巳崔浩論臣聞有有道之士有有才之士至明而持之以晦至智而守之以愚與物並遊而不離其域者有道之士也以明濟眀以智資智頴然獨出不肯與衆為耦者有才之士也夫有道之與有才相去逺矣不可不知也史稱崔浩自比張良謂稽古過之以臣觀之浩曾不及荀賈何敢望子房乎夫子房之於漢荀攸賈詡之於魏浩於元魏運籌制勝算無遺策實各一時之謀臣也高祖以子房與韓信蕭何為三人傑用之以取天下韓信王楚數十城蕭何封侯第一而子房獨願封留而已及太子監關中兵乃行少傅事晏然處於叔孫通之下了無矜伐不平之意故司馬遷以為無智名無勇功可謂有道之士也荀賈雖不足以與於此然攸謀謨帷幄時人子弟莫知其言詡亦闔門自守退無交私皆以令終故陳壽以為良平之亞雖有才之士亦頗聞君子之道者也浩則不然其設心措意惟恐功之不著名之不顯而已李順之死浩既有力而奏五寅元厯章尤夸誕妄詆古人所撰圗書至鑱石道旁以彰直筆明哲之所為固如此乎正孟子所謂小有才未聞君子之大道適足以殺其身而巳盆成括之流也以此論之浩曾不及荀賈眀矣何敢望子房乎夫以其精治身以緒餘治天下功成事遂奉身而退者道家之流也觀天文察時變以輔人事明於末而不知本陰陽家之流也子房始遊下邳受書圯上老人終曰願棄人間從赤松子遊耳則其術蓋出於道家也浩精於術數之學其言熒惑之入秦彗星之滅晉與夫免出後宫姚興獻女之事尤異及黜莊老乃以為矯誣之言則其術蓋出於隂陽而己此其所以不同也然髙帝用子房之謀棄咸陽還定三秦滅項羽於垓下太武用浩亦取赫連昌破蠕蠕平沮渠牧犍於涼州惠帝得不廢者子房之本謀而太武為國副主亦自浩發之其迹蓋相似也嗚呼豈欲為子房而不知所以為子房者歟蘇門六君子文粹卷三十二
