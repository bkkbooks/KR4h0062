body:
  text: 蘇門六君子文粹卷十九宛丘文粹一宋張耒撰書上曽子固龍圖書某嘗以謂君子之文章不浮於其德其剛柔緩急之氣繁簡舒敏之節一出乎其誠不隱其所已至不强其所不知譬之楚人之必為楚聲秦人之必衣秦服也惟其言不浮乎其心故因其言而求之則潜德遁志不可隱伏蓋古之人不知言則無以知人而世之惑者徒知夫言與德二者不可以相通或信其言而疑其行嗚呼是徒知其一而不知夫君子之文章固出於其德與夫無其德而有其言者異位也某之初為文最喜讀左氏離騷之書邱明之文美矣然其行事不見於後不可得而考屈平之仁不忍私其身其氣酋其趣髙故其言反覆曲折初疑於繁左顧右挽中疑其迂然至誠惻怛於其心故其言周密而不厭考乎其終而知其仁也憤而非懟也異而自潔而非私也倣徨悲嗟卒無存省之者故剖志决慮以無自顯此屈原之忠也故其文如明珠美玉麗而可悅也如秋風夜露凄忽而感惻也如神仙烟雲髙逺而不可挹也維其言以考其事其有不合者乎自三代以來最喜讀太史公韓退之之文司馬遷竒邁慷慨自其少時周遊天下交結豪傑其學長於討論尋繹前世之迹負氣敢言以蹈於禍故其文章踈蕩明白簡朴而馳騁惟其平生之志有所鬱於中故其餘章末句時有感激而不泄者韓愈之文如先王之衣冠郊廟之鼎俎至其放逸起卓不可收攬則極言語之瓌巧有不足以過之者嗟乎退之之於唐蓋不遇矣然其犯人主忤權臣臨義而忘難剛毅而信實而其學又能獨為於道德滅裂之後纂孔孟之緒餘以自立其說則愈之文章雖欲不如是蓋不可得也自唐以來更五代之紛紜宋興鋤叛而討亡及仁宗之朝天下大定兵戈不試休養生息日趨於富盛之域士大夫之游於其時者談笑佚樂無復向者幽憂不平之氣天下之文章稍稍興起而廬陵歐陽公始為古文近揆兩漢逺追三代而出於孟軻韓愈之間以立一家之言積習而益髙淬濯而益新而後四方學者始恥其舊而惟古之求而歐陽公於是時實持其權以開引天下之豪傑而世之號能文章者其出歐陽之門者居十九焉而執事實為之冠其文章論議與之上下聞之先達以謂公之文其興雖後於歐公屹然歐公之所畏忘其後來而論及者也某自初讀書即知讀執事之文既熟而思之廣求逺訪以日攬其變嗚呼如公者真極天下之文者歟上唐運判書某聞昔者三代之時公卿大夫之待其下何其仁愛忠厚發於至誠而能盡下之情也下之事上何其夷易簡直各得自獻其意無有阻塞不達之恐而不限於勢也夫惟上能盡下之情故下不限於勢上俯而就之下仰而及之故尊卑之情通而貴賤之志達然某嘗疑之天下急於求其上者物理之所當然公卿大夫既貴矣宜其偃然無待於物彼汲汲以求於下苟有善焉如或失之此其故何也蓋天下之位有尊卑貴賤之不同者勢之所當然非其事亦判然兩為而不相與也今夫貴者止於自安一切無事於功名可也苟有功名之心則貴者之功賤者之力也尊者之名卑者之成也故上之求乎下猶下之求其上也昔周公既尊矣身履天下之富貴而後世稱急賢待士者必稽焉故其效也百官庶府莫不修治制度文理莫不彰明周公之身無遺德焉夫豈周公一人之力哉惟其然故古之公卿大夫不敢苟簡守常以便其私尊者汲汲有求於卑貴者汲汲不遺於賤夫上有至誠惻怛之心不敢遺忘疏逺之士則士之在下者亦不敢復愛其所有至於奮厲出竒惟恐不逮者繇此故也三代之政既亡公卿大夫無復向者至誠盡天下之意謹身無過自處甚重忘其立功立事之心浸然鋤去感發激昻之氣以謂無所事於微賤於下者不過言功不幸功不至焉雖有過人拔俗之才不聞之矣其斥而去之不過論罪幸而無過雖天下之冗瑣不復問之矣情阻而不合氣否而不交下畏其上則有之矣而不愛也下恭其上則有之矣而不忠也貴賤異志尊卑不親而三代之風泯然矣事功之不立豈不以此哉某嘗讀西漢見吳公之取賈生田延年之用尹翁歸暴勝之禮雋不疑蓋嘗竊歎三人者猶能降心迹古之義居尊以禮賢致誠以納士以太守之尊使者之貴親與匹夫下士相接務盡人之才而忘下之瀆之也夫如前三君者未足道也然巳能如此然則天下之賢者多矣安知無有慨然能用古義不溺於流俗有功名之心而忘其區區之尊嚴者耶嗚呼安得斯人者而處天下之富貴哉使誠有之天下之遺善潜德庶幾乎興矣上黃判監書某嘗怪夫人之於道何其所見之不一而其言之各異也蓋自周衰以來諸子各以其說行於世而其言獨能推本道德之意知本而不流於末守真而不陷於僞者莫近於老莊然是二人者乃棄仁義斥禮樂絶學棄智以自明其說考其心以謂為其術必棄仁義禮樂而四者固其術之害也惟其然是故得罪於後世之儒者自秦漢以來天下學者甚知推本仁義其言禮樂治道有足觀者矣而未嘗有一言及於性命道德之本蓋以謂道德性命者亦無所用於禮樂也是二者之謂乎然不可以並亡各擯其所不及而求全其所長而某之不肖嘗竊歎以為不然何者所謂道者固無乎不在蓋大至於天地衆至於萬物無有一物不資其用者豈其缺然有所不足歟使道之有不足則安取道於是思有以合二者之論而得其說為道德之論者本於虛而無形執禮樂之論者主於著見而有迹極無形之論至於忘言推有迹之至則至於終身言而不盡此其所以齟齬而不同以謂有無之相害耶則有者固自以有耳而有未始非無也無者固自無耳亦無未始非有也有與無二者將命於我耳而我之為是說果何自而起也在物無定形在我無定心然則凡乃出於妄意私智而非物之正耶繇是而觀之則方其在仁義禮樂者未始非道德性命也方其在道德性命者亦未始非仁義禮樂也同舉而非一也兩立而非二也圎融和㑹而物與我兩宜矣尚何區區之辨哉蓋孔子之道本於寂然不動矣然方其感於物而天下之故無所不通洗心齊戒退藏於密矣然天下之至賾萬物之至動未嘗厭也某之於學功有得於此而後視天下之大萬物之衆今古之不齊而無往而不一焉所謂萬物一府死生同狀者推其端乃一本於此而後知夫子之道之為全也答杜鋒書兩墜珠玉又付以新文一軸披讀纍日不勝欽仰試誦所疑其一篇曰非季札夫季札何可非也札之達於禮樂蓋孔子之所與而其人之賢則非管晏叔向子産韓厥所可及也然則其於辭受之際宜亦至矣彼其辭千乘之國於爭奪之世蓋欲制行以髙天下而教後世將以愧夫盜據竊取而使亂臣賊子之禍少息焉使季札受亦可辭亦可而卒辭之者亦行其志云爾夫豈有所不可哉夫季札非忘吳也豈不曰國之存亡廢興天也非人之所能為也昔孤竹君以國與叔齊叔齊讓伯夷而卒皆逃去入周不反其國而孤竹之後不聞有興者而孔子論二子曰求仁而得仁未嘗罪以亡其國也夫子之不非夷齊則季札之不得罪於夫子明矣足下試詳思之世之貴王衍以器用言之譬如玩好間一物耳未可格以法度也愚以為季札為不可非王衍為不足非也再答杜鋒書嗟乎季子讓國幾千餘嵗厯數聖賢未嘗有說獨見黜於吾子蓋夫子謂後生可畏者夫季子之不肯受吳直是不欲有國耳故其言曰願附子臧之義彼視棄千乘之國如草芥亦必有樂乎此而易彼者苟求其所以讓之之名則夀夢欲越諸兄而立之季子固不可也至餘昧卒而子僚之才亦足以君國則季子不得廢嫡而立孟子曰天之所廢必若桀紂者故益伊尹周公不有天下此札之所以必辭者惡亂君臣之大分也季札之於道德其深矣哉吳屈庸曰季札守節者也雖有國不立可謂知其心矣孟子曰好名之人能讓千乘之國則自夷齊以來札一人而巳所謂聖人之清者也夫豈在所黜哉孟子曰若夫成功則天也則古之論存亡廢興未有不言天者非幸不幸也孤竹之君欲越次而立叔齊叔齊辭之可也伯夷長當立而辭之何哉商人世及則叔齊將以次亦當立也而夫子初不論此直曰古之賢人也其意可見季子之聽樂其於禮樂之際深矣其於辭受必不草草更宜詳之答汪信民書抑聞之古之文章雖制作之體不一端大抵不過記事辨理而巳記事可以垂世辨理而足以開物皆辭達者也雖然有道辭生於理理根於心苟邪氣不入於心僻學不記於耳目中和正大之氣溢於中發於文字言語未嘗不明白條暢盍觀於語者乎直者文簡事核而理明雖使婦女童子聽之而諭曲者枝詞游說文繁而事晦讀之三反而不見其情此無待而然者也蘇門六君子文粹卷十九
