body:
  text: 蘇門六君子文粹卷四十六濟南文粹五宋李豸撰進論將材論臣聞牛羊欲其茁壯也必其善牧車馬欲其習服也必其善御矧軍旅之事將帥之職畀之以師律付之以疆場內欲重吾國外欲克吾敵顧不慎哉不可以三軍之元帥姑且備其員兩國之民命聊且試其技不考其可必為國禍不求其良必為民殃故當築壇告廟之始必觀是人果足以稱此禮乎至推轂授鉞之際又觀是人果足以勝吾任乎昔在戰國之紛紛不惟君可以擇臣而臣亦可以擇君當時英雄挾其長遊視諸侯能用我者然後仕之故欲求將不可遽得今天下為家四海為畿罔匪臣僕英雄盡入於彀中多士咸在衆技自獻惟君王所擇所謂能稱築壇告廟之禮能勝推轂授鉞之任者固亦有之在所選而已昔之論將者其材有五曰勇曰智曰仁曰信曰忠將何以貴乎勇蓋直以養氣威以克愛剛以致其敢義以致其必蔑視敵國而砥礪三軍吾之所指曷敢不從死吾之所麾曷敢不從移非勇不能也勇則不可犯矣將何以貴乎智蓋使貪使愚各求其所類使勇使智各效其長技俾敵常為客而不足我常為主而有餘我常致人而人必應人不可致我而我自如為勝敗之政如神默運制竒正之術如環無端非智不能也智則不可亂將何以貴乎仁蓋以慈養其惠以惠養其威寬以御衆衆罔不盡其心恱以使民民罔不盡其力忘勞而供武服犯難而圖戰多欲與之可赴深溪必自我視之如嬰兒欲與之可俱死必自我視之如愛子則非仁何以懷之仁則能愛人故也人不可無信而將之信為重蓋方其涖師也國不自外理國容於是乎不入軍軍不從中御軍容於是乎不入國將軍之權專矣如之何交厥孚於上下布至誠於逺邇故貴乎信信則不欺人故也事君皆以忠而將之忠為大蓋方其用師也上不制於天下不制於地中不制於人將軍之志自用矣如之何惟君是圖而忘其身惟國是憂而忘其家故貴乎忠忠則無二心故也夫有爵有戮士心所屬可安可危君慮所隨士心所屬以賞刑之柄繫焉賞刑之所繫成敗如轉掌君慮所隨愛憎之變㑹焉愛憎之所㑹禍福如發機惟信惟忠乃為建立勛名之權輿杜塞危疑之關鍵也以是五材泛觀乎朝如持度以揆長短如操量以較多寡其分别差等殆無遺形大材如罍小材如杯以杯受罍過則溢以罍受杯綽乎兼容故古之人論將有妻子之將有十人之將有百人之將有千人之將有十萬人之將有百萬人之將其材相去逺甚然不離乎五者之間也雖然材必適其用用必適其宜執方而無權守一而不變雖用良材覆為纍德故太公之論將有十過孫武之論將有五危觀其過之所生究其危之所自其初皆五材之良其失皆五材之蔽有材而不能用至於軍敗國辱家殘身戮吁可哀也故為將之道既有五材以御三軍欲攬英雄之心則又當行之以三禮斷之以三至欲重廟堂之勝算則又當持之以五慎審之以五權達事宜而有九變無失九變則置敵於全囚泥法制則有九拘母執九拘則立我於全勝古之人論良將有曰剛則法天可望而不可干柔則像淵可觀而不可玩去如收電可見而不可追留如丘山可瞻而不可動有將如此則築壇告廟之禮推轂受鉞之任為不愧矣故初作三軍欲謀元帥惟卻縠說禮樂而敦詩書於是用於晉秦伐阿鄄而燕侵河上惟穰苴文附衆而武勝敵於是用於齊孫武十三篇之說闔閭試之以婦人卒以强吳吳起七十六戰之功魏武始於論兵器卒以强魏先軫以下軍之佐而超將中軍不以卑踰尊為疑卻氏狐氏欒氏以族人從軍不以親同職為間韓信奮於亡虜魏尚拔於囚徒充國自舉任之而不違伏波求用試之而不拒謝安薦姪而不沮其挾親竇憲請行而曲聽其補過所用者材也材可用焉不當牽左右近習之好惡不當徇士卒國人之議論挺然不疑斷以已意夫賢將之徒類皆英雄豪傑之士觀人君用已如此其重當如之何圖報哉谷永曰楚有子玉得臣文公為之側席而坐趙有亷頗馬服强秦不敢窺兵井陘國有賢將所恃如此惟陛下注意焉陸賈曰天下安注意相天下危注意將必至天下危注意將則不亦晚乎惟天下安乃注意將之時是謂治不忘亂安不忘危也將心論臣聞有君子將有小人將君子將天下之將也小人將亡國之將也古之賢將原兵之意可以為仁術察武之用可以廣德心故以殺止殺非所以好殺以戰去戰非所以好戰司馬法曰殺人安人殺之可也攻其國愛其民攻之可也孫子曰全國為上破國次之全軍為上破軍次之何古人終始以愛存心歟故君子之將能師古人之意以不戰屈人兵為心小人之將違古人之意以嗜殺人為事以不戰屈人兵為心以天下為心者也非天下之將乎以嗜殺人為事亡國而不恤者也非亡國之將乎夫尉繚當梁惠王之時為兵之說曰善用兵者能殺士卒之半其次殺十之三其次殺十之一能殺其半者威加海內能殺其十之三者力加諸侯能殺十之一者令行士卒信此說也則興師二十萬可自誅其十萬興師十萬可自誅其五萬矣且夫將軍心也士卒支指也心誠則支指應心危則支指衛士樂附則將威今驅無罪之人以犯難悅以使之猶恐不得其心忍羅置罪罟以快意於刑戮乎誅其半欲其半之用命孰若全軍撫愛皆使之親其上死其長乎殺半用半雖勝何益孟子曰不仁哉梁惠王也糜爛其民而戰之爭地以戰殺人盈野爭城以戰殺人盈城嗚呼慘酷至此尉繚有以啓之歟臣於是乎求於古之君子善撫士卒而愛之者私竊慕焉其惟戰國之李牧蜀之諸葛亮唐之李靖臣請言其用兵之意夫李牧之居鴈門也罄軍市之租以養士力椎牛犒燕以養士心謹烽燧多間諜以養嚴入保示怯佯北致人以養氣謀熟勇全皆願一戰於是選車餘千選騎餘萬百金之士五萬彀者十萬一舉而滅襜襤走單于破東胡降林胡向使自殺其士卒之半則莫不怨讟矣孰肯自獻其勇以求一戰乎諸葛亮之禦張郃之衆號四十萬而亮之衆不滿一軍衆寡既不敵而强弱又相逺兩軍既陳而翻兵適交亮以用兵行師大信為本乃悉遣之且曰去者束裝以待期妻子企踵而計日則原其情而閔其勞懷以仁而厲以義可謂周矣故去者感激願留一戰住者憤怒人百其勇殺郃走懿以成其功向使自殺其士卒之半則聞聲而還矣孰肯忘死銜恩以決一戰乎李靖之與太宗論兵也太宗以嚴刑深法使人畏我不畏敵為疑靖以卒未附而罰不行不可用為說太宗以愛克威威克愛為問靖以愛設為先威設為後為對則君臣之心何視卒如嬰兒乎又曰頃討突厥總蕃漢之衆出塞千里未嘗戮一揚干斬一莊賈夫衛公於艱難草創之初剪刈凶渠以掃欃槍備延陀於關內伐突厥於定襄蕩吐渾於西海夷蕭銑於江陵向使自殺其士卒之半則危國亡師之不暇況宣威信於異域乎嗚呼安得今日守邉之將愛育士卒如此三子者乎夫天子之兵以仁為本以義為御天下之將以慈為主以勇為決卻視尉繚之說非亡國之兵小人之將乎秦以殘忍虎狼之惡務殺伐屠戮以强天下又有殘忍虎狼之將能殺伐屠戮以快其意䝉驁王翦之父子也世為秦人之民賊攻城克敵固已衆矣然未若白起之甚夫白起之為將也戰必勝攻必取誠莫可及以書考之凡攻某國拔之伐某所取之不言斬首若干坑卒若干者置而勿論論其直書斬首若干坑卒若干而計之凡殺敵國之兵八十四萬人然起戰卒死於敵者又當幾十萬總兩國供軍之民其誅求裒斂因以失業而死者又當幾十萬矣何晏曰白起降趙卒而坑豈徒酷暴之謂乎後亦難得志矣又曰裁四十萬之命而適足以强天下之戰要一日之功而更堅諸侯之守又曰殺降之禍大於劇戰然則兵勝未幾而被戮國强未幾而為墟良以此乎臣於是乎求於古之君子能制閫外而懷柔者私竊慕焉其惟戰國之荀吳晉之羊祜唐之郭元振乎臣請言其用兵之說夫荀吳之伐鮮虞而圍鼓也鼓人欲叛其君而附已吳曰吾不可以欲城而市姦所喪滋多鼓人請降而有食邑吳曰吾焉用邑以賈怠不如完舊食竭力盡克鼓而還不戮一人賢哉羊叔子之為荆州也慨然有平吳之心開布大信專修德義縱俘釋虜以示至仁歸禽償榖以示不擾潘景來冦追斬而厚葬之美其死節陸抗對壘抗病而饋之藥抗顧不疑內則授良謀於張華外則付成算於杜預卒能平吳賢哉郭元振之鎮西域也撫馭諸蕃專尚忠義走吐蕃之衆開涼州之圍㑹兵百萬以集湟川分兵十道以進青海贊普屈膝而請和突厥畏威而入貢跪質勒而至於霣身弔婆葛而為之流涕賢哉嗚呼安得今日守邉之將綏撫敵國如此三子者乎夫天子之兵至信為主至公為輔天下之將附衆以文威敵以武卻視白起之功非亡國之兵小人之將乎夫為政至用兵棘矣用兵至於殺人可哀矣以可殺而以殺為事乃嗜好也嗜殺人者其心何如孟子曰始作俑者其無後乎為其象人而用之也懼後世以象人為未足有徇之以人者矣故必推原其理而深罪之奈何尉繚之法使後世藉口以殘忍乎孟子曰盡信書不如無書吾於武城取其二三䇿而已何其血流之漂杵也懼後世以漂杵則忍心於屠殄矣故必推原其書而深詆之奈何白起之事誘後世快意於殺伐乎陛下以仁政為重孝治為先則將之心術亦可戒矣彼一夫向隅而泣滿堂為之不樂東海殺一孝婦天降纍年之旱以罰之惟人命為可重也陛下念哉竒正論臣聞天下之事有能以勝不能有術以勝無術皆有能矣能之精者又勝焉皆有術矣術之多者又勝焉借以羿與般而譬之羿善射般善工學射者有彀的善工者有規矩特其大略也般之所以巧又有巧焉故學羿之射既與羿之巧均則有勝羿之心焉必曰吾與乃技相若羿不勝其忿而鬬技果相若則為羿之過失於盡其巧而傳之故卻視般之教示以巧而不盡其所以巧者誠為自勝之計也兵始於黃帝法成於太公黃帝而上兵未設以有兵勝無兵太公而上法未備以有法勝無法太公而後何其紛紛耶用兵者既頻學兵者既衆一定之法不足以相勝故管仲穰苴孫武吳起尉繚留侯孔明李靖之徒始出而論竒正竒正者因古以御時依體以立用千變萬化以制勝䇿用之之法可觀也而所以用之者不可見也戰之之理可論也而所以戰者不可陳也勝之之道可制也而所以勝之者不可傳也彼用兵之書布在方䇿既已人人皆可習矣用兵之法試於行陳既已人人皆能布矣人人皆習我亦習焉人人皆能我亦能焉是亦衆人也以衆人敵衆人尚何議先勝故竒正之理古人議而不辨竒正之法古人論而不議竒正之變古人存而不論非不論也不可論故不敝而常新以俟後世君子俾因襲致用可以神遇而不可以智知可以道運而不可以迹究法猶奕之局也兵猶奕之棋也竒正猶奕之智也智無一揆棋無定形觀其黑白不相容新故不相仍咫尺數路情狀萬變勝負得失在於一子然則竒正之形所以使敵人前後不相及衆寡不相待貴賤不相救上下不相扶亦一二䇿而己故四為正四為竒黃帝握竒之文也一術為正一術為竒曹公新書之義也前向為正後卻為竒太宗所以勝宋老生也先合為正後出為竒曹公所以辨孫武也方為正圓為竒步為正騎為竒受於君者為正將所自出者為竒固曰妙矣然人既用之則為故智不足襲蹈何哉不惟世之人知之而夷狄亦知之故當益為變化以出意外所謂形人而我無形致人而不致於人者非陳迹相㳂而能勝也苟惟正此固亦粗矣能求竒正之義於意外古今幾人哉故學兵雖衆不足畏之誠以勝之又勝者猶在人也臣觀唐太宗與李靖論竒正之理所謂無不正無不竒又曰竒亦勝正亦勝善夫能知變通故其論左右逢原莫非竒正之變其言曰以竒為正以正為竒吾之竒使敵視之以為正吾之正使敵視之以為竒因其漢長於弩而蕃長於馬則為之法使馬亦有正弩亦有竒變其號而易其服也則為之法使蕃而示之以漢為竒漢而示之以蕃為竒方其陳之散也以合為竒方其陳之合也以散為竒觸類長之變而通之使竒正相生生生不窮竒正相變變變不測惟欲多方誤敵乖其所之豈復膠柱哉卻視孫子所謂以正合以竒勝猶為膠柱矣李靖論韓擒虎以謂但能識正為正竒為竒不知竒正之相變知竒正之相變者其知神之幾乎故早晏者天之隂陽左右者人之隂陽竒正者天人相變之隂陽相生也無窮如天地相因也不竭如江河相濟也終而復始如日月相成也死而復生如四時味止於五五味之變不可勝嗜聲止於五五聲之變不可勝聽色止於五五色之變不可勝視兵雖竒正竒正之變不可勝窮巧厯不能盡其數聖智不能極其端此之謂兵妙或曰竒正固有宜分合固有變如之何以訓偏裨如之何以教士卒臣曰簡其節目異其號令正為一法竒為一法或進或退各以何别或分或合各以何驗吾以號令使之號令所指變亦隨之既一吾之耳目又變敵之耳目兵惟知有號令不知為竒正車果何出騎果何來徒果何從敵人雖知吾有竒正不知竒正所在士卒雖為吾用知吾以竒正取勝不知竒正何先方料吾以正而吾忽以竒方意吾以竒而吾止以正不惟敵之不知而士卒亦莫之知孫子曰見勝不過衆人之所知非善之善也戰勝而天下曰善非善之善也知吾有制勝之形而不知吾所以制勝之形非善之善不足以與於此或曰竒正之情何如臣曰兵家之要貴我專而敵分為竒正者在我故專應竒正者在敵故分以知吾之有竒正也則備我備前則後寡備左則右寡備我者所以寡彼也無所不備者無所不寡也我專為一彼分為十以十擊一者也我專則安彼分則擾以安擊擾者也勝負之理不言可喻故能正不能竒守將也能竒不能正鬭將也守將可以用竒劫鬭將可以用正老能竒能正乃國之輔今夫以武為業動纍億萬鬭力勇而已鮮知兵之法學兵之法動纍數千分行陳而已鮮窮兵之理窮兵之理動纍數十分强弱而已鮮知竒正借或有人但能知竒為竒正為正而已鮮知竒正之變臣故曰兵法貴勝勝之所以勝以竒正法可傳而竒正不可傳學兵雖衆不足畏者以勝之所以勝者猶在人也或曰羊叔子之平吳也不為掩襲之計尅日而後戰奈何專論竒正哉臣曰乃所以為竒正也償米縱俘歸禽饋藥竒正之用也懷其心逮祜死而王濬舟師東下一舉而俘其主夷其社孰知夫正在荆州而竒在益州耶兹竒正之大者也人君俾賢將之用竒正必若羊叔子則成功必大矣蘇門六君子文粹卷四十六
