body:
  text: 蘇門六君子文粹卷九宛丘文粹一宋張耒撰論邴吉論邴丞相為人至深厚也豫獨有恨焉虜入雲中詔問丞相御史以虜所入郡吏不能對得譴責而丞相能具知見謂憂邉思職夫吉之能知馭吏之力也夫平日不知從事於其所急而一時際會於他人之力亦可以為徼幸矣謂之真憂邉思職也可乎因徼幸以得譽遂從而冒之坐視人之得譴責而不分謗則亦少欺矣龔遂因王生一言天子以為長者遂不敢以為出已曰此乃臣議曹教臣夫遂之能歸功於君其善微而不冒人之善其德厚矣方天子讓御史吉如曰臣與御史等耳臣之僕有先白臣者臣是以知之此其為能豈獨憂邉思職而己哉世人有未嘗射挾弓注矢一發而中不知者曰天下之善射者也其人不讓則知之者笑之矣邴吉脫宣帝於死能絶口不道獨貪一馭吏之功殆必不然傳曰思則得之不思則不得也吉未之思歟夫冒徼幸之福而安處之此庸人之所常行獨為邴丞相恨也王鄭論昔孔子論令尹子文陳文子皆以忠清與之而不與之仁管子之德不及二子逺矣而以仁與之何也夫仁之為道雖大然其實以濟物為本濟物之事非一善可以當之必其才德為世所賴得我則存非我則亡我之所在家安而國治如是則有一善不害為不仁而有小不善於仁未害也豫觀王祥鄭沖何曾三人者考其行事之變從容無事之際雖謂君子可也然為魏大臣隂相司馬氏以喪魏室卒導而授之夫平日則戒慎君子之所忽而當事則為小人所不忍為此所謂色取仁而行違在家在邦必聞者也昔西漢之衰有此乎此孔光師丹皆盜當世賢君子之名而或屈於董賢或迫於王莽使為姦者反依之以取重嗚呼治天下其不可以無才智骨鯁之士也淮南王欲為亂獨憚大將軍與汲黯畏衛青畏其武畏汲黯畏其正也夫世固有德不足以化姦才不足以止亂而可以謂之仁人君子乎夫使令尹子文陳文子當管仲之任則不勝矣李德裕曰平淡和雅世所謂君子者居平必不能急病理煩遭難必不能捐軀濟厄可以羽儀朝廷潤色名教如宗廟瑚璉園林鴻鵠者此數子之謂矣王導論豫觀王導之為晉有以也哉自古開國建邦尚功利修戰伐其俗好武喜功其國家法度修立若是者必速強而無內亂然當其亡也必為大敵取之何則法制素立人畏而不敢犯故無內亂然國小勢單而有所恃必敢鬬其人才可用則不能下人夫小國敢鬬而不下人大國之所取也吳蜀是己諸葛亮治蜀法制謹密兵武修立糧儲豐而器械精故以區區之蜀而魏人不敢侮亮既死薑維持其餘力黷武好戰而魏取之孫權之為吳也江東才武之士悉用而無遺其將帥多可用之才權既死而規略風聲不改其舊孫皓不肯俯仰畏縮為自守之計時用其武而晉取之故曰小國敢鬬而不下人大國之所取也夫政和俗弱畏患自守者多內侮其弊也內之強有力者取之然不待其力盡勢窮則不亡何則內有強力之臣而無所忌則必起然國人未去則取之也難非極弊不可復振之際則不可得東晉是也導相元帝於江東所以立國者不過賓延賢士招禮名勝設學校謹選舉力為柔仁和厚之政而己夫當西晉之末兵戈並起天下大亂非有商君管仲之節制刻深以圖功利起怠惰收蓄天下才勇之士不畏勞苦往反與之深入力爭未有能立者也而導顧為此豈其才不足歟或者曰導之意以謂限長江而與關洛交兵相元帝而與劉石爭雄駕御賀循紀瞻之徒而與夷狄馳逐此百舉而百敗曾不如勿為之愈也是以置江北之紛紛而為保國之計苟為後世不遽亡之䇿而可矣夫王敦蘇峻之內侮桓溫桓玄之倔強大則君廢大臣誅小則控制上流而朝廷奔命宜若朝夕而亡矣卒之劉裕取之於凌夷甚弊之後此固導之深圖也齊之政強魯之政弱魯朝齊而齊先亡乃自古然矣張華論裴頠勸張華以黜賈后而華不可其言曰聊以優遊卒歲當時華有天下之望姦臣孽后切齒於華久矣雖不舉大事可得優遊卒歲歟華之智寧不知此而為是言何也夫華為之亦死不為亦死徼幸苟免自安之言耳方是時華之計無可為者矣與外臣為仇則賈后得藉口以誅之與孽后為怨則強王將以仗正而行其意起貧賤取富貴既無棄屣之髙又名重纍身衆所不置己有遁尾之厲嗟乎華於是時蓋知不免矣自古為是言者不以賢不肖皆不免者也董卓築郿塢曰事成雄據天下不成守此塢夫事不成而塢可得而守歟卓雖愚亦知之矣曹爽不能用桓範之計而曰不失為富家翁其措意亦如此華之優遊董卓之守塢曹爽之富翁皆知不免而徼幸苟且之言耳不足論也士之謀身至此亦可悲也夫屈突通論屈突通知隋之亡力不足以救也審矣然力盡勢極有為萬一之計其心皎然非負隋也通未及死而被擒其不死者非自免也唐救之也唐之為隋之讐明也通不負其所事而捨其生然忘其仇而食其祿責通報其怨非也天之所與通安得而報之君子於其讐度非所得報則不敢行其私然亦不敢忘其私故食其祿者通之罪也凡負恩圗存於可為之時者得罪於通可也忠亦不足為矣裴守真論先王之禮不眀於世日以廢壞遂至於滅亡者其初未始不自於諛夫盜儒苟欲媚世主之私而不務行先王之意而俯從今世之便也先王以至誠仁義之心誠意於禮樂之際齋眀盛服如臨師保父母之嚴一有不中凶咎從之而使後世之汚君習於安樂驕傲者勉而為之其欲捨而從我也固已不勝其怠而諛夫盜儒又從而為之解説旁引曲取既使之便其私意而又曰自義理之所安嗚呼先王之禮何從而興乎秦併六國典禮盡滅髙祖撥天下之亂庶幾其有興矣而叔孫通阿其意不能尊其所聞而行之乃為是苟且滅裂之具而漢之禮終以不眀則起于叔孫通之徇其君豫讀裴守真傳守真善容典為太常博士當時謂才稱其官至論射牲禮曰古者天子自射牲漢遣侍中今天子奠玉酌獻而己可也古今異宜不必射牲破陳慶善二舞入天子為起守真言古無天子立觀舞者請從古夫射牲古也勞而今也佚則從今立觀舞今也勞而古也佚則從古守真非能法古也特從其佚便使人主便之而己夫先王之禮惟惡夫好便而無制者而後為是曲折制度之嚴也使有司之禮近于人情者非其至也嗚呼自秦漢以來天子之車服金珠翠羽婦人之服竒文巧畫房闥之玩仙靈鬼怪可駭之物雕韋織毳戎狄之用皆有之矣推其禍本亂原未有不起于好便安者為之也夫一守真不足道也而世遂以才稱其官則知史説偷風瞽俗相扇而不知恥也可勝嘆哉李郭論雄傑好亂之士可服以天下之大義不可掩以匹夫之小數何也彼其心甘為理屈不肯負人以其智幸而掩之得志其後必大亂凶悖放恣而後其志乃己此不可不慎也漢髙祖苟一時之便偽遊雲夢而執韓信雖能執信而信之反心自此生矣當此時髙才智士亦有輕其君之心故英布貫髙之亂繼踵而起者此非伏英雄之道也李光弼提孤軍與安史健虜百鬬百勝其治軍行兵風采出郭子儀之右而當時諸將皆望風伏子儀如敬君父而光弼之在彭城諸將己不為使子儀能使吐蕃為父而史思眀乃上書請誅光弼太抵光弼之實不及子儀之名子儀安坐而有餘光弼馳騁而不足豫嘗思其故讀史思眀傳見光弼使烏承恩潛殺史思眀事而後知李郭之優劣蓋子儀之為人至誠不欺主於忠信而胸中洞然大人也故靜則人安其德動則人伏其義光弼用烏承恩使襲殺史思眀此雖狡夫猾虜之常態意其人雖雄悍驃勇而中有所不可保信者市井之智盜賊之謀有時而用也不然何以召史思眀之侮而田承嗣之膝獨為尚父屈歟此於服人之道小矣嗚呼成事以材不若以德服人以智不若以理惟德與理始鈍終利以之治大以之行逺未之有悔也韓愈論韓退之以為文人則有餘以為知道則不足何則文章自東漢以來氣象則己卑矣分為三國又列為南北天下大亂士氣不振而又雜以蠻夷輕淫靡嫚之風亂以羌氐悍魯鄙悖之氣至於唐而大壞矣雖人才衆多如貞觀風俗平治如開元而惟文章之衰未有能振其弊者愈當貞元中獨却而揮之上窺典謨中包遷固下逮騷雅沛然有餘浩乎無窮是愈之才有見於聖賢之文而後如此其在夫子之門將追遊夏而及之而比之于漢以來齷齪之文人則不可然則愈知道歟曰愈未知也愈之原道曰博愛之謂仁行而宜之之謂義繇是而之焉之謂道果如此則舍仁與義而非道也仁與義為定名道與德為虛位道有君子有小人德有吉有凶若如此道與德特未定而仁與義皆道也是愈於道本不知其何物故其言紛紛異同而無所歸而獨不知子思之言乎天命之謂性率性之謂道修道之謂教曰性曰道曰教而天下之能事畢矣禮樂政刑所謂教也而出於道仁義禮智所謂道也而出於性性則原於天論至於此而足矣未嘗持一偏曰如是謂之道如是謂之非道曰定名曰虛位也則子思實知之矣愈者擇焉而不精語焉而不詳而健於言者歟李德裕論李德裕制變遇事之方裴度有所愧然度之制變務出於中和故事出而人不驚事己而身安德裕矜才而快意者也故其所發竦動人之觀聽而後多悔宦者劉承偕監劉悟軍悟不堪其侮而言之朝憲宗以其有寵於母后也問計於度請斬之又曰不能斬則流之夫斬之則風采足以震動而於事也健然苟求下足以厭悟意上不傷太后心流之亦足矣何必求動人之視聼哉此度過人者也劉稹之叛計策出於郭誼為多稹勢己窮蹙誼斬稹以降此在稹為可賞德裕以為劉稹小子安知反誼始教之而終賣稹以求生卒斬之德裕之出此不過欲眀大義立風聲以竦動視聽耳若誼者置而不問斯可矣何必求名而殺之耶是時強藩叛臣力足以拒王命而所深忌者左右之竊發也誅郭誼而叛臣始安心于其下其為慮蓋己踈矣德裕惡牛僧孺其傾僧孺也曰僧孺聞劉從諫滅而慨嘆又結成其往來之迹夫傾大臣惟有交反者之罪為無以加人主之所不恕僧孺繇此遂竄德裕於復怨則快矣而君子豈忍為是哉故一失勢羣起而擠之身沒南荒非偶然也蘇門六君子文粹卷九
