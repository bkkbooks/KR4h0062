body:
  text: 蘇門六君子文粹巻五十三濟北文粹六宋晁補之撰西漢雜論霍光復德為宗正德為宗正雜按上官氏盖主事德常持老子知足之計妻死大將軍光欲以女妻之德不敢取畏滿盛也盖長公主孫譚遮德自言德數責以公主起居無狀侍御史以為光望不受女承指劾德誹謗詔獄德實責數公主而御史乃以為受譚寃訴免為庶人屏居山田光聞而恨之復白召德守青州刺史歲餘復為宗正與立宣帝賜爵關内侯右楚元王傳第六德附傳光威震人主權傾天下德畏其盛而懼婚此在常情不能無望也御史承指誣德以誹謗詔獄而德惟良折獄用御史力至免為庶人此在常情不能無説也然德拒疏已而光不放於利而不怨御史阿己欲而光以説之不以道而不説抑光可謂賢矣以是持滿雖百世不傾可也而坐牽于孽妻之愛忍許后事不白以是負天下至于覆宗世謂霍氏之禍萌于驂乘亦光不早辯頽其勲名哀哉更生使人上變事時恭顯許史子弟侍中諸曹皆側目于望之等更生懼焉乃使其外親上變事言切聞故前將軍蕭望之等皆忠正無私欲致大治忤于貴戚尚書令道路人聞望之等復進以為且復見毁讒必曰嘗有過之臣不宜復用是大不然且往者髙皇帝時季布有罪至于夷滅後赦以為將軍髙后孝文之間卒為名臣孝武帝時倪寛有重罪繫按道侯韓説諫曰前吾丘夀王死陛下至今恨今殺寛後將復大恨矣上感其言遂貰寛復用之位至御史大夫御史大夫未有及寛者也董仲舒坐私為災異書主父偃取奏之下吏罪至不道幸䝉不誅復為太中大夫膠西相仲舒為世儒宗定議有益天下孝宣帝時夏侯勝坐誹謗繫獄三年免為庶人宣帝復用至長信少府太子大傅名敢直言天下美之有過之臣無負國家有益天下此四臣者足以觀矣前𢎞恭奏望之等獄决三月地大震恭移病出後復視事天隂雨雪由是言之地動殆為恭等臣愚以謂宜退恭顯以彰蔽善之罰進望之等以通賢者之路書奏恭顯疑其更生所為白請考姦詐辭果服遂逮更生繫獄下太傅韋𤣥成諫大夫貢禹與廷尉雜考劾更生前為九卿坐與望之堪謀排車騎將軍髙許史氏侍中者毁離親戚欲退去之而獨專權為臣不忠幸不伏誅不悔前過而教令人言變亊誣罔不道更生坐免為庶人而望之亦使子上書自寃前事恭顯白令詣獄置對望之自殺天子甚悼恨之右楚元王傳第六向附傳向以宗室良欲盡忠于主而嫉恭顯許史輩懷奸害正若力能肆諸市朝猶君子之所與也非私也且向之言曰昔孔子與顔淵更相稱譽不為朋黨禹稷與臯陶傳相汲引不為比周何則忠于為國無邪心也向憂望之等復退誠無邪心然已預焉故不敢自為上陳之而教其所親上變雖本無邪心至此而不幸類欺矣向誠内省不以為嫌然自為上陳之而意不免乎便已且上安能無嫌而必聽哉從妻言之為妬妻雖俚人語其變人心必也抑君子能為可用不能使上之必用若夫成功則天也向如彼何哉或曰智者術之原此術也奈何曰欺曰君子之用智不得已而至於術猶託之正是謂名之必可言言之必可行在君子為術在聖人為權捨曰正而出于欺雖濟君子恥諸况不濟何以自免于邪不惟其欺不可為而已抑姦人得以藉其口于主曰彼自謂正而正如此後何以復信于上哉此恭顯所以得因是陷向而向辭服又不惟其能陷向而己卒并望之遣子上書亊見治而殺望之自向為之也雖然𤣥成禹非朋恭顯者也若曰向誠忠于國家而慮不聽乃欺若此治其欺可也而曰前欲毁離親戚為臣不忠夫向不為忠孰為忠耶二子漢儒宗猶畏恭顯竊位患失而鄙如此况其下者乎陸賈交歡平勃諸呂擅權欲刼少主危劉氏陳平嘗燕居深念賈往不請直入坐平方念不見賈賈曰何念深也平曰生揣我何念賈曰云云不過患諸呂少主耳天下安注意相天下危注意將將相和則士豫附士豫附天下雖有變則權不分臣嘗欲謂太尉絳侯絳侯與我戲易吾言君何不交驩太尉深相結乃以五百金為絳侯夀厚具樂飲太尉太尉亦報如之及誅呂氏立孝文賈頗有力右陸賈傳第十三誅禄産迎文帝天下後世皆知其為平勃朱虚東牟之功謂賈有游談之助耳雖如孝文深德大臣之立已而謂章與興居始謀立齊王猶詘其功然間一歲終立二人為王至賈之功則無一人為言之文帝亦不圖也以陳平之智百發百中而方其端居深念不知所出微賈發之安知與勃深相結使彼不疑而後可與成功哉管蔡之事斷可見矣聖如周公賢如召公而召公不悦故周室㡬危况勃椎魯少文昧於慮始安能不疑平而覩未萌以成至計哉然賈一言而兩人成謀社稷之計出其掌握去禄産如莧陸之易措劉氏如泰山之安二人同心其利斷金豈不信哉然平始起微時有功當賞不忘魏無知髙帝固以為不背本者及此智窮計困得賈一言而免深禍成大勲事定國安而已佚樂顧忘賈本圖不聞其為上言之上亦莫之省賈亦不自言而翛然事外樂以忘利易曰鴻漸于陸其羽可用為儀吉陸賈以之辟陽侯助建䘮朱建母死貧未有以發䘮方假貸服具陸賈素與建善廼見辟陽侯賀曰平原君母死辟陽侯曰平原君母死何以賀我陸生曰前日君侯欲知平原君平原君義不知君以其母故今其母死君誠厚送䘮則彼為君死矣辟陽侯乃奉百金裞云云或毁辟陽侯惠帝欲誅之云云建乃求見孝惠幸臣閎籍孺閎籍孺從其計言帝果出辟陽侯孝文時淮南厲王殺辟陽侯以黨諸王孝文聞建為其策使吏捕欲治建遂自剄右朱建傳第十三陸賈自喜畫策而朱建又尚氣節兩人為此皆其性所不能已也然賈亦善建故哀建母死不葬乃以計動辟陽侯使助建䘮建以母死不葬故德賈之惠廼以謀閎籍孺使免辟陽侯死此其情也而辟陽侯閎籍孺兩人皆行不正賈建與通計議甚汙可鄙者若曰賈為人䘮建為母死儻可以免然君子之與人交惟無以利為哉將無所不至也婁敬願上言便宜婁敬齊人漢五年戍隴西過雒陽脫輓輅見齊人虞將軍曰臣願見上言便宜虞將軍入言上上召見云云右婁敬傳第十三敬之見在漢五年然漢楚之争蕭何曹參韓信張良陳平並從漢王方是時婁敬何在耶天下以定于漢諸侯王將皆封而敬始為戍卒脫輓輅而獻計謀豈愚于前而智于後哉人才各有所長當分裂擾攘之際戰功成敗間不容髪智者獻謀勇者効力有如蕭韓張陳並以人傑馳騁而興漢敬之才不足與於其間也漢已有天下而長治之策未足敬于是焉出矣勸都關中則良平之所未發而敬首陳至羣臣争言都周然後張良乃從而明言其便竟建西都諫伐匈奴則良平之所不慮而敬獨疑至白登見圍七日然後陳平乃從而計賂閼氏僅以得解則是敬之二議蚤圖先見皆良平之所未思也又敬之所陳凡三事皆有先後始議徙都以安國本國勢既定獨憂四夷故中勸髙帝以結和親論可以毋戰而漸臣者和親既成外患斯弭故終又勸髙帝徙六國彊族以實關中為强本弱末之術如是漢業成矣而髙帝盡用其計漢以大治傳祚四百故敬之功不減漢初起佐命功臣也叔孫通請作原廟惠帝為東朝長樂宮作複道方築武庫南通奏事因請間曰陛下何自築複道髙帝寢衣冠月出遊髙廟子孫奈何乘宗廟道上行哉惠帝懼曰急毁之通曰人主無過舉今已作百姓知之矣願陛下為原廟云云右叔孫通傳第十三原廟非古也自通啓之且子孫乘宗廟道上行不可也則亦壞之而已本為複道不為原廟百姓皆已知之矣奈何復教人主使欺百姓以取是名乎夫人主行無過舉改之可也文之非也叔孫通制禮儀叔孫通舎枹鼔而立一王之儀遇其時也右叔孫通傳贊第十三禮樂廢叔孫綿蕞草具於介胄中世儒末習何足為一王之儀然秦滅詩書繼以髙祖惡儒士功臣又皆武夫屠販之流或殿上飲酒㧞劍争功㡬何不覆而亂哉通因時制宜度髙祖所能行以漸革之漢卒稱文治通於此功亦多矣觀通始徵魯兩生兩生不肯行以為禮樂必百年積德而後可以興通以為鄙儒不知時變棄而不取然則通雖收散亡殘缺之舊志雖不備姑取而有之而漢卒賴焉文理以興雖謂之成一王之儀可無愧矣厲王殺辟陽侯厲王力扛鼎乃往請辟陽侯辟陽侯出見之即自袖金椎椎之命從者刑之馳諸闕下肉袒而謝曰臣母不當坐趙時事辟陽侯力能得之呂后不争罪一也趙王如意子母無罪呂后殺之辟陽侯不争罪二也呂后王諸呂欲以危劉氏辟陽侯不争罪三也臣謹為天下除賊報母之讐其志為親故不治赦之右淮南王傳第十四辟陽罪應大戮不止于三而諸王擅殺列侯罪亦無赦文帝知辟陽之足以得死而傷厲王之為母殺讐又以兄弟恩故屈法赦長可謂寛矣内假手於人以去元惡而外不害親親之仁寛之可施術莫尚此然而竟以是啓淮南使速敗故傳曰寛難薄昭為書責厲王厲王不用漢法出入警蹕稱制文帝重自切責之令薄昭與厲王書諫數之曰竊聞大王剛直而勇慈惠而厚貞信多斷是天以聖人之資奉大王也云云右淮南厲王傳第十四厲王驕不學問未可以義禮動也昭縁君命為書切責以天下公法懼之可也今先稱所長以順適其志而后數其罪意誠是也然人臣而以聖人奉之其明者耶則懼不敢當知禍之不可勝矣其暗者耶則益驕無乃曰人謂我聖我固自聖是促之亂也昭詞非也淮南王死袁盎勸誅丞相御史廼遣長載以輜車令縣次傳袁盎諫曰云云臣恐其逢霧露病死陛下有殺弟之名奈何上曰吾將苦之耳今復之云云淮南王乃不食而死上悲哭謂袁盎曰吾不從公言卒亡淮南王盎曰願陛下自寛上曰為之奈何曰獨斬丞相御史以謝天下乃可上即令丞相御史逮諸縣傳淮南王不發封餽侍者皆棄市右淮南王傳第十四七國反聞盎勸上以誅御史大夫鼂錯當時皆尤錯以為權首而不甚罪盎盖七國以誅錯為名也淮南王反時上以弟故曰赦之羣臣以法故曰無赦而上自赦之王不幸道死大臣何罪盎乘隙以勸誅丞相御史然則盎果亂人喜權凌上者非但不善錯而擠之也至終不得其死豈不幸耶田蚡説淮南王淮南王安入朝雅善太尉氏武安侯田蚡武安侯迎之霸上與語曰今上無太子王親髙皇帝孫行仁義天下莫不聞宮車一日宴駕非王尚誰立者淮南王大喜右淮南王傳第十四安為人資俊才喜名好士而蚡以大臣處帷幄私許以非望安之禍蚡啓之也安反伏誅以伍被之才苦諫數四雅稱漢美而竟以雷同并戮蚡不及誅幸也蒯通説武臣楚漢初起武臣略定趙地號武信君通説范陽令徐公云云徐公再拜具車馬遣通通遂以此説武臣武臣以車百乘騎二百侯印迎徐公燕趙聞之降者三十餘城如通策焉右蒯通傳第十五説士能以其辨張為利害奪人於頃刻之間類今日言之明日不可復用者若通説武信以謂范陽令先降而身死邊地必皆為金城湯池范陽令先下必身富貴邊城必相率而降後卒如其言此策也非説也息夫躬詐謀詭計躬與孫寵謀上變事云云東平王雲雲后謁及伍宏等皆坐誅侍中董賢愛幸上欲侯之遂下詔云躬寵因賢以聞封賢為髙安侯寵為方陽侯躬為宜陵侯丞相王嘉内疑東平獄事争不欲侯賢等語在嘉傳云云躬上奏言單于當以十一月入塞後以病為解疑有他詐為車爰㚄使者來上書唯天子哀告單于歸臣侍子令匈奴客聞焉則是所謂上兵伐謀公孫禄言躬逆詐造不信之謀不可許上乃罷羣臣獨與躬議因建言往年熒惑守心太白髙而芒光又角星茀于河鼓其法為有兵亂可斬一郡守以立威震四夷云云上然之以問丞相丞相嘉對曰臣聞動民以行不以言應天以實不以文云云就拜孔鄉侯傅晏為大司馬衞將軍是日日有食之董賢因此沮躬晏之策上繇是惡躬等右息夫躬傳第十五班固贊云利口之覆邦家此言至矣躬始造詐計欲攜匈奴而公孫以王者威信排之而不聴卒懷詭心欲以厭星變而王嘉以天不可欺沮之而不從二議明甚而哀帝溺躬憸言初不知悟利口之入人如此哉然躬以利心告變覬覦輔政隂謀誣誅東平王等與董賢俱封賢亦其黨矣彼賢惡躬薄加沮焉不旋踵躬敗故人主苟暗于聴則君子雖强不足以間小人而以小人間小人則有一隙焉而立聴其浸潤道以相勝然也息夫躬著絶命論初躬待詔數危言髙論自恐遭害著絶命詞云云右息夫躬傳第十五班固詆躬云息夫作姦東平誅躬豈但躬敗東平欲因事抵巇謀動蕭墻生釁邊鄙以招權寵快已志未及戮而自殘幸矣懷諼誤國以得禍敗何所取而許其危言髙論乎又絶命詞内頌忠憤感激可勸而後世溺其淫詞故出之石奮恭謹萬石君石奮無文學恭謹無與比過宮門闕必下車趨見路馬必軾焉郎中令王臧以文學獲罪皇太后太后以謂儒者文多質少萬石君家不言而躬行乃以長子建為郎中令少子慶為内史後慶為齊相齊國慕其家行不治而齊國大治右石奮傳第十六奮為善若固有之不以是近名故人服也下宮門式路馬禮也自漢以來行之者少或行之猶非其誠舜禹行趨人猶以為賤今世有一切腐儒捨聖人之迹而為之莊子所謂冠枝木之冠帶死牛之脅獨絃哀歌之徒無補世治豈但人不知化之不笑議而嫉排之則可矣肯慕而化之哉彼誠矯偽欺世度聖人之事皆己才智之所不能及則寧盜其迹之易為者以誑聾俗而不知察故人皆以為賤若奮之出于至誠恭謹不知名之為可近則此所以當世不謗後人尊之不然父子一切不知學問徒厪厪不為過而已何以隠然為漢忠臣孝子古今仰之若此哉石慶醇謹慶為丞相時漢方南誅兩粤東擊朝鮮北逐匈奴西伐大宛中國多事天下廵狩海内修古神祠封禪興禮樂公家用少桑𢎞羊等致利王溫舒之屬峻法倪寛等推文學九卿更進用事事不關决於慶慶醇謹而已在位九歲無能有所斥言嘗欲請治上近臣所忠九卿咸宣不能服反受其過贖罪右石奮傳第十六傳曰天下多事則賢哲馳騖而不足天下無事則庸夫髙枕而有餘慶為謹厚君子然才智不足道也漢以髙帝厚萬石君之故因厚其子孫萬石君以一介之善使慶冒三事正使奕世小心无咎何足以濟鼎足折形渥之凶哉石慶罷相而後起視事元封四年關東流民二百萬口無名數者四十萬公卿議欲請徙流民于邊以適之上以慶老謹不能與其議乃賜丞相告歸而按御史大夫以下慶慙不任職上書云云上報曰今流民愈多計文不改注郡上計文書自文飾不改正也孤兒幼年未滿十歲無罪而坐率朕失望焉今君上書請入粟為庶人夫懷知民貧而請益賦動危之而辭位欲安歸難乎君其反室慶素質見詔報反室而自以為得許上印綬掾吏以為責甚深而終以醜惡之辭也或勸慶宜引决慶甚懼不知所出遂復起視事右石奮傳第十六忠實仁厚漢廷如石氏父子者固不可以一二數而慶又尤謹者豈樂病國害人哉然才非其任智能不及惟坐視民亡無術以救而至欲以請徙于邊類殘忍不愛民體國者之為盖自古及今所謂一切善人者皆暗不知計議或姦謀助之不幸雷同其弊乃甚于惡人之志殺人者而始終昩昩亦不自知也不然豈其醜之以反室而欲往懼之以責深而復起哉衞綰長者衞綰戲車為郎文帝崩時屬孝景曰綰長者善遇之景帝以為廉忠無他賜代桃侯舎為丞相劉舎朝奏事如職所奏然自初官以至相終無可言右衞綰傳第十六唐詩云賈生明王道衞綰攻車戲同遇孝文時何人都貴位甚矣夫才大難用論髙難信而無能謹厚者之易合且親也周仁令上自察周仁得幸後宮袐戲仁常在旁終無所言上時問仁仁曰上自察之然亦無所毁右周仁傳第十六直不疑周仁張歐號為一切長者不疑人枉以盜而不自辨曰長者可也若仁上所親如此又時有所問每曰上自察之此謹于保身者也何足尚哉張歐始以刑名進廼能使官屬以為長者而不敢大欺至涕泣對具獄歐不特愛己且愛人似小勝耳王襄取罇賜左右梁平王襄李太后親平王之大母也而平王之后曰任后初孝王有罍罇直千金任后聞而欲得之李太后曰先王有命毋得以罇與人王襄直使人開府取罇賜任后有漢使者來李太后欲自言王使謁者中郎胡等遮止閉門李太后與争門措指云云公卿治奏以為不孝削梁王五縣梟任后首於市右梁平王傳第十七漢法行不私多貸其親任后事李太后誅不順而罪梟首此法民懼俗化之本也然任后罪殺之可也梟首暴尸斷恩己甚盖漢習秦餘非甸師之意也絳灌等害賈誼誼以為漢興二十餘年宜當改正朔易服色文帝謙讓未遑也然諸法令所更定及列侯就國其説皆誼發之於是天子議以誼任公卿之位絳灌東陽侯馮敬之之屬盡害之周勃灌嬰張相如也馮敬時為御史大夫廼毁誼曰洛陽之人年少初學專欲擅權紛亂諸事於是天子後亦疎之不用其議右賈誼傳第十八嗟乎士之難進也尚矣絳侯等皆漢功臣忠實宜體國者而見誼進暴不能不害其能况勢利輩哉眉山蘇公言誼志大量小非漢文不能用誼誼不能用漢文以謂得君如此猶且以不用死然則天下無堯舜終不可以為歟嘗竊疑之夫人臣奮不顧身為主立事主任而勿貳廼得自竭以漢文之賢盖能知誼任公卿者而亦且惑絳灌之私論若中才之主不能知賢盖不足道既疎不用其議猶强聒而不舎此誼之所難也若枉已以交絳灌之徒而幸不斥至其有為又與之異趨則身可容而為道不行其卒亦自傷哭泣夭絶命也夫蘇門六君子文粹巻五十三
