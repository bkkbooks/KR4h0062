body:
  text: 蘇門六君子文粹卷三十六淮海文粹二宋秦觀撰書上吕晦叔書某聞天下之功成於器識來世之名立於學術古之大臣以道事君不可則止未始有意於功名然其器識學術博大精微則功名巋然與時自至雖欲深閉固拒揮而去之不可得也昔漢昭宣之時霍光以宿衛之臣任漢室之寄大器將傾徐起而正之神色不變此其器識實有以過人者然操持國柄不知消息盈虗之運身死肉未及寒而宗族滅矣則學術不明之弊也其後順桓之間李固以一時名儒位居三事扼姦臣之吭而奪其氣此其學術真有古之遺風然易舉輕發不能定大計於無形至争以口舌申之書幐事故不就身亦隨之䘮焉則器識不宏之弊也非特二子為如此大抵西漢之士器識優於學術故多成功而名不足東漢之士學術優於器識故多令名而功不成夫君子以器為車以識為馬學術者所以御之耳西漢之士如環人之車駕以駃騠驅通道上峻阪無所不可然而日暮途逺倒行逆施者有焉東漢之士如竇泰氏持策攬轡圓旋中規方折中矩而車弊馬羸轉薄於險阻之間則固己敗矣某狂妄嘗以此說推論歴世豪傑之士又以黙觀當今之時而縉紳先生有告某者以謂器足以任天下之重識足以致無窮之逺學足以探天人之賾術足以遇事物之變如古之所謂大臣非閣下不足以與於此又曰閤下之道如元氣行乎渾茫之中其發為風霆雨露者特糟粕耳某時方食聞之投匕箸而起遂欲身從服役之後求備洒掃之列而困於無介紹莫獲自通竊伏淮海抱區區之願缺然未厭者有年矣比者天幸閤下來守是邦而某丘墓之邑實𨽻麾下是以輒㤀賤陋取其不腆之文錄在異卷䞇諸下執事又述其願見之說為書先焉夫大冶無棄金大陶無棄土江海不却水王侯不遺士某雖不能亷小謹曲以自託於鄉閭然古人所以處廢興而擇去就者竊嘗講其一二矣儻閤下不賜拒絶而辱收之請繼此以進干冒台嚴俯伏待命不宣上岐公論薦士書嘗聞之禍莫大於蔽賢福莫長於薦士漢武之大臣其功莫如衛霍其酷莫如張湯青去病之後侯失國除其傳不過一再而湯之子孫茅土相襲逮乎東京何哉一身之功過不足以易天下之利害故青去病受蔽賢之禍而湯獲薦士之福雖㣲二三子古之人其孰不然哉一沐三握髮一飯三吐哺起以待士猶恐失天下之賢人葢其封於少昊之墟曲阜廟食者三十有四世其列封者又為凡蔣邢茅胙祭之國夫周公之求賢豈有意於求福哉天之報施自當然耳謝王學士書劒工之惑劒劒之似莫耶者惟歐冶能名其種玉工之眩玉玉之似碧蘆者惟猗頓不失其情夫宗工碩儒亦後進之歐冶猗頓也記閒軒記士累於進退久矣弁冕端委於廟堂之上者倦而不知歸披莾蒼而佃橫清泠而漁者閉距而不肯試二者皆有累焉序送錢秀才序夫思慮可以求索視聽可以聞見而操履可以殆及者皆物也歌酒之娛文字之樂等物而己矣固何足以殊觀哉漁父有云滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足夫清濁因水而不在物拘縱因時而不在已集瑞圖序余謂萬物皆天地之委和而瑞物者又至和之所委也至和之氣磅礴氤氳而不己則必發見於天地之間其精者葢已為盛德為尊行為豪傑之材其浮沉而下上者則又為景星卿雲甘露時雨醴泉芝草連理之木同穎之禾而棲翔遊息乎其中者則又為鳯凰麒麟神馬靈龜之屬曄乎光景色象之異也藹乎華實臭味之殊也卓乎形聲文章之無與及也於是世指以為瑞焉繇是言之世之所謂瑞者乃盛德尊行魁奇之才所鍾和氣之餘者耳說心說心本無說說之非心也雖本無說而不得不有說黙而神之與道全之說而明之與道散之其全為體即體而有用其散為用即用而有體體用並游於不窮而俱止於無所極者其惟心而已矣而世之君子迷己於物沉真於偽而莫之見焉此心說之所以作也目無外視耳無外聽遺物㤀形在我而已此其心歟曰非也心不在我然則目無内視耳無内聽馳神游精在物而已此其心歟曰非也心不在物然則物之有色我因視焉物之有聲我因聽焉來則御之去則將之彼是兩㤀在物我之間而已矣此其心歟曰非也心不在物我之間然則心無所在乎曰惡得而無在也雖不在我未始離我雖不在物未始離物雖不在物我之間而亦未始離乎物我之間者此心之真在也譬如虗空焉虗空者即之不親逺之不疎萬物方有則與之有萬物方無則與之無俛仰消息惟萬物之與俱夫虗空之於心猶一星之於天而一塵之於地也及其至猶若是又况於心者乎是故即心無物謂之性即心有物謂之情心有所感謂之意心有所之謂之志意有所歸謂之思志有所致謂之慮故合精以止謂之魄配神以行謂之魂與神為一謂之精不離於精謂之神此十者入則一出則不一出入無常要皆以心為主耳不得乎主未有得乎臣者也是以古之通乎此則動為一氣静為二儀動静有萬物鼔舞有死生若然者陰可以開陽可以闔天地可以倒置日月可以逆行上焉造物者不得臣下焉外形體㤀始終者不得友而况富貴之儻來死生之小變乎其不能累也亦明矣彼世之君子則不然知其曲不知其通安於近而迷於逺有見於外者則求心於物有見於内者則求心於我又其甚則蔽形而㤀其神以謂心者特在乎方寸胷臆之間外此則物而已矣嗚呼其亦不智也哉有人於此棄邑而取宫棄堂而取室世必以為不智人矣是何也所有者小而所遺者大也心之形非特宫與室之微心之神非特堂與邑之廣而所取者如此所棄者如彼豈不惑哉一人惑之一國笑之一國惑之天下笑之天下盡惑孰笑之哉悲夫是皆不見心之真在之過也繇此觀之太上見心而無所取舍其次無心其次虗心其次有心有心者累物衆人之事也虗心者遺實賢人之事也無心者㤀有聖人之事也見心之真在而無所取舍者死生不得與之變神人之事也嗚呼安得神人而與之說心哉雜著書王蠋事後文古之人有不去商紂之虐君以從周武之聖臣而守死西山者其人曰伯夷伯夷者孔子稱為仁孟子稱為聖不在乎學者能道之也古之人有不愛刳身戮尸之患以求盡忠極節於其君者其人曰比干比干者孔子稱為仁孟子稱為賢不在乎學者能道之也古之人有不愛將軍之印不願萬户之封引身即死以眀君臣之大義而求自附於伯夷比干之事者其人曰王蠋王蠋無孔子孟子之稱而其名亦不獲自附於伯夷比干焉學者亦不可不道也當燕人之破齊齊王走莒也臨淄之地汶篁之疆為齊者無幾也齊之臣平居腰黃金結紫綬論議人主之前者一旦狼顧鳥竄分散四出不逃而去則屈而降無一人焉為其君出身抗賊以全齊者方是時王蠋齊之布衣也積德累行退耕於野口未嘗食君之粟身未嘗衣君之帛獨以謂生於齊國世為齊民則當死於齊君乃奮身守大節守區區之畫邑以待燕人燕人亦為之却三十里不敢近其後燕將畏蠋之賢念蠋之在而齊之卒不滅也數為甘言㗖之曰我將以子為將封子以萬家不者屠畫邑蠋曰忠臣不事二君正女不更二夫國亾矣蠋尚何存今刼之以兵誘之以將是助桀為虐也與其無義而生固不若烹乃經其頭於木枝自奮絶脰而死士大夫聞之皆太息流涕曰王蠋布衣也義不北面於燕况在位食祿者乎於是乃相與迎襄王於莒而齊之殘民始感義奮發閉城堅守人人莫肯下燕者故莒即墨得數戰不亾而田單卒能因其民心奮其智謀却數萬之衆復七十餘城王蠋激之也始余讀史記至此未嘗不為蠋廢書而泣以為推蠋之志足以無憾於天無怍於人無欺於伯夷比干之事太史公當特書之屢書之以破萬世亂臣賊子之心奈何反不為蠋立傳其當時事迹乃微見於田單之傳尾使蠋之名僅存以不失傳而不足以暴天下甚可恨也且夫聶政荆軻之匹徒能瞋目攘臂奮然不顧以報一言一飯之德非有君臣之讐而懐匕首䄂鐵椎白日殺人以䘮七尺之軀者太史公猶以其有義也而為之立傳以見後世後世亦從而服之曰壯士蘇秦張儀陳軫犀首左右賣國以取容非有死國死君之行朝為楚卿暮為秦相不以慊於心太史公猶以其善說也而為之立傳以見後世後世亦從而服之曰奇材以至韓非申不害之徒刑名之學也猶以原道德而附之老聃淳于髠鄒衍田駢慎到接子環淵騶奭之徒迂濶之士也猶以多學而附之孟子然則世有殺身成仁如王蠋之事者獨不當傳之以附於伯夷之後乎噫昔者夫子作春秋其大義在於正君臣嚴父子使當時君臣正父子嚴則春秋不作矣後世愚夫庸婦一言一行近似者皆當筆之春秋况夫卓然有補世教者得無特書之屢書之乎此予所以為太史公惜也蘇門六君子文粹巻三十六
