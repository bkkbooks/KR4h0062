body:
  text: 蘇門六君子文粹卷五十六濟北文粹六宋朝補之撰舊唐書雜論改葬韋庶人景雲元年韋庶人悖逆庶人並以禮改葬右睿宗紀第七大義滅親既與天下共棄之矣弒父與君以禮改葬非也追尊則天皇后三年追尊則天皇后曰天后聖帝右睿宗紀第七武氏之惡非其子嗣立則為世大戮無復列於唐宗廟矣今不貶后稱為已幸而追尊其無名之僣號以為愛親是播其惡於衆也元宗赦囚開元七年秋七月制以亢陽日久上親慮囚徒多所原免諸州委州牧縣宰量事處置右玄宗紀第八自東漢以來守令權輕益甚夫赦囚上澤也而玄宗使牧宰得自量事處置最為近古開元之治抑有由矣劾貶李廙至德二載上議大舉收復兩京盡括公私馬以助軍給事中李廙署云無馬大夫崔光遠劾之貶廙江華太守右肅宗紀第十肅宗東還衆才一旅盜已穴寢廟人心去就之時也當時州鎮身為賊守朝廷或不能討而新平保定二太守以郡小力不足拒賊皆及於誅夫責人臣效死之義寧計爾力誅之是也括馬出於勢急非平時橫科廙以近臣率先違令雖事輕棄郡而情不憂國甚之劾貶輕矣楚元據城自守襄州偏將楚元逐刺史王政據城自守又襄州軍亂殺節度使史部將張瑾據州叛右肅宗紀第十將吏逐帥阻兵自此始前此未有也時大寇嗣興餘黨未殄朝廷置不暇問譬方搏虎救噬而豺攘其豬捨之宜也然因是以萌藩鎮戕主擅相立之患惜哉故國多事姦人必乘隙窺利覬幸捕誅李文饒寧舍澤潞而詰十五里明光甲之欺夫行政必先理鼠偷鼠偷不捨則磨牙者懼矣授梁崇義節度使襄州右兵馬使梁崇義殺大將李昭據城自固乃授崇義刺史山南道節度使右代宗紀第十一代宗時國連遭大喪寇亦未殄崇義之罪不唯不暇討遂因以節度與之姑息之政始於此矣柳伉請誅程元振太常博士柳伉上疏以吐蕃犯京師罪由程元振請斬之以謝天下上甚嘉納以元振有保護功削在身官爵放歸田里元振衣婦人衣入京城御史鞫問以狀聞配流溱州既行追念舊恩於江陵府安置右代宗紀第十一肅宗以興復大功神器所歸不在宦官輔翊也猶驕李輔國用為兵部尚書令宰臣送上遂離間兩宫虧損上德而代宗又甚焉至加輔國尚父位三公而元振尤親近用事譛害大臣方迫於戎寇播越憂懼故一賤士足以悟之而竟牽􅉏御之愛優柔不斷以隳大刑然則唐之患藩鎮宦官皆代宗啓之此如木方盛蝎已穴其中其亡之形非一日積也俘懷恩三公王爵僕固懷恩聞朔方行營節度使僕固瑒死燒營遁入吐蕃制奪懷恩先任靈州大都督府長史單于鎮北副元帥朔方節度使其太保中書令太寧郡王如故右代宗紀第十一懷恩蒙國大恩背叛為寇去節度等號而存三公王爵此為貶耶赦耶唐之政令不可得而知也勑轉運使撿察科役永泰元年敕如聞諸州承本道節度觀察使牒科役百姓致戶口雕弊此後委轉運使察訪以聞右代宗紀第十一代宗之時朝廷方強人才猶盛足以有為前此梁崇義殺李昭據襄州遂授以節度使李懷玉逐侯希逸據淄青遂授以知留後事威令已不行於藩鎮而姑息之患始起矣乃區區欲以轉運使撿察其科役信美而不能行真兒戲哉代宗有重輪芝草赤兔之瑞丁未日重輪是夜月重輪癸未太廟二室芝草生乾陵令於陵署得赤兔以獻右代宗紀第十一代宗之時戎寇方滋歲屢旱蝗厪厪焉守成不暇重輪芝草赤兔一歲同至為何瑞也故論休符者證人事而已代宗減稅詔邊事猶殷戎車屢駕軍興取給皆出邦畿乃者遵冉有之言守周公之制十而稅一務於行古前此從第五琦請十畝稅一畝效古十一今則編戶流亡而墾田減稅計量入之數盛倍征之法云云京兆府今年合徴稅八十二萬五千石宜減稅放十七萬五千石青苗地頭錢宜三分放一右代宗紀第十一古者十一而稅過此無橫斂也後世常賦之外取於民者不知凡幾種又履畝而稅曰吾慕古是重困也民亡不亦宜乎代宗慙而減之有文景之意然既知量入之數甚倍征之法而不能改曰姑減今年幾何是月攘一雞以待來年然後已者也况終不已者耶姚懷李延俊封王同華節度使周智光專殺監軍封華州牙將姚懷為感義郡王李延俊為承化郡王以斬智光之功也右代宗紀第十一異姓封王本於軍興賞功一切之政然王爵之輕且濫莫甚於唐追諡齊王倓興信公主亡女張氏追諡故齊王倓為承天皇帝興信公主亡女張氏為恭順皇后右代宗紀第十一尊追親王為皇帝皇太子古未聞也自太宗以來失之回紇使劫掠坊市正月回紇使出鴻臚寺劫掠坊市吏不能禁止復以三百騎犯金光門慰諭之方止七月回紇蕃客奪長安令邵説所乘馬人吏不能禁右代宗紀第十一代宗嘗藉回紇之力以捍吐蕃所以優禮之無不至回紇恃功而暴其使親於京師犯法而捨不敢治不惟無以示遠人後何以復使之哉若曰執其使明其所犯使歸自伏罪於其國借使不問而詭辭以報我我亦陽置不問猶足以為不治逺人于頔請一月三朝宰相于頔請依杜佑例一月三朝從之右憲宗紀第十四憲宗初立紀綱粗振杜佑嘗以老辭位優詔月三朝禮也而于頔乃以例請貴老尊賢之意不出於朝廷而可以自致不但意輕國家而不臣之迹彰矣不加貶責又從之主威所以削也降承璀為軍器使吐突承璀復為右軍中尉諫官以承璀建謀討伐無功請行朝典上宥之降承璀為軍器使右憲宗紀第十四自神策置中尉宦官始握禁兵權已重矣而憲宗初命承璀為鎮州詔討處置等使時許孟容與諫官固嘗極言不可憲宗不得已但粗改處置之名至是無功人言沓至又忍而貸之驕其徒太甚竟貽蕭墻之禍易稱不可如何者此之謂也憲宗用異鎛以戶部侍郎判度支皇甫鎛同中書門下平章事依前判度支以衛尉卿充諸道鹽鐵使程異為工部侍郎同中書門下平章事依前充使是時上切於財賦故用聚斂之臣居相位詔下羣情驚駭裴度崔羣極諫不納二人請退右憲宗紀第十五淮蔡不臣數十年河北刺客又賊宰相憲宗奮然發於英斷誓必誅翦韋貫之請緩承宗而專討元濟遂罷政事袁滋請罷兵立貶為刺史且屢出內庫錢帛供軍而元濟尋誅承宗恐懼歸命憲宗誠中興賢主非但無征利之心而已惟其初年志平僣叛病力不足故不得已厚斂一切出於權宜而牽於所欲成至用異鎛當鼎鉉平居朝廷信重如度羣輩願去位以諌而不回嗚呼人主亦愼於有為哉詔百辟卿士徇公詔百辟卿士宜各徇公勿為朋黨右穆宗紀第十六正心以正朝廷正朝廷以正百官先王所以能使在位者皆正直而德如羔羊也穆宗不足以身化而明不能辨邪正區區焉詔曰勿為而已為者又未必能察而知易曰咸其輔頰舌騰口説也何所補哉罷理匭使罷理匭使以諫議大夫李渤知匭奏置胥吏添課料故也右敬宗紀第十七以增胥吏俸料為吝而罷理匭使惜至輕廢至重也試制舉人上御宣政殿試制舉人二百九十一人以中書舍人鄭㴠等充考制策官右敬宗紀第十七制策至二百九十一人濫可知鄭涵考定制舉人鄭㴠等考定制舉人上謂宰相曰韋端符楊魯士皆涉物議宜與外官乃授白水城國尉宰相請其罪名不報右敬宗紀第十七制舉以待非常之材而得之者容私焉知其涉物議而不按有司不黜濫者尚命以官既失之矣至宰相請其事而匿不下益非也李逢吉不欲李紳量移上徽號大赦時李紳貶官李逢吉不欲紳量移乃於赦文內但言左降官已量移者與量移近處不言未量移者與量移翰林學士論例云不可為紳一人與逢吉相惡遂令近年流貶官皆不得量移帝遽命追赦改之右敬宗紀第十七宰相挾私怨更赦敇近臣論而追改之而逢吉不得罪信任如故無政莫甚於此矣劉從諫問殺王涯罪名昭義劉從諫三上疏問王涯罪名仇士良懼是日從諌遣焦楚長入奏於客省進狀請面對上召楚長慰諭遣之右文宗紀第十七下仇士良初殺涯等之數日相鄭覃李石又十數日石奏刑殺過多覃又陳理道上曰我每思貞觀開元之時觀今日之事憤氣填膺方是時士良輩新屠滅訓注等家握兵自防京師訛言屢驚石等敢出口微議已勇過孟賁矣又從諫近在澤潞擁兵問所難答若欲以清君側者士良雖悍已復股栗從諫意雖不為朝廷而辭順可恃而文宗石等亦終不能借此以正士良之誅特新遭大變又以投鼠忌器竟怗怗不能誰何而士良泰然以寵祿終忠臣之寃百世不洗功名之會難哉難哉宣帝幸華清宫車駕將幸華清宮兩省進狀論奏詔曰朕以驪山近宫真聖廟貌未嘗修謁云云蓋崇禮敬之心非以般遊為事已允來請右宣宗紀第十八華清之幸聽諫而輟亦足善也諱般遊之實託禮敬之名詔令人主所以信四海也自文非矣若出一時代言者之口非諛則欺殺韓宗紹同昌公主薨以待詔韓宗紹醫藥不效殺之捕其親族三百餘口宰相劉瞻京兆尹溫璋論諫行法太過上怒叱出之右懿宗紀第十九病死而殺醫是為不道又捕無辜數百人至叱宰相非特撞郎而已也殺韋殷裕國子司業韋殷裕論淑妃弟郭敬述陰事上怒甚即日下京兆府決殺妻崔氏等九人配入掖庭右懿宗紀第十九上論妃戚家私事而當大逆不道之戮桀紂之暴不過於此唐之亡自此兆矣責中書亡失赦書宴百寮於崇勳殿上贊述全忠之功因言御樓前一日所司亡失赦書賴元帥府收得副本幾失事矣中書不得無過裴樞等起待罪右昭宗紀第二十國祚將遷君臣束手方區區責宰相失官文書事可憐也哉太宗輟封禪貞觀六年平突厥年榖屢登羣臣請封太山太宗曰如朕本心但使天下太平家給人足雖闕封禪之禮亦可比德堯舜秦始皇登封岱宗奢侈自矜漢文竟不登封而躬行儉約刑措不用今皆稱始皇為暴虐之主漢文為有德之君以此而言何假封禪後羣臣復請十五年下詔將有事於泰山至洛陽以星變罷其事右志第三太宗始排羣議欲守儉約賢君仁人之言也請者不已後卒議行徒以星變而止耳文中子曰封禪非古也其秦漢之侈心乎蓋太宗好大喜功自不憚萬里伐高麗况封禪耶使其本心薄之而不為雖舉天下以勸我何有哉既行而以事輟則特不得已耳語曰智及之仁不能守之其太宗之謂乎玄宗信李渾王元翼之誣太白山人李渾稱於金星洞仙人見語老人云有玉版石記符聖上長生久視令御史中丞王鉷入山洞求得之太白山封神應公金星洞改嘉祥洞華陽縣改真符縣又太白山人王玄翼云見玄元皇帝於寶仙洞中又使鉷往得玉石函右志第四玄宗時事也崇道德慈惠之意尊老氏以為始祖未害於理也唐同泰言瑞石於天后朝亦封洛水神為顯聖侯於其側置縣立碑與玄宗事無異也而開元間盧履氷以為言玄宗立詔罷毀夫武氏則心知同泰之偽而假威鬼神以讋天下如王莾意耳至玄宗既深嫉同泰之偽而甘受李渾王玄翼之誣出於誠心冀幸以為信然者則是事與武氏同而其惑乃武氏之所不惑而偽為之者以其英武好治苟有蔽焉不免於欺如此况中才以降哉髙駢在西川安南時諸侯震恐真百夫特也氣凌萬乘莫能誰何而呂用之一巫家子奴材妾智睢盱其側如幻師之玩木人口目臂足惟所牽掣忽指空中曰仙人過駢則亟拜雖莫知何向而終不疑也豈識不若巫家子哉惟其富貴已極嗜好已足但覬不死恐不可得故人以其所覬而不可得者啖之惑自此入無不至矣可不戒哉可不戒哉蘇門六君子文粹卷五十六
