body:
  text: 蘇門六君子文粹卷二十九淮海文粹二宋秦觀撰進策邊防上臣嘗謂方今夷狄之患未有甚於西邊者夫契丹强大幾與中國抗衡党項遺種假息之地不當漢之數縣而臣以為夷狄之患未有甚於西邊者何也葢大遼自景德結好之後雖有信使金帛綿絮他物之賂而一歲不過七十餘萬西邊自熙寧犯境以來雖絶夏人賜予熙河蘭㑹輸轉飛輓之費一歲至四百餘萬北邉歲賂七十餘萬而兵寢士休累世無犬吠之警西邉歲費四百餘萬而羌人數入逆執亊者如鴈行將吏被介冑而卧以此言之北邉之患孰與西邊之患重乎今天下謀臣策士議欲緩西邉之患者多大率不過有二臣請具陳其說而去取之有曰昔漢武以遼陽九百里之地斗辟難守棄以予胡元帝亦以闗東歲饑納賈捐之疏罷朱崖郡葢王者不以無用弊所恃也狄道枹䍐故為吐蕃諸夷之巢穴五泉㑹寧亦乆為夏人所據若以蘭㑹之地復賜夏人用府州故事擇土酋以為熙河之守則數百萬之費可一朝而省此其說一也有曰狄道枹䍐五泉㑹寧皆中國故地自漢唐以至國初不聞苦其難守者以靈武内屬故也今置靈武於度外者八十餘年蕃漢地形相錯如綉耕鑿則有踐蹂之患饋運則有鈔奪之虞是以苦其難守也若遂取橫山次復靈武則蘭㑹熙河自為内地尚安有數百萬之費乎此又一說也以臣觀之以前說可以施於陛下即位之初後說可以施於今日之後何則陛下即位之初羌人各率種落交臂屈膝請命下吏是若赦其罪戾與之更始假以熙河之節賜以蘭㑹之區則外足以懐柔逺人心内足以寛元元之力今則不然天奪其魄自干誅夷相為輔車遊魂疆場邉屯吏士攘袂切齒皆欲犁其庭而掃其閭夫順逆之勢殊則撫御之術異為今計者獨有取橫山而復靈武耳覉縻不絶之說可復道哉臣故曰前說可施於陛下即位之初後說可以施於今日之後也昔曹公征漢中而弗克乃下詔曰雞肋楊修以為鷄肋者食之無所得棄之如可惜公將歸矣巳而果然葢是時成都方為劉氏所據曹公以為雖得漢中之地必有輸將之費禦捍之勤其勢未易乆守故不若棄之便也及鄧艾襲取成都而漢中遂為控引輸寫之地豈可謂食之無所得棄之如可惜者乎然則曹公之棄漢中特以未睱取成都耳以此言之則知前二說者去取各有時也且天下之形勢固有不相闗而實相待者飛者以翼而縶其足則不能飛走者以足縛其手則不能走瓶罄則罍恥唇亾則齒寒橫山靈武亦蘭㑹熙河之手足而蘭㑹熙河亦橫山靈武之罍齒也功成於彼則患紓於此矣杜欽議夜郎以為不毛之地無用之民聖王不以勞中國宐罷郡放棄其民絶其侯王勿復通如以先帝所立之功不可墮壊亦宜因其萌芽絶之嗚呼是今日西邉之勢也邊防中或謂臣曰咸平中賊繼遷者攻䧟靈武進圍麟州朝廷檄召諸鎮兵討之僅能解圍而巳逮寶元慶厯之間元昊僣逆兵孥而不解者數年竞亦不能致其頭於北闕下元豐初大舉弔伐之師五道並進輒無功而返未幾永樂䧟没詔使死者二人夫羌之勁悍不可以力屈久矣奈何輕議取橫山復靈武哉臣應之曰不然夫勝有勢敗有時聖人不能生其時時至而不失其勢昔咸平之時海内初離分裂之禍上下厭苦於兵俱欲休息而繼遷之黨以兇悍狡險之姿據平夏之全壤扼瀚海之要衝故其攘清逺而竊靈武也朝廷置之度外而不復問寶元慶厯之間天下承平日乆邊防之備大率皆弛將不知兵而兵不習戰彼元昊者雖生於砂磧牛馬之區而計數足以濟其姦勇决足以成其惡料敵合變有古單于之風小羌入事請盟惟恐居後於是盡有河南之地又取河西之境乃歸節旄僣名號卷甲一出其鋒不可當者矣先皇帝自熙寜以來懲累朝之事為萬世之計申嚴武備命將出征戎軒啟行枹䍑請命天戈再指五原内屬元豐之初遂决策大舉夏人震懼不知所為然猶未即伏辜者其形勢巳成其支黨具在譬如不肖子守其先人之廬雖終賣鬻而期月之間資用尚饒未可問也今則不然承先皇帝飭勵之後内修外攘之餘將帥之銓擇士卒之蒐練器甲之犀利財用之充委皆數倍於寶元慶厯之間而天方厭羌内難屢起權臣擅事蚌鷸相持既狃於永樂之役常以中國為易與耳又謂陛下新即位方務休靖未能外事四夷夫戰而輕驕與夫懈不設備在兵法皆滅亾之道也繇是言之彼無敗形我無勝勢者咸平之時是也我之勝勢己具彼之敗形未成者元豐之初是也我有必勝之勢彼有必敗之形者今日是也且時難得而易失一日縱敵數世之患也奈何不議取横山而復靈武哉昔漢武帝擊匈奴追奔逐北者二十餘年浮西河絶大漠破寘顔襲虜廷封狼居胥山禪於姑衍以臨瀚海虜名王貴人以百數築單于邸城於長安然竟不能南面而臣之也逮宣帝匈奴内亂五單于争立漢以威德覆之於是始肯臣服甘露中呼韓邪單于遂來朝於甘泉之宫唐太宗伐高麗至身屬櫜鞬鞍結兩服雖㧞遼東白崖諸城而駐蹕之後靺鞨犯陣李勣等力戰破之軍還悵然思魏徴在朕豈有此行耶迨高宗時葢蘇文死諸子閱稂怨禍結連饑饉頻仍災異並見於是唐遣勣等討之遂滅其國以其地置安東都䕶夫孝武太宗用武之主也宣帝高宗守文之君也然而匈奴之所以叛服高麗之所以存亾者何哉用武之主奮威而擊於前守文之君乘弊而取於後亦其形勢使然無足怪也臣以為陛下觀匈奴髙麗之所以破則知夏國之可夷觀宣帝髙宗之所以克則知天誅之可致觀武帝文皇之功則先帝之志不可㤀也願陛下擇大臣知兵者一人以為統帥盡䕶諸將之軍使之毋顧小利毋急近功而專以横山靈武為事不過三年河南之地復歸於中國矣邊防下臣既言靈武蘭㑹之形勢因請遂陳攻守之策今夫盡堅悉銳傅壘而陣八部並進晝夜不息是知攻而巳者也増陴濬隍嬰城自固屈指計功以須援兵是知守而巳者也知攻而巳者可以擒小敵矣而不可以擒大敵知守而巳者可以保堅城矣而不可以保危城古之知攻守者不然堅壁不戰自養其鋒則雖大敵而可擒直前逆擊折其盛勢則雖危城而可保是之謂以守為攻以攻為守非天下之奇材何足以知之乎諸葛相蜀歲出師以伐魏魏人患之及亮死師不復出而蜀遂以亾葢亮以蜀者險阻新造之國而四靣皆廹強敵非數出銳師以挫之則其勢不能自保此則以攻為守者也漢使趙充國擊先零而請罷騎兵留步士萬人屯田以待其敝宣帝從其議遂滅先零葢充國以先零窮寇急與之角則中國必有饋輓轉輸之勞故罷騎留屯而圖以期月此則以守為攻者也臣以為孔明所以保蜀之策可以守蘭㑹而充國所以破先零之計可以取靈武何則今蘭㑹之地與夏人接界犬牙相入若積粟儲械端坐而守彼必時入而寇我小則掠羊馬大則㧞障隧援兵將至羌輒引去既解而歸則又復入如此連年則我數揺動而車甲疲非長久之道也為今之策莫若以秦鳯涇原麟府鄜延環慶五路之兵與蘭㑹相表裏約以兵萬人歲各一出雖大勝無輕入雖小却無久畱務以撓羌人而己夫以五路之兵歲各一出則是我之兵歲一戰而羌人歲五戰也羌雖魁徤豈有歲五戰而不罷極者也彼既救死扶傷之不給則蘭㑹之地自然無事此則孔明守蜀之遺意也自靈武䧟没八十餘年其地北距大河南抵環慶瀚海七百里舄鹵無水泉若誠舉大兵徑薄其下則敵將嬰其巢穴竄伏不出而潜以精兵擊吾歸路吾軍粮盡引還則腹背受敵而進退不可得非萬全也為今之策莫若興屯田假以歲月以為必誅之計今屯田自闗中以至塞下往往而有然水利不興人力未盡内無良吏為之教督外無遊兵為之捍敵是以雖有其名而未享其利願置使者一人如漢之搜粟都尉之類專領其事凡要害之利盡發吏卒屯之濬溝澮繕亭陣頻出騎士以為田者遊兵積粟數百萬斛則靈武在吾掌股中矣此亦充國破先零之遺意也夫羌以數縣之衆乃能與中國之師抗者無他吾軍動以轉輸輜重自隨非饋餉不行彼則各贏斗升之粮負於馬上而戰耳是中國所長者兵多所短者難餉羌所長者易食所短者兵少也今既大興屯田假以歲月以為必誅之計又分諸路之兵歲各一出以為撓賊之謀則吾之所短者無足慮彼之所長者無所施臣謂不過三年羌必大困然後遣一介之使告之曰能以靈武之地歸中國則罷兵不然并取夏臺數州矣彼知我不得靈武兵未息也必自割其地獻於朝廷如有迷愎不從則以數萬人自鄜畤度塞門抵回東阪可唾手而取也傳曰猛虎在深山百獸震恐及其在䧟穽之中揺尾而求食積威約之漸也夫惟能以積威約之漸則羌雖勁悍將揺尾而求食矣蘇門六君子文粹卷二十九
