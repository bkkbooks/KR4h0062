body:
  text: 蘇門六君子文粹卷三十九豫章文粹三宋黃庭堅撰記仁宗皇帝御書記臣某元祐中待罪太史氏竊觀金匱石室之書論載仁宗皇帝在位四十有二年幼少遂生至於耆老安樂田里不憂不懼百姓皆如芻狗無謝生之心又言上天德純粹無聲色畋遊之好平居時御筆墨尤喜飛白書一書之成左右扶侍爭先乞去稍稍散落人間慶雲景星光被萬物士大夫家或得隻字片紙相與傳玩比於河圖洛書敬愛所在如臨父母此豈與周人思召伯愛其甘棠同年而語哉恭惟昭陵復土垂四十年至今父老言之未嘗不隕涕後生聞説前朝事無不踊躍恨不身當其時嗚呼可謂有德君子者耶竊嘗深求太平之原而仁祖在位時未嘗出竒變古垂衣拱手以天下之公是非進退大臣而百官修職四夷承風臣亦不能識其所以然故祕閣挍理臣張公裕所藏書其子臣浩以示臣臣冒昧論著如此譽天地之髙厚贊日月之光華臣自知其不能也伯夷叔齊廟記伯夷叔齊墓在河東蒲坂雷首之陽見於水經地志可考不妄其即墓為廟則不知所始以二子之賢意其為唐晉之典祀也舊矣元祐六年豫同年進士臨淄王闢之為河東縣政成乃用四年九月大享赦書以公錢七萬及廢徹淫祠之屋作新廟凡三十有二楹貴德尚賢聞者興起貌象祠器皆中法程某月某甲子有事於廟乃相與謀記歲月乞文於豫章黃庭堅謹按伯夷叔齊孤竹君之二子逃其國而不有者也豫嘗求其説伯夷之不得立也其宗與國人必有不説者矣叔齊之立也其宗與國人必有不説者矣於是時紂又在上虐用諸侯則二子之去亦以避紂耶二子雖去其國其社稷必血食如初也雖不經見以曹子臧吳季札之傳考之意其若是也故孔子以為不降其志不辱其身身中清廢中權求仁而得仁又何怨又曰齊景公有馬千駟死之日民無德而稱焉伯夷叔齊餓於首陽之下民到於今稱之孟子以為非其君不事非其民不使不立於惡人之朝不與惡人言故聞伯夷之風者頑夫亷懦夫有立志此則二子之行也至於諫武王不用去而餓死則豫疑之陽夏謝景平曰二子之事凡孔子孟子之所不言可無信也其初蓋出莊周空言無事實其後司馬遷作史記列傳韓愈作頌事傳三人而空言成實若三家之學皆有罪於聖人者也徒以文章擅天下學者又弗深考故從而信之以豫觀謝氏之論可謂篤信好學者矣然可為智者道也豫觀今之為吏愒日玩歲及為政者鮮矣政且不舉又何暇於教民今河東為縣吏治膚敏政成而舉典祀教民可謂知本矣故樂為之書并書豫所聞二子事以告來者閬州整暇堂記無事而使物物得其所可以折千里之衝之謂整有事而以逸待勞以實擊虛彼不足而我有餘之謂暇夫不素備而應倉卒可以徼幸於無患其顛沛狼戾者十常八九也豈惟人事哉天之於物疾風震雷伏於土中者皆萌動然後阜蕃而成夏落其實而枯其枝然後閉塞而成冬夫惟整故能暇上天之道也昔者晉欒針使於楚楚執政問晉國之勇對曰好以衆整又問如何曰好以暇雖晉楚爭盟務以辭相勝充其情楚豈能與中國抗衡哉今之郡守古諸侯也提千里之兵以守關要平居燕安拙者奉三尺而有餘至於倉卒變故巧者應事機而不足此惟不知素整暇故也滎陽魯侯仲修仁宗時御史中丞魯公家也儒素有風力其家法存焉為閬中太守知學問為治民之源知恭儉為勸學之路先本而後末右經而左律在官二年內明而外肅吏畏而民服乃作堂以燕樂之表裏江山不知風雨於以燕御賔客講問闕遺沈沈翼翼千里之觀也堂成而魯侯甚愛之問名於江南黃某某曰若魯侯可謂能整能暇矣故名之曰整暇所以美其成功而勸其未至也詩曰逮天之未隂雨徹彼桑土綢繆牖户今此下民或敢侮豫可謂能整矣又曰來歸自鎬我行永久飲御諸友包鱉膾鯉侯誰在矣張仲孝友可謂能暇矣前所敘説以告後人後所賦詩以為魯侯壽故并記之大雅堂記丹稜楊素翁英偉人也其在州閭鄉黨有俠氣不少假借人然以禮義不以財力稱長雄也聞余欲盡書杜子美西川夔峽諸詩刻石藏蜀中好文喜事之家素翁粲然向余請從事焉又欲作髙屋廣楹庥此石因請名焉余名之曰大雅堂而告之曰由杜子美以來四百餘年斯文委地文章之士隨世而能傑出時輩未有升子美之堂者况室家之好耶余嘗欲隨欣然會意處箋以數語終以汨沒世俗初不暇給雖然子美詩妙處乃在無意於文夫無意而意己至非廣之以國風雅頌深之以離騷九歌安能咀嚼其意味闖然入其門耶故使後生輩自求之則得之深矣使後之登大雅堂者能以余説而求之則思過半矣彼喜穿鑿者棄其大旨取其發興於所遇林泉人物草木魚蟲以為物物皆有所託如世間商度隱語者則子美之詩委地矣素翁可并刻此於大雅堂中後生可畏安知無渙然氷釋於斯文者乎元符三年九月涪翁書資深堂記孟子曰君子深造之以道欲自得之也見異端而不能弗畔居之不安也趨下流而失其本資之不深也今夫水決之東則東流決之西則西流背原而往矣左之右之而常逄其原亦必有道矣夫教者欲速效而不使人自得之學者欲速化而不求自得之蓋孟子之罪人也賢樂堂記待外物而適者未得之憂人之先之也既得之憂人之奪之也故雖有榮觀得之亦憂失之亦憂無時而樂也自適其適者無纍於物物之去來未嘗不樂也故古之人觀乎儻來若寄於我如浮雲之外物亦正其名曰賢者而後樂此不賢者雖有此不樂也養正堂記在易之頥正吉養正則吉也齊王之子亦人子也居富貴之養而氣體與人殊况能自求其心居天下之廣居則其所養宜何如呼於垤澤之門者非宋君也而聲似之以其居相似也其居與古人相似而病不及古人吾則不信也夫惟不言不笑不取是非物之情飄風暴雨天地不能持久也未同而言脅肩諂笑苟可以得車所治每下而不恥者吾不知也至於時然後言樂然後笑義然後取彼其中必有以信之詩云鼓鐘於宫聲聞於外矣夫事其事而小大得情語默當物齋心服形於宫庭屋漏之間而民氣和於耕桑隴畝之上彼其於性命之情必有不蘄於規矩準繩而正者焉瑞芝亭記竊怪漢世既嘉尚芝草而兩漢循吏之傳未有聞焉何也豈其所居民得其職所去民思其功生則羽儀於朝沒則蒸嘗於社則是民之鳳凰麒麟醴泉芝草也耶抑使民田畝有禾黍則不必芝草生户庭使民伏臘有雞豚則不必麟鳯在郊黠吏不舞文則不必虎皆渡河里胥不追擾則不必蝗不入境此其見效優於空文也耶昔黃霸引上計吏問興化之條有鶡雀來自京兆舍中飛集丞相府上霸以為皇天降下神雀欲圖上奏京兆尹張敞言郡國計吏竊笑丞相之仁厚智略有餘而微信竒怪也恐丞相興化之條或長詐偽以敗風俗天子嘉納焉劉昆為江陵令連年火災昆輒向火叩頭多能反風降雨遷洪農太守驛道多虎崤澠不通昆為政三年虎負子渡河乃召入為光祿勳詔問昆江陵反風滅火洪農虎北渡河行何德政而致是對曰偶然耳左右皆笑其質帝歎曰乃是長者之言由是觀之張敞之篤論世祖之知言建成之文不如光祿之質也南園記以道觀分於嶄岩之上則獨居而樂以身觀國於蓬蓽之間則獨思而憂松菊亭記期於名者入朝期於利者適市期於道者何之哉反諸身而已矣鐘鼓管弦以飾喜鈇鉞干戈以飾怒山川松菊以飾燕間者哉貴者知軒冕不可守而有收其餘日以就間者矣富者知金玉之不可守而有收其餘力以就間者矣書上蘇子瞻書心親則千里晤對情異則連屋不相往來是理之必然者也答何靜翁書江出汶山水力才能濫觴溝渠所并大川三百小川三千然後往而與洞庭彭蠡同波下而與南溟北海同味今足下之學誠汶山有源之水也大川三百足下其求之師小川三千足下其求之友與唐坦之書行之而心中自以為宜推之於人而人以為宜則是義也有人亦若是無人亦若是正信調直終不覆藏則是樂也臨財無苟得臨難無苟免古人之義也君子坦蕩蕩古人之樂義也雜著書記覺民對問弟仲堪溫恭而文好學之義方愛日而未倦也某字之覺民覺民曰願遂聞之應之曰自勝之謂強能任之謂堪聰莫宜於反聽明莫宜於內視強莫宜於自勝古之人能披折萬物獨見本真能自勝已然後有形有物皆為服役故其自任曰吾天民之先覺者也吾將以此道覺斯民也古之人未聞此道則發憤而忘食聞之則樂以忘憂守之則不知老之將至覺民曰我始於何治而可以比於先民之覺問之曰若善琴何自而手與絃俱和曰心和而已若善篆何自而手與筆俱正曰心正而已曰然則求自比於先民之覺獨不始於治心乎覺民曰詩云思無邪思馬思徂其斯之謂歟曰然遂書而贈之與王立之木之能茂其枝葉者以其根定也水之能鑒萬物者以其塵定也故曰能定然後能應書幽芳亭士之才德蓋一國則曰國士女之色蓋一國則曰國色蘭之香蓋一國則曰國香書晉世家後以富貴有人易以貧賤有人難夫晉文公出走周流天下窮矣貧矣賤矣而介子推不去有以有之也反國有萬乘而介子推去之無以有之也能其難不能其易此文公所以不王也晉文公反國介子推不肯受賞自為詩曰有龍于飛周遍天下五蛇從之為之丞輔龍反其鄉得其處所四蛇從之得其雨露一蛇羞之稿死於中野懸書公門而伏於山下文公聞之曰嘻是之推也辟舍變服令國中曰有能得介子推者爵上卿田百萬或遇之山中負斧蓋簦問焉曰請問介子推安在曰夫子推苟不欲見而欲隱吾獨焉知之遂背而行終身不見人心之不同豈不甚哉今世之逐利者蚤朝晏退焦唇乾嗌日夜思之猶未之能得今得之而務疾逃之介子推之離俗逺矣黃庭堅曰晉文公能其難不能其易何也困窮則士能其難安樂則士辭其易故也介子推豈故得之而務疾逃之必有謂者耶書萍鄉縣璧天子使縣令宰百里固欲安樂之豈使操三尺法而與子弟讐敵哉昔漢宣帝患北海多盜賊起龔遂為太守及入見見其老而悔之遂進而問曰北海之盜陛下將勝之耶將安之耶然後宣帝喜見於色曰張官置吏固欲安之也余嘗許以為天下長者也夫猛則玉石俱焚寬則公私皆廢吾不猛不寬惟其是而已矣跋陷蕃王太尉書物固不一能士固不一節酈寄賣友而存君親君子以為可跋奚移文堯牽羊而舜鞭之羊不得食堯舜俱疲百羊在谷牧一童子草露晞而出草露濕而歸不亡一羊任其指撝故曰使人也器之物有所不可則亦有所宜警夜偷者不以馬司晝漏者不以雞準繩規矩異用殊施天傾西北地缺東南尺有所不逮寸有所覃子不通之則屨不可運土簣不可當履坐而睨之小大俱廢子如通之則瞽者之耳聾者之目絶利一源收功十百事固有精於一則盡善遍用智則無功有所不能乃有所大能焉跋韓退之送窮文送窮文蓋出於揚子雲逐貧賦制度始終極相似而逐貧文類俳至退之亦諧戲而語稍莊文彩過逐貧矣大概擬前人文章如子雲解嘲擬東方答客難退之進學解擬子雲解嘲柳子厚晉問擬枚乘七發皆文章之美也至於追琢前人不能出其範圍雖班孟堅之賔戲崔伯庭之達旨蔡伯喈之釋誨僅可觀焉况下者乎祭韓康公文明珠白璧不言而出九重之淵天球河圖不卜而為萬乘之器休亭賦衆人休乎得所欲士休乎成名君子休乎命至人休乎物莫之攖江西道院賦風行於上而水波此天下之至文仁形於心而民服此天下之善化豈可為多令而病民慢自設險而病民詐耶九轉丹砂鑄鐵成金兩漢循吏鑄頑成仁我簡靜則民肅我平易則民親劉明仲墨竹賦陽虎有若之似夫子市人識之顔回之具體門人不知切偲齋銘思而不學無所於覺故謂之殆學而不思萑葦不治故謂之罔切切偲偲相勸以兩殖齋銘以心為田我耒耜之慈祥弟友種而茂之忠信不貪苗而立之敦厚恭敬水而耰之師友琢磨耔而薅之先王之言又時雨之仁義有年左右取之相彼寒窶我則與之所性齋銘道行不加窮處不病此之謂性由思入睿由睿入覺此之謂學性則聖質學則聖功謂豫不能倒戈自攻天下求師四海取友道立德尊宗吾性有正堂銘畏首畏尾不自尊巳牽於勢放於利虐鰥寡以奉髙明是謂不平忠不足而詐有餘躬不行而責從令是謂不正夫平者如執權衡以司重輕如天四時不言自行夫正者渴飲而飢食冬裘而夏葛喜怒豫奪由巳而不由物故行天下而不屈養浩堂銘心者氣之君氣者心之將君之所愾將應如響心淵如淵氣得其養夫惟氣之為物憂則焦然怒則勃然羞則戁然懼則瞿然勞則單然飢則瘁然酌其有餘不足而用其中爾乃浩然養源堂銘江出汶山其才濫觴其浸荆楚匪舟不航非以有源而受下流多故耶行潦之委盈溝溢壑少焉雨止立觀其涸故曰必清其源源清則流潔必深其源源深則流長是故有令德者百世不亡自寫真贊飲不過一瓢食不過一簞田夫亦不改其樂而夫子乃謂之能賢何也顔淵當首出萬物而奉以四海九州而享之若是故曰人不堪其憂蘇門六君子文粹卷三十九
