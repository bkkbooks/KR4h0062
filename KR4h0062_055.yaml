body:
  text: 蘇門六君子文粹卷五十五濟北文粹六宋朝補之撰西漢雜論路溫舒搢奏獄吏為諫宣帝即位溫舒上書言宜尚德緩刑云云秦有十失其一尚存治獄之吏是也譽諛之聲日滿於耳虛美薰心實禍蔽塞此乃秦之所以亡天下者也夫人情安則樂生痛則思死捶楚之下何求而不得故囚不勝痛則飾辭以視之吏治者利其然則指道以明之上奏畏郤則煆鍊而周內之蓋奏當之成雖咎繇聽之猶以為死餘辜何則成鍊者衆文致之罪明也上善其言遷廣陽私府長右路溫舒傳第二十一班固以賈山鄒陽枚乘路溫舒四人者傳相附以其上書論事類也然山於孝文恭儉之主至借秦為喻及諷其與賢士共射獵雖憂深思遠有防豫之忠而文帝亦何至是哉陽乘遊吳與梁不得已而説而吳梁何足遊且説哉溫舒遇宣帝有為議與時會意刻核之風其弊為酷烈故得指秦失而宣帝至是亦深見采納世被其利過三人遠矣固之言曰山自下劘上陽乘遊危國然卒免刑戮者其言正也溫舒辭順而意篤遂為世家宜哉是故於四人者未有間也山陽乘皆浮於辭類非深切事情而溫舒論失之存獨指獄吏與言虛美薰心實禍蔽塞及獄吏成鍊之情可以為百世戒確乎其言如飢之粟病之藥也凛乎其志有治世大臣之風矣固以其上書論事類乃溫舒言可施於事非三人之類也藉福説田蚡上議置丞相太尉藉福説蚡曰魏其侯貴久矣素天下士歸之今將軍初興未如即上以將軍為相必讓魏其魏其為相將軍必為太尉太尉相尊等耳有讓賢名蚡乃微言太后風上於是乃以嬰為丞相蚡為太尉藉福賀嬰因弔曰君侯喜善疾惡方今善人譽君侯故至丞相然惡人衆亦且毀君侯君侯能兼容則幸矣不能今以毀去矣嬰不聽灌夫出蚡遂怒曰此吾驕灌夫之罪也乃令騎留夫夫不得出藉福起為謝按夫項令謝夫愈怒不肯順蚡乃戲騎縳夫右田蚡灌夫傳第二十二藉福似專為蚡遊説者故其意每助蚡然教蚡以下嬰讓相則智矣至説嬰兼容按夫使謝則無意於害竇灌者蚡能用嬰夫不能用故蚡全而兩人死也田蚡迎淮南王霸上淮南王安入朝時蚡為太尉迎安霸上謂安曰上未有太子大王最賢髙祖孫即宫車晏駕非大王尚誰立哉淮南王大喜厚遺金錢財物上自嬰夫事時不直蚡特為太后故及聞淮南事上曰使武安侯在者族矣右灌夫傳第二十三蚡嬰三人者皆召權利以氣相傾而交禍蚡雖免於誅而死不旋踵見怪物焉班固以謂凶德參會其才不足相優劣也雖然嬰為差賢其救夫死亦出於義何則方梁孝王倚太后愛而景帝未立太子酒酣上從容曰千秋萬歲後傳王太后歡嬰獨引巵酒進上曰天下者高祖天下父子相傳漢之約也上何以得傳梁王太后由此憎嬰及栗太子廢嬰為傅又力爭不能得謝病去嬰為人臣於此亦足賢矣蚡以大臣當淮南王以藩臣入朝迎安霸上乃私許安以宫車晏駕而立安夫為人臣如此而不族豈不幸哉武帝英主自初即位故已嫉蚡專曰君除吏盡未吾亦欲除吏又曰遂取武庫及東朝廷辨內史是魏其侯不堅上罵內史曰吾并斬若屬矣則帝意直嬰無意族夫可知徒以黽俯從太后而兩人族嗟乎人君雖謹於奉親而族人之家刑亦可以濫設哉至淮南王反乃始歎息謂蚡在當族然亦竟不正蚡罪非也韓安國説梁王梁王以至親故得自置相二千石出入遊戲僣於天子天子聞之心不善太后知帝弗善乃怒梁使者弗見安國為梁使見大長公主而泣曰何梁王為人子之孝為人臣之忠而太后曽不省也云云公孫詭羊勝説王求為帝太子及益地事陰使人刺漢用事謀臣及殺吳故相袁盎云云景帝遣捕詭勝必得安國聞詭勝匿王所乃入見王而泣曰主辱者臣死大王無良臣故紛紛至此今勝詭不得請辭賜死王曰何至此云云安國曰今大王列在諸侯訹邪臣浮説犯上禁撓明法天子以太后故不忍致法於大王幸大王自改大王終不覺悟云云右韓安國傳第二十二漢初接秦雖經術粗立然卿大夫論事猶習捭闔務以奪人梁王倚帝弟僣踰而安國稱其忠孝以解上意而全梁意雖愛主然梁安得為忠孝哉非正論也然使安國非君子愛人以姑息而已者耶則進為罔上退亦適足以驕王而未足以全梁至勝詭為姦而安國正色不撓諭以禍福明甚王雖驕即知懼而出勝詭使天子全兄弟愛而梁以安蓋為漢語則佑梁為梁語則尊漢然則安國非愛人以姑息者也謀也韓安國以五百金遺田蚡安國坐法失官家居武帝即位田蚡親貴用事安國以五百金遺蚡蚡言安國太后上素聞安國賢即召以為北部都尉遷為大司農其年蚡為丞相安國為御史大夫右韓安國傳第二十二漢賢臣如安國者少安國而賄况其下者也武帝立武始侯昌趙王彭祖薨時淖姬兄為漢宦者召問淖子何如對曰為人多欲上曰多欲不宜君國子民問武始侯昌何如曰無咎無譽上曰如是可矣遣使者立昌右景十三王傳第二十三趙敬肅王傳傳曰無德而富貴謂之不幸王同姓非以賢勞也若武帝之言所以親其族而保全之至矣必才者耶地大力豐則叛否則以奢淫敗昌無行事記立與薨而已此武帝處之得也中山靖王勝來朝武帝初即位大臣懲吳楚七國行事議者多寃朝錯之策皆以諸侯連城數十泰強欲稍侵削數奏暴其過惡諸侯王自以骨肉至親云云今或無罪為臣下所侵辱有司吹毛求疵笞服其臣使證其君云云建元三年中山靖王勝來朝天子置酒勝聞樂聲而泣云云具以吏所侵聞於是上厚諸侯之禮省有司所奏諸侯事勝為人樂酒好內有子一百二十餘人右景十三王傳第二十三中山靖王勝傳厚親親之禮王者之盛德也然漢諸侯皆奢淫不循制故朝錯議削於其前主父定制於其後猶不能救武帝感勝之言而隆私恩在武帝得親親之禮矣而勝樂酒好內至有子一百二十餘人外浮辨而內濟姦欲勝不足道也去附作歌去為望卿作歌曰背尊章嫖以忽謀屈奇起自絶行周流自生患諒非望今誰怨昭信欲擅愛請閉諸姬去憐之為作歌曰愁莫愁居無聊心重結意不舒內茀鬱憂哀積上不見天生何益日崔隤時不再願棄軀死無悔右景十三王傳第二十三去附傳去犬彘行燔燒烹煮生割剝人大惡仍重不足汙册牘然其歌詩成理類善屬辭者漢尚文武帝好賦諸王不學者能言如此其習俗使然也李廣善射孝文十四年胸奴大入蕭關而廣以良家子從軍擊胡用善射殺首虜多為郎騎常侍數從射獵格殺猛獸文帝曰惜廣不逢時令當高祖世萬戶侯豈足道哉右李廣傳第二十四為國患無人才不患無其時人才無時而不可用也又如孝文時內難方夷外懼未釋宜日夜求才若不及之際也有臣如李廣足任將帥且在左右又自知奇其能若遇時萬戶侯不足道者矣何孝文能用馮唐之言還魏尚於其遠而不能用已之所知起李廣於其近也傳曰天下雖安忘戰必危豈必如高祖新造擾攘之國然後為有其時自太尉入北軍諸呂蹀血漢未嘗一日而去兵終文景世之盛胸奴侵盜干戈日尋所急者將帥之才耳奈何自文帝以奇廣乃至武帝三世不用廣雖曰用矣亦不盡其才厪厪乎以諉人役尚不足欲責其成功可得哉霍去病軍數有天幸廣結髮數奇功名一切聽於天命不復計其才不才則廣之不獲於衛霍間何疑哉廣孫陵亦有廣風其不逢類廣觀武帝以廣為青前將軍且密戒青不令廣獨當胸奴乃移前并於右廣欲一當胸奴竟不可又遣陵為二師將輜重而陵願自當一隊乃怒曰將惡相屬耶卒與步不與騎二事類也廣不為前軍徙回遠陵步兵少無後繼安得功利又大將軍方以姊子夫寵二師以女弟李夫人寵皆躐士大夫擅兵柄武帝固信青不信廣任廣利不任陵廣與陵僅在其指蹤厮養間敗死固宜嗟乎武帝安知用奇士哉司馬遷雪李陵韓延年戰死陵曰無面目報陛下遂降云云羣臣皆罪陵上以問太史令司馬遷遷盛言陵有國士之風身雖陷敗然其所摧敗亦足暴於天下彼之不死宜欲得當以報漢也右李陵傳第二十四武帝始不察路博德羞為陵後距疑陵悔不欲出固非矣又竟不遣博德使陵以少擊衆尚殺胸奴數千人單于震恐亦名將矣如遷之言其所摧敗亦足以暴於天下此知陵者之言也至言陵欲得當以報漢陵以匹夫沒強虜何能為耶使其有謀不過投隙率邊人拔身來歸必不能舉胸奴內屬明矣陵自為蘇武言令漢且貫陵罪全其老母庶幾曹柯之盟陵誠自信才足以為此夫齊事與胸奴事異也胸奴之俗喪君有君劫一單于可病吾國則立一單于以信吾國陵且與俱斃何以報漢故遷與陵之言皆非也其勸武降而不得泣曰嗟乎義士陵與衛律之罪通于天至此則陵之悔其身之不幸復以自還而將死矣然則陵有功耶罪耶曰漢用陵不盡其才兵少而數勝亦功也使如韓延年死則後世復何議忍死而降曰吾將有為孰明之以謂安知其不能有為則母誅陵不可還而可死又竟不死是陵於忠孝皆負矣曰罪可也衛青為大將軍天子使使者持大將軍印即軍中拜青為大將軍封青子伉為宜春侯子不疑為陰安侯子登為發干侯青固謝曰臣幸得待罪行間賴陛下神靈軍大捷皆諸校力戰之功也臣青子在襁褓中未有勤勞上幸裂地封為三侯非臣待罪行間所以勸士力戰之意也伉等三人何敢受封上曰我非忘諸校功也今固且圖之又蘇建盡亡其軍獨以身得亡去自歸青議郎周霸曰自大將軍出未嘗斬裨將今建棄軍可斬以明將軍之威云云青曰青幸得以肺腑待罪行間不患無威而霸説我以明威甚失臣意且使臣職當斬將其歸天子天子自裁之於以風為人臣不敢專權不亦可乎右衛青傳第二十五青無卓犖才能其起奴𨽻臨士大夫也徒以其肺腑寵又班固言其軍數有天幸不破敗也合二幸以得封侯為大將軍似不足言也然其所以起微賤極安榮而不顚則非徒二幸亦青知止足持滿畏罪以能保之也其曰伉等三人何敢受封是言也則雖以奴𨽻加士大夫之上可也至周霸請斬蘇建以明威而青自言以肺腑待罪不患無威深斥霸論以謂甚失臣意則非徒可以加士大夫之上蓋堂堂乎有漢大臣之風矣雖欲不貴且侯而永終譽亦不可得也封霍去病為冠軍侯霍去病大將軍青姊少兒子也及衛皇后尊去病以皇后姊子再從大將軍大將軍受詔與壯士為票姚校尉與輕勇騎八百直棄大將軍數百里赴利斬捕首虜以二千五百戶封去病為冠軍侯右霍去病傳第二十五李廣結髮與胸奴大小七十戰竟以不封引咎自刎而去病一戰即封遂顯名雖論功成敗行賞罰自殊亦用有當不當然也李陵孤立自請擊胸奴而無左右強近之援武帝則曰吾發兵多無騎與汝竟以是困至去病以肺腑從軍則獨詔大將軍與壯士大將軍又為擇輕勇騎豫之去病封陵降此何怪哉夫士求有用於時必量其上之信否未信而試不得已而用且內無助而遠求功乃徒欲以其才力蘄必成故多敗而中才則率多成功然則廣與陵可謂才矣而未可謂能自用其才也寧乘説青王夫人方幸於上寧乘説青曰將軍所以功未甚多身食萬戶三子皆為侯者以皇后故也今王夫人幸而宗族未富貴願將軍奉所賜千金為王夫人親壽青以五百金為王夫人親壽上聞問青青以實對上乃拜寧乘為東海都尉右霍去病傳第二十五寧乘所説秦漢以來遊公侯貴人間策士之常談也青懼滿求安而聽焉青固宜保富貴者未可以長者之遺風責青也二者臣子之自謀得矣而寧乘拜為東海都尉何哉董仲舒對策武帝即位舉賢良文學之士前後百數而仲舒賢良對策天子覽其對而異焉右仲舒傳第二十六傳稱武帝初立魏其武安侯為相而隆儒矣及仲舒對策推明孔氏抑黜百家立學校之官州郡舉茂才孝亷皆自仲舒發之然武帝名隆儒既異仲舒對至三策之可謂勤矣對畢不以居內而以為諸侯相何耶曰不合乎則如傳所載既用其言矣用其言踈其人然則武帝名隆儒實好大喜功與儒者議闊而不好也抑世皆疑仲舒語徒以白魚流火為受命之符非三代得天下以仁之意又推説園廟災顧下比京房翼奉輩至使弟子不知以為大愚抑末也不足以論仲舒劉向以謂伊呂無以加之而子歆意其不可亦緣當時毀譽雖然何必為伊呂顧其言深切可施於事者何如漢承秦大壞仲舒以謂非有文德以教訓於天下誅名而不察實為善者未必免而犯惡者未必刑是以百官皆飾空言虛辭而不顧實外有事君之禮內有背上之心造為飾詐趨利無恥又好用慘酷之吏刑者甚衆死者相望而姦不息俗化使然也宜少損周之文致用夏之忠者此最深切非世儒守經不知務徒語三代則欲一二守文不復可否或名夫治莫盛於周而周之文致乃有時乎不可用亂莫亂於秦而欲革秦弊乃獨在乎損周政世務名而不語實者安能知之宗三代而實違之者非能及也顧其言深切可施於事不以與周反與夏同然則何必伊呂姑要與治同道而足如醫治病不問其藥血脈治而人命延有謂之俞扁無不可者風俗善而世祚久謂之伊呂可也則劉向謂仲舒為王佐才非過也蘇門六君子文粹卷五十五
