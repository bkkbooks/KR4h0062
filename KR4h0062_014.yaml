body:
  text: 蘇門六君子文粹卷十四宛丘文粹一宋張耒撰說說道昔者聖人之神智固以獨立於萬物之上而無與為侣然其應物之迹與夫輔世之術何其夷易而可遵著明而易見也今夫所謂仁者道之一而非其全也然自孔子不敢當而夫子厯談其門人如子貢子路之髙弟皆不得與獨一顔淵庶幾不違而已仁之為名有實其動有迹聖人難之如此而况所謂道者乎是何也道之為名無實其動無迹周萬物之用而無定名循萬物之變而無定形聖人之所獨得之於心而人不與知焉其為物也君子之所難至而小人可以為資夫惟君子之所難至故以顔子之德而猶有所試夫惟小人可以為資是故君子慎之而不敢少肆於形器之外以至仁伐至不仁天下之所謂順也而伯夷非之夫伯夷有見於君臣而無見於仁不仁之變也立賢而捨不肖則能安其國家而季子辭之夫季子有見於嫡庶之分而無見於國家安危之權也夫伯夷季子天下之豪傑也其智非不足以有知於君臣嫡庶之外也而守之至死而不敢踰何也夫君臣嫡庶天下之大分也違天下之大分者謂之亂敢任天下之亂而卒不違其正惟有道者能之二子之智不能了然於此而無疑也則寧守其一以無失天下之常故道者君子之所難夫以臣伐君之為不可也而時伐之以庶易嫡之為不可也而時易之是道也聖人之所以破天下之常安而湯武王季之所以為聖而世之姦凶所資之以為僣亂者也天下之小人其心常樂於放肆而無法聖人憂之故一飲食一衣裳嘬啜步趨裾領佩帶恐乎不敢自便使天下守之如畏父母彼惟視天下如揉强伏猛一日解殺則起而為亂故恐懼而不敢肆如此乃欲一決隄壞防闢户徹閾而示之以無所不可曰此為道也則天下幾何而其君臣父子之不相保也故曰小人可以為資孔子曰守道不如守官世之中人使之守官則天下常治而豪傑之士使之繇道則或失之中庸之言曰君子之中庸也君子而時中小人之中庸也小人而無忌憚也夫時中者道之權也而小人之無忌憚乃欲自冒於君子之權則小人者可以一日而啓其自便之意哉且君子之所謂仁義者非謂其知仁義而已也必曰能行焉故仁義責之於躬行至於道則曰志於道而已彼惟其未可以躬行也亦竊有志焉可也自周衰以來老聃莊周始以其說暴於天下彼惟不見聖人之用心故以其所知取髙於世自是以來天下學者棄常而守變忽事而貴理也久矣而不知夫將盡天下之變者必通天下之常將順天下之理者必通天下之事夫聖人所以難夫道而不以示人者其心非外之也非絶其途使天下之人不得而至也吾明至顯之迹使天下繇之君子為之無難而小人無所恃以為亂者又非特如是而止也夫變之所存不在夫變而常者變之宅也異之所起不在夫異而同者異之符也習常守同而後天下之異至也異起焉恣其所取而不為貪者其必知天下之至亷任其所殺而不為暴者其必知天下之至仁故道可循而入不可以直而取吾見天下之好髙者足以召天下之亂而已未見其能道也說俗天下之事其為物也微而為效也漸而深平居無事則若緩而無能為而國家之治亂興亡常繇之者天下之風俗是也天下安而後風俗美非安而後美也夫惟俗美故天下安天下危亂而後風俗惡非亂而後惡也惟風俗之不美故亂繇之而起治天下之本在正俗正俗之道在示之以所安夫人之情何為其有所安也安生於所習見所習久而心悅者然後安之聖人知其然故隆仁義明禮樂以善天下之民使人知其為善家諭其道內外上下無賢不肖舉皆習焉故其人一曰捨是則其心不安是以可使善而不可使為惡不幸天下有僣叛不軌之臣則天下共怒而力誅之如負至難可畏之責閭里有桀傲違教之民則一鄉悉力而共排之如見異常可駭之物惟其然故其為天下也安平而無虞其傳祚也悠逺而屢興昔者三代之衰皆有中興之子孫而周之末世凌夷大壞至於春秋戰國之際其亦極矣然齊桓晉文以大義倡諸侯於紛爭奮攘之中靡然無敢不從當是時也不能霸天下不尊天子者無以令諸侯至於逐君盜國之臣猶不敢自肆必有以其說借依於禮何則天下之情繇安於順故也是故順天下之情者興而違者不旋踵而亡彼秦之强而二世遂滅者何也彼教其俗使安之者乃其所以自亡者也秦滅六國以詐力取天下其民之所見非兵戰則智計非詐謀則斬伐而又使暴刻之吏嚴慘之長日夜猜察而抉剔之秦之父子視殺人無異於犬羊視欺其上無異於紿冦讐視紛爭不寧無異於床寢門闥之安父子兄弟日夜相教其身習之其心安之其氣樂之一不為是則以其為不肖之民故天下一亂君臣相殘郡縣分裂屠殺篡弒大亂而後已何則秦之父兄安於是人莫之或非故也且天下之治亂未有能獨成者也必資天下之衆而天下之安於善而不安者一人其勢不能害天下之治何則周之時非無小人也天下安於惡而不安者一人其勢不能救天下之亂何則秦之時非無君子也故俗之所安其固不可搖俗之所厭其間不可合是以聖人畏之昔者唐之中世大盜起而為亂其將相大臣力征盡討不須㬰而去之大盜既去其遺黨餘種之在河北者皆封以為諸侯然其後僣亂叛渙無所不至唐之君臣為之不安枕者百年卒不能鋤去其河北而唐幾與之皆亡何唐去河北之易而平河北之難也夫安史之際天下習治之俗也彼其民皆愛其君服其政而惡其仇彼其播越而危亡也流涕痛哭而思拯之者不啻如報其父母挾天下之共怒而誅其賊故其用力不勞彼河北之諸鎮傳世一再之後其視叛王命凌天子者乃其所謂才能可喜之觀以夫忠順而畏上者為柔懦而無振故曰𢎞正一效順自以為能變兩河舊俗然不須㬰而禍及之彼唐之君臣乃以人之所欲而强奪其所安故用力雖久而無成嗚呼天下之所安其可畏也如是其甚矣乎仁人君子不務觀天下之俗而占其國家之安危存亡而區區於末事細故者亦愚矣周之俗安於禮義也故周興秦之俗安於詐力殺伐也故秦亡河北之俗安於犯上僣逆也故唐衰彼其安於義禮以夫凡可以為禮義之俗術皆教之故也彼其安於詐力殺伐與夫犯上僣逆者亦以夫凡可以為二者皆見之政也日漸之月摩之則其蟠也如山其動也如川入而譎其妻子者習而後譎其君安於竊鈎者習而後能竊國欲人之無安於惡者無待其成絶其漸焉吾亦遲之矣說化天下之勢自天子至於公卿百執事皆有位自治天下一國而至於一縣鄙一管庫田野族黨皆有職郊廟社稷禮樂服物皆有具賞罰生殺斂散開闔皆有法備其位終其職治其具謹其法天下亦可以常治而不廢矣然而位備職修具立法完而天下不治者何也昔者秦之初天子甚尊百職事甚卑郡縣之勢順而禁約之防甚密也至于二世天下之勢猶未改也而天下土崩瓦解而不可救豈四者不具之罪哉四者之在天下猶人之有四肢心腹而其所以為人不在是也夫人之所以為人其精神為之主而肢體為之物精神清明而後其身為用如其神眊然而䝉昏則其身雖完而不為使至其神漠然亡去而不與屬則腐敗而已矣身豈足恃以固哉先王之治天下者列布官師政教之具於四方而主治於吾心出乎心而加乎身動乎身而見乎化夫心者政之精神而政者心之宅也龍衮執冒大輅鸞旗三揖而坐垂衣而拱手此不足以恃為壯也挾弓超乘瞋目而視總干而立此不足恃以為武也燕私房闥之好淫僻安䙝之習不除而欲以禮齊天下驕懦退怯婦人女子之情不忘而欲以威正四方譬之土偶人未有為土偶人而變者也先王知其然故備天下之政而主之於修身且夫宗祖恣肆於燕寢外朝之臣不見也中夜而醉呼平旦之人不聞也然先王不敢以人之不見不聞而恣何也畏吾身之不然而內有愧焉故也夫惟備物於前而吾心未免於有愧而天下始不信之矣是故先王不敢自恣於冥冥之中誠吾身無愧乎吾心使吾朝夕振作所以示天下而使之從我者確然無有毫髮間於吾誠故其㡣衮執冒大輅鸞旗也天下望其容貌聽其聲音而莊肅之心生挾弓超乘瞋目總干也天下望其旌麾見其羽旄而武怒之氣作蓋天下之所不可掩其實也實著於內而人從於外莫之為而自然候惟有其實而不誣也故位列於上而下仰之職修於官而民從之有司之具不徒設而人則之庶官之法不徒施而人畏之其治益便而其功日隆凡布在內外陳之耳目者皆為吾用是故賞罰號令謂之政陳物顯容謂之教修身治心以達其意於政教謂之化且天下之事有莫知所以然而其理必然者其惟誠乎熊渠子夜行見寢石以為伏虎睨而射之滅矢飲羽下視知石也却復射之矢摧無跡夫射一也而中否異何也所為射之心不同故也政具教存而天下不聽朝廷之上朝言仁義夕講禮樂而天下紛爭放肆不為少止者是射石之矢也豈復能有所動哉夫制刑者莫不欲天下之無犯也堯舜垂衣拱手於上而天下之人象刑而不犯張湯杜周持小慧細察以刺取人之罪辜者世未嘗無也而犯刑者不止夫垂衣拱手之於使人遷善逺罪也宜緩於鞭笞刖劓者矣然論其效必先堯舜繇此觀之政事果足以治天下哉說經新添先王之治天下其賞罰榮辱天下者可謂衆矣然先王未嘗有心焉何則其賞者天下之所共與其罰者天下之所共棄取天下之同好共惡而制榮辱焉故吾何所用心哉夫惟好惡不出於吾心而天下舉同焉是故其好者非苟可悅者也其惡者非私可怒者也是之謂經使天下可悅者非出於一人之私好故為之非苟順也使天下可惡者非出於一人之私恣故避之非苟畏也是以天下之人皆有至公之心正行直言以自達於世而隂消天下姦邪詭僞之俗蓋昔三代之時臣之所以告其君君之所以戒其臣官師相規父子相告者其言明白夷易非有深逺隱伏使人難通而疑之者豈獨如是而已哉其衣服冠冕動作言貌莫不禁夫造異而不同者也嗚呼先王防民之責可謂深矣天下之姦邪何從而起耶使天下之為上皆至公大正取天下之好惡以為已之取舍則必得善惡之實而姦僞何從入之哉惟其天下之所謂善而時非之天下之所謂惡而時取之其為說辨而可惑其為理澤而可喜故奸人得乘其便以附㑹其意而名理始亂矣且見不反人性不能治天下之公善逺天下之共惡也故不得志於世之人苟概之以天下之常道則何從而行其意哉故必其興也必自乎上之好惡違天下之經而志之所向詭辨而多竒也昔齊人有嗜羊者一嗜其瘠一嗜其肥肥之庖皆善羊也而屠羊之病棄而不售者舉集於嗜瘠之門夫彼之所嗜者瘠而已未及夫病也而病者集何也夫肥者天下之所共好不可以僞欺也彼惟所嗜與人異宜僻怪不常而不可以常味曉也故可冒而欺焉是故嗜瘠而得病孟子曰經正則庶民興斯無邪慝矣夫邪慝者不可以經為也惟夫經不正則好惡不通於天下之衆故庶民廢而奸慝冒之以起周公有言曰汝為正克用常人夫非常之人天下之所難得而不如常人何也夫貴天下之所難得經之所繇喪也昔唐文宗成其辱决意於李訓鄭注夫文宗豈欲自禍哉其意惟厭夫天下之所謂才者謂皆庸不足與圖事意天下之竒才必出於常人用意之外故視其姦險譎怪而心不疑更以天下之常理為庸人之論文宗之用心非不至也而無益於禍何也彼惟好惡之不得其正故人主之好惡無他焉舉經而已矣說愛新添世之常言皆曰人之所愛莫如身胥靡乞丐之民使我其身未有樂之者張子曰世未嘗有愛其身者而愛害其身者方且日夜與其身為讎遑遑乎惟恐其害之不至也而何有萬一之愛於身乎天下之物其害夀命而致病者莫如飲食男女之際節臭味逺聲色呼吸屈伸以期於久夀此有生之大務也且世之人有日夜自勉於久夀而若急於飲食男女之際者乎使勉於益生之道如進其所甚憎而使奪其害生之欲如聞其所甚愛彼其為愛生亦不足為矣老子曰人常不畏死奈何以死懼之夫人未有語之以死而不畏者也而日夜之所為則取死之道過半矣凡世之人不畏死之實而畏死之名禍其身於疾病痛苦而死則樂趨而不悔鬬擊刑戮一旦而死則知避之所以亡其生之實則未有别也夫鬬擊刑戮萬一也疾病痛苦朝夕也不戒萬一果畏死乎然凡人譽必曰賢曰君子則愛其身者宜莫若為賢與君子也信止所愛而蹈其言者十人而一而好敗其為君子之道者十人而九也惡死而好害其生者惡不肖而好敗其善者故世之言乎其立者不可其右而深惡其左吾里之狂人好富而日投其金於田里之人而吾之里人果不以投金者或貧矣蘇門六君子文粹卷十四
